<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- TODO: Update title -->
    <title>PAGE_NAME | NumbahWan TCG</title>

    <!-- NW Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.webp">

    <!-- NW Core CSS (order matters) -->
    <link rel="stylesheet" href="/static/nw-utilities.css">
    <link rel="stylesheet" href="/static/nw-tokens.css">
    <link rel="stylesheet" href="/static/nw-core.css">

    <!-- NW Systems -->
    <script defer src="/static/nw-icons-inline.js"></script>
    <script src="/static/click-juice.js" defer></script>

    <style>
        /* ============================================
           PAGE_NAME — NumbahWan Guild Page
           Brand: NumbahWan (NW) — NOT KINTSUGI
           ============================================ */

        /* NW Font Stack — required on every guild page */
        @font-face{font-family:'NumbahWan';src:url('/static/fonts/NumbahWan-Regular.woff2') format('woff2'),url('/static/fonts/NumbahWan-Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
        @font-face{font-family:'Orbitron';src:url('/static/fonts/orbitron-variable.woff2') format('woff2');font-weight:400 900;font-style:normal;font-display:swap}
        @font-face{font-family:'Inter';src:url('/static/fonts/inter-variable.woff2') format('woff2');font-weight:400 700;font-style:normal;font-display:swap}

        /* NW Color Tokens — copy from nw-tokens.css if page needs local overrides */
        :root {
            --bg: #0a0a0f;
            --bg2: #0f0f1a;
            --card-bg: #111122;
            --border: #1e1e35;
            --primary: #ff6b00;       /* Ember orange — NW signature */
            --primary-light: #ff9d4d;
            --primary-dark: #cc5500;
            --gold: #ffd700;
            --gold-dim: #b8860b;
            --gold-glow: rgba(255,215,0,0.15);
            --cyan: #00d4ff;
            --green: #00d26a;
            --red: #ff4757;
            --purple: #a855f7;
            --text: #e8e6df;
            --text-dim: #8a8678;
            --text-muted: #555;
        }

        /* Base reset */
        * { margin:0; padding:0; box-sizing:border-box; max-width:100vw; }
        html, body { overflow-x:hidden; max-width:100vw; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 0.95rem;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Page container ─────────────────────── */
        .page-container {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 16px 60px;
        }

        /* ── Page header ────────────────────────── */
        .page-header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .page-header h1 {
            font-family: 'NumbahWan', 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .page-subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--gold);
            letter-spacing: 1px;
        }

        /* ── Reusable card block ────────────────── */
        .nw-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            position: relative;
        }
        .nw-card::before {
            content: '';
            position: absolute;
            top: 0; left: 16px; right: 16px; height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--gold), var(--primary));
            border-radius: 2px;
        }
        .nw-card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Status pills ───────────────────────── */
        .status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
            justify-content: center;
        }
        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid;
        }
        .status-pill.gold   { color: var(--gold);   border-color: rgba(255,215,0,0.3);   background: rgba(255,215,0,0.08); }
        .status-pill.fire   { color: var(--primary); border-color: rgba(255,107,0,0.3);   background: rgba(255,107,0,0.08); }
        .status-pill.cyan   { color: var(--cyan);    border-color: rgba(0,212,255,0.3);   background: rgba(0,212,255,0.08); }
        .status-pill.green  { color: var(--green);   border-color: rgba(0,210,106,0.3);   background: rgba(0,210,106,0.08); }
        .status-pill.red    { color: var(--red);     border-color: rgba(255,71,87,0.3);   background: rgba(255,71,87,0.08); }
        .status-pill.purple { color: var(--purple);  border-color: rgba(168,85,247,0.3);  background: rgba(168,85,247,0.08); }
        .status-pill .val {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
        }

        /* ── Tab system ─────────────────────────── */
        .tab-bar {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-dim);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(255,107,0,0.15), rgba(255,215,0,0.1));
            border-color: var(--primary);
            color: var(--primary);
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: panelIn 0.3s ease; }
        @keyframes panelIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* ── Action buttons ─────────────────────── */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 16px;
        }
        .action-btn {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid;
            background: transparent;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn.primary { color: var(--primary); border-color: rgba(255,107,0,0.4); }
        .action-btn.primary:hover { background: rgba(255,107,0,0.1); }
        .action-btn.danger  { color: var(--red);     border-color: rgba(255,71,87,0.4); }
        .action-btn.info    { color: var(--cyan);    border-color: rgba(0,212,255,0.4); }
        .action-btn.success { color: var(--green);   border-color: rgba(0,210,106,0.4); }
        .action-btn.full { grid-column: 1 / -1; }

        /* ── Toast notification ─────────────────── */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--card-bg); border: 1px solid var(--primary);
            color: var(--text); padding: 10px 20px; border-radius: 8px;
            font-size: 0.85rem; z-index: 9999; opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }

        /* ── Description text ───────────────────── */
        .desc-text {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        /* ════════════════════════════════════════════
           MOBILE — Single breakpoint (768px)
           DO NOT add a second @media for 768px!
           ════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .page-container { padding: 14px 10px 50px; }
            .nw-card { padding: 12px; }
            .tab-btn { font-size: 0.75rem; padding: 6px 10px; }
            .action-btn { font-size: 0.8rem; padding: 8px; }
            /* Minimum font sizes: 0.85rem (~13.6px) for text, 0.8rem for tiny labels */
        }
    </style>
</head>
<body>
    <!-- NW Nav (universal guild navigation) -->
    <script src="/static/nw-nav.js"></script>

    <div class="page-container">
        <!-- ═══ HEADER ═══ -->
        <div class="page-header">
            <h1 data-i18n="page_title">PAGE_NAME</h1>
            <div class="page-subtitle" data-i18n="page_subtitle">Subtitle goes here</div>
        </div>

        <!-- ═══ STATUS BAR ═══ -->
        <div class="status-bar">
            <div class="status-pill gold"><span data-i18n="stat_label_1">Label</span> <span class="val" id="stat1">#1</span></div>
            <div class="status-pill fire"><span data-i18n="stat_label_2">Label</span> <span class="val" id="stat2">0</span></div>
        </div>

        <!-- ═══ TAB BAR ═══ -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="tab1" data-i18n="tab_1">Tab 1</button>
            <button class="tab-btn" data-tab="tab2" data-i18n="tab_2">Tab 2</button>
            <button class="tab-btn" data-tab="tab3" data-i18n="tab_3">Tab 3</button>
        </div>

        <!-- ═══ TAB PANELS ═══ -->
        <div class="tab-panel active" id="panel-tab1">
            <div class="nw-card">
                <div class="nw-card-title">
                    <span data-i18n="card_title_1">Card Title</span>
                </div>
                <p class="desc-text" data-i18n="card_desc_1">Card description goes here. Use data-i18n for all text.</p>

                <!-- Dynamic content rendered by JS goes here -->
                <div id="dynamicContent1"></div>

                <div class="action-grid">
                    <button class="action-btn primary" onclick="PAGE.action1()"><span data-i18n="btn_action1">Action 1</span></button>
                    <button class="action-btn info" onclick="PAGE.action2()"><span data-i18n="btn_action2">Action 2</span></button>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="panel-tab2">
            <div class="nw-card">
                <div class="nw-card-title"><span data-i18n="card_title_2">Second Tab</span></div>
                <p class="desc-text" data-i18n="card_desc_2">Content for the second tab.</p>
            </div>
        </div>

        <div class="tab-panel" id="panel-tab3">
            <div class="nw-card">
                <div class="nw-card-title"><span data-i18n="card_title_3">Third Tab</span></div>
                <p class="desc-text" data-i18n="card_desc_3">Content for the third tab.</p>
            </div>
        </div>
    </div>

    <!-- Toast element -->
    <div class="toast" id="toast"></div>

    <!-- NW i18n Core (must come before page script) -->
    <script src="/static/nw-i18n-core.js"></script>

    <script>
    // ============================================
    // PAGE_NAME ENGINE
    // ============================================

    // i18n helper — wraps NW_I18N.t() with fallback
    const t = (k, fb) => (typeof NW_I18N !== 'undefined' && NW_I18N.t) ? NW_I18N.t(k, fb) : fb || k;

    const PAGE = (() => {
        // ── State ───────────────────────────────
        const state = {
            // TODO: Add page-specific state
        };

        // ── Tab system ──────────────────────────
        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                    btn.classList.add('active');
                    const panel = document.getElementById('panel-' + btn.dataset.tab);
                    if (panel) panel.classList.add('active');
                });
            });
        }

        // ── Toast ───────────────────────────────
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        // ── Actions (TODO: implement) ───────────
        function action1() {
            showToast(t('toast_action1', 'Action 1 triggered'));
        }
        function action2() {
            showToast(t('toast_action2', 'Action 2 triggered'));
        }

        // ── Init ────────────────────────────────
        function init() {
            initTabs();
            // TODO: Render dynamic content, load state, etc.
        }

        // ── State persistence (optional) ────────
        function saveState() {
            try { localStorage.setItem('nw_PAGE_NAME_state', JSON.stringify(state)); } catch {}
        }
        function loadState() {
            try {
                const saved = JSON.parse(localStorage.getItem('nw_PAGE_NAME_state'));
                if (saved) Object.assign(state, saved);
            } catch {}
        }

        return { init, action1, action2, showToast };
    })();

    // ── i18n Registration ───────────────────────
    // All 3 languages required for NW guild pages
    NW_I18N.register({
        en: {
            page_title: 'PAGE_NAME',
            page_subtitle: 'Subtitle goes here',
            tab_1: 'Tab 1', tab_2: 'Tab 2', tab_3: 'Tab 3',
            stat_label_1: 'Label', stat_label_2: 'Label',
            card_title_1: 'Card Title', card_desc_1: 'Card description goes here.',
            card_title_2: 'Second Tab', card_desc_2: 'Content for the second tab.',
            card_title_3: 'Third Tab', card_desc_3: 'Content for the third tab.',
            btn_action1: 'Action 1', btn_action2: 'Action 2',
            toast_action1: 'Action 1 triggered', toast_action2: 'Action 2 triggered'
        },
        zh: {
            page_title: '頁面名稱',
            page_subtitle: '副標題',
            tab_1: '分頁一', tab_2: '分頁二', tab_3: '分頁三',
            stat_label_1: '標籤', stat_label_2: '標籤',
            card_title_1: '卡片標題', card_desc_1: '卡片描述。',
            card_title_2: '第二分頁', card_desc_2: '第二分頁內容。',
            card_title_3: '第三分頁', card_desc_3: '第三分頁內容。',
            btn_action1: '操作一', btn_action2: '操作二',
            toast_action1: '操作一已觸發', toast_action2: '操作二已觸發'
        },
        th: {
            page_title: 'ชื่อหน้า',
            page_subtitle: 'คำบรรยาย',
            tab_1: 'แท็บ 1', tab_2: 'แท็บ 2', tab_3: 'แท็บ 3',
            stat_label_1: 'ป้าย', stat_label_2: 'ป้าย',
            card_title_1: 'ชื่อการ์ด', card_desc_1: 'คำอธิบายการ์ด',
            card_title_2: 'แท็บที่สอง', card_desc_2: 'เนื้อหาแท็บที่สอง',
            card_title_3: 'แท็บที่สาม', card_desc_3: 'เนื้อหาแท็บที่สาม',
            btn_action1: 'การกระทำ 1', btn_action2: 'การกระทำ 2',
            toast_action1: 'การกระทำ 1 ถูกเรียก', toast_action2: 'การกระทำ 2 ถูกเรียก'
        }
    });

    document.addEventListener('DOMContentLoaded', () => PAGE.init());
    </script>
</body>
</html>
