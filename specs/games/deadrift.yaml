type: game-page-3d
slug: deadrift
title: "DEADRIFT"

theme:
  primary: "#ff4444"
  secondary: "#ffbe0b"
  background: "#0c0c14"
  palette: ["#ff4444", "#ffbe0b", "#a855f7", "#f97316", "#22d3ee", "#22c55e"]

game:
  genre: zombie-idle-rpg
  mechanic: "Side-scrolling zombie survival with auto-combat, weapon gacha, prestige system, and community guilds"
  controls:
    tap: "Attack / Confirm"
    swipe: "Dodge / Navigate"
    hold: "Special ability"
  
  prestige_tiers:
    - id: gamer
      name: "Fat Gamer"
      unlock: 0
      bonus: "none"
    - id: enforcer
      name: "Enforcer"
      unlock: 1
      bonus: "+25% DMG"
    - id: seal
      name: "Navy SEAL Team 6"
      unlock: 3
      bonus: "+50% DMG, cinematic unlock"

  weapons:
    melee:
      - { id: bat, name: "Baseball Bat", rarity: common, dmg: 5, speed: 1.0 }
      - { id: pipe, name: "Lead Pipe", rarity: common, dmg: 7, speed: 0.9 }
      - { id: machete, name: "Machete", rarity: rare, dmg: 12, speed: 1.1 }
      - { id: katana, name: "Katana", rarity: epic, dmg: 18, speed: 1.3 }
      - { id: chainsaw, name: "Chainsaw", rarity: legendary, dmg: 28, speed: 0.7 }
    ranged:
      - { id: m4a1, name: "M4A1", rarity: rare, dmg: 10, speed: 1.5, range: 400 }
      - { id: shotgun, name: "Shotgun", rarity: rare, dmg: 22, speed: 0.6, range: 200 }
      - { id: minigun, name: "Minigun", rarity: epic, dmg: 8, speed: 3.0, range: 350 }
      - { id: railgun, name: "Railgun", rarity: legendary, dmg: 45, speed: 0.3, range: 600 }
      - { id: plasma, name: "Plasma Cannon", rarity: ssr, dmg: 60, speed: 0.5, range: 500 }

  enemies:
    - { id: walker, name: "Walker", hp: 30, speed: 0.5, type: melee }
    - { id: runner, name: "Runner", hp: 20, speed: 1.5, type: melee }
    - { id: bloater, name: "Bloater", hp: 100, speed: 0.3, type: explode }
    - { id: spitter, name: "Spitter", hp: 25, speed: 0.7, type: ranged }
    - { id: crawler, name: "Crawler", hp: 15, speed: 1.0, type: melee }

  bosses:
    - { id: gorelord, name: "The Gorelord", hp: 500, phases: 3, zone: 2 }
    - { id: hivemind, name: "The Hivemind", hp: 1000, phases: 4, zone: 5 }

  zones:
    - { id: ruined_city, name: "Ruined City", unlock: 0, material: scrap }
    - { id: subway, name: "Subway Tunnels", unlock: 5, material: wire }
    - { id: hospital, name: "Abandoned Hospital", unlock: 12, material: meds }
    - { id: military, name: "Military Base", unlock: 20, material: ammo }
    - { id: nuclear, name: "Nuclear Plant", unlock: 30, material: fuel }
    - { id: hive, name: "The Hive", unlock: 40, material: chitin }

  difficulty:
    enemies_per_wave: "2 + wave * 1.5"
    hp_scaling: "1 + wave * 0.2"
    boss_every: 10

  audio:
    type: web-audio-synth
    ambient: true
    sfx: true

  telemetry:
    track_sessions: true
    track_inputs: true
    addiction_scoring: true
    persistence: localStorage

community:
  guild: true
  trade: true
  pvp: true
  progression: true

# ═══════════════════════════════════════════════════════════════
# ART PIPELINE — Art Forge v2.0 manifest
# This drives the entire art generation + crop + embed pipeline
# ═══════════════════════════════════════════════════════════════
art:
  style: "dark comic-book cel-shaded style with vibrant colors and thick outlines, 2D side-scroller game art"
  outputDir: "./public/games/art/deadrift"
  embedMode: base64    # Inline all art into the HTML for true single-file game

  characters:
    - id: char_tier0_gamer
      description: "Overweight gamer male, stained hoodie, sweatpants, gaming headset, bag of chips, energy drink in pocket. Comedic, slouching posture. Side view facing right"
      size: lg

    - id: char_tier1_enforcer
      description: "Muscular fit male, buzz cut, grey t-shirt under olive tactical vest, cargo pants, combat boots, holding nothing (hands ready). Stern expression. Side view facing right"
      size: lg

    - id: char_tier2_seal
      description: "Elite Navy SEAL operator, full tactical gear, helmet with NVG, plate carrier with MOLLE pouches, camo pants, knee pads, combat boots. Weapon slung on back. Side view facing right"
      size: lg

  enemies:
    - id: zombie_walker
      description: "Slow shambling zombie, torn dirty clothes, green-grey rotting skin, missing jaw, exposed ribs, glowing red eyes. Side view"
      size: md

    - id: zombie_runner
      description: "Fast lean zombie, ripped clothes, long arms, mouth wide open screaming, sprinting pose, red glowing eyes. Side view"
      size: md

    - id: zombie_bloater
      description: "Huge fat bloated zombie, distended stomach about to burst, pustules, yellow-green skin, dripping toxic slime. Side view"
      size: lg

    - id: zombie_spitter
      description: "Hunched zombie with elongated neck, cheeks bulging with acid, toxic green drool, one arm mutated into tentacle. Side view"
      size: md

    - id: zombie_crawler
      description: "Half-zombie crawling on ground, no legs, dragging entrails, fast with arms, reaching forward. Side view"
      size: md

    - id: boss_gorelord
      description: "Massive gore demon, towering muscular frame, exposed muscles and bone, crown of bone spikes, glowing red chest cavity, two giant clawed arms. Side view"
      size: lg

    - id: boss_hivemind
      description: "Alien hivemind creature, multiple heads fused together, tentacles, bioluminescent orange pustules, floating slightly, ethereal horror. Side view"
      size: lg

  # ★ WEAPONS — Batched on sheets for efficiency
  # 10 weapons = 2 sheet images + 2 rmbg calls = 4 API calls (instead of 20)
  weapons:
    - id: wpn_bat
      description: "Wooden baseball bat, worn grip tape, blood splatter, slightly cracked"

    - id: wpn_pipe
      description: "Rusty metal pipe, bent slightly, wrapped with tape at grip end"

    - id: wpn_machete
      description: "Military machete, dark blade with nicks, wrapped handle, blood on edge"

    - id: wpn_katana
      description: "Japanese katana, gleaming steel blade, red and black wrapped handle, slight glow"

    - id: wpn_chainsaw
      description: "Gas-powered chainsaw, orange and black, running with sparks, aggressive"
      size: md

    - id: wpn_m4a1
      description: "M4A1 assault rifle, black with red dot sight, military spec, side view"
      size: md

    - id: wpn_shotgun
      description: "Tactical pump shotgun, dark grey, short barrel, pistol grip"
      size: md

    - id: wpn_minigun
      description: "Handheld minigun, multiple rotating barrels, ammo belt, heavy military"
      size: md

    - id: wpn_railgun
      description: "Futuristic railgun, glowing blue energy coils, sleek sci-fi design"
      size: md

    - id: wpn_plasma
      description: "Plasma cannon, green glowing core, alien-tech design, energy crackling"
      size: md

  # ★ ITEMS — Batched on one sheet for efficiency
  # 6 items = 1 sheet image + 1 rmbg call = 2 API calls (instead of 12)
  items:
    - id: mat_scrap
      description: "Pile of metal scrap pieces, rusty bolts and gears"

    - id: mat_wire
      description: "Bundle of copper electrical wire, stripped ends sparking"

    - id: mat_meds
      description: "Medical supplies, bandages, pills, red cross symbol"

    - id: mat_ammo
      description: "Box of ammunition, brass bullet casings visible, military markings"

    - id: mat_fuel
      description: "Yellow fuel canister, radiation warning symbol, glowing slightly"

    - id: mat_chitin
      description: "Alien chitin plate, dark glossy surface, organic curves, iridescent"

  # ★ EFFECTS — Batched on one sheet
  # 4 effects = 1 sheet + 1 rmbg = 2 API calls (instead of 8)
  effects:
    - id: fx_muzzle_flash
      description: "Bright yellow-white muzzle flash, star burst shape, hot sparks"

    - id: fx_blood_splat
      description: "Dark red blood splatter, spray pattern, droplets"

    - id: fx_explosion
      description: "Fiery explosion, orange and red flames, smoke, debris"
      size: md

    - id: fx_shield
      description: "Blue translucent energy shield bubble, hexagonal pattern, glowing edges"
      size: md

  # Backgrounds — Individual (too large for sheets)
  backgrounds:
    - id: zone0_ruined_city
      description: "Destroyed cityscape at night, broken skyscrapers with glowing purple/red windows, rubble, abandoned cars, distant fires, thick dark atmosphere"
      colorScheme: "dark reds, deep purples, fire orange"

    - id: zone1_subway
      description: "Dark underground subway tunnel, abandoned metro station, flickering teal emergency lights, puddles on tracks reflecting light, cracked pillars, graffiti, eerie fog"
      colorScheme: "dark teal, cyan, black"

    - id: zone2_hospital
      description: "Abandoned hospital corridor, flickering fluorescent lights, overturned gurneys, biohazard signs, blood smears, eerie purple lighting, broken windows"
      colorScheme: "dark purple, sterile white, blood red"

    - id: zone3_military
      description: "Military compound at night, fortified bunkers, sandbag walls, watchtowers, military vehicles, ammunition crates, yellow floodlights cutting through haze"
      colorScheme: "olive green, dark khaki, yellow floodlight"

    - id: zone4_nuclear
      description: "Nuclear power plant meltdown, cracked cooling towers leaking radioactive green glow, toxic waste barrels, radiation signs, dead vegetation, ominous clouds"
      colorScheme: "toxic yellow-green, dark grey, nuclear glow"

    - id: zone5_hive
      description: "Organic alien hive interior, fleshy red walls, pulsating veins, bone-like columns, blood pools, bioluminescent growths, horrific living architecture"
      colorScheme: "deep crimson, blood red, bioluminescent orange"

renderer:
  tier: canvas2d
  fallback: procedural
  postProcess:
    - bloom
    - vignette
    - screen_shake
