type: game-page
slug: voidbloom
title: "VOIDBLOOM"

theme:
  primary: "#c471f5"
  secondary: "#ff006e"
  background: "#000000"
  palette: ["#c471f5", "#ff006e", "#ffbe0b", "#8338ec", "#00e5ff", "#ff8800"]

game:
  genre: roguelike-bullet-hell
  mechanic: "You're a dying star cultivating alien flowers in the void. Each flower is a weapon. The void fights back."
  controls:
    mouse: "Move toward pointer, auto-aim"
    tap: "Shoot / Start / Restart"
    e_key: "Switch active flower weapon"
    shift: "Slow time (costs energy)"
  
  flowers:
    - id: starbloom
      pattern: single
      fire_rate: 8
      unlocked: true
    - id: rosevoid
      pattern: spread3
      fire_rate: 12
      unlocked: true
    - id: helixfern
      pattern: helix
      unlock_wave: 3
    - id: novaorchid
      pattern: burst
      unlock_wave: 5
    - id: ashpetal
      pattern: rapid
      unlock_wave: 8

  enemies:
    - drifter: "Slow, drifting void creature"
    - spitter: "Ranged attacker, aims at player"
    - orbiter: "Orbits player, fires spreads"
    - blocker: "Tanky, slow, absorbs damage"
    - swarm: "Fast, fragile, chases player"

  bosses:
    - voidmaw: "Wave 5 — 3 phases, ring + spiral + aimed patterns"
    - eclipsis: "Wave 10 — 4 phases, complex bullet curtains"

  difficulty:
    enemies_per_wave: "3 + wave * 2"
    hp_scaling: "1 + wave * 0.15"
    boss_every: 5
    
  audio:
    type: web-audio-synth
    drone: true
    dynamic_layers: true

  telemetry:
    track_sessions: true
    track_inputs: true
    addiction_scoring: true
    persistence: localStorage
