type: game-page
slug: pulse-drift
title: "Pulse Drift"

theme:
  primary: "#00e5ff"
  secondary: "#ff006e"
  background: "#0a0a1a"
  palette: ["#00e5ff", "#ff006e", "#ffbe0b", "#8338ec", "#3a86ff"]

game:
  genre: rhythm-dodge
  mechanic: "Player circle pulses between colors on a beat. Walls scroll toward you — tap/click to phase-shift color. Match the wall color to pass through, mismatch = death."
  controls:
    tap: "Phase shift to next color"
    hold: "Slow time (costs energy)"
  scoring:
    base: 10
    chain_multiplier: true
    max_chain: 50
  
  difficulty:
    start_bpm: 80
    max_bpm: 160
    bpm_increase_per_level: 5
    wall_gap_start: 0.45
    wall_gap_min: 0.25
    colors_start: 2
    colors_max: 4
    colors_unlock_at: [1, 5, 15]

  audio:
    type: "web-audio-synth"
    beat_sound: "kick"
    phase_sound: "blip"
    death_sound: "noise-burst"
    bg_drone: true

  telemetry:
    track_sessions: true
    track_inputs: true
    track_deaths: true
    addiction_scoring: true
    debug_overlay: true
