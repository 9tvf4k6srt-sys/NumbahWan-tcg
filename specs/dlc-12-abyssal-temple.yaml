explore:
  tag: "DLC 12 • The Drowned Oracle"
  title: "Thalassa, the Drowned Oracle — She Heard Every Wish"
  tagline: "She didn't grant wishes. She collected them. Now she has 10,000 years of desperate prayers — and she's using them as ammunition."

  boss_image:
    src: "/static/game/the-veil/abyssal-temple-boss.webp"
    alt: "Thalassa the Drowned Oracle — ancient sea deity in a flooded cathedral beneath Castle NumbahWan"
    frame_tag: "THALASSA, THE DROWNED ORACLE"
    frame_engine: "DLC 12 BOSS"

  lore:
    heading: "The Cathedral Beneath the Waves"
    paragraphs:
      - key: thalassa_p1
        en: "The Abyssal Temple was discovered when a player's fishing line went taut and pulled them through the castle's foundations. 400 meters below Castle NumbahWan lies a cathedral that predates the guild by centuries. Its pews are filled with coral-encrusted skeletons still in prayer position. The organ still plays — powered by the tide. The stained glass windows depict events that haven't happened yet."
      - key: thalassa_p2
        en: "Thalassa sits at the altar, draped in kelp and barnacles, her eyes replaced by two glowing pearls that see every timeline simultaneously. She's been collecting the wishes of everyone who ever prayed at Castle NumbahWan — not to grant them, but to understand human desire well enough to weaponize it. Her ultimate attack: she grants your deepest wish, then shows you why you shouldn't have wanted it."

    side_image:
      src: "/static/game/the-veil/abyssal-temple-keyart.webp"
      alt: "The Abyssal Temple — flooded cathedral beneath Castle NumbahWan with bioluminescent coral"
      frame_tag: "THE ABYSSAL TEMPLE — DEPTHS"
      frame_engine: "DLC 12"

  features:
    - key: feat_pressure
      icon: "🌊"
      title: "Pressure Mechanics"
      en: "The deeper you go, the more your abilities compress. Melee range shrinks. Spell radius tightens. At maximum depth, your screen physically distorts. The first raid boss where your GPU settings are a survival mechanic. Players with ultrawide monitors have a genuine tactical advantage. Gerald brought a snorkel. It does not help."

    - key: feat_wishweapon
      icon: "⭐"
      title: "Wish Weaponry"
      en: "Thalassa's attacks are literal answered prayers. She fires beams of 'I wish I was stronger' that buff you beyond control — your character starts breaking their own equipment from excess power. She summons 'I wish I was loved' that charm your companions against you. The final phase: 'I wish this would end' — instant kill if you've typed it in chat during the raid."

    - key: feat_coralarmor
      icon: "🐚"
      title: "Coral Armor Set"
      en: "Defeat Thalassa to craft the Coral Armor — living armor that grows on your character over time. After 30 days it reaches full bloom with bioluminescent patterns unique to each player. The armor whispers the last wish Thalassa heard before you defeated her. It's always 'I wish someone would listen.' Gerald is uncomfortable."

i18n: auto
