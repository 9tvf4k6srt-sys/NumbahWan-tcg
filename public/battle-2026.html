<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚔️ NWG Battle Arena 2026</title>
  <link rel="icon" href="/static/icons/sacred-log-64.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/nw-battle-2026.css">
  <script src="/static/nw-essentials.js" defer></script>
  <script src="/static/nw-sounds.js" defer></script>
  <script src="/static/nw-battle-2026.js" defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav style="background:#15151f;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;">
    <a href="/" style="color:#ffd700;text-decoration:none;font-weight:bold;">🔥 NumbahWan</a>
    <div style="display:flex;gap:1rem;">
      <a href="/cards" style="color:#888;text-decoration:none;font-size:0.85rem;">📦 Cards</a>
      <a href="/card-bridge" style="color:#888;text-decoration:none;font-size:0.85rem;">💰 Bridge</a>
      <a href="/wallet" style="color:#888;text-decoration:none;font-size:0.85rem;">👛 Wallet</a>
    </div>
  </nav>

  <!-- Battle Container -->
  <div id="battleContainer"></div>

  <script>
    // Load demo cards if needed
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('/api/cards?limit=20');
        const data = await res.json();
        if (data.cards) {
          NWBattle2026.setCollection(data.cards);
          NWBattle2026.init('battleContainer');
        }
      } catch(e) {
        console.warn('Could not load cards:', e);
      }
    });
  </script>
</body>
</html>
