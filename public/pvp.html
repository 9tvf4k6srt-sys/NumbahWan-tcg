    <style>
        :root {
            --primary: #ff6b00;
            --primary-light: #ff9d4d;
            --primary-dark: #cc5500;
            --bg-dark: #0a0a0f;
            --win-green: #22c55e;
            --loss-red: #ef4444;
            --gold: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            background: var(--bg-dark);
            font-family: var(--nw-font-display), sans-serif;
            color: #fff;
        }
        
        .pixel-font { font-family: 'NumbahWan', 'Press Start 2P', cursive; }
        
        .aurora-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 107, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(239, 68, 68, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(34, 197, 94, 0.08) 0%, transparent 70%);
            z-index: -1;
            animation: auroraMove 20s ease-in-out infinite;
        }
        
        @keyframes auroraMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(3deg); }
        }
        
        .glass-card {
            background: rgba(255, 107, 0, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        /* Day card styling */
        .day-card {
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.1) 0%, rgba(0, 0, 0, 0.3) 100%);
            border: 2px solid rgba(255, 107, 0, 0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .day-card:hover {
            border-color: rgba(255, 107, 0, 0.5);
            box-shadow: 0 8px 32px rgba(255, 107, 0, 0.2);
        }
        
        .day-card.good-day {
            border-color: rgba(34, 197, 94, 0.4);
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(0, 0, 0, 0.3) 100%);
        }
        
        .day-card.bad-day {
            border-color: rgba(239, 68, 68, 0.4);
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(0, 0, 0, 0.3) 100%);
        }
        
        .day-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .day-header.good { background: rgba(34, 197, 94, 0.15); }
        .day-header.bad { background: rgba(239, 68, 68, 0.15); }
        
        /* Battle record styling */
        .battle-row {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        
        .battle-row:hover {
            background: rgba(255, 107, 0, 0.1);
            border-color: rgba(255, 107, 0, 0.2);
        }
        
        .win-badge {
            background: linear-gradient(135deg, var(--win-green) 0%, #16a34a 100%);
            color: white;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        
        .loss-badge {
            background: linear-gradient(135deg, var(--loss-red) 0%, #dc2626 100%);
            color: white;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        
        .defense-tag {
            background: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .attack-tag {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .lp-gain { color: var(--win-green); font-size: 0.8rem; }
        .lp-loss { color: var(--loss-red); font-size: 0.8rem; }
        
        /* Rank badges */
        .gm-badge {
            background: linear-gradient(135deg, var(--gold) 0%, #f59e0b 100%);
            color: #000;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        
        .gm-badge.demoted {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .gm-badge.promoted {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }
        
        /* Shine animation for flex cards */
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        @keyframes rainbowGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 0, 255, 0.8)); }
            33% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8)); }
            66% { filter: drop-shadow(0 0 15px rgba(255, 107, 0, 0.8)); }
        }
        
        /* Stats box */
        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--primary);
        }
        
        /* Melon emoji animation */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .melon-bounce { animation: bounce 2s ease-in-out infinite; }
        
        /* Class icon */
        .class-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(255, 107, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        
        
        
        
        
        /* Win rate circle */
        .win-rate-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(var(--win-green) var(--win-pct), rgba(239, 68, 68, 0.4) var(--win-pct));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .win-rate-ring::before {
            content: '';
            width: 60px;
            height: 60px;
            background: var(--bg-dark);
            border-radius: 50%;
            position: absolute;
        }
        
        .win-rate-text {
            position: relative;
            z-index: 1;
            font-weight: 900;
            font-size: 1rem;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .battle-row {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }
            .battle-row > div:last-child {
                align-self: flex-end;
            }
        }
        
        /* Quick Battle Button */
        .quick-battle-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 24px;
            background: linear-gradient(135deg, #ff6b00, #ffd700);
            color: #000;
            font-weight: 700;
            text-decoration: none;
            border-radius: 12px;
            font-family: 'NumbahWan', 'Orbitron', sans-serif;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(255, 107, 0, 0.4);
        }
        .quick-battle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 107, 0, 0.6);
        }
        .battle-icon { font-size: 20px; }
        
        /* Quick Actions Grid */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 107, 0, 0.3);
            border-radius: 16px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .action-btn:hover {
            background: rgba(255, 107, 0, 0.1);
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        .action-btn.battle { border-color: rgba(255, 107, 0, 0.5); }
        .action-btn.deck { border-color: rgba(168, 85, 247, 0.5); }
        .action-btn.collection { border-color: rgba(34, 197, 94, 0.5); }
        .btn-icon { font-size: 32px; margin-bottom: 8px; }
        .btn-text { color: #fff; font-weight: 700; font-size: 14px; }
        .btn-desc { color: rgba(255, 255, 255, 0.5); font-size: 12px; margin-top: 4px; }
        
        @media (max-width: 640px) {
            .quick-actions { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .action-btn { padding: 12px 8px; }
            .btn-icon { font-size: 24px; }
            .btn-text { font-size: 11px; }
            .btn-desc { display: none; }
            .quick-battle-btn { padding: 10px 16px; font-size: 14px; }
        }
