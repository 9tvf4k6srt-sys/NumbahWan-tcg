<!DOCTYPE html>
<html>
<head>
    <title>Test Pull</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; }
        .pack { width: 200px; height: 280px; background: url('/static/images/packs/pack-single.png') center/contain no-repeat;
                cursor: pointer; margin: 20px auto; border: 3px solid gold; border-radius: 16px; }
        .pack:hover { transform: scale(1.05); }
        .status { text-align: center; padding: 20px; font-size: 18px; }
        .log { background: #000; padding: 10px; margin-top: 20px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">🧪 Test Pull Page</h1>
    <div class="status" id="status">Click the pack to test!</div>
    <div class="pack" onclick="testPull()"></div>
    <div class="log" id="log"></div>
    
    <script>
        function log(msg) {
            console.log(msg);
            document.getElementById('log').innerHTML += msg + '<br>';
        }
        
        function testPull() {
            log('✅ Click detected!');
            document.getElementById('status').textContent = '🎴 PULLING...';
            
            // Simulate card pull
            const rarities = ['common', 'common', 'common', 'uncommon', 'uncommon', 'rare', 'epic', 'legendary', 'mythic'];
            const rarity = rarities[Math.floor(Math.random() * rarities.length)];
            
            log('🎲 Rolled: ' + rarity.toUpperCase());
            
            setTimeout(() => {
                document.getElementById('status').innerHTML = '🎉 You got a <strong style="color:' + 
                    (rarity === 'mythic' ? '#ff00ff' : rarity === 'legendary' ? '#ffd700' : '#fff') + 
                    '">' + rarity.toUpperCase() + '</strong> card!';
                log('✅ Pull complete!');
            }, 500);
        }
        
        log('Page loaded at ' + new Date().toLocaleTimeString());
        log('Ready to test pulls!');
    </script>
</body>
</html>
