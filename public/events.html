<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>NumbahWan TCG | Events & Bonuses</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/nw-tokens.css">
    <link rel="stylesheet" href="/static/nw-utilities.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="/static/nw-essentials.js"></script>
    <script src="/static/nw-wallet.js"></script>
    <script src="/static/nw-icons-inline.js"></script>
    <script src="/static/nw-nav.js"></script>
    <style>
        :root {
            --gold: #ffd700; --orange: #ff6b00; --purple: #a855f7; --blue: #3b82f6;
            --green: #22c55e; --red: #ef4444; --dark: #0a0a0f; --mythic: #ff00ff;
            --cyan: #00ffff; --log: #c97f3d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--dark); 
            color: #fff;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        
        .bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(ellipse at top, rgba(255,107,0,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(168,85,247,0.1) 0%, transparent 40%),
                var(--dark);
        }
        
        header {
            position: sticky; top: 0; z-index: 100;
            padding: 12px 16px;
            background: rgba(10,10,15,0.98);
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255,107,0,0.4);
        }
        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 800;
            color: var(--orange); text-decoration: none;
            text-shadow: 0 0 20px rgba(255,107,0,0.5);
            display: flex; align-items: center; gap: 8px;
        }
        .nav-links { display: flex; gap: 8px; align-items: center; }
        .nav-link {
            padding: 8px 14px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            color: #fff; font-size: 13px; text-decoration: none; font-weight: 600;
        }
        
        main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
        
        /* Today's Event Banner */
        .today-banner {
            background: linear-gradient(135deg, rgba(255,107,0,0.2), rgba(168,85,247,0.2));
            border: 2px solid var(--orange);
            border-radius: 20px; padding: 24px;
            margin-bottom: 24px;
            position: relative; overflow: hidden;
        }
        .today-banner::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at top right, rgba(255,107,0,0.3) 0%, transparent 50%);
        }
        .today-label {
            font-size: 11px; font-weight: 700;
            color: var(--orange); margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
            position: relative;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .today-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, var(--orange), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            position: relative;
        }
        .today-desc {
            color: rgba(255,255,255,0.7);
            font-size: 14px; margin-bottom: 16px;
            position: relative;
        }
        .today-bonuses {
            display: flex; flex-wrap: wrap; gap: 10px;
            position: relative;
        }
        .bonus-tag {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; padding: 8px 16px;
            font-size: 13px; font-weight: 600;
            display: flex; align-items: center; gap: 6px;
        }
        .bonus-tag.active {
            background: linear-gradient(135deg, var(--green), #16a34a);
            border-color: var(--green);
            color: #fff;
        }
        .today-timer {
            position: absolute; top: 20px; right: 24px;
            text-align: right;
        }
        .timer-label { font-size: 10px; color: rgba(255,255,255,0.5); }
        .timer-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; font-weight: 700;
            color: var(--cyan);
        }
        
        /* Weekly Calendar */
        .week-section {
            margin-bottom: 32px;
        }
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px; font-weight: 700;
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .week-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .day-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .day-card:hover { border-color: var(--orange); transform: translateY(-2px); }
        .day-card.today {
            background: linear-gradient(135deg, rgba(255,107,0,0.2), rgba(255,215,0,0.2));
            border-color: var(--orange);
        }
        .day-card.past { opacity: 0.5; }
        .day-name {
            font-size: 10px; font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .day-card.today .day-name { color: var(--orange); }
        .day-date {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px; font-weight: 700;
            margin-bottom: 8px;
        }
        .day-event {
            font-size: 20px; margin-bottom: 4px;
        }
        .day-event-name {
            font-size: 9px; font-weight: 600;
            color: rgba(255,255,255,0.7);
            line-height: 1.2;
        }
        
        /* Event Details */
        .events-list {
            display: flex; flex-direction: column;
            gap: 16px;
        }
        .event-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 20px;
            display: flex; gap: 16px;
            transition: all 0.3s;
        }
        .event-card:hover { border-color: var(--orange); }
        .event-card.active {
            background: linear-gradient(135deg, rgba(255,107,0,0.1), rgba(168,85,247,0.1));
            border-color: var(--orange);
        }
        .event-icon {
            width: 60px; height: 60px;
            background: rgba(255,107,0,0.2);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; flex-shrink: 0;
        }
        .event-content { flex: 1; }
        .event-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 8px;
        }
        .event-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px; font-weight: 700;
        }
        .event-schedule {
            font-size: 11px; font-weight: 600;
            padding: 4px 10px; border-radius: 12px;
            background: rgba(255,255,255,0.1);
        }
        .event-schedule.weekly { background: rgba(59,130,246,0.3); color: var(--blue); }
        .event-schedule.daily { background: rgba(34,197,94,0.3); color: var(--green); }
        .event-schedule.limited { background: rgba(255,107,0,0.3); color: var(--orange); }
        .event-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
        }
        .event-bonuses {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .event-bonus {
            font-size: 11px; font-weight: 600;
            padding: 4px 10px; border-radius: 8px;
            background: rgba(255,215,0,0.2);
            color: var(--gold);
        }
        
        /* Upcoming Section */
        .upcoming-section {
            margin-top: 32px;
        }
        .upcoming-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .upcoming-card {
            background: linear-gradient(135deg, rgba(168,85,247,0.1), rgba(255,0,255,0.1));
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 16px; padding: 20px;
        }
        .upcoming-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .upcoming-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px; font-weight: 700;
            color: var(--purple);
        }
        .upcoming-date {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        .upcoming-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
        }
        .upcoming-preview {
            display: flex; gap: 8px;
        }
        .preview-tag {
            font-size: 10px;
            padding: 3px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        
        /* Stats Row */
        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }
        .stat-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 16px; text-align: center;
        }
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px; font-weight: 700;
            color: var(--gold);
        }
        .stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-top: 4px;
        }
        
        @media (max-width: 700px) {
            .week-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; }
            .day-card { padding: 8px 4px; }
            .day-date { font-size: 14px; }
            .day-event { font-size: 16px; }
            .day-event-name { display: none; }
            .today-timer { position: static; margin-top: 16px; text-align: left; }
            .event-card { flex-direction: column; }
            .event-icon { width: 100%; height: 50px; }
        }
    </style>
</head>
<body data-page-id="events">
    <div class="bg"></div>
    
    <header>
        <a href="/tcg" class="logo">
            <span class="nw-icon" style="width:24px;height:24px" data-nw-icon="calendar"></span>
            EVENTS
        </a>
        <div class="nav-links">
            <a href="/forge" class="nav-link">🔥 Forge</a>
            <a href="/staking" class="nav-link">⚡ Staking</a>
            <a href="/arcade" class="nav-link">🎮 Arcade</a>
        </div>
    </header>
    
    <main>
        <!-- Today's Event Banner -->
        <div class="today-banner" id="todayBanner">
            <div class="today-label">
                <span class="live-dot"></span>
                HAPPENING NOW
            </div>
            <h1 class="today-title" id="todayTitle">Loading...</h1>
            <p class="today-desc" id="todayDesc">Check out today's special bonuses!</p>
            <div class="today-bonuses" id="todayBonuses">
                <!-- Bonuses will be rendered here -->
            </div>
            <div class="today-timer">
                <div class="timer-label">Ends in</div>
                <div class="timer-value" id="timerValue">--:--:--</div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value" id="eventsParticipated">0</div>
                <div class="stat-label">Events Joined</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="bonusesEarned">0%</div>
                <div class="stat-label">Extra Earned</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="streakDays">0</div>
                <div class="stat-label">Day Streak</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="nextBonus">--</div>
                <div class="stat-label">Next Big Event</div>
            </div>
        </div>
        
        <!-- Weekly Calendar -->
        <div class="week-section">
            <div class="section-title">
                <span class="nw-icon" style="width:20px;height:20px" data-nw-icon="calendar"></span>
                THIS WEEK
            </div>
            <div class="week-grid" id="weekGrid">
                <!-- Days will be rendered here -->
            </div>
        </div>
        
        <!-- Weekly Events List -->
        <div class="section-title">
            <span class="nw-icon" style="width:20px;height:20px" data-nw-icon="star"></span>
            WEEKLY EVENTS
        </div>
        <div class="events-list" id="eventsList">
            <!-- Events will be rendered here -->
        </div>
        
        <!-- Upcoming Special Events -->
        <div class="upcoming-section">
            <div class="section-title">
                <span class="nw-icon" style="width:20px;height:20px" data-nw-icon="rocket"></span>
                COMING SOON
            </div>
            <div class="upcoming-grid" id="upcomingGrid">
                <!-- Upcoming events will be rendered here -->
            </div>
        </div>
    </main>
    
    <script>
        // ============================================
        // NW CONTENT CALENDAR SYSTEM
        // ============================================
        
        const WEEKLY_EVENTS = [
            {
                id: 'market_monday',
                name: 'Market Monday',
                day: 1, // Monday
                emoji: '🏪',
                description: 'Trading bonuses and market discounts every Monday!',
                bonuses: [
                    { label: '+10% Trade Value', active: true },
                    { label: '-5% Market Fees', active: true }
                ],
                color: 'var(--blue)'
            },
            {
                id: 'training_tuesday',
                name: 'Training Tuesday',
                day: 2,
                emoji: '⚔️',
                description: 'Earn bonus XP from battles and challenges.',
                bonuses: [
                    { label: '1.5× Battle XP', active: true },
                    { label: 'Free Tutorials', active: true }
                ],
                color: 'var(--green)'
            },
            {
                id: 'war_wednesday',
                name: 'War Wednesday',
                day: 3,
                emoji: '🏆',
                description: 'Battle tournaments with prize pools!',
                bonuses: [
                    { label: 'Tournament Open', active: true },
                    { label: '1.5× Battle Rewards', active: true }
                ],
                color: 'var(--red)'
            },
            {
                id: 'throwback_thursday',
                name: 'Throwback Thursday',
                day: 4,
                emoji: '⏰',
                description: 'Limited-time access to previous season cards.',
                bonuses: [
                    { label: 'Legacy Cards Available', active: true },
                    { label: 'Nostalgia Packs', active: true }
                ],
                color: 'var(--purple)'
            },
            {
                id: 'forge_friday',
                name: 'Forge Friday',
                day: 5,
                emoji: '🔥',
                description: 'Double pity progress and boosted mythic rates!',
                bonuses: [
                    { label: '2× Pity Progress', active: true },
                    { label: '2× Mythic Rate', active: true }
                ],
                color: 'var(--orange)'
            },
            {
                id: 'social_saturday',
                name: 'Social Saturday',
                day: 6,
                emoji: '🤝',
                description: 'Community events and guild competitions.',
                bonuses: [
                    { label: '2× Co-op Rewards', active: true },
                    { label: 'Guild Bonus Active', active: true }
                ],
                color: 'var(--cyan)'
            },
            {
                id: 'stake_sunday',
                name: 'Stake Sunday',
                day: 0,
                emoji: '💎',
                description: 'Double staking rewards all day!',
                bonuses: [
                    { label: '2× Staking Rewards', active: true },
                    { label: 'Bonus Claim Window', active: true }
                ],
                color: 'var(--gold)'
            }
        ];
        
        const UPCOMING_EVENTS = [
            {
                name: 'Season 3 Launch',
                date: 'March 2026',
                description: 'New card set with 120+ cards, new mechanics, and exclusive launch rewards!',
                tags: ['New Cards', 'Limited Packs', 'Free Pulls']
            },
            {
                name: 'Anniversary Celebration',
                date: 'April 2026',
                description: "Celebrate NumbahWan's anniversary with massive giveaways and throwback events!",
                tags: ['Free Mythic', 'Bonus Logs', 'Legacy Returns']
            },
            {
                name: 'Collaboration Drop',
                date: 'Coming Soon',
                description: 'Special collaboration with a surprise partner. Exclusive cards only available during this event!',
                tags: ['Exclusive', 'Limited Time', '???']
            }
        ];
        
        let timerInterval;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTodayEvent();
            renderWeekCalendar();
            renderEventsList();
            renderUpcomingEvents();
            loadUserStats();
            startTimer();
            
            if (window.NWIconsInline) NWIconsInline.init();
        });
        
        function getTodayEvent() {
            const today = new Date().getDay(); // 0 = Sunday, 1 = Monday, etc.
            return WEEKLY_EVENTS.find(e => e.day === today) || WEEKLY_EVENTS[0];
        }
        
        function renderTodayEvent() {
            const event = getTodayEvent();
            
            document.getElementById('todayTitle').textContent = event.name;
            document.getElementById('todayDesc').textContent = event.description;
            
            const bonusesHtml = event.bonuses.map(b => `
                <div class="bonus-tag ${b.active ? 'active' : ''}">
                    ${b.active ? '✓' : ''} ${b.label}
                </div>
            `).join('');
            document.getElementById('todayBonuses').innerHTML = bonusesHtml;
            
            // Update banner gradient
            document.getElementById('todayBanner').style.borderColor = event.color;
        }
        
        function renderWeekCalendar() {
            const grid = document.getElementById('weekGrid');
            const today = new Date();
            const currentDay = today.getDay();
            
            // Get start of week (Monday)
            const startOfWeek = new Date(today);
            const diff = currentDay === 0 ? -6 : 1 - currentDay;
            startOfWeek.setDate(today.getDate() + diff);
            
            const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const dayMapping = [1, 2, 3, 4, 5, 6, 0]; // Mon-Sun to day numbers
            
            let html = '';
            for (let i = 0; i < 7; i++) {
                const date = new Date(startOfWeek);
                date.setDate(startOfWeek.getDate() + i);
                
                const dayNum = dayMapping[i];
                const event = WEEKLY_EVENTS.find(e => e.day === dayNum);
                const isToday = date.toDateString() === today.toDateString();
                const isPast = date < today && !isToday;
                
                html += `
                    <div class="day-card ${isToday ? 'today' : ''} ${isPast ? 'past' : ''}" 
                         onclick="showEventDetail('${event?.id}')">
                        <div class="day-name">${dayNames[i]}</div>
                        <div class="day-date">${date.getDate()}</div>
                        <div class="day-event">${event?.emoji || '📅'}</div>
                        <div class="day-event-name">${event?.name?.split(' ')[0] || ''}</div>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }
        
        function renderEventsList() {
            const list = document.getElementById('eventsList');
            const today = new Date().getDay();
            
            // Sort events so today's event is first
            const sortedEvents = [...WEEKLY_EVENTS].sort((a, b) => {
                if (a.day === today) return -1;
                if (b.day === today) return 1;
                return (a.day - today + 7) % 7 - (b.day - today + 7) % 7;
            });
            
            list.innerHTML = sortedEvents.map(event => {
                const isActive = event.day === today;
                const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                
                return `
                    <div class="event-card ${isActive ? 'active' : ''}" data-event="${event.id}">
                        <div class="event-icon" style="background: ${event.color}20;">
                            ${event.emoji}
                        </div>
                        <div class="event-content">
                            <div class="event-header">
                                <div class="event-name">${event.name}</div>
                                <div class="event-schedule weekly">Every ${dayNames[event.day]}</div>
                            </div>
                            <div class="event-desc">${event.description}</div>
                            <div class="event-bonuses">
                                ${event.bonuses.map(b => `<span class="event-bonus">${b.label}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderUpcomingEvents() {
            const grid = document.getElementById('upcomingGrid');
            
            grid.innerHTML = UPCOMING_EVENTS.map(event => `
                <div class="upcoming-card">
                    <div class="upcoming-header">
                        <div class="upcoming-name">${event.name}</div>
                        <div class="upcoming-date">${event.date}</div>
                    </div>
                    <div class="upcoming-desc">${event.description}</div>
                    <div class="upcoming-preview">
                        ${event.tags.map(tag => `<span class="preview-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function loadUserStats() {
            // Load from localStorage
            const stats = JSON.parse(localStorage.getItem('nw_event_stats') || '{}');
            
            document.getElementById('eventsParticipated').textContent = stats.participated || 0;
            document.getElementById('bonusesEarned').textContent = (stats.bonusPercent || 0) + '%';
            document.getElementById('streakDays').textContent = stats.streak || 0;
            document.getElementById('nextBonus').textContent = getNextBigEvent();
        }
        
        function getNextBigEvent() {
            const today = new Date().getDay();
            // Forge Friday is the "big" event
            const daysUntilFriday = (5 - today + 7) % 7;
            if (daysUntilFriday === 0) return 'TODAY!';
            if (daysUntilFriday === 1) return 'Tomorrow';
            return `${daysUntilFriday} days`;
        }
        
        function startTimer() {
            function updateTimer() {
                const now = new Date();
                const endOfDay = new Date(now);
                endOfDay.setHours(23, 59, 59, 999);
                
                const diff = endOfDay - now;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                document.getElementById('timerValue').textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function showEventDetail(eventId) {
            const event = WEEKLY_EVENTS.find(e => e.id === eventId);
            if (!event) return;
            
            // Scroll to event card
            const card = document.querySelector(`[data-event="${eventId}"]`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.style.animation = 'none';
                card.offsetHeight; // Trigger reflow
                card.style.animation = 'highlight 1s ease-out';
            }
        }
        
        // Track participation (demo)
        function recordParticipation() {
            const stats = JSON.parse(localStorage.getItem('nw_event_stats') || '{}');
            stats.participated = (stats.participated || 0) + 1;
            stats.streak = (stats.streak || 0) + 1;
            stats.bonusPercent = Math.min((stats.bonusPercent || 0) + 5, 100);
            localStorage.setItem('nw_event_stats', JSON.stringify(stats));
            loadUserStats();
        }
        
        // Auto-record today's visit
        const lastVisit = localStorage.getItem('nw_event_last_visit');
        const today = new Date().toDateString();
        if (lastVisit !== today) {
            localStorage.setItem('nw_event_last_visit', today);
            recordParticipation();
        }
    </script>
</body>
</html>
