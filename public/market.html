<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NumbahWan Market - Trade Cards</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script defer src="/static/nw-currency.js"></script>
    <script defer src="/static/nw-wallet.js"></script>
    <script defer src="/static/nw-mint.js"></script>
    <script defer src="/static/nw-components.js"></script>
    <script defer src="/static/nw-cards.js"></script>
    <script defer src="/static/nw-card-value.js"></script>
    <style>
        :root {
            --gold: #ffd700;
            --mythic: #ff00ff;
            --legendary: #ffd700;
            --epic: #a855f7;
            --rare: #3b82f6;
            --green: #22c55e;
            --dark: #0a0a0c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: linear-gradient(180deg, rgba(10,10,12,0.98), rgba(10,10,12,0.95));
            border-bottom: 1px solid rgba(255,215,0,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }
        .logo {
            font-family: 'NumbahWan', 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 12px; }
        .nav-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .nav-links a.active { color: var(--green); background: rgba(34,197,94,0.1); }
        
        /* Main Layout */
        .main { display: flex; padding-top: 56px; min-height: 100vh; }
        .market-panel { flex: 1; padding: 16px; overflow-y: auto; max-height: calc(100vh - 56px); }
        
        /* Chat FAB — sits above bottom bar (44px) + safe margin */
        .chat-fab {
            position: fixed; bottom: 56px; left: 16px;
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: 2px solid rgba(255,255,255,0.2);
            color: white; font-size: 24px; cursor: pointer;
            z-index: 9996; box-shadow: 0 4px 20px rgba(34,197,94,0.4);
            transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .chat-fab:hover { transform: scale(1.1); }
        .chat-fab.hidden { display: none; }
        .chat-badge {
            position: absolute; top: -4px; right: -4px;
            background: #ef4444; color: white; font-size: 10px; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Chat Panel — above bottom bar, below nav panel */
        .chat-panel {
            position: fixed; bottom: 56px; left: 16px;
            width: 320px; max-height: 450px;
            background: rgba(15,15,20,0.98);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 16px; display: flex; flex-direction: column;
            z-index: 1001; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .chat-panel.hidden { opacity: 0; transform: translateY(20px) scale(0.95); pointer-events: none; }
        .chat-panel.open ~ .chat-fab { display: none; }
        .chat-header {
            padding: 12px 16px; background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px 16px 0 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-header-right { display: flex; align-items: center; gap: 12px; }
        .chat-close {
            background: rgba(255,255,255,0.1); border: none;
            color: rgba(255,255,255,0.6); width: 28px; height: 28px;
            border-radius: 50%; cursor: pointer; font-size: 14px;
        }
        .chat-close:hover { background: rgba(255,255,255,0.2); color: white; }
        .chat-title { font-family: 'NumbahWan', 'Orbitron', sans-serif; font-size: 13px; color: var(--green); }
        .online-count { font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 4px; }
        .online-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .chat-messages { flex: 1; overflow-y: auto; padding: 12px; max-height: 280px; }
        .chat-msg { margin-bottom: 10px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-msg-header { display: flex; gap: 8px; align-items: center; margin-bottom: 2px; }
        .chat-user { font-size: 11px; font-weight: 600; color: var(--gold); }
        .chat-time { font-size: 9px; color: rgba(255,255,255,0.3); }
        .chat-text { font-size: 12px; color: rgba(255,255,255,0.85); line-height: 1.4; }
        .chat-msg.system { text-align: center; padding: 8px; background: rgba(34,197,94,0.1); border-radius: 8px; }
        .chat-msg.system .chat-text { color: var(--green); font-size: 11px; }
        .chat-msg.pull { background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(255,215,0,0.1)); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,215,0,0.3); }
        .chat-msg.sale { background: rgba(34,197,94,0.15); padding: 8px; border-radius: 8px; }
        .chat-input-area { padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 8px; }
        .chat-input {
            flex: 1; padding: 10px 14px; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            color: #fff; font-size: 13px; outline: none;
        }
        .chat-input:focus { border-color: var(--green); }
        .chat-send { width: 40px; height: 40px; background: var(--green); border: none; border-radius: 50%; color: #fff; font-size: 16px; cursor: pointer; }
        
        /* Market Section */
        .market-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .market-title { font-family: 'NumbahWan', 'Orbitron', sans-serif; font-size: 20px; color: var(--green); }
        .market-stats-bar { display: flex; gap: 16px; font-size: 12px; }
        .stat-item { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.6); }
        .stat-value { color: var(--green); font-weight: 700; font-family: 'NumbahWan', 'Orbitron', sans-serif; }
        
        /* Filters */
        .filters-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 14px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 600; cursor: pointer;
        }
        .filter-btn:hover { border-color: rgba(255,255,255,0.3); }
        .filter-btn.active { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.1); }
        .filter-btn.mythic.active { border-color: var(--mythic); color: var(--mythic); }
        .filter-btn.legendary.active { border-color: var(--legendary); color: var(--legendary); }
        .filter-btn.epic.active { border-color: var(--epic); color: var(--epic); }
        .filter-btn.rare.active { border-color: var(--rare); color: var(--rare); }
        .sort-select { padding: 8px 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 11px; margin-left: auto; }
        
        /* Listings Grid */
        .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; content-visibility: auto; }
        .listing-card {
            background: rgba(20,20,25,0.9); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; overflow: hidden; transition: all 0.3s; cursor: pointer;
        }
        .listing-card:hover { transform: translateY(-4px); border-color: var(--green); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .listing-card.new { animation: newGlow 2s ease; }
        @keyframes newGlow { 0% { box-shadow: 0 0 30px rgba(34,197,94,0.6); } 100% { box-shadow: none; } }
        .listing-card.deal { border-color: var(--gold); }
        .listing-img-wrap { position: relative; padding-top: 130%; background: rgba(0,0,0,0.3); }
        .listing-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background: rgba(0,0,0,0.3); }
        .listing-badge { position: absolute; top: 8px; left: 8px; padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .listing-badge.deal { background: var(--gold); color: #000; }
        .listing-badge.new { background: var(--green); color: #fff; }
        .listing-rarity-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
        .listing-rarity-bar.mythic { background: linear-gradient(90deg, #ff00ff, #ff66ff); }
        .listing-rarity-bar.legendary { background: linear-gradient(90deg, #ffd700, #ffed4a); }
        .listing-rarity-bar.epic { background: linear-gradient(90deg, #a855f7, #c084fc); }
        .listing-rarity-bar.rare { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .listing-info { padding: 12px; }
        .listing-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .listing-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .listing-rarity { font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .listing-rarity.mythic { color: var(--mythic); }
        .listing-rarity.legendary { color: var(--legendary); }
        .listing-rarity.epic { color: var(--epic); }
        .listing-rarity.rare { color: var(--rare); }
        .listing-seller { font-size: 10px; color: rgba(255,255,255,0.4); }
        .listing-price-row { display: flex; justify-content: space-between; align-items: center; }
        .listing-price { font-family: 'NumbahWan', 'Orbitron', sans-serif; font-size: 15px; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 4px; }
        .listing-price img { width: 14px; height: 14px; }
        .listing-buy-btn {
            padding: 10px 20px; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: 2px solid #16a34a; border-radius: 8px; color: #fff;
            font-size: 13px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(34,197,94,0.4); position: relative; z-index: 10;
        }
        .listing-buy-btn:hover { transform: scale(1.08); }
        .listing-buy-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Tabs */
        .market-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .market-tab {
            padding: 10px 20px; background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 13px; font-weight: 700; cursor: pointer; position: relative;
            font-family: 'Orbitron', sans-serif; transition: all 0.2s;
        }
        .market-tab:hover { color: rgba(255,255,255,0.8); }
        .market-tab.active { color: var(--green); }
        .market-tab.active::after {
            content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px;
            background: var(--green); border-radius: 1px;
        }
        .market-tab .tab-count {
            display: inline-block; background: rgba(255,255,255,0.1); padding: 1px 6px;
            border-radius: 8px; font-size: 10px; margin-left: 6px;
        }
        .market-tab.active .tab-count { background: rgba(34,197,94,0.2); color: var(--green); }
        
        /* My Cards Grid */
        .my-cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .my-card {
            background: rgba(20,20,25,0.9); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; overflow: hidden; transition: all 0.3s; position: relative;
        }
        .my-card:hover { border-color: rgba(255,255,255,0.3); }
        .my-card.tradeable { border-color: rgba(34,197,94,0.3); cursor: pointer; }
        .my-card.tradeable:hover { border-color: var(--green); transform: translateY(-3px); box-shadow: 0 8px 25px rgba(34,197,94,0.2); }
        .my-card-img-wrap { position: relative; padding-top: 130%; background: rgba(0,0,0,0.3); }
        .my-card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; background: rgba(0,0,0,0.3); }
        .my-card-count {
            position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8);
            padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .my-card-count.dupe { background: rgba(34,197,94,0.2); border-color: var(--green); color: var(--green); }
        .my-card-info { padding: 10px; }
        .my-card-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .my-card-rarity { font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .my-card-sell-btn {
            width: 100%; padding: 8px; margin-top: 6px; background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none; border-radius: 6px; color: #fff; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .my-card-sell-btn:hover { filter: brightness(1.15); }
        .my-card-sell-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: none; }
        .my-card-serial { font-size: 9px; color: rgba(255,255,255,0.4); margin-top: 2px; }
        
        /* List Modal */
        .list-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .list-modal.show { display: flex; animation: fadeIn 0.2s; }
        .list-modal-content {
            background: rgba(20,20,28,0.98); border: 1px solid rgba(255,215,0,0.3);
            border-radius: 16px; padding: 24px; max-width: 380px; width: 100%;
            animation: scaleIn 0.3s ease-out;
        }
        .list-modal-title { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--green); margin-bottom: 16px; text-align: center; }
        .list-modal-card { display: flex; gap: 14px; align-items: center; margin-bottom: 16px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .list-modal-card img { width: 60px; height: 78px; object-fit: cover; border-radius: 6px; }
        .list-modal-card-info { flex: 1; }
        .list-modal-card-name { font-size: 14px; font-weight: 600; }
        .list-modal-card-meta { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; }
        .price-input-group { margin-bottom: 16px; }
        .price-input-group label { display: block; font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
        .price-input-row { display: flex; gap: 8px; align-items: center; }
        .price-input {
            flex: 1; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; color: #fff; font-size: 16px; font-family: 'Orbitron', sans-serif; text-align: center;
        }
        .price-input:focus { border-color: var(--green); outline: none; }
        .price-suggestion { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 4px; text-align: center; }
        .gift-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding: 10px; background: rgba(255,215,0,0.05); border-radius: 8px; cursor: pointer; }
        .gift-toggle input { accent-color: var(--gold); }
        .gift-toggle-label { font-size: 12px; color: var(--gold); }
        .list-modal-actions { display: flex; gap: 10px; }
        .list-modal-actions button { flex: 1; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
        .btn-cancel { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
        .btn-confirm-list { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; box-shadow: 0 4px 12px rgba(34,197,94,0.3); }
        .btn-confirm-list:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* Empty State — centered on screen */
        .empty-state { text-align: center; padding: 20px; color: rgba(255,255,255,0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; }
        .empty-icon { font-size: 60px; margin-bottom: 16px; }
        .empty-text { font-size: 14px; margin-bottom: 8px; }
        
        /* Mobile — phone-first layout, avoids bottom bar (44px) + nav FABs (right side) */
        @media (max-width: 768px) {
            .header { padding: 0 10px; height: 50px; }
            .logo { font-size: 14px; }
            .nav-links { gap: 2px; overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; scrollbar-width: none; }
            .nav-links::-webkit-scrollbar { display: none; }
            .nav-links a { font-size: 11px; padding: 5px 8px; white-space: nowrap; flex-shrink: 0; }
            .chat-fab { bottom: 56px; left: 12px; width: 48px; height: 48px; font-size: 20px; }
            .chat-panel { bottom: 56px; left: 8px; right: 8px; width: auto; max-height: 50vh; }
            .market-panel { padding: 12px; padding-bottom: 120px; }
            .main { padding-top: 50px; }
            .market-title { font-size: 16px; }
            .market-stats-bar { gap: 8px; font-size: 11px; }
            .market-header-bar { margin-bottom: 10px; }
            .market-tabs { margin-bottom: 10px; }
            .market-tab { padding: 8px 14px; font-size: 12px; }
            .filters-bar { gap: 6px; margin-bottom: 10px; }
            .filter-btn { padding: 6px 10px; font-size: 10px; }
            .sort-select { font-size: 10px; padding: 6px 8px; }
            .listings-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .listing-info { padding: 8px; }
            .listing-name { font-size: 12px; }
            .listing-price { font-size: 13px; }
            .listing-buy-btn { padding: 8px 14px; font-size: 12px; }
            .my-cards-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .list-modal-content { padding: 16px; max-width: 340px; }
            .toast { bottom: 60px; font-size: 12px; padding: 10px 18px; }
        }
        @media (max-width: 380px) {
            .listings-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .listing-info { padding: 6px; }
            .listing-name { font-size: 11px; }
            .listing-buy-btn { padding: 6px 10px; font-size: 11px; }
            .nav-links a { font-size: 10px; padding: 4px 6px; }
            .chat-fab { width: 44px; height: 44px; font-size: 18px; }
        }
        
        /* Toast & Overlays */
        .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 12px 24px; background: rgba(10,10,12,0.95); border: 2px solid var(--gold); border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 9996; opacity: 0; transition: all 0.3s; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: #ef4444; color: #ef4444; }
        
        .success-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .success-overlay.show { display: flex; animation: fadeIn 0.3s; }
        .success-content { text-align: center; animation: scaleIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .success-icon { font-size: 80px; margin-bottom: 20px; animation: bounce 0.6s; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .success-title { font-family: 'NumbahWan', 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; color: var(--green); margin-bottom: 16px; }
        .success-card { font-size: 20px; color: #fff; margin-bottom: 8px; }
        .success-price { font-size: 18px; color: var(--gold); margin-bottom: 16px; }
        .success-balance { font-size: 16px; color: rgba(255,255,255,0.7); }
        .success-balance span { color: var(--green); font-weight: 700; }
    </style>
    
    <!-- NW Helper Library -->
    <script defer src="/static/helpers/nw-core.js"></script>
    <script defer src="/static/helpers/nw-ui.js"></script>
    <script defer src="/static/helpers/nw-anim.js"></script>
    <script defer src="/static/helpers/nw-audio.js"></script>
    <script defer src="/static/helpers/nw-state.js"></script>
    <script defer src="/static/helpers/nw-guild.js"></script>
    <script src="/static/nw-nav.js" defer></script>
<script src="/static/nw-sounds.js" defer></script>
<script src="/static/nw-guide.js" defer></script>
    <script src="/static/nw-zone-bundle.js" defer></script>
</head>
<body data-page-id="market">
    <header class="header">
        <a href="/" class="logo">NUMBAHWAN</a>
        <nav class="nav-links">
            <a href="/forge" data-i18n="forge">Forge</a>
            <a href="/arcade" data-i18n="arcade">Arcade</a>
            <a href="/market" class="active" data-i18n="market">Market</a>

    <div class="toast" id="toast"></div>
    
    <!-- List Card Modal -->

    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-icon"></div>

            <div class="success-card" id="successCardName"></div>
            <div class="success-price" id="successPrice"></div>
            <div class="success-balance" data-i18n="newBalance">New Balance: <span id="successNewBalance">0</span> Sacred Logs</div>
        </div>

    <script>
    // ============================================
    // NUMBAHWAN MARKET - API-BASED TRADING SYSTEM
    // Supports thousands of concurrent users
    // ============================================
    
    // Normalize card image path — all card images are .webp
    function cardImg(img) {
        if (!img) return '/static/images/cards/placeholder.webp';
        // Replace any non-.webp extension with .webp
        const normalized = img.replace(/\.(jpg|jpeg|png|gif)$/i, '.webp');
        return '/static/images/cards/' + normalized;
    }
    // Thumbnail version for grid views — smaller, faster to load
    function cardThumb(img) {
        if (!img) return '/static/images/cards/thumbs/placeholder.webp';
        const normalized = img.replace(/\.(jpg|jpeg|png|gif)$/i, '.webp');
        return '/static/images/cards/thumbs/' + normalized;
    }
    
    const PRICE_GUIDE = {
        legendary: { min: 50, suggested: 150 },
        epic: { min: 20, suggested: 50 },
        rare: { min: 10, suggested: 25 },
        uncommon: { min: 5, suggested: 10 },
        common: { min: 3, suggested: 5 }
    };
    
    let marketListings = [];
    let chatMessages = [];
    let currentFilter = 'all';
    let currentSort = 'newest';
    let selectedListing = null;
    let myUserId = '';
    let myUserName = '';
    let lastChatTimestamp = 0;
    let pollInterval = null;
    let currentTab = 'browse';
    let myCardFilter = 'tradeable';
    let listingCard = null; // card being listed
    
    // ============================================
    // API FUNCTIONS
    // ============================================
    
    async function fetchListings() {
        try {
            const res = await fetch('/api/market/listings');
            const data = await res.json();
            if (data.success) {
                marketListings = data.listings;
                renderListings();
                document.getElementById('totalListings').textContent = data.count;
                document.getElementById('browseCount').textContent = data.count;
            }
        } catch (err) {
            console.error('Failed to fetch listings:', err);
        }
    }
    
    async function fetchChat() {
        try {
            const res = await fetch(`/api/market/chat?since=${lastChatTimestamp}`);
            const data = await res.json();
            if (data.success && data.messages.length > 0) {
                // Add new messages
                data.messages.forEach(msg => {
                    if (msg.created_at > lastChatTimestamp) {
                        chatMessages.push(msg);
                        lastChatTimestamp = msg.created_at;
                    }
                });
                // Keep only last 100 messages
                if (chatMessages.length > 100) chatMessages = chatMessages.slice(-100);
                renderChat();
            }
        } catch (err) {
            console.error('Failed to fetch chat:', err);
        }
    }
    
    async function sendHeartbeat() {
        try {
            const res = await fetch('/api/market/heartbeat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: myUserId, userName: myUserName })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('onlineCount').textContent = data.onlineCount;
                document.getElementById('onlineUsers').textContent = data.onlineCount;
            }
        } catch (err) {}
    }
    
    async function buyListing(listingId) {
        const listing = marketListings.find(l => l.id === listingId);
        if (!listing) {
            toast('Listing not found!', 'error');
            return;
        }
        
        // Don't buy your own listing
        if (listing.sellerId === myUserId) {
            toast("That's your own listing!", 'error');
            return;
        }
        
        const myLogs = NW_WALLET?.getBalance?.('wood') || 0;
        
        if (listing.price > 0 && myLogs < listing.price) {
            toast(`Not enough Sacred Logs! Need ${listing.price - myLogs} more.`, 'error');
            return;
        }
        
        // Confirm purchase
        const priceText = listing.price === 0 ? 'FREE (gift)' : `${listing.price} Sacred Logs`;
        const confirmMsg = `${listing.price === 0 ? 'Claim' : 'Buy'} ${listing.card.name} for ${priceText}?`;
        if (!confirm(confirmMsg)) return;
        
        try {
            // 1. Call API to record transaction
            const res = await fetch('/api/market/buy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    listingId,
                    buyerId: myUserId,
                    buyerName: myUserName
                })
            });
            const data = await res.json();
            
            if (!data.success) {
                toast(data.error || 'Purchase failed!', 'error');
                return;
            }
            
            // 2. Deduct sacred logs locally (if price > 0)
            if (listing.price > 0) {
                NW_WALLET.spend('wood', listing.price, 'MARKET_BUY:' + listing.card.name);
            }
            
            // 3. Add card to collection (wallet tracks count for duplicates)
            NW_WALLET.addToCollection(listing.cardId, listing.card.rarity);
            
            // 4. Add minted instance to NW_MINT inventory (preserves serial/tier)
            if (typeof NW_MINT !== 'undefined' && data.instanceId) {
                NW_MINT.addToInventory({
                    instanceId: data.instanceId,
                    cardId: listing.cardId,
                    serial: data.serial || 0,
                    tierName: data.tier || 'STANDARD',
                    mintedAt: Date.now(),
                    ownerId: myUserId
                });
                console.log('[MARKET] Received minted card:', data.instanceId, 'serial #' + data.serial);
            }
            
            // 5. Update UI
            const newWallet = NW_WALLET.getWalletInfo();
            const newLogs = NW_WALLET?.getBalance?.('wood') || 0;
            
            showSuccess(listing.card.name, listing.price, newLogs);
            updateBalance();
            if (window.updateFloatBalances) window.updateFloatBalances();
            
            // 6. Refresh both tabs
            await fetchListings();
            await fetchChat();
            renderMyCards();
            
        } catch (err) {
            console.error('Buy error:', err);
            toast('Transaction failed!', 'error');
        }
    }
    
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !myUserId) return;
        
        try {
            await fetch('/api/market/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: myUserId,
                    userName: myUserName,
                    message: text
                })
            });
            input.value = '';
            await fetchChat();
        } catch (err) {
            toast('Failed to send message', 'error');
        }
    }
    
    // ============================================
    // RENDER FUNCTIONS
    // ============================================
    
    function renderListings() {
        const grid = document.getElementById('listingsGrid');
        const now = Date.now();
        
        let listings = [...marketListings];
        
        // Apply rarity filter
        if (currentFilter !== 'all') {
            listings = listings.filter(l => l.card?.rarity === currentFilter);
        }
        
        // Apply sort
        const rarityOrder = { mythic: 0, legendary: 1, epic: 2, rare: 3, uncommon: 4, common: 5 };
        listings.sort((a, b) => {
            if (currentSort === 'newest') return b.listed - a.listed;
            if (currentSort === 'price-low') return a.price - b.price;
            if (currentSort === 'price-high') return b.price - a.price;
            if (currentSort === 'rarity') return (rarityOrder[a.card?.rarity] || 5) - (rarityOrder[b.card?.rarity] || 5);
            return 0;
        });
        
        if (listings.length === 0) {
            grid.innerHTML = '<div class="empty-state"><div class="empty-icon"></div><div class="empty-text" data-i18n="marketIsEmpty">Market is empty!</div><div class="empty-hint" data-i18n="pullCardsAtThe">Pull cards at the <a href="/forge" style="color:#22c55e" data-i18n="forge2">Forge</a>, then list them in your <a href="/wallet" style="color:#ffd700" data-i18n="wallet2">Wallet</a> to sell!</div></div>';
            return;
        }
        
        grid.innerHTML = listings.map(listing => {
            const card = listing.card;
            if (!card) return '';
            
            const guide = PRICE_GUIDE[card.rarity] || PRICE_GUIDE.common;
            const isDeal = listing.price <= guide.suggested * 0.8;
            const isNew = (now - listing.listed) < 60000;
            
            return `
                <div class="listing-card ${isDeal ? 'deal' : ''} ${isNew ? 'new' : ''}" onclick="buyListing(${listing.id})">
                    <div class="listing-img-wrap">
                        <img class="listing-img" loading="lazy" decoding="async" src="${cardThumb(card.img)}" alt="${card.name}" onerror="this.onerror=null;this.src=cardImg(this.alt!=='placeholder'?'${card.img}':'placeholder.webp')">
                        ${isDeal ? '<div class="listing-badge deal">DEAL</div>' : ''}
                        ${isNew && !isDeal ? '<div class="listing-badge new">NEW</div>' : ''}
                        <div class="listing-rarity-bar ${card.rarity}"></div>
                    </div>
                    <div class="listing-info">
                        <div class="listing-name">${card.name}</div>
                        <div class="listing-meta">
                            <span class="listing-rarity ${card.rarity}">${card.rarity}${listing.serial ? ' #' + listing.serial : ''}</span>
                            <span class="listing-seller">by ${listing.seller}</span>
                        </div>
                        <div class="listing-price-row">
                            <span class="listing-price">${listing.price === 0 ? '<span style="color:#ffd700">FREE</span>' : listing.price + ' <img loading="lazy" src="/static/icons/sacred-log.webp" style="width:16px;height:16px;vertical-align:middle">'}</span>
                            <button class="listing-buy-btn" onclick="event.stopPropagation(); buyListing(${listing.id})">${listing.price === 0 ? 'CLAIM' : 'BUY'}</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function renderChat() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = chatMessages.slice(-50).map(msg => {
            const msgClass = msg.msg_type === 'pull' ? 'pull' : msg.msg_type === 'sale' ? 'sale' : msg.msg_type === 'system' ? 'system' : '';
            
            if (msg.msg_type === 'system' || msg.msg_type === 'pull' || msg.msg_type === 'sale') {
                return `<div class="chat-msg ${msgClass}"><div class="chat-text">${escapeHtml(msg.message)}</div></div>`;
            }
            
            return `
                <div class="chat-msg">
                    <div class="chat-msg-header">
                        <span class="chat-user">${escapeHtml(msg.user_name || 'Guest')}</span>
                        <span class="chat-time">${getTimeAgo(msg.created_at)}</span>
                    </div>
                    <div class="chat-text">${escapeHtml(msg.message)}</div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    // ============================================
    // UI HELPERS
    // ============================================
    
    function toggleChat() {
        const panel = document.getElementById('chatPanel');
        const fab = document.getElementById('chatFab');
        if (panel.classList.contains('hidden')) {
            panel.classList.remove('hidden');
            fab.classList.add('hidden');
        } else {
            panel.classList.add('hidden');
            fab.classList.remove('hidden');
        }
    }
    
    function updateBalance() {
        const wallet = NW_WALLET?.getWalletInfo();
        document.getElementById('myBalance').textContent = NW_WALLET?.getBalance?.('wood') || 0;
    }
    
    function showSuccess(cardName, price, newBalance) {
        document.getElementById('successCardName').textContent = '' + cardName;
        document.getElementById('successPrice').textContent = '-' + price + ' Sacred Logs';
        document.getElementById('successNewBalance').textContent = newBalance;
        
        const overlay = document.getElementById('successOverlay');
        overlay.classList.add('show');
        setTimeout(() => overlay.classList.remove('show'), 3000);
        overlay.onclick = () => overlay.classList.remove('show');
    }
    
    function toast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show ' + type;
        setTimeout(() => t.className = 'toast', 3000);
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function getTimeAgo(timestamp) {
        const seconds = Math.floor((Date.now() - timestamp) / 1000);
        if (seconds < 60) return 'now';
        if (seconds < 3600) return Math.floor(seconds / 60) + 'm';
        if (seconds < 86400) return Math.floor(seconds / 3600) + 'h';
        return Math.floor(seconds / 86400) + 'd';
    }
    
    // ============================================
    // TAB SYSTEM & MY CARDS
    // ============================================
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.market-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.getElementById('browseTab').style.display = tab === 'browse' ? '' : 'none';
        document.getElementById('myCardsTab').style.display = tab === 'mycards' ? '' : 'none';
        if (tab === 'mycards') renderMyCards();
    }
    
    function setMyFilter(filter) {
        myCardFilter = filter;
        document.querySelectorAll('[data-myfilter]').forEach(b => b.classList.toggle('active', b.dataset.myfilter === filter));
        renderMyCards();
    }
    
    function getMyCards() {
        // Use getFullCollection() — getWalletInfo() does NOT include collection
        const collection = (typeof NW_WALLET !== 'undefined' && NW_WALLET.getFullCollection) 
            ? NW_WALLET.getFullCollection() 
            : {};
        const allCards = typeof NW_CARDS !== 'undefined' ? NW_CARDS.getAll() : [];
        
        const results = [];
        for (const [cardId, data] of Object.entries(collection)) {
            if (!data || data.count <= 0) continue;
            const cardInfo = allCards.find(c => String(c.id) === String(cardId));
            if (!cardInfo) continue;
            
            // Get mint instances for this card
            let instances = [];
            if (typeof NW_MINT !== 'undefined') {
                instances = NW_MINT.getPlayerInstances(cardId) || [];
            }
            
            results.push({
                cardId: Number(cardId),
                card: cardInfo,
                count: data.count || 1,
                level: data.level || 1,
                xp: data.xp || 0,
                instances,
                canTrade: data.count >= 2 // keep at least 1
            });
        }
        
        // Sort: tradeable first, then by rarity
        const rarityOrder = { mythic: 0, legendary: 1, epic: 2, rare: 3, uncommon: 4, common: 5 };
        results.sort((a, b) => {
            if (a.canTrade !== b.canTrade) return a.canTrade ? -1 : 1;
            return (rarityOrder[a.card.rarity] || 5) - (rarityOrder[b.card.rarity] || 5);
        });
        
        return results;
    }
    
    function renderMyCards() {
        const grid = document.getElementById('myCardsGrid');
        const cards = getMyCards();
        
        // Update tab count
        const tradeableCount = cards.filter(c => c.canTrade).length;
        document.getElementById('myCardsCount').textContent = cards.length;
        
        const filtered = myCardFilter === 'tradeable' ? cards.filter(c => c.canTrade) : cards;
        
        if (filtered.length === 0) {
            if (myCardFilter === 'tradeable') {
                grid.innerHTML = '<div class="empty-state"><div class="empty-icon">\ud83d\udd12</div><div class="empty-text">No tradeable cards</div><div class="empty-hint">You need 2+ copies of a card to trade.<br>Buy duplicates from the market or pull at the <a href="/forge" style="color:#22c55e">Forge</a>!</div></div>';
            } else {
                grid.innerHTML = '<div class="empty-state"><div class="empty-icon">\ud83c\udccf</div><div class="empty-text">No cards yet!</div><div class="empty-hint">Buy cards from the <span style="color:#22c55e;cursor:pointer" onclick="switchTab(\'browse\')">Market</span> or pull at the <a href="/forge" style="color:#22c55e">Forge</a> to start.</div></div>';
            }
            return;
        }
        
        grid.innerHTML = filtered.map(c => {
            const imgPath = c.card.img || 'placeholder.webp';
            const bestInstance = c.instances[0]; // lowest serial
            const serialText = bestInstance ? `Best: #${bestInstance.serial} (${bestInstance.tierName})` : '';
            const tradeSerial = c.instances.length > 1 ? c.instances[c.instances.length - 1] : null; // sell worst serial
            
            return `
                <div class="my-card ${c.canTrade ? 'tradeable' : ''}" ${c.canTrade ? `onclick="openListModal(${c.cardId})"` : ''}>
                    <div class="my-card-img-wrap">
                        <img class="my-card-img" loading="lazy" decoding="async" src="${cardThumb(imgPath)}" alt="${c.card.name?.en || c.card.name}" onerror="this.onerror=null;this.src=cardImg('${imgPath}')">
                        <div class="my-card-count ${c.count >= 2 ? 'dupe' : ''}">\u00d7${c.count}</div>
                    </div>
                    <div class="my-card-info">
                        <div class="my-card-name">${c.card.name?.en || c.card.name}</div>
                        <div class="my-card-rarity ${c.card.rarity}">${c.card.rarity}</div>
                        ${serialText ? `<div class="my-card-serial">${serialText}</div>` : ''}
                        ${c.canTrade 
                            ? `<button class="my-card-sell-btn" onclick="event.stopPropagation(); openListModal(${c.cardId})">LIST FOR SALE</button>`
                            : `<button class="my-card-sell-btn" disabled>ONLY COPY</button>`
                        }
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // ============================================
    // LIST CARD MODAL
    // ============================================
    
    function openListModal(cardId) {
        const cards = getMyCards();
        const myCard = cards.find(c => c.cardId === Number(cardId));
        if (!myCard || !myCard.canTrade) {
            toast("Can't sell your only copy!", 'error');
            return;
        }
        
        listingCard = myCard;
        
        // Pick the worst serial to sell (keep best for yourself)
        const sellInstance = myCard.instances.length > 1 
            ? myCard.instances[myCard.instances.length - 1] // worst (highest serial)
            : null;
        
        const cardName = myCard.card.name?.en || myCard.card.name;
        const imgPath = myCard.card.img || 'placeholder.webp';
        const guide = PRICE_GUIDE[myCard.card.rarity] || PRICE_GUIDE.common;
        
        document.getElementById('listModalCard').innerHTML = `
            <img loading="lazy" decoding="async" src="${cardImg(imgPath)}" alt="${cardName}" onerror="this.onerror=null;this.src='/static/images/cards/placeholder.webp'">
            <div class="list-modal-card-info">
                <div class="list-modal-card-name">${cardName}</div>
                <div class="list-modal-card-meta">${myCard.card.rarity.toUpperCase()} \u2022 \u00d7${myCard.count} owned${sellInstance ? ' \u2022 Selling #' + sellInstance.serial + ' (' + sellInstance.tierName + ')' : ''}</div>
                <div class="list-modal-card-meta" style="color:rgba(34,197,94,0.8)">Keeping ${myCard.count - 1} copy${myCard.count - 1 > 1 ? 'ies' : ''}</div>
            </div>
        `;
        
        document.getElementById('listPriceInput').value = guide.suggested;
        document.getElementById('priceSuggestion').textContent = `Suggested: ${guide.suggested} \u2022 Min: ${guide.min} \u2022 Use 0 for free gift`;
        document.getElementById('giftCheckbox').checked = false;
        
        document.getElementById('listModal').classList.add('show');
    }
    
    function closeListModal() {
        document.getElementById('listModal').classList.remove('show');
        listingCard = null;
    }
    
    function toggleGift() {
        const cb = document.getElementById('giftCheckbox');
        const input = document.getElementById('listPriceInput');
        if (cb.checked) {
            input.value = 0;
            input.disabled = true;
        } else {
            input.disabled = false;
            const guide = PRICE_GUIDE[listingCard?.card?.rarity] || PRICE_GUIDE.common;
            input.value = guide.suggested;
        }
    }
    
    async function confirmList() {
        if (!listingCard) return;
        
        const price = Math.max(0, Math.floor(Number(document.getElementById('listPriceInput').value) || 0));
        const cardName = listingCard.card.name?.en || listingCard.card.name;
        
        // Pick the worst serial to sell
        const sellInstance = listingCard.instances.length > 1 
            ? listingCard.instances[listingCard.instances.length - 1]
            : null;
        
        const btn = document.getElementById('confirmListBtn');
        btn.disabled = true;
        btn.textContent = 'LISTING...';
        
        try {
            const res = await fetch('/api/market/list', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    cardId: listingCard.cardId,
                    card: { 
                        name: cardName,
                        rarity: listingCard.card.rarity,
                        img: listingCard.card.img || 'placeholder.webp'
                    },
                    price,
                    sellerId: myUserId,
                    sellerName: myUserName,
                    serial: sellInstance?.serial || null,
                    tier: sellInstance?.tierName || null,
                    instanceId: sellInstance?.instanceId || null
                })
            });
            
            const data = await res.json();
            if (!data.success) {
                toast(data.error || 'Listing failed!', 'error');
                return;
            }
            
            // Remove from local inventory
            // 1. Decrease count in wallet collection (access internal wallet directly)
            const walletObj = NW_WALLET.wallet;
            if (walletObj?.collection?.[listingCard.cardId]) {
                walletObj.collection[listingCard.cardId].count--;
                if (walletObj.collection[listingCard.cardId].count <= 0) {
                    delete walletObj.collection[listingCard.cardId];
                }
                NW_WALLET.saveWallet();
            }
            
            // 2. Remove mint instance
            if (sellInstance && typeof NW_MINT !== 'undefined') {
                NW_MINT.removeFromInventory(sellInstance.instanceId);
            }
            
            closeListModal();
            toast(`Listed ${cardName} for ${price === 0 ? 'FREE' : price + ' Sacred Logs'}!`, 'success');
            
            // Refresh everything
            await fetchListings();
            await fetchChat();
            renderMyCards();
            updateBalance();
            
        } catch (err) {
            console.error('List error:', err);
            toast('Failed to list card!', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'LIST FOR SALE';
        }
    }
    
    // ============================================
    // FILTER & SORT HANDLERS
    // ============================================
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderListings();
        });
    });
    
    document.getElementById('sortSelect').addEventListener('change', (e) => {
        currentSort = e.target.value;
        renderListings();
    });
    
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    // ============================================
    // INITIALIZATION
    // ============================================
    
    window.addEventListener('nw-wallet-ready', () => {
        const wallet = NW_WALLET.getWalletInfo();
        myUserId = wallet?.guestId || 'guest-' + Date.now();
        myUserName = myUserId.substring(0, 8);
        
        updateBalance();
        renderMyCards();
        
        // Initial fetch
        fetchListings();
        fetchChat();
        sendHeartbeat();
        
        // Poll every 3 seconds for real-time updates
        pollInterval = setInterval(() => {
            fetchListings();
            fetchChat();
            sendHeartbeat();
            updateBalance();
        }, 3000);
    });
    
    // Fallback init
    setTimeout(() => {
        if (!myUserId) {
            myUserId = 'guest-' + Date.now();
            myUserName = 'Guest';
            fetchListings();
            fetchChat();
            sendHeartbeat();
        }
    }, 3000);
    
    // Cleanup on page leave
    window.addEventListener('beforeunload', () => {
        if (pollInterval) clearInterval(pollInterval);
    });
    </script>
