<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements | NumbahWan TCG</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/static/nw-wallet.js"></script>
    <script src="/static/nw-achievements.js"></script>
    <script src="/static/nw-nav.js" defer></script>
    <style>
        :root {
            --gold: #ffd700; --orange: #ff6b00; --dark: #0a0a0f;
            --neon-blue: #00d4ff; --neon-green: #00ff88; --neon-pink: #ff00ff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--dark); 
            color: #fff; 
            min-height: 100vh;
            padding-top: 80px;
        }
        
        .page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(28px, 5vw, 42px);
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        
        /* Progress ring */
        .progress-section {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        
        .progress-ring-container {
            position: relative;
            width: 180px;
            height: 180px;
        }
        
        .progress-ring {
            transform: rotate(-90deg);
        }
        
        .progress-ring-bg {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 12;
        }
        
        .progress-ring-fill {
            fill: none;
            stroke: url(#progressGradient);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 1s ease;
        }
        
        .progress-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .progress-percent {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            color: var(--gold);
        }
        
        .progress-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }
        
        /* Stats row */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
        }
        
        .stat-value.gold { color: var(--gold); }
        .stat-value.blue { color: var(--neon-blue); }
        .stat-value.pink { color: var(--neon-pink); }
        
        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Category */
        .category {
            margin-bottom: 40px;
        }
        
        .category-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            color: var(--gold);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Achievement grid */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        
        .achievement-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .achievement-card.locked {
            opacity: 0.5;
            filter: grayscale(0.8);
        }
        
        .achievement-card.unlocked {
            border-color: rgba(255,215,0,0.3);
            background: rgba(255,215,0,0.05);
        }
        
        .achievement-card.unlocked:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.15);
            border-color: var(--gold);
        }
        
        .achievement-card.secret.locked {
            filter: grayscale(1) blur(2px);
        }
        
        .achievement-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .achievement-card.unlocked .achievement-icon {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,107,0,0.2));
            animation: iconGlow 2s ease infinite;
        }
        
        @keyframes iconGlow {
            0%, 100% { box-shadow: 0 0 0 rgba(255,215,0,0); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        }
        
        .achievement-info {
            flex: 1;
            min-width: 0;
        }
        
        .achievement-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
            color: #fff;
        }
        
        .achievement-card.unlocked .achievement-name {
            color: var(--gold);
        }
        
        .achievement-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.4;
        }
        
        .achievement-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        
        .badge-unlocked {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: #000;
        }
        
        .badge-secret {
            background: rgba(255,0,255,0.2);
            color: var(--neon-pink);
        }
        
        /* Locked icon overlay */
        .lock-icon {
            position: absolute;
            right: 16px;
            bottom: 16px;
            font-size: 18px;
            opacity: 0.3;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .stats-row { gap: 20px; }
            .stat-value { font-size: 22px; }
            .achievement-card { padding: 16px; }
            .achievement-icon { width: 48px; height: 48px; font-size: 24px; }
        }
    </style>
</head>
<body data-page-id="achievements">
    <div class="page-container">
        <div class="page-header">
            <h1 class="page-title" data-i18n="title">Achievements</h1>
            <p class="page-subtitle" data-i18n="subtitle">Unlock badges, prove your worth</p>
        </div>
        
        <!-- Progress Ring -->
        <div class="progress-section">
            <div class="progress-ring-container">
                <svg class="progress-ring" width="180" height="180">
                    <defs>
                        <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#ffd700"/>
                            <stop offset="100%" stop-color="#ff6b00"/>
                        </linearGradient>
                    </defs>
                    <circle class="progress-ring-bg" cx="90" cy="90" r="70"/>
                    <circle class="progress-ring-fill" id="progressRing" cx="90" cy="90" r="70"/>
                </svg>
                <div class="progress-text">
                    <div class="progress-percent" id="progressPercent">0%</div>
                    <div class="progress-label">COMPLETE</div>
                </div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value gold" id="statUnlocked">0</div>
                <div class="stat-label" data-i18n="unlocked">Unlocked</div>
            </div>
            <div class="stat-item">
                <div class="stat-value blue" id="statTotal">0</div>
                <div class="stat-label" data-i18n="total">Total</div>
            </div>
            <div class="stat-item">
                <div class="stat-value pink" id="statSecret">0</div>
                <div class="stat-label" data-i18n="secrets">Secrets Found</div>
            </div>
        </div>
        
        <!-- Achievement Categories -->
        <div id="achievementCategories"></div>
    </div>
    
    <script>
        const categories = {
            collection: { icon: '📚', name: { en: 'Collection', zh: '收藏', th: 'คอลเลกชัน' }, ids: ['first_card', 'collector_10', 'collector_50', 'collector_100'] },
            rarity: { icon: '💎', name: { en: 'Rare Finds', zh: '稀有發現', th: 'ของหายาก' }, ids: ['rare_first', 'epic_first', 'legendary_first', 'mythic_first'] },
            battle: { icon: '⚔️', name: { en: 'Battle', zh: '戰鬥', th: 'การต่อสู้' }, ids: ['first_win', 'wins_10', 'wins_50', 'wins_100', 'streak_5', 'streak_10'] },
            economy: { icon: '💰', name: { en: 'Economy', zh: '經濟', th: 'เศรษฐกิจ' }, ids: ['nwg_1000', 'nwg_10000', 'nwg_100000'] },
            engagement: { icon: '📅', name: { en: 'Engagement', zh: '參與', th: 'การมีส่วนร่วม' }, ids: ['login_7', 'login_30', 'embassy_visit'] },
            upgrades: { icon: '⭐', name: { en: 'Upgrades', zh: '升級', th: 'อัพเกรด' }, ids: ['first_upgrade', 'max_star', 'first_burn'] },
            secret: { icon: '🔮', name: { en: 'Secrets', zh: '秘密', th: 'ความลับ' }, ids: ['lucky_47', 'regina_fan', 'night_owl', 'og_member'] }
        };
        
        function renderAchievements() {
            const lang = localStorage.getItem('numbahwan_lang') || 'en';
            const all = NW_ACHIEVEMENTS.getAll();
            const progress = NW_ACHIEVEMENTS.getProgress();
            
            // Update stats
            document.getElementById('statUnlocked').textContent = progress.unlocked;
            document.getElementById('statTotal').textContent = progress.total;
            document.getElementById('statSecret').textContent = progress.unlockedSecret;
            document.getElementById('progressPercent').textContent = progress.percent + '%';
            
            // Update progress ring
            const ring = document.getElementById('progressRing');
            const circumference = 2 * Math.PI * 70;
            const offset = circumference - (progress.percent / 100) * circumference;
            ring.style.strokeDashoffset = offset;
            
            // Render categories
            const container = document.getElementById('achievementCategories');
            container.innerHTML = '';
            
            Object.entries(categories).forEach(([catId, cat]) => {
                const catAchievements = cat.ids.map(id => all.find(a => a.id === id)).filter(Boolean);
                if (catAchievements.length === 0) return;
                
                const catEl = document.createElement('div');
                catEl.className = 'category';
                catEl.innerHTML = `
                    <h2 class="category-title">
                        ${cat.icon} ${cat.name[lang] || cat.name.en}
                        <span style="font-size:12px;color:rgba(255,255,255,0.4);font-family:Inter;">
                            ${catAchievements.filter(a => a.unlocked).length}/${catAchievements.length}
                        </span>
                    </h2>
                    <div class="achievement-grid">
                        ${catAchievements.map(ach => `
                            <div class="achievement-card ${ach.unlocked ? 'unlocked' : 'locked'} ${ach.secret ? 'secret' : ''}">
                                <div class="achievement-icon">${ach.unlocked || !ach.secret ? ach.icon : '❓'}</div>
                                <div class="achievement-info">
                                    <div class="achievement-name">${ach.unlocked || !ach.secret ? ach.name : '???'}</div>
                                    <div class="achievement-desc">${ach.unlocked ? ach.desc : (ach.secret ? '???' : ach.desc)}</div>
                                </div>
                                ${ach.unlocked ? '<span class="achievement-badge badge-unlocked">✓</span>' : ''}
                                ${ach.secret && !ach.unlocked ? '<span class="achievement-badge badge-secret">SECRET</span>' : ''}
                                ${!ach.unlocked ? '<span class="lock-icon">🔒</span>' : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(catEl);
            });
        }
        
        // i18n
        const i18n = {
            en: { title: 'Achievements', subtitle: 'Unlock badges, prove your worth', unlocked: 'Unlocked', total: 'Total', secrets: 'Secrets Found' },
            zh: { title: '成就', subtitle: '解鎖徽章，證明你的實力', unlocked: '已解鎖', total: '總共', secrets: '發現的秘密' },
            th: { title: 'ความสำเร็จ', subtitle: 'ปลดล็อคตรา พิสูจน์ตัวเอง', unlocked: 'ปลดล็อค', total: 'ทั้งหมด', secrets: 'ค้นพบความลับ' }
        };
        
        function applyTranslations(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang]?.[key]) el.textContent = i18n[lang][key];
            });
            renderAchievements();
        }
        
        document.addEventListener('nw-lang-change', (e) => applyTranslations(e.detail.lang));
        
        window.addEventListener('nw-wallet-ready', () => {
            NW_ACHIEVEMENTS.checkAll();
            renderAchievements();
        });
        
        window.addEventListener('nw-achievement-unlocked', () => {
            renderAchievements();
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            applyTranslations(localStorage.getItem('numbahwan_lang') || 'en');
            
            // Init wallet if not ready
            if (typeof NW_WALLET !== 'undefined') {
                NW_WALLET.init().then(() => {
                    NW_ACHIEVEMENTS.checkAll();
                    renderAchievements();
                });
            } else {
                renderAchievements();
            }
        });
    </script>
</body>
</html>
