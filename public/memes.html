    <style>
        :root {
            --primary: #ff6b00;
            --primary-light: #ff9d4d;
            --bg-dark: #0a0a0f;
            --card-width: min(380px, 85vw);
            --card-height: min(480px, 70vh);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            overflow: hidden; 
            height: 100%; 
            touch-action: none;
            overscroll-behavior: none;
        }
        
        body {
            font-family: var(--nw-font-display), sans-serif;
            background: var(--bg-dark);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .pixel-font { font-family: 'NumbahWan', 'Press Start 2P', cursive; }
        
        /* ============================================
           SMOOTH 3D CAROUSEL
           ============================================ */
        
        .meme-universe {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            overflow: hidden;
        }
        
        /* Ambient glow */
        .ambient-glow {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(ellipse at center, rgba(255,107,0,0.15) 0%, transparent 60%);
            animation: ambientPulse 4s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes ambientPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        
        /* Carousel track */
        .carousel-track {
            position: relative;
            width: var(--card-width);
            height: var(--card-height);
            transform-style: preserve-3d;
        }
        
        /* Individual meme card - GPU accelerated */
        .meme-card {
            position: absolute;
            width: var(--card-width);
            height: var(--card-height);
            border-radius: 24px;
            overflow: hidden;
            cursor: grab;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            will-change: transform, opacity;
            box-shadow: 0 25px 80px -20px rgba(0,0,0,0.8);
            /* NO CSS transition - we animate with JS for smoothness */
        }
        
        .meme-card:active { cursor: grabbing; }
        
        .meme-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,107,0,0.3) 0%, transparent 50%);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.3s;
        }
        
        .meme-card.active::before { opacity: 1; }
        
        /* Card inner content */
        .card-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%);
            border: 2px solid rgba(255,107,0,0.3);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .meme-card.active .card-inner {
            box-shadow: 0 0 60px rgba(255,107,0,0.3), inset 0 0 60px rgba(255,107,0,0.05);
            border-color: rgba(255,107,0,0.6);
        }
        
        .card-image-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Caption area */
        .card-caption {
            padding: 16px 20px;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.95));
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ff6b00;
            margin-bottom: 4px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .card-text {
            font-size: 0.85rem;
            color: #ccc;
            line-height: 1.4;
        }
        
        /* Vote counter */
        .vote-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #ff6b00;
            border: 1px solid rgba(255,107,0,0.3);
            transition: all 0.3s;
            z-index: 10;
        }
        
        .vote-badge:hover {
            transform: scale(1.1);
            background: rgba(255,107,0,0.3);
        }
        
        .vote-badge.voted {
            animation: votePop 0.5s ease;
            background: rgba(255,107,0,0.4);
        }
        
        @keyframes votePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* Category badge */
        .category-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        
        .category-badge.guild { color: #22c55e; border-color: rgba(34,197,94,0.3); }
        .category-badge.raids { color: #ef4444; border-color: rgba(239,68,68,0.3); }
        .category-badge.reggina { color: #a855f7; border-color: rgba(168,85,247,0.3); }
        .category-badge.random { color: #fbbf24; border-color: rgba(251,191,36,0.3); }
        
        /* ============================================
           NAVIGATION CONTROLS
           ============================================ */
        
        .nav-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 200;
        }
        
        .nav-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,107,0,0.2);
            border: 2px solid rgba(255,107,0,0.5);
            color: #ff6b00;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        
        .nav-btn:hover {
            background: rgba(255,107,0,0.4);
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255,107,0,0.5);
        }
        
        .nav-btn:active { transform: scale(0.95); }
        
        /* Progress dots */
        .progress-track {
            display: flex;
            gap: 6px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,107,0,0.3);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .progress-dot.active {
            background: #ff6b00;
            box-shadow: 0 0 10px #ff6b00;
            transform: scale(1.3);
        }
        
        .progress-dot:hover { background: rgba(255,107,0,0.6); }
        
        /* Counter display */
        .counter-display {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: rgba(255,107,0,0.7);
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .counter-current {
            font-size: 2rem;
            font-weight: bold;
            color: #ff6b00;
            text-shadow: 0 0 20px rgba(255,107,0,0.5);
        }
        
        /* ============================================
           TOP NAVIGATION BAR
           ============================================ */
        
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 300;
            background: linear-gradient(180deg, rgba(10,10,15,0.95), transparent);
        }
        
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #ff6b00;
        }
        
        .nav-brand svg { width: 32px; height: 32px; }
        .nav-brand span { font-family: 'NumbahWan', 'Press Start 2P', cursive; font-size: 0.75rem; }
        
        .nav-actions { display: flex; gap: 12px; }
        
        .nav-icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,107,0,0.15);
            border: 1px solid rgba(255,107,0,0.3);
            color: #ff6b00;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .nav-icon-btn:hover {
            background: rgba(255,107,0,0.3);
            transform: scale(1.05);
        }
        
        /* ============================================
           CATEGORY FILTER PILLS
           ============================================ */
        
        .filter-bar {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            z-index: 250;
        }
        
        .filter-pill {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            color: #888;
        }
        
        .filter-pill:hover { color: #ff6b00; }
        
        .filter-pill.active {
            background: #ff6b00;
            color: #000;
            box-shadow: 0 0 20px rgba(255,107,0,0.5);
        }
        
        /* ============================================
           SWIPE HINT
           ============================================ */
        
        .swipe-hint {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,107,0,0.6);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: hintPulse 2s ease-in-out infinite;
            z-index: 150;
            transition: opacity 0.5s;
        }
        
        .swipe-hint .arrow { animation: swipeArrow 1.5s ease-in-out infinite; }
        .swipe-hint .arrow.left { animation-delay: 0.3s; }
        
        @keyframes swipeArrow {
            0%, 100% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(10px); opacity: 1; }
        }
        
        @keyframes hintPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .hint-hidden { opacity: 0 !important; pointer-events: none; }
        
        /* ============================================
           FLOATING REACTIONS
           ============================================ */
        
        .reaction-burst {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            font-size: 2rem;
            animation: reactionFloat 2s ease-out forwards;
        }
        
        @keyframes reactionFloat {
            0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translateY(-200px) scale(1.5) rotate(20deg); }
        }
        
        /* ============================================
           MOMENTUM INDICATOR
           ============================================ */
        
        .momentum-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255,107,0,0.1);
            z-index: 500;
        }
        
        .momentum-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b00, #ffd700);
            width: 0%;
            box-shadow: 0 0 20px #ff6b00;
            transition: width 0.05s linear;
        }
        
        /* ============================================
           RESPONSIVE
           ============================================ */
        
        @media (max-width: 480px) {
            :root {
                --card-width: 90vw;
                --card-height: 65vh;
            }
            
            .filter-bar {
                flex-wrap: wrap;
                max-width: 90vw;
                justify-content: center;
            }
            
            .filter-pill { padding: 6px 12px; font-size: 0.75rem; }
            .nav-btn { width: 48px; height: 48px; }
            .progress-track { padding: 8px 12px; }
            .progress-dot { width: 6px; height: 6px; }
        }
    </style>

        // ============================================
        // SMOOTH CAROUSEL ENGINE
        // ============================================
        let currentIndex = 0;
        let targetIndex = 0;
        let displayIndex = 0; // Floating point for smooth animation
        let filteredMemes = [...memeData];
        let velocity = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragCurrentX = 0;
        let lastDragX = 0;
        let lastDragTime = 0;
        let animating = false;
        let hasInteracted = false;
        
        const track = document.getElementById('carousel-track');
        const progressTrack = document.getElementById('progress-track');
        const counterCurrent = document.getElementById('counter-current');
        const counterTotal = document.getElementById('counter-total');
        const momentumFill = document.getElementById('momentum-fill');
        const swipeHint = document.getElementById('swipe-hint');
        const universe = document.getElementById('meme-universe');
        
        // ============================================
        // CARD POSITION CALCULATOR - 3D TRANSFORMS
        // ============================================
        function getCardTransform(offset) {
            // offset: -3 to +3 (floating point)
            const absOffset = Math.abs(offset);
            const sign = offset >= 0 ? 1 : -1;
            
            // Smooth curves for each property
            const x = sign * Math.pow(absOffset, 0.8) * 180; // Horizontal spread
            const z = -Math.pow(absOffset, 1.5) * 80; // Depth
            const rotateY = -sign * Math.min(absOffset * 15, 35); // Rotation
            const scale = Math.max(0.5, 1 - absOffset * 0.15); // Scale
            const opacity = Math.max(0, 1 - absOffset * 0.3); // Fade
            
            return {
                transform: `translateX(${x}px) translateZ(${z}px) rotateY(${rotateY}deg) scale(${scale})`,
                opacity: opacity,
                zIndex: Math.round(100 - absOffset * 10)
            };
        }
        
        // ============================================
        // RENDER CARDS (once)
        // ============================================
        function renderCards() {
            track.innerHTML = '';
            
            filteredMemes.forEach((meme, index) => {
                const card = document.createElement('div');
                card.className = 'meme-card';
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-image-container">
                            <img class="card-image" src="${meme.image}" alt="${meme.title}" loading="eager"  fetchpriority="high">
                            <span class="category-badge ${meme.category}">${meme.category}</span>
                            <div class="vote-badge" onclick="vote(${index}, event)">
                                <span></span>
                                <span class="vote-count">${meme.votes}</span>
                            </div>
                            <div class="card-caption">
                                <div class="card-title">${meme.title}</div>
                                <div class="card-text">${meme.caption}</div>
                            </div>
                        </div>
                    </div>
                `;
                track.appendChild(card);
            });
            
            renderProgressDots();
            updateCounter();
            updateCardPositions();
        }
        
        // ============================================
        // UPDATE CARD POSITIONS (called every frame during animation)
        // ============================================
        function updateCardPositions() {
            const cards = track.querySelectorAll('.meme-card');
            
            cards.forEach((card, index) => {
                const offset = index - displayIndex;
                
                // Only render cards within visible range
                if (Math.abs(offset) > 4) {
                    card.style.display = 'none';
                    return;
                }
                
                card.style.display = '';
                const { transform, opacity, zIndex } = getCardTransform(offset);
                
                card.style.transform = transform;
                card.style.opacity = opacity;
                card.style.zIndex = zIndex;
                
                // Active state for center card
                if (Math.abs(offset) < 0.5) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }
        
        // ============================================
        // SMOOTH ANIMATION LOOP
        // ============================================
        function animate() {
            if (!isDragging) {
                // Spring physics toward target
                const diff = targetIndex - displayIndex;
                const spring = 0.15; // Spring strength
                const damping = 0.75; // Velocity damping
                
                velocity += diff * spring;
                velocity *= damping;
                displayIndex += velocity;
                
                // Snap when close enough
                if (Math.abs(diff) < 0.01 && Math.abs(velocity) < 0.01) {
                    displayIndex = targetIndex;
                    velocity = 0;
                    currentIndex = targetIndex;
                    updateCounter();
                    updateActiveDot();
                    animating = false;
                }
            }
            
            updateCardPositions();
            
            // Update momentum bar
            const momentum = Math.min(Math.abs(velocity) * 50, 100);
            momentumFill.style.width = momentum + '%';
            
            if (animating || isDragging) {
                requestAnimationFrame(animate);
            }
        }
        
        function startAnimation() {
            if (!animating) {
                animating = true;
                requestAnimationFrame(animate);
            }
        }
        
        // ============================================
        // NAVIGATION
        // ============================================
        function navigateTo(index) {
            hideHint();
            index = Math.max(0, Math.min(filteredMemes.length - 1, index));
            targetIndex = index;
            startAnimation();
        }
        
        function goTo(index) {
            navigateTo(index);
        }
        
        // ============================================
        // DRAG/SWIPE HANDLING
        // ============================================
        function handleDragStart(e) {
            isDragging = true;
            dragStartX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            dragCurrentX = dragStartX;
            lastDragX = dragStartX;
            lastDragTime = performance.now();
            velocity = 0;
            startAnimation();
        }
        
        function handleDragMove(e) {
            if (!isDragging) return;
            hideHint();
            
            const x = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const now = performance.now();
            const dt = now - lastDragTime;
            
            // Calculate velocity
            if (dt > 0) {
                velocity = (lastDragX - x) / dt * 0.5;
            }
            
            lastDragX = x;
            lastDragTime = now;
            dragCurrentX = x;
            
            // Update display index based on drag
            const dragDelta = (dragStartX - x) / 200; // Sensitivity
            displayIndex = targetIndex + dragDelta;
            
            // Clamp with rubber band effect at edges
            if (displayIndex < 0) {
                displayIndex = displayIndex * 0.3;
            } else if (displayIndex > filteredMemes.length - 1) {
                const overflow = displayIndex - (filteredMemes.length - 1);
                displayIndex = (filteredMemes.length - 1) + overflow * 0.3;
            }
        }
        
        function handleDragEnd() {
            if (!isDragging) return;
            isDragging = false;
            
            const dragDistance = dragStartX - dragCurrentX;
            const threshold = 50;
            
            // Determine target based on velocity and distance
            let newTarget = targetIndex;
            
            if (Math.abs(velocity) > 0.3) {
                // High velocity - use momentum
                const momentumCards = Math.round(velocity * 3);
                newTarget = Math.round(displayIndex) + momentumCards;
            } else if (Math.abs(dragDistance) > threshold) {
                // Threshold crossed - move one card
                newTarget = dragDistance > 0 ? targetIndex + 1 : targetIndex - 1;
            } else {
                // Snap back
                newTarget = Math.round(displayIndex);
            }
            
            // Clamp to valid range
            targetIndex = Math.max(0, Math.min(filteredMemes.length - 1, newTarget));
            
            // Add some velocity for smooth finish
            if (Math.abs(velocity) > 0.1) {
                velocity *= 2;
            }
        }
        
        // ============================================
        // PROGRESS DOTS
        // ============================================
        function renderProgressDots() {
            const maxDots = 15;
            const totalMemes = filteredMemes.length;
            const dotsToShow = Math.min(totalMemes, maxDots);
            
            progressTrack.innerHTML = '';
            
            for (let i = 0; i < dotsToShow; i++) {
                const mappedIndex = Math.floor(i * (totalMemes - 1) / (dotsToShow - 1));
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dot.dataset.index = mappedIndex;
                dot.onclick = () => navigateTo(mappedIndex);
                progressTrack.appendChild(dot);
            }
            
            updateActiveDot();
        }
        
        function updateActiveDot() {
            const dots = progressTrack.querySelectorAll('.progress-dot');
            const totalMemes = filteredMemes.length;
            const maxDots = dots.length;
            
            dots.forEach((dot, i) => {
                const mappedIndex = parseInt(dot.dataset.index);
                const range = totalMemes / maxDots;
                
                const isActive = currentIndex >= mappedIndex - range/2 && currentIndex < mappedIndex + range/2;
                const isFirst = mappedIndex === 0 && currentIndex < range/2;
                const isLast = mappedIndex === totalMemes - 1 && currentIndex >= totalMemes - range/2;
                
                dot.classList.toggle('active', isActive || isFirst || isLast);
            });
        }
        
        function updateCounter() {
            counterCurrent.textContent = currentIndex + 1;
            counterTotal.textContent = filteredMemes.length;
        }
        
        // ============================================
        // VOTING
        // ============================================
        function vote(index, event) {
            event.stopPropagation();
            
            const meme = filteredMemes[index];
            meme.votes++;
            
            const badge = event.currentTarget;
            badge.classList.add('voted');
            badge.querySelector('.vote-count').textContent = meme.votes;
            
            spawnReaction(event.clientX, event.clientY);
            setTimeout(() => badge.classList.remove('voted'), 500);
        }
        
        function spawnReaction(x, y) {
            const reactions = ['', '', '', '', '', '', ''];
            const reaction = document.createElement('div');
            reaction.className = 'reaction-burst';
            reaction.textContent = reactions[Math.floor(Math.random() * reactions.length)];
            reaction.style.left = x + 'px';
            reaction.style.top = y + 'px';
            document.body.appendChild(reaction);
            setTimeout(() => reaction.remove(), 2000);
        }
        
        // ============================================
        // FILTERING
        // ============================================
        document.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                
                const filter = pill.dataset.filter;
                filteredMemes = filter === 'all' ? [...memeData] : memeData.filter(m => m.category === filter);
                
                currentIndex = 0;
                targetIndex = 0;
                displayIndex = 0;
                velocity = 0;
                renderCards();
            });
        });
        
        // ============================================
        // SHUFFLE
        // ============================================
        function shuffleMemes() {
            filteredMemes = filteredMemes.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            targetIndex = 0;
            displayIndex = 0;
            velocity = 0;
            renderCards();
            
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    spawnReaction(
                        window.innerWidth / 2 + (Math.random() - 0.5) * 200,
                        window.innerHeight / 2 + (Math.random() - 0.5) * 200
                    );
                }, i * 100);
            }
        }
        
        // ============================================
        // KEYBOARD
        // ============================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigateTo(currentIndex - 1);
            if (e.key === 'ArrowRight') navigateTo(currentIndex + 1);
            if (e.key === ' ') { e.preventDefault(); shuffleMemes(); }
        });
        
        // ============================================
        // HINT
        // ============================================
        function hideHint() {
            if (!hasInteracted) {
                hasInteracted = true;
                swipeHint.classList.add('hint-hidden');
            }
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        universe.addEventListener('mousedown', handleDragStart);
        universe.addEventListener('mousemove', handleDragMove);
        universe.addEventListener('mouseup', handleDragEnd);
        universe.addEventListener('mouseleave', handleDragEnd);
        
        universe.addEventListener('touchstart', handleDragStart, { passive: true });
        universe.addEventListener('touchmove', handleDragMove, { passive: true });
        universe.addEventListener('touchend', handleDragEnd);
        
        universe.addEventListener('contextmenu', e => e.preventDefault());
        
        // Mouse wheel support
        universe.addEventListener('wheel', (e) => {
            e.preventDefault();
            hideHint();
            const direction = e.deltaY > 0 ? 1 : -1;
            navigateTo(currentIndex + direction);
        }, { passive: false });
        
        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            const fp = document.getElementById('fp');
            if (fp) setTimeout(() => fp.style.display = 'none', 300);
            
            renderCards();
            
            // Preload images
            filteredMemes.forEach(meme => {
                const img = new Image();
                img.src = meme.image;
            });
        });
