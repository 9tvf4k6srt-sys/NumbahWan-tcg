<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本週午餐菜單 | Weekly Lunch Menu</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --gold: #d4a574;
            --gold-light: #e8c9a0;
            --emerald: #10b981;
            --emerald-dark: #059669;
            --cream: #faf7f2;
            --dark: #0f1a0f;
            --card-bg: #162216;
            --card-border: rgba(16, 185, 129, 0.2);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--cream);
        }

        /* Main container */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        /* Header */
        .header {
            flex-shrink: 0;
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            background: rgba(15, 26, 15, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header-title h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-title span {
            font-size: 12px;
            color: var(--gold);
            font-weight: 400;
        }

        .header-week {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--emerald);
            font-weight: 500;
        }

        /* Card carousel */
        .carousel-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        /* Card wrapper for swipe */
        .cards-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
        }

        .card {
            position: absolute;
            inset: 0;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        opacity 0.4s ease;
            will-change: transform, opacity;
            touch-action: pan-y;
        }

        .card.active {
            transform: translateX(0);
            opacity: 1;
            z-index: 10;
        }

        .card.prev {
            transform: translateX(-105%);
            opacity: 0;
            z-index: 5;
        }

        .card.next {
            transform: translateX(105%);
            opacity: 0;
            z-index: 5;
        }

        .card.dragging {
            transition: none;
        }

        /* Card content */
        .card-image {
            position: relative;
            width: 100%;
            flex: 0 0 45%;
            min-height: 200px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a2e1a 0%, #0f1f0f 100%);
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.3s ease;
        }

        .card-image img.loaded {
            opacity: 1;
        }

        .card-image img:not(.loaded) {
            opacity: 0;
        }

        .image-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #1a2e1a 0%, #0f1f0f 100%);
            color: var(--gold);
            font-size: 48px;
            transition: opacity 0.3s ease;
        }

        .image-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .image-loading span {
            font-size: 13px;
            color: rgba(250, 247, 242, 0.5);
        }

        .card-badges {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .badge-healthy {
            background: rgba(16, 185, 129, 0.9);
            color: white;
        }

        .badge-calories {
            background: rgba(0, 0, 0, 0.7);
            color: var(--cream);
        }

        .day-badge {
            position: absolute;
            bottom: 12px;
            left: 12px;
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .day-badge-name {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .day-badge-date {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }

        /* Card body */
        .card-body {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .dish-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .dish-name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--cream);
            line-height: 1.2;
        }

        .dish-name-en {
            font-size: 14px;
            color: var(--gold);
            font-style: italic;
        }

        /* Sides */
        .sides-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sides-title {
            font-size: 11px;
            color: rgba(250, 247, 242, 0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .sides-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .side-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: rgba(212, 165, 116, 0.1);
            border: 1px solid rgba(212, 165, 116, 0.25);
            border-radius: 12px;
            font-size: 14px;
            color: var(--gold-light);
            transition: all 0.2s ease;
        }

        .side-item:active {
            transform: scale(0.96);
            background: rgba(212, 165, 116, 0.2);
        }

        /* Nutrition */
        .nutrition-bar {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-top: auto;
        }

        .nutrition-item {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nutrition-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--emerald);
        }

        .nutrition-label {
            font-size: 10px;
            color: rgba(250, 247, 242, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Order button */
        .order-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }

        .order-btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Navigation dots & arrows */
        .nav-container {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 16px 20px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            background: rgba(15, 26, 15, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--card-border);
        }

        .nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--card-border);
            background: rgba(22, 34, 22, 0.8);
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-btn:active:not(:disabled) {
            transform: scale(0.92);
            background: rgba(212, 165, 116, 0.2);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn svg {
            width: 20px;
            height: 20px;
        }

        .nav-dots {
            display: flex;
            gap: 10px;
        }

        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(212, 165, 116, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-dot.active {
            background: var(--gold);
            transform: scale(1.3);
            box-shadow: 0 0 12px rgba(212, 165, 116, 0.5);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 14px 24px;
            background: var(--emerald);
            border-radius: 12px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 2000;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(212, 165, 116, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: var(--gold);
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Swipe hint */
        .swipe-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            z-index: 20;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .swipe-hint.hidden {
            opacity: 0;
        }

        .swipe-hint svg {
            animation: swipeAnim 1.5s ease-in-out infinite;
        }

        @keyframes swipeAnim {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-8px); }
        }

        /* Image modal for fullscreen view */
        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .image-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .image-modal img {
            max-width: 95%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 16px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .image-modal.show img {
            transform: scale(1);
        }

        .image-modal-close {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-modal-hint {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom));
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }

        /* Tap to enlarge hint on images */
        .tap-hint {
            position: absolute;
            bottom: 50px;
            right: 12px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            gap: 4px;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
    </style>
    <script src="/static/nw-nav.js"></script>
    <script src="/static/nw-i18n-core.js"></script>
</head>
<body data-page-id="menu-demo">
    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">載入中...</div>
    </div>

    <!-- Main App -->
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-title">
                <h1>🍽️ 本週午餐菜單</h1>
                <span>Weekly Lunch Menu</span>
            </div>
            <div class="header-week">
                📅 2/3 - 2/7
            </div>
        </header>

        <!-- Card Carousel -->
        <div class="carousel-container">
            <div class="cards-wrapper" id="cardsWrapper">
                <!-- Cards will be generated here -->
            </div>
            
            <!-- Swipe hint -->
            <div class="swipe-hint" id="swipeHint">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                左右滑動瀏覽
            </div>
        </div>

        <!-- Navigation -->
        <nav class="nav-container">
            <button class="nav-btn" id="prevBtn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            
            <div class="nav-dots" id="navDots"></div>
            
            <button class="nav-btn" id="nextBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </button>
        </nav>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span id="toastText"></span>
    </div>

    <!-- Image Modal -->
    <div class="image-modal" id="imageModal">
        <button class="image-modal-close" onclick="closeImageModal()">×</button>
        <img id="modalImage" src="" alt="">
        <div class="image-modal-hint">點擊任意處關閉</div>
    </div>

    <script>
        // Menu data
        const menuData = [
            {
                day: '週一',
                dayEn: 'Monday',
                date: '2月3日',
                emoji: '🍜',
                dish: '照燒雞肉丼',
                dishEn: 'Teriyaki Chicken Don',
                healthy: true,
                calories: 520,
                sides: [
                    { emoji: '🍵', name: '味噌湯' },
                    { emoji: '🍊', name: '季節水果' }
                ],
                nutrition: { protein: 35, carbs: 48, fiber: 8 },
                imageUrl: '/static/menu-images/monday-teriyaki.webp'
            },
            {
                day: '週二',
                dayEn: 'Tuesday',
                date: '2月4日',
                emoji: '🍝',
                dish: '義式田園麵',
                dishEn: 'Italian Garden Pasta',
                healthy: true,
                calories: 480,
                sides: [
                    { emoji: '🥗', name: '田園沙拉' },
                    { emoji: '🫐', name: '優格' }
                ],
                nutrition: { protein: 18, carbs: 52, fiber: 12 },
                imageUrl: '/static/menu-images/tuesday-pasta.webp'
            },
            {
                day: '週三',
                dayEn: 'Wednesday',
                date: '2月5日',
                emoji: '🍛',
                dish: '泰式綠咖哩',
                dishEn: 'Thai Green Curry',
                healthy: true,
                calories: 550,
                sides: [
                    { emoji: '🍚', name: '香米飯' },
                    { emoji: '🍮', name: '椰奶布丁' }
                ],
                nutrition: { protein: 28, carbs: 45, fiber: 9 },
                imageUrl: '/static/menu-images/wednesday-curry.webp'
            },
            {
                day: '週四',
                dayEn: 'Thursday',
                date: '2月6日',
                emoji: '🥙',
                dish: '魚肉塔可',
                dishEn: 'Fish Tacos',
                healthy: true,
                calories: 420,
                sides: [
                    { emoji: '🥬', name: '涼拌捲心菜' },
                    { emoji: '🧃', name: '鮮榨果汁' }
                ],
                nutrition: { protein: 32, carbs: 38, fiber: 10 },
                imageUrl: '/static/menu-images/thursday-tacos.webp'
            },
            {
                day: '週五',
                dayEn: 'Friday',
                date: '2月7日',
                emoji: '🍕',
                dish: '披薩日！',
                dishEn: 'Pizza Friday!',
                healthy: true,
                calories: 580,
                sides: [
                    { emoji: '🥗', name: '凱薩沙拉' },
                    { emoji: '🍨', name: '冰淇淋' }
                ],
                nutrition: { protein: 24, carbs: 58, fiber: 6 },
                imageUrl: '/static/menu-images/friday-pizza.webp'
            }
        ];

        // State
        let currentIndex = 0;
        let isDragging = false;
        let startX = 0;
        let currentX = 0;
        let hasInteracted = false;

        // Elements
        const cardsWrapper = document.getElementById('cardsWrapper');
        const navDots = document.getElementById('navDots');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const swipeHint = document.getElementById('swipeHint');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Initialize
        function init() {
            createCards();
            createDots();
            setupEvents();
            updateUI();
            
            // Hide loading after a short delay
            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
            }, 500);
        }

        // Create cards
        function createCards() {
            menuData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                
                card.innerHTML = `
                    <div class="card-image" onclick="openImageModal(${index})">
                        <div class="image-loading" id="loading-${index}">
                            ${item.emoji}
                            <span>載入圖片中...</span>
                        </div>
                        <img 
                            src="${item.imageUrl}" 
                            alt="${item.dish}"
                            onload="imageLoaded(${index})"
                            onerror="imageError(${index})"
                        >
                        <div class="card-badges">
                            ${item.healthy ? '<span class="badge badge-healthy">🌿 健康餐</span>' : '<span></span>'}
                            <span class="badge badge-calories">🔥 ${item.calories} kcal</span>
                        </div>
                        <div class="day-badge">
                            <span class="day-badge-name">${item.emoji} ${item.day}</span>
                            <span class="day-badge-date">${item.dayEn} • ${item.date}</span>
                        </div>
                        <div class="tap-hint">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            點擊放大
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="dish-info">
                            <h2 class="dish-name">${item.dish}</h2>
                            <p class="dish-name-en">${item.dishEn}</p>
                        </div>
                        
                        <div class="sides-section">
                            <p class="sides-title">附餐 Sides</p>
                            <div class="sides-list">
                                ${item.sides.map(side => `
                                    <div class="side-item">
                                        <span>${side.emoji}</span>
                                        <span>${side.name}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="nutrition-bar">
                            <div class="nutrition-item">
                                <div class="nutrition-value">${item.nutrition.protein}g</div>
                                <div class="nutrition-label">蛋白質</div>
                            </div>
                            <div class="nutrition-item">
                                <div class="nutrition-value">${item.nutrition.carbs}g</div>
                                <div class="nutrition-label">碳水</div>
                            </div>
                            <div class="nutrition-item">
                                <div class="nutrition-value">${item.nutrition.fiber}g</div>
                                <div class="nutrition-label">纖維</div>
                            </div>
                        </div>
                        
                        <button class="order-btn" onclick="orderMeal('${item.dish}')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            預訂此餐
                        </button>
                    </div>
                `;
                
                cardsWrapper.appendChild(card);
            });
        }

        // Image load handlers
        function imageLoaded(index) {
            const loading = document.getElementById(`loading-${index}`);
            const card = document.querySelector(`.card[data-index="${index}"]`);
            const img = card.querySelector('.card-image img');
            
            if (loading) loading.classList.add('hidden');
            if (img) img.classList.add('loaded');
        }

        function imageError(index) {
            const loading = document.getElementById(`loading-${index}`);
            if (loading) {
                loading.innerHTML = `${menuData[index].emoji}<span>圖片載入失敗</span>`;
            }
        }

        // Create navigation dots
        function createDots() {
            menuData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = 'nav-dot';
                dot.onclick = () => goToCard(index);
                navDots.appendChild(dot);
            });
        }

        // Setup touch/mouse events
        function setupEvents() {
            // Touch events on wrapper
            cardsWrapper.addEventListener('touchstart', handleDragStart, { passive: true });
            cardsWrapper.addEventListener('touchmove', handleDragMove, { passive: false });
            cardsWrapper.addEventListener('touchend', handleDragEnd);
            
            // Mouse events
            cardsWrapper.addEventListener('mousedown', handleDragStart);
            document.addEventListener('mousemove', handleDragMove);
            document.addEventListener('mouseup', handleDragEnd);
            
            // Button events
            prevBtn.addEventListener('click', prevCard);
            nextBtn.addEventListener('click', nextCard);
            
            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') prevCard();
                if (e.key === 'ArrowRight') nextCard();
                if (e.key === 'Escape') closeImageModal();
            });
        }

        // Drag handlers
        function handleDragStart(e) {
            if (e.target.closest('.order-btn') || e.target.closest('.side-item')) return;
            
            isDragging = true;
            startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            
            const activeCard = document.querySelector('.card.active');
            if (activeCard) activeCard.classList.add('dragging');
            
            hideHint();
        }

        function handleDragMove(e) {
            if (!isDragging) return;
            
            currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const deltaX = currentX - startX;
            
            const activeCard = document.querySelector('.card.active');
            if (activeCard) {
                // Add resistance at edges
                let resistance = 1;
                if ((currentIndex === 0 && deltaX > 0) || 
                    (currentIndex === menuData.length - 1 && deltaX < 0)) {
                    resistance = 0.3;
                }
                
                activeCard.style.transform = `translateX(${deltaX * resistance}px)`;
            }
            
            if (e.cancelable) e.preventDefault();
        }

        function handleDragEnd() {
            if (!isDragging) return;
            isDragging = false;
            
            const activeCard = document.querySelector('.card.active');
            if (activeCard) {
                activeCard.classList.remove('dragging');
                activeCard.style.transform = '';
            }
            
            const deltaX = currentX - startX;
            const threshold = cardsWrapper.offsetWidth * 0.2; // 20% threshold
            
            if (Math.abs(deltaX) > threshold) {
                if (deltaX < 0 && currentIndex < menuData.length - 1) {
                    nextCard();
                } else if (deltaX > 0 && currentIndex > 0) {
                    prevCard();
                }
            }
            
            startX = 0;
            currentX = 0;
        }

        // Navigation
        function nextCard() {
            if (currentIndex < menuData.length - 1) {
                currentIndex++;
                updateUI();
                hideHint();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        function goToCard(index) {
            currentIndex = index;
            updateUI();
            hideHint();
        }

        // Update UI state
        function updateUI() {
            // Update cards
            document.querySelectorAll('.card').forEach((card, index) => {
                card.classList.remove('active', 'prev', 'next');
                
                if (index === currentIndex) {
                    card.classList.add('active');
                } else if (index < currentIndex) {
                    card.classList.add('prev');
                } else {
                    card.classList.add('next');
                }
            });
            
            // Update dots
            document.querySelectorAll('.nav-dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
            
            // Update buttons
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === menuData.length - 1;
        }

        // Hide swipe hint
        function hideHint() {
            if (!hasInteracted) {
                hasInteracted = true;
                swipeHint.classList.add('hidden');
            }
        }

        // Order meal
        function orderMeal(dish) {
            showToast(`${dish} 已加入訂單！`);
            
            // Haptic feedback
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Image modal
        function openImageModal(index) {
            const item = menuData[index];
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            
            img.src = item.imageUrl;
            img.alt = item.dish;
            modal.classList.add('show');
            
            // Close on click
            modal.onclick = (e) => {
                if (e.target !== img) {
                    closeImageModal();
                }
            };
        }

        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('show');
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
