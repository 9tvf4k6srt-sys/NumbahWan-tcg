<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parry Hotter 程式巫術學院 | 本週午餐菜單</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        :root {
            --gold: #d4a574;
            --gold-light: #e8c9a0;
            --emerald: #10b981;
            --emerald-dark: #047857;
            --cream: #faf7f2;
            --dark: #1a1a1a;
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(145deg, #0d1f0d 0%, #0a1a0a 50%, #051005 100%);
        }

        /* Ambient background effects */
        .ambient-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--emerald) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 20px;
            background: linear-gradient(to bottom, rgba(10, 26, 10, 0.95) 0%, rgba(10, 26, 10, 0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--cream);
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(212, 165, 116, 0.3);
            background: rgba(212, 165, 116, 0.1);
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header-btn:hover {
            background: rgba(212, 165, 116, 0.2);
            transform: translateY(-2px);
        }

        /* Menu Book Container */
        .menu-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 120px;
            perspective: 2000px;
        }

        /* The Book */
        .menu-book {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100%;
            max-height: 680px;
            transform-style: preserve-3d;
        }

        /* Book spine/shadow */
        .book-spine {
            position: absolute;
            left: 50%;
            top: 5%;
            bottom: 5%;
            width: 8px;
            background: linear-gradient(to right, #2a1a0a, #4a3020, #2a1a0a);
            transform: translateX(-50%);
            border-radius: 2px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 50;
        }

        /* Page styles */
        .page {
            position: absolute;
            width: 50%;
            height: 100%;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: grab;
            right: 0;
        }

        .page.flipping {
            transition: none;
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        .page-front, .page-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 0 16px 16px 0;
            overflow: hidden;
            background: linear-gradient(135deg, #1a2e1a 0%, #152515 100%);
            border: 1px solid rgba(212, 165, 116, 0.15);
            box-shadow: var(--card-shadow);
        }

        .page-back {
            transform: rotateY(180deg);
            border-radius: 16px 0 0 16px;
        }

        /* Left side of book (static) */
        .book-left {
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #1a2e1a 0%, #152515 100%);
            border: 1px solid rgba(212, 165, 116, 0.15);
            border-radius: 16px 0 0 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        /* Page content */
        .page-content {
            position: absolute;
            inset: 0;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Day header */
        .day-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(4, 120, 87, 0.2) 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--emerald);
            margin-bottom: 20px;
            align-self: flex-start;
        }

        .day-name {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--cream);
            margin-bottom: 8px;
        }

        .day-date {
            font-size: 13px;
            color: rgba(250, 247, 242, 0.5);
            margin-bottom: 24px;
        }

        /* Food image */
        .food-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .food-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .food-image-container:hover .food-image {
            transform: scale(1.05);
        }

        .food-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            background: rgba(16, 185, 129, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .calories-badge {
            position: absolute;
            bottom: 12px;
            left: 12px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 11px;
            color: var(--cream);
        }

        /* Dish info */
        .dish-name {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--cream);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .dish-name-en {
            font-size: 13px;
            color: var(--gold);
            margin-bottom: 16px;
            font-style: italic;
        }

        /* Side dishes */
        .sides-title {
            font-size: 12px;
            color: rgba(250, 247, 242, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .sides-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .side-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(212, 165, 116, 0.1);
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 20px;
            font-size: 13px;
            color: var(--gold-light);
            transition: all 0.3s ease;
        }

        .side-item:hover {
            background: rgba(212, 165, 116, 0.2);
            transform: translateY(-2px);
        }

        /* Nutrition info */
        .nutrition-bar {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(212, 165, 116, 0.1);
            display: flex;
            justify-content: space-between;
        }

        .nutrition-item {
            text-align: center;
        }

        .nutrition-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--emerald);
        }

        .nutrition-label {
            font-size: 10px;
            color: rgba(250, 247, 242, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Navigation Controls */
        .nav-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
        }

        .nav-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(212, 165, 116, 0.3);
            background: rgba(26, 46, 26, 0.8);
            backdrop-filter: blur(20px);
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(212, 165, 116, 0.2);
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(212, 165, 116, 0.2);
        }

        .nav-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
        }

        .page-indicator {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(26, 46, 26, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }

        .page-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(212, 165, 116, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .page-dot.active {
            background: var(--gold);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.5);
            transform: scale(1.2);
        }

        .page-dot:hover:not(.active) {
            background: rgba(212, 165, 116, 0.5);
        }

        /* Drag hint */
        .drag-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            opacity: 1;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .drag-hint.hidden {
            opacity: 0;
        }

        .drag-hint svg {
            animation: swipeHint 2s ease-in-out infinite;
        }

        @keyframes swipeHint {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-10px); }
        }

        /* Order button */
        .order-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.4);
        }

        .order-btn:active {
            transform: translateY(-1px);
        }

        /* Loading state */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, #0d1f0d 0%, #0a1a0a 50%, #051005 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(212, 165, 116, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 20px;
            color: var(--gold);
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 16px 24px;
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 200;
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Cover page styles */
        .cover-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px 20px;
        }

        .cover-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-dark) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 24px;
            box-shadow: 0 15px 40px rgba(16, 185, 129, 0.3);
        }

        .cover-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--cream);
            margin-bottom: 8px;
        }

        .cover-subtitle {
            font-size: 14px;
            color: var(--gold);
            margin-bottom: 32px;
        }

        .cover-week {
            padding: 12px 24px;
            background: rgba(212, 165, 116, 0.15);
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 30px;
            color: var(--gold-light);
            font-size: 14px;
        }

        .cover-instruction {
            margin-top: auto;
            padding-top: 40px;
            color: rgba(250, 247, 242, 0.5);
            font-size: 13px;
        }

        /* Image placeholder during loading */
        .image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 46, 26, 0.8) 0%, rgba(21, 37, 21, 0.8) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 40px;
        }

        .shimmer {
            background: linear-gradient(
                90deg,
                rgba(212, 165, 116, 0.1) 0%,
                rgba(212, 165, 116, 0.2) 50%,
                rgba(212, 165, 116, 0.1) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .menu-container {
                padding: 70px 10px 130px;
            }

            .page-content {
                padding: 20px 18px;
            }

            .day-name {
                font-size: 26px;
            }

            .dish-name {
                font-size: 18px;
            }

            .food-image-container {
                aspect-ratio: 16/10;
            }
        }

        /* Flip sound visual feedback */
        .page.flip-sound::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(212, 165, 116, 0.1) 0%, transparent 70%);
            pointer-events: none;
            animation: flipFlash 0.3s ease-out forwards;
        }

        @keyframes flipFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>

    <!-- Ambient background -->

    <!-- Menu Book -->

                ],
                nutrition: { protein: 28, carbs: 45, fiber: 9 },
                imageUrl: 'https://www.genspark.ai/api/files/s/0HFGI7v4',
                imagePlaceholder: '🍛'
            },
            {
                day: '週四',
                dayEn: 'Thursday',
                date: '2月6日',
                emoji: '🥙',
                dish: '魚肉塔可',
                dishEn: 'Fish Tacos',
                healthy: true,
                calories: 420,
                sides: [
                    { emoji: '🥬', name: '涼拌捲心菜' },
                    { emoji: '🧃', name: '鮮榨果汁' }
                ],
                nutrition: { protein: 32, carbs: 38, fiber: 10 },
                imageUrl: 'https://www.genspark.ai/api/files/s/R0DXyaTs',
                imagePlaceholder: '🌮'
            },
            {
                day: '週五',
                dayEn: 'Friday',
                date: '2月7日',
                emoji: '🍕',
                dish: '披薩日！',
                dishEn: 'Pizza Friday!',
                healthy: true,
                calories: 580,
                sides: [
                    { emoji: '🥗', name: '凱薩沙拉' },
                    { emoji: '🍨', name: '冰淇淋' }
                ],
                nutrition: { protein: 24, carbs: 58, fiber: 6 },
                imageUrl: 'https://www.genspark.ai/api/files/s/9oIsQ42K',
                imagePlaceholder: '🍕'
            }
        ];

        // State
        let currentPage = 0;
        let isDragging = false;
        let startX = 0;
        let currentX = 0;
        let dragPage = null;
        let hasInteracted = false;

        // DOM elements
        const pagesContainer = document.getElementById('pagesContainer');
        const bookLeft = document.getElementById('bookLeft');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const dragHint = document.getElementById('dragHint');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Initialize menu
        function initMenu() {
            // Create pages
            menuData.forEach((item, index) => {
                const page = createPage(item, index);
                pagesContainer.appendChild(page);
            });

            // Create page indicators
            menuData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `page-dot ${index === 0 ? 'active' : ''}`;
                dot.onclick = () => goToPage(index);
                pageIndicator.appendChild(dot);
            });

            // Update book left content for first page
            updateBookLeft(0);

            // Setup event listeners
            setupEventListeners();

            // Hide loading
            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
            }, 800);
        }

        // Create a page element
        function createPage(item, index) {
            const page = document.createElement('div');
            page.className = 'page';
            page.dataset.index = index;
            page.style.zIndex = menuData.length - index;

            page.innerHTML = `
                <div class="page-front">
                    <div class="page-content">
                        <div class="day-badge">
                            <span>${item.emoji}</span>
                            <span>${item.day}</span>
                        </div>
                        
                        <h2 class="day-name">${item.day}</h2>
                        <p class="day-date">${item.dayEn} • ${item.date}</p>
                        
                        <div class="food-image-container">
                            ${item.imageUrl 
                                ? `<img class="food-image" src="${item.imageUrl}" alt="${item.dish}" loading="lazy">` 
                                : `<div class="image-placeholder shimmer" data-index="${index}">${item.imagePlaceholder}</div>`
                            }
                            ${item.healthy ? '<div class="food-badge">🌿 健康餐</div>' : ''}
                            <div class="calories-badge">🔥 ${item.calories} kcal</div>
                        </div>
                        
                        <h3 class="dish-name">${item.dish}</h3>
                        <p class="dish-name-en">${item.dishEn}</p>
                        
                        <p class="sides-title">附餐 Sides</p>
                        <div class="sides-list">
                            ${item.sides.map(side => `
                                <div class="side-item">
                                    <span>${side.emoji}</span>
                                    <span>${side.name}</span>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="nutrition-bar">
                            <div class="nutrition-item">
                                <div class="nutrition-value">${item.nutrition.protein}g</div>
                                <div class="nutrition-label">蛋白質</div>
                            </div>
                            <div class="nutrition-item">
                                <div class="nutrition-value">${item.nutrition.carbs}g</div>
                                <div class="nutrition-label">碳水</div>
                            </div>
                            <div class="nutrition-item">
                                <div class="nutrition-value">${item.nutrition.fiber}g</div>
                                <div class="nutrition-label">纖維</div>
                            </div>
                        </div>
                        
                        <button class="order-btn" onclick="addToOrder('${item.dish}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            預訂此餐
                        </button>
                    </div>
                </div>
                <div class="page-back">
                    <div class="page-content">
                        ${index < menuData.length - 1 ? createPageBackContent(menuData[index + 1]) : createEndContent()}
                    </div>
                </div>
            `;

            return page;
        }

        // Create back of page content (preview of next day)
        function createPageBackContent(nextItem) {
            return `
                <div style="opacity: 0.7; transform: scaleX(-1);">
                    <div class="day-badge">
                        <span>${nextItem.emoji}</span>
                        <span>明日預告</span>
                    </div>
                    <h2 class="day-name">${nextItem.day}</h2>
                    <p class="dish-name" style="margin-top: 20px;">${nextItem.dish}</p>
                    <p class="dish-name-en">${nextItem.dishEn}</p>
                </div>
            `;
        }

        // Create end content
        function createEndContent() {
            return `
                <div class="cover-content" style="transform: scaleX(-1);">
                    <div class="cover-logo">🎉</div>
                    <h2 class="cover-title">本週菜單完畢</h2>
                    <p class="cover-subtitle">See you next week!</p>
                    <p style="color: var(--gold-light); margin-top: 20px;">祝您用餐愉快 ✨</p>
                </div>
            `;
        }

        // Update left book content
        function updateBookLeft(pageIndex) {
            if (pageIndex === 0) {
                bookLeft.innerHTML = `
                    <div class="page-content cover-content">
                        <div class="cover-logo">🍽️</div>
                        <h1 class="cover-title">本週午餐菜單</h1>
                        <p class="cover-subtitle">Weekly Lunch Menu</p>
                        <div class="cover-week">
                            <span>📅</span> 2月3日 - 2月7日
                        </div>
                        <p class="cover-instruction">→ 翻頁瀏覽菜單</p>
                    </div>
                `;
            } else {
                const prevItem = menuData[pageIndex - 1];
                bookLeft.innerHTML = `
                    <div class="page-content">
                        <div class="day-badge">
                            <span>${prevItem.emoji}</span>
                            <span>${prevItem.day}</span>
                        </div>
                        
                        <h2 class="day-name">${prevItem.day}</h2>
                        <p class="day-date">${prevItem.dayEn} • ${prevItem.date}</p>
                        
                        <div class="food-image-container">
                            ${prevItem.imageUrl 
                                ? `<img class="food-image" src="${prevItem.imageUrl}" alt="${prevItem.dish}">` 
                                : `<div class="image-placeholder shimmer">${prevItem.imagePlaceholder}</div>`
                            }
                        </div>
                        
                        <h3 class="dish-name">${prevItem.dish}</h3>
                        <p class="dish-name-en">${prevItem.dishEn}</p>
                        
                        <p class="sides-title">附餐 Sides</p>
                        <div class="sides-list">
                            ${prevItem.sides.map(side => `
                                <div class="side-item">
                                    <span>${side.emoji}</span>
                                    <span>${side.name}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            const pages = document.querySelectorAll('.page');
            
            pages.forEach(page => {
                // Touch events
                page.addEventListener('touchstart', handleDragStart, { passive: false });
                page.addEventListener('touchmove', handleDragMove, { passive: false });
                page.addEventListener('touchend', handleDragEnd);
                
                // Mouse events
                page.addEventListener('mousedown', handleDragStart);
                document.addEventListener('mousemove', handleDragMove);
                document.addEventListener('mouseup', handleDragEnd);
            });

            // Navigation buttons
            prevBtn.addEventListener('click', prevPage);
            nextBtn.addEventListener('click', nextPage);

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') prevPage();
                if (e.key === 'ArrowRight') nextPage();
            });
        }

        // Drag handlers
        function handleDragStart(e) {
            const page = e.currentTarget;
            const pageIndex = parseInt(page.dataset.index);
            
            // Only allow dragging current page or flipped pages
            if (pageIndex !== currentPage && !page.classList.contains('flipped')) return;
            
            isDragging = true;
            dragPage = page;
            startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            
            page.classList.add('flipping');
            page.style.cursor = 'grabbing';
            
            hideHint();
        }

        function handleDragMove(e) {
            if (!isDragging || !dragPage) return;
            
            e.preventDefault();
            currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            
            const deltaX = currentX - startX;
            const pageIndex = parseInt(dragPage.dataset.index);
            const isFlipped = dragPage.classList.contains('flipped');
            
            let rotation;
            if (isFlipped) {
                // Unflipping (dragging right)
                rotation = Math.max(-180, Math.min(-180 + (deltaX / 3), 0));
            } else {
                // Flipping (dragging left)
                rotation = Math.max(-180, Math.min(deltaX / 3, 0));
            }
            
            dragPage.style.transform = `rotateY(${rotation}deg)`;
            
            // Add shadow based on rotation
            const progress = Math.abs(rotation) / 180;
            dragPage.style.filter = `drop-shadow(${10 * progress}px 0 20px rgba(0,0,0,${0.3 + progress * 0.2}))`;
        }

        function handleDragEnd(e) {
            if (!isDragging || !dragPage) return;
            
            const deltaX = currentX - startX;
            const pageIndex = parseInt(dragPage.dataset.index);
            const isFlipped = dragPage.classList.contains('flipped');
            const threshold = window.innerWidth * 0.15; // 15% of screen width
            
            dragPage.classList.remove('flipping');
            dragPage.style.cursor = 'grab';
            dragPage.style.filter = '';
            
            if (isFlipped) {
                // Was flipped, check if should unflip
                if (deltaX > threshold) {
                    unflipPage(pageIndex);
                } else {
                    // Snap back to flipped
                    dragPage.style.transform = 'rotateY(-180deg)';
                }
            } else {
                // Was not flipped, check if should flip
                if (deltaX < -threshold) {
                    flipPage(pageIndex);
                } else {
                    // Snap back to original
                    dragPage.style.transform = '';
                }
            }
            
            isDragging = false;
            dragPage = null;
            startX = 0;
            currentX = 0;
        }

        // Page flip functions
        function flipPage(index) {
            const pages = document.querySelectorAll('.page');
            const page = pages[index];
            
            if (!page || index >= menuData.length) return;
            
            page.classList.add('flipped');
            page.style.transform = '';
            
            // Play flip sound effect (visual only)
            page.classList.add('flip-sound');
            setTimeout(() => page.classList.remove('flip-sound'), 300);
            
            currentPage = index + 1;
            updateNavigation();
            updateBookLeft(currentPage);
        }

        function unflipPage(index) {
            const pages = document.querySelectorAll('.page');
            const page = pages[index];
            
            if (!page || index < 0) return;
            
            page.classList.remove('flipped');
            page.style.transform = '';
            
            currentPage = index;
            updateNavigation();
            updateBookLeft(currentPage);
        }

        // Navigation functions
        function nextPage() {
            if (currentPage < menuData.length) {
                flipPage(currentPage);
                hideHint();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                unflipPage(currentPage - 1);
            }
        }

        function goToPage(targetPage) {
            while (currentPage < targetPage && currentPage < menuData.length) {
                flipPage(currentPage);
            }
            while (currentPage > targetPage && currentPage > 0) {
                unflipPage(currentPage - 1);
            }
        }

        function updateNavigation() {
            // Update buttons
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage >= menuData.length;
            
            // Update dots
            const dots = document.querySelectorAll('.page-dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentPage);
            });
        }

        // Utility functions
        function hideHint() {
            if (!hasInteracted) {
                hasInteracted = true;
                dragHint.classList.add('hidden');
            }
        }

        function addToOrder(dish) {
            showToast(`${dish} 已加入訂單！`);
            
            // Haptic feedback simulation (vibration if supported)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function showInfo() {
            showToast('拖曳或點擊箭頭翻頁瀏覽菜單');
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initMenu);
    </script>
</body>
</html>
