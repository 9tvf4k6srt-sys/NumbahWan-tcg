<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NumbahWan TCG | BATTLE ARENA v6.0</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/static/battle-v6.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="/static/nw-cards.js"></script>
</head>
<body>
    <!-- ═══ BATTLE ARENA v6.0 — TAP TO PLAY ═══ -->
    <div id="arena">
        <!-- TOP: Enemy Info -->
        <header id="topBar">
            <a href="/" class="back-link">← Back</a>
            <div class="turn-badge" id="turnBadge">TURN 1</div>
            <div class="energy-display" id="energyDisplay">
                <span class="energy-icon">⚡</span>
                <span id="energyText">1/1</span>
            </div>
        </header>

        <!-- ENEMY HP BAR -->
        <div class="hp-row enemy-hp">
            <div class="hp-avatar" id="enemyAvatar">🤖</div>
            <div class="hp-info">
                <div class="hp-name" id="enemyName">Enemy</div>
                <div class="hp-bar-wrap">
                    <div class="hp-bar-fill enemy-fill" id="enemyHpBar" style="width:100%"></div>
                    <span class="hp-text" id="enemyHpText">30/30</span>
                </div>
            </div>
        </div>

        <!-- BATTLEFIELD -->
        <div id="battlefield">
            <!-- Enemy Board -->
            <div class="board-side enemy-side" id="enemyBoard">
                <div class="board-slot" data-slot="0"></div>
                <div class="board-slot" data-slot="1"></div>
                <div class="board-slot" data-slot="2"></div>
                <div class="board-slot" data-slot="3"></div>
                <div class="board-slot" data-slot="4"></div>
            </div>

            <!-- Divider -->
            <div class="board-divider">
                <span class="vs-text">⚔️</span>
            </div>

            <!-- Player Board -->
            <div class="board-side player-side" id="playerBoard">
                <div class="board-slot player-slot" data-slot="0"></div>
                <div class="board-slot player-slot" data-slot="1"></div>
                <div class="board-slot player-slot" data-slot="2"></div>
                <div class="board-slot player-slot" data-slot="3"></div>
                <div class="board-slot player-slot" data-slot="4"></div>
            </div>
        </div>

        <!-- PLAYER HP BAR -->
        <div class="hp-row player-hp">
            <div class="hp-avatar">😎</div>
            <div class="hp-info">
                <div class="hp-name player-name">You</div>
                <div class="hp-bar-wrap">
                    <div class="hp-bar-fill player-fill" id="playerHpBar" style="width:100%"></div>
                    <span class="hp-text" id="playerHpText">30/30</span>
                </div>
            </div>
        </div>

        <!-- SYNERGY BAR -->
        <div id="synergyBar" class="synergy-bar"></div>

        <!-- HAND — THE STAR OF THE SHOW -->
        <div id="handArea">
            <div class="hand-header">
                <span class="hand-label">YOUR HAND</span>
                <span class="hand-count" id="handCount">0/7</span>
            </div>
            <div class="hand-cards" id="playerHand"></div>
        </div>

        <!-- ACTION BUTTONS -->
        <div id="actionBar">
            <button class="action-btn end-turn-btn" id="endTurnBtn">END TURN</button>
            <button class="action-btn attack-btn" id="attackBtn" disabled>⚔️ ATTACK</button>
        </div>

        <!-- ANNOUNCER -->
        <div id="announcer" class="announcer hidden"></div>

        <!-- GAME OVER OVERLAY -->
        <div id="gameOver" class="game-over hidden">
            <div class="game-over-content">
                <h1 id="gameOverTitle"></h1>
                <div id="gameOverStats"></div>
                <button class="play-again-btn" onclick="location.reload()">PLAY AGAIN</button>
                <a href="/" class="home-btn">← Home</a>
            </div>
        </div>

        <!-- START SCREEN -->
        <div id="startScreen" class="start-screen">
            <div class="start-content">
                <h1 class="start-title">⚔️ BATTLE ARENA</h1>
                <p class="start-subtitle">NumbahWan TCG v6.0</p>
                <div class="diff-select">
                    <button class="diff-btn selected" data-diff="casual" onclick="selectDiff('casual')">
                        <span class="diff-icon">🤖</span>
                        <span class="diff-name">Casual</span>
                        <span class="diff-desc">Vibes only</span>
                    </button>
                    <button class="diff-btn" data-diff="ranked" onclick="selectDiff('ranked')">
                        <span class="diff-icon">🏆</span>
                        <span class="diff-name">Ranked</span>
                        <span class="diff-desc">Smart AI</span>
                    </button>
                    <button class="diff-btn" data-diff="boss" onclick="selectDiff('boss')">
                        <span class="diff-icon">💀</span>
                        <span class="diff-name">Boss</span>
                        <span class="diff-desc">No mercy</span>
                    </button>
                </div>
                <button class="start-btn" id="startBtn">⚔️ START BATTLE</button>
            </div>
        </div>

        <!-- FLOATING COMBAT LOG -->
        <div id="combatLog" class="combat-log"></div>
    </div>

    <!-- Card Detail Modal -->
    <div id="cardModal" class="card-modal hidden" onclick="closeCardModal(event)">
        <div class="card-modal-content" id="cardModalContent"></div>
    </div>

    <script src="/static/nw-card-engine.js"></script>
    <script src="/static/nw-battle-v6.js"></script>
</body>
</html>
