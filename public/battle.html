<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NumbahWan TCG | BATTLE ARENA v7.0</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/static/battle-v7.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="/static/nw-cards.js"></script>
</head>
<body>
    <!-- ═══ BATTLE ARENA v7.0 — ACCESSIBILITY-FIRST REDESIGN ═══ -->
    <!-- Research: Marvel Snap lanes, 60px+ touch targets, 16pt+ fonts, thumb-zone actions -->
    <div id="arena">

        <!-- ═══ TOP BAR: Compact info row ═══ -->
        <header id="topBar">
            <a href="/" class="back-btn" aria-label="Back to home">←</a>
            <div class="top-info">
                <span class="turn-pill" id="turnBadge">TURN 1</span>
                <span class="energy-pill" id="energyPill">⚡ <span id="energyText">1/1</span></span>
            </div>
            <button class="menu-btn" id="menuBtn" aria-label="Game menu">☰</button>
        </header>

        <!-- ═══ ENEMY ZONE ═══ -->
        <div class="player-zone enemy-zone">
            <div class="zone-header">
                <div class="avatar-hp">
                    <span class="zone-avatar" id="enemyAvatar">🤖</span>
                    <div class="zone-info">
                        <span class="zone-name enemy-name" id="enemyName">Enemy</span>
                        <div class="hp-bar-track">
                            <div class="hp-bar-fill enemy-bar" id="enemyHpBar" style="width:100%"></div>
                            <span class="hp-label" id="enemyHpText">30/30</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Enemy Board: 5 slots -->
            <div class="board-row" id="enemyBoard">
                <div class="board-slot enemy-slot" data-slot="0" data-side="enemy"></div>
                <div class="board-slot enemy-slot" data-slot="1" data-side="enemy"></div>
                <div class="board-slot enemy-slot" data-slot="2" data-side="enemy"></div>
                <div class="board-slot enemy-slot" data-slot="3" data-side="enemy"></div>
                <div class="board-slot enemy-slot" data-slot="4" data-side="enemy"></div>
            </div>
        </div>

        <!-- ═══ BATTLE DIVIDER ═══ -->
        <div class="battle-divider">
            <div class="divider-line"></div>
            <span class="divider-icon">⚔️</span>
            <div class="divider-line"></div>
        </div>

        <!-- ═══ PLAYER ZONE ═══ -->
        <div class="player-zone your-zone">
            <!-- Player Board: 5 slots -->
            <div class="board-row" id="playerBoard">
                <div class="board-slot player-slot" data-slot="0" data-side="player"></div>
                <div class="board-slot player-slot" data-slot="1" data-side="player"></div>
                <div class="board-slot player-slot" data-slot="2" data-side="player"></div>
                <div class="board-slot player-slot" data-slot="3" data-side="player"></div>
                <div class="board-slot player-slot" data-slot="4" data-side="player"></div>
            </div>
            <div class="zone-header player-header">
                <div class="avatar-hp">
                    <span class="zone-avatar">😎</span>
                    <div class="zone-info">
                        <span class="zone-name your-name">You</span>
                        <div class="hp-bar-track">
                            <div class="hp-bar-fill player-bar" id="playerHpBar" style="width:100%"></div>
                            <span class="hp-label" id="playerHpText">30/30</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══ SYNERGY TICKER ═══ -->
        <div id="synergyTicker" class="synergy-ticker"></div>

        <!-- ═══ HAND AREA: The Star — Big Carousel Cards ═══ -->
        <div id="handArea" class="hand-area">
            <div class="hand-header">
                <span class="hand-label">YOUR HAND</span>
                <span class="hand-count" id="handCount">0 / 7</span>
            </div>
            <div class="hand-carousel" id="playerHand">
                <!-- Cards rendered here as big swipeable cards -->
            </div>
            <div class="hand-dots" id="handDots"></div>
        </div>

        <!-- ═══ ACTION BAR: Thumb Zone — Always at Bottom ═══ -->
        <div id="actionBar" class="action-bar">
            <button class="action-btn end-btn" id="endTurnBtn" aria-label="End your turn">
                <span class="btn-icon">⏭</span>
                <span class="btn-text">END TURN</span>
            </button>
            <button class="action-btn attack-btn" id="attackBtn" disabled aria-label="Attack enemy">
                <span class="btn-icon">⚔️</span>
                <span class="btn-text">ATTACK</span>
            </button>
        </div>

        <!-- ═══ ANNOUNCER: Big, readable, center screen ═══ -->
        <div id="announcer" class="announcer hidden" role="alert" aria-live="assertive"></div>

        <!-- ═══ COMBAT LOG: Floating toasts ═══ -->
        <div id="combatLog" class="combat-log" aria-live="polite"></div>

        <!-- ═══ GAME OVER OVERLAY ═══ -->
        <div id="gameOver" class="overlay hidden">
            <div class="overlay-card">
                <h1 id="gameOverTitle" class="overlay-title"></h1>
                <div id="gameOverStats" class="overlay-stats"></div>
                <button class="big-btn gold-btn" onclick="location.reload()">⚔️ PLAY AGAIN</button>
                <a href="/" class="overlay-link">← Back to Home</a>
            </div>
        </div>

        <!-- ═══ START SCREEN ═══ -->
        <div id="startScreen" class="overlay">
            <div class="overlay-card start-card">
                <h1 class="start-title">⚔️ BATTLE ARENA</h1>
                <p class="start-sub">NumbahWan TCG v7.0</p>
                <div class="diff-grid">
                    <button class="diff-card selected" data-diff="casual" onclick="selectDiff('casual')">
                        <span class="diff-emoji">🤖</span>
                        <span class="diff-label">Casual</span>
                        <span class="diff-hint">Vibes only</span>
                    </button>
                    <button class="diff-card" data-diff="ranked" onclick="selectDiff('ranked')">
                        <span class="diff-emoji">🏆</span>
                        <span class="diff-label">Ranked</span>
                        <span class="diff-hint">Smart AI</span>
                    </button>
                    <button class="diff-card" data-diff="boss" onclick="selectDiff('boss')">
                        <span class="diff-emoji">💀</span>
                        <span class="diff-label">Boss</span>
                        <span class="diff-hint">No mercy</span>
                    </button>
                </div>
                <button class="big-btn gold-btn" id="startBtn">⚔️ START BATTLE</button>
            </div>
        </div>

        <!-- ═══ CARD DETAIL MODAL ═══ -->
        <div id="cardModal" class="overlay hidden" onclick="closeCardModal(event)">
            <div class="overlay-card modal-card" id="cardModalContent"></div>
        </div>

    </div>

    <script src="/static/nw-card-engine.js"></script>
    <script src="/static/nw-battle-v7.js"></script>
</body>
</html>
