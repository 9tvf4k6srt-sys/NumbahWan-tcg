<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NumbahWan TCG | BATTLE ARENA</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════════
           MARVEL SNAP INSPIRED BATTLE UI - PREMIUM FEEL
           ═══════════════════════════════════════════════════════════════════ */
        
        :root {
            /* Colors */
            --gold: #ffd700;
            --orange: #ff6b00;
            --fire: #ff4500;
            --purple: #a855f7;
            --blue: #3b82f6;
            --cyan: #00ffff;
            --green: #22c55e;
            --red: #ef4444;
            --dark: #0a0a0f;
            --mythic: #ff00ff;
            
            /* Card sizes - MUCH BIGGER */
            --card-width: 140px;
            --card-height: 196px;
            --hand-card-width: 120px;
            --hand-card-height: 168px;
            --board-card-width: 100px;
            --board-card-height: 140px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; 
            overflow: hidden;
            touch-action: manipulation;
        }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #000;
            color: #fff;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           EPIC ARENA BACKGROUND
           ═══════════════════════════════════════════════════════════════════ */
        .arena-container {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, 
                #0a0a1a 0%, 
                #1a0a2e 30%,
                #2a1040 50%,
                #1a0a2e 70%,
                #0a0a1a 100%);
        }
        
        /* Animated particles background */
        .arena-particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle 20s linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           TOP BAR - COMPACT HEADER
           ═══════════════════════════════════════════════════════════════════ */
        .top-bar {
            height: 50px;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.9), rgba(0,0,0,0.7));
            border-bottom: 2px solid rgba(255,107,0,0.4);
            z-index: 100;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255,215,0,0.6);
            text-decoration: none;
        }
        .back-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .back-btn:hover {
            background: rgba(255,107,0,0.3);
            border-color: var(--orange);
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           HP BARS - BIG AND IMPACTFUL
           ═══════════════════════════════════════════════════════════════════ */
        .hp-section {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        
        .hp-container {
            flex: 1;
            max-width: 300px;
        }
        .hp-container.enemy {
            text-align: right;
        }
        
        .hp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .hp-container.enemy .hp-header {
            flex-direction: row-reverse;
        }
        
        .hp-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hp-name.enemy { color: var(--red); }
        .hp-name.player { color: var(--cyan); }
        
        .hp-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--green);
            text-shadow: 0 0 15px rgba(34,197,94,0.6);
            transition: all 0.3s;
        }
        .hp-value.low { 
            color: var(--red); 
            text-shadow: 0 0 15px rgba(239,68,68,0.8);
            animation: hpPulse 0.5s infinite;
        }
        .hp-value.mid { 
            color: var(--gold); 
            text-shadow: 0 0 15px rgba(255,215,0,0.6);
        }
        @keyframes hpPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .hp-bar {
            height: 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.2);
            position: relative;
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #84cc16, #22c55e);
            background-size: 200% 100%;
            animation: hpShimmer 2s linear infinite;
            border-radius: 7px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .hp-fill.low { 
            background: linear-gradient(90deg, #ef4444, #f97316, #ef4444);
        }
        .hp-fill.mid { 
            background: linear-gradient(90deg, #fbbf24, #f59e0b, #fbbf24);
        }
        @keyframes hpShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* HP damage flash */
        .hp-bar.damaged {
            animation: hpDamageFlash 0.3s ease-out;
        }
        @keyframes hpDamageFlash {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 30px var(--red), inset 0 0 30px rgba(239,68,68,0.5); }
        }
        
        .vs-divider {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: var(--orange);
            text-shadow: 
                0 0 30px var(--orange),
                0 0 60px var(--fire);
            animation: vsPulse 2s infinite;
        }
        @keyframes vsPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           ENERGY DISPLAY - CRYSTALS
           ═══════════════════════════════════════════════════════════════════ */
        .energy-bar {
            padding: 8px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }
        
        .energy-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--cyan);
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }
        
        .energy-crystals {
            display: flex;
            gap: 6px;
        }
        .energy-crystal {
            width: 32px;
            height: 32px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .energy-crystal::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 
                0 0 15px var(--cyan),
                inset 0 0 10px rgba(255,255,255,0.3);
        }
        .energy-crystal::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .energy-crystal.spent {
            transform: scale(0.8);
            opacity: 0.3;
        }
        .energy-crystal.spent::before {
            background: linear-gradient(135deg, #333, #222);
            box-shadow: none;
        }
        
        .turn-indicator {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .turn-indicator.your-turn {
            background: linear-gradient(135deg, var(--green), #16a34a);
            color: #fff;
            box-shadow: 0 0 20px rgba(34,197,94,0.5);
            animation: turnGlow 1s infinite;
        }
        .turn-indicator.enemy-turn {
            background: linear-gradient(135deg, var(--red), #dc2626);
            color: #fff;
        }
        @keyframes turnGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(34,197,94,0.5); }
            50% { box-shadow: 0 0 40px rgba(34,197,94,0.8); }
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           BATTLE BOARD - THE MAIN ARENA
           ═══════════════════════════════════════════════════════════════════ */
        .battle-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
            gap: 8px;
            perspective: 1000px;
        }
        
        .board-row {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border-radius: 16px;
            position: relative;
            transform-style: preserve-3d;
        }
        
        .board-row.enemy {
            background: linear-gradient(180deg, 
                rgba(239,68,68,0.1) 0%, 
                rgba(239,68,68,0.05) 50%,
                transparent 100%);
            border: 2px solid rgba(239,68,68,0.2);
        }
        .board-row.player {
            background: linear-gradient(0deg, 
                rgba(0,255,255,0.1) 0%, 
                rgba(0,255,255,0.05) 50%,
                transparent 100%);
            border: 2px solid rgba(0,255,255,0.2);
        }
        
        /* Center divider line */
        .board-divider {
            height: 4px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--orange) 20%, 
                var(--gold) 50%, 
                var(--orange) 80%, 
                transparent);
            box-shadow: 0 0 20px var(--orange);
            margin: 4px 0;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           BOARD SLOTS - WHERE CARDS LIVE
           ═══════════════════════════════════════════════════════════════════ */
        .board-slot {
            width: var(--board-card-width);
            height: var(--board-card-height);
            background: rgba(255,255,255,0.03);
            border: 3px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform-style: preserve-3d;
        }
        
        .board-slot::before {
            content: '+';
            font-size: 32px;
            color: rgba(255,255,255,0.1);
            font-weight: 300;
        }
        .board-slot.enemy::before {
            content: '';
        }
        
        .board-slot:hover {
            border-color: var(--gold);
            background: rgba(255,215,0,0.1);
            transform: scale(1.02);
        }
        
        .board-slot.targetable {
            border-color: var(--red);
            animation: targetablePulse 0.8s infinite;
        }
        @keyframes targetablePulse {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(239,68,68,0.4);
                border-color: rgba(239,68,68,0.6);
            }
            50% { 
                box-shadow: 0 0 40px rgba(239,68,68,0.8);
                border-color: var(--red);
            }
        }
        
        .board-slot.has-card {
            border-style: solid;
            border-color: transparent;
            background: transparent;
        }
        .board-slot.has-card::before {
            content: '';
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           BOARD CARDS - BIG AND BOLD
           ═══════════════════════════════════════════════════════════════════ */
        .board-card {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            overflow: visible;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        
        .board-card:hover {
            transform: translateY(-8px) scale(1.05);
            z-index: 10;
        }
        
        .board-card-inner {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 
                0 4px 15px rgba(0,0,0,0.5),
                0 0 30px rgba(0,0,0,0.3);
        }
        
        .board-card-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Stats overlay - BIGGER NUMBERS */
        .board-card-stats {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-box {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 900;
        }
        .stat-atk {
            background: linear-gradient(135deg, var(--red), #dc2626);
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .stat-hp {
            background: linear-gradient(135deg, var(--green), #16a34a);
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .stat-icon {
            font-size: 14px;
        }
        
        /* Rarity glow */
        .board-card.mythic .board-card-inner {
            box-shadow: 
                0 0 30px var(--mythic),
                0 0 60px rgba(255,0,255,0.3);
        }
        .board-card.legendary .board-card-inner {
            box-shadow: 
                0 0 25px var(--gold),
                0 0 50px rgba(255,215,0,0.3);
        }
        .board-card.epic .board-card-inner {
            box-shadow: 
                0 0 20px var(--purple),
                0 0 40px rgba(168,85,247,0.3);
        }
        
        /* Card ability badge */
        .ability-badge {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            padding: 2px 8px;
            background: linear-gradient(135deg, var(--purple), #7c3aed);
            border-radius: 10px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           CARD ANIMATIONS - MARVEL SNAP STYLE
           ═══════════════════════════════════════════════════════════════════ */
        
        /* SLAM DOWN - Card played to board */
        .board-card.slamming {
            animation: cardSlam 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes cardSlam {
            0% { 
                transform: translateY(-200px) translateZ(100px) rotateX(-30deg) scale(1.5);
                opacity: 0;
            }
            40% { 
                transform: translateY(20px) translateZ(50px) rotateX(10deg) scale(1.1);
                opacity: 1;
            }
            70% { 
                transform: translateY(-10px) translateZ(20px) rotateX(-5deg) scale(1.02);
            }
            100% { 
                transform: translateY(0) translateZ(0) rotateX(0) scale(1);
            }
        }
        
        /* ATTACK - Lunge forward */
        .board-card.attacking {
            animation: cardAttack 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes cardAttack {
            0% { transform: translateY(0) translateZ(0) scale(1); }
            20% { transform: translateY(10px) translateZ(-20px) scale(0.95); }
            40% { transform: translateY(-60px) translateZ(80px) scale(1.15); }
            60% { transform: translateY(-30px) translateZ(40px) scale(1.1); }
            100% { transform: translateY(0) translateZ(0) scale(1); }
        }
        
        /* HIT - Recoil and flash */
        .board-card.hit {
            animation: cardHit 0.4s ease-out;
        }
        @keyframes cardHit {
            0% { transform: translateX(0) scale(1); filter: brightness(1); }
            25% { transform: translateX(-15px) scale(0.95); filter: brightness(3); }
            50% { transform: translateX(10px) scale(0.97); filter: brightness(1.5); }
            75% { transform: translateX(-5px) scale(0.98); filter: brightness(1.2); }
            100% { transform: translateX(0) scale(1); filter: brightness(1); }
        }
        
        /* DEATH - Shatter and fade */
        .board-card.dying {
            animation: cardDeath 0.8s ease-out forwards;
        }
        @keyframes cardDeath {
            0% { transform: scale(1) rotateY(0); opacity: 1; filter: brightness(1); }
            20% { transform: scale(1.1) rotateY(-10deg); filter: brightness(2); }
            40% { transform: scale(1.05) rotateY(15deg) translateY(-20px); filter: brightness(1.5); }
            100% { transform: scale(0.3) rotateY(90deg) translateY(50px); opacity: 0; filter: brightness(0.5); }
        }
        
        /* BUFF - Glow and grow */
        .board-card.buffed {
            animation: cardBuff 0.6s ease-out;
        }
        @keyframes cardBuff {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.5) saturate(1.5); box-shadow: 0 0 50px var(--gold); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           HAND SECTION - CARD FAN
           ═══════════════════════════════════════════════════════════════════ */
        .hand-section {
            padding: 12px 20px 16px;
            background: linear-gradient(0deg, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
            border-top: 3px solid rgba(0,255,255,0.3);
        }
        
        .hand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .hand-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .hand-count {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--cyan);
        }
        
        .hand-cards {
            display: flex;
            justify-content: center;
            gap: 12px;
            min-height: calc(var(--hand-card-height) + 20px);
            overflow-x: auto;
            padding: 10px 0;
        }
        .hand-cards::-webkit-scrollbar {
            height: 6px;
        }
        .hand-cards::-webkit-scrollbar-thumb {
            background: var(--orange);
            border-radius: 3px;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           HAND CARDS - BIG AND INTERACTIVE
           ═══════════════════════════════════════════════════════════════════ */
        .hand-card {
            flex-shrink: 0;
            width: var(--hand-card-width);
            height: var(--hand-card-height);
            border-radius: 12px;
            overflow: visible;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom center;
        }
        
        .hand-card:hover {
            transform: translateY(-30px) scale(1.15);
            z-index: 100;
        }
        
        .hand-card.selected {
            transform: translateY(-40px) scale(1.2);
            z-index: 101;
        }
        .hand-card.selected .hand-card-inner {
            box-shadow: 
                0 0 40px var(--orange),
                0 0 80px rgba(255,107,0,0.5);
        }
        
        .hand-card.unplayable {
            opacity: 0.5;
            filter: grayscale(0.6);
        }
        .hand-card.unplayable:hover {
            transform: translateY(-10px) scale(1.02);
        }
        
        .hand-card-inner {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.5),
                0 0 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        
        .hand-card:hover .hand-card-inner {
            border-color: var(--gold);
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.7),
                0 0 30px rgba(255,215,0,0.3);
        }
        
        .hand-card-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Energy cost badge */
        .cost-badge {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--cyan), var(--blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,255,255,0.5);
            z-index: 10;
        }
        
        /* Hand card stats */
        .hand-card-stats {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 6px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex;
            justify-content: space-between;
        }
        .hand-stat {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 900;
        }
        .hand-stat.atk { color: var(--red); }

        /* ═══════════════════════════════════════════════════════════════════

           ═══════════════════════════════════════════════════════════════════ */
        .action-bar {
            display: flex;

        /* ═══════════════════════════════════════════════════════════════════
           DAMAGE NUMBERS - BIG AND IMPACTFUL
           ═══════════════════════════════════════════════════════════════════ */
        .damage-number {
            position: fixed;
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--red);
            text-shadow: 
                3px 3px 0 #000,
                -3px -3px 0 #000,
                3px -3px 0 #000,
                -3px 3px 0 #000,
                0 0 30px var(--red);
            animation: damagePopup 1.2s ease-out forwards;
            z-index: 1000;
            pointer-events: none;
        }
        .damage-number.crit {
            font-size: 64px;

                3px 3px 0 #000,
                -3px -3px 0 #000,
                0 0 50px var(--gold);
            animation: critPopup 1.2s ease-out forwards;
        }
        .damage-number.heal {
            color: var(--green);
            text-shadow: 
                3px 3px 0 #000,
                -3px -3px 0 #000,
                0 0 30px var(--green);
        }
        .damage-number.miss {
            font-size: 36px;
            color: var(--purple);
        }
        
        @keyframes damagePopup {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.3); opacity: 1; }
            40% { transform: translateY(-40px) scale(1); }
            100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
        }
        @keyframes critPopup {
            0% { transform: translateY(0) scale(0.3) rotate(-10deg); opacity: 0; }
            20% { transform: translateY(-30px) scale(1.5) rotate(5deg); opacity: 1; }
            40% { transform: translateY(-50px) scale(1.2) rotate(-3deg); }
            100% { transform: translateY(-120px) scale(0.9) rotate(0); opacity: 0; }
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           SCREEN EFFECTS
           ═══════════════════════════════════════════════════════════════════ */
        
        /* Screen shake */
        .arena-container.shaking {
            animation: screenShake 0.4s ease-out;
        }
        .arena-container.shaking-heavy {
            animation: screenShakeHeavy 0.5s ease-out;
        }
        @keyframes screenShake {
            0%, 100% { transform: translateX(0); }
            10% { transform: translateX(-8px) translateY(4px); }
            20% { transform: translateX(8px) translateY(-4px); }
            30% { transform: translateX(-6px) translateY(2px); }
            40% { transform: translateX(6px) translateY(-2px); }
            50% { transform: translateX(-4px); }
            60% { transform: translateX(4px); }
            70% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }
        @keyframes screenShakeHeavy {
            0%, 100% { transform: translateX(0); }
            10% { transform: translateX(-15px) translateY(8px) rotate(-1deg); }
            20% { transform: translateX(15px) translateY(-8px) rotate(1deg); }
            30% { transform: translateX(-12px) translateY(6px) rotate(-0.5deg); }
            40% { transform: translateX(12px) translateY(-6px) rotate(0.5deg); }
            50% { transform: translateX(-8px) translateY(4px); }
            60% { transform: translateX(8px) translateY(-4px); }
            70% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        
        /* Screen flash */
        .screen-flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .screen-flash.active {
            animation: flashEffect 0.3s ease-out;
        }
        @keyframes flashEffect {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }
        
        /* Impact ring */
        .impact-ring {
            position: fixed;
            border: 4px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            animation: impactExpand 0.5s ease-out forwards;
        }
        @keyframes impactExpand {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           BATTLE LOG - SIDE PANEL
           ═══════════════════════════════════════════════════════════════════ */
        .battle-log {
            position: fixed;

        .log-entry {

        }
        .log-entry.damage { border-left: 3px solid var(--red); }
        .log-entry.heal { border-left: 3px solid var(--green); }
        .log-entry.ability { border-left: 3px solid var(--purple); }
        .log-entry.summon { border-left: 3px solid var(--gold); }
        .log-entry.crit { border-left: 3px solid var(--orange); }
        
        /* ═══════════════════════════════════════════════════════════════════
           VICTORY / DEFEAT OVERLAY
           ═══════════════════════════════════════════════════════════════════ */
        .game-over-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;

        .game-over-text {

        }
        @keyframes gameOverPulse {

        /* ═══════════════════════════════════════════════════════════════════

        .card-tooltip {
            position: fixed;

        }
        .tooltip-rarity.mythic { color: var(--mythic); }
        .tooltip-rarity.legendary { color: var(--gold); }
        .tooltip-rarity.epic { color: var(--purple); }

        .tooltip-stats {
            display: flex;

            margin-bottom: 12px;
        }
        .tooltip-stat {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
        }
        .tooltip-abilities {
            font-size: 13px;

        }
        .tooltip-ability {

        }
        
        /* ═══════════════════════════════════════════════════════════════════
           RESPONSIVE

        @media (max-width: 768px) {

<body>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// NUMBAHWAN TCG - BATTLE ARENA v2.0
// Marvel Snap-Inspired Premium Battle Experience
// ═══════════════════════════════════════════════════════════════════════════

(function() {
    'use strict';
    
    // ═══════════════════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════════════════
    const CONFIG = {
        MAX_GUILD_HP: 30,
        MAX_BOARD: 5,
        MAX_HAND: 7,
        STARTING_HAND: 4,
        MAX_ENERGY: 10,
        
        // Animation timings (ms)
        CARD_SLAM_DURATION: 500,
        ATTACK_DURATION: 600,
        HIT_DURATION: 400,
        DEATH_DURATION: 800,
        
        // Audio
        MASTER_VOLUME: 0.7
    };
    
    // ═══════════════════════════════════════════════════════════════════
    // GAME STATE
    // ═══════════════════════════════════════════════════════════════════
    const gameState = {
        playerHP: CONFIG.MAX_GUILD_HP,
        enemyHP: CONFIG.MAX_GUILD_HP,
        energy: 1,
        maxEnergy: 1,
        turn: 1,
        isPlayerTurn: true,
        
        playerHand: [],
        playerBoard: [null, null, null, null, null],
        enemyHand: [],
        enemyBoard: [null, null, null, null, null],
        
        playerDeck: [],
        enemyDeck: [],
        
        selectedCard: null,
        isAnimating: false,
        
        stats: {
            cardsPlayed: 0,
            damageDealt: 0,
            cardsKilled: 0
        }
    };
    
    // Card pool
    let CARDS = [];
    
    // ═══════════════════════════════════════════════════════════════════
    // AUDIO SYSTEM - Web Audio API
    // ═══════════════════════════════════════════════════════════════════
    const Audio = {
        ctx: null,
        
        init() {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        
        // Play a procedural sound
        play(type) {
            if (!this.ctx) this.init();
            if (this.ctx.state === 'suspended') this.ctx.resume();
            
            const now = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            switch(type) {
                case 'cardSlam':
                    // Deep thump + whoosh
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
                    gain.gain.setValueAtTime(0.6, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.type = 'sine';
                    osc.start(now);
                    osc.stop(now + 0.3);
                    // Add noise burst
                    this.playNoise(0.2, 0.1);
                    break;
                    
                case 'attack':
                    // Whoosh + hit
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.type = 'sawtooth';
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                    
                case 'hit':
                    // Impact
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.type = 'square';
                    osc.start(now);
                    osc.stop(now + 0.15);
                    this.playNoise(0.3, 0.08);
                    break;
                    
                case 'crit':
                    // Big impact + ring
                    this.play('hit');
                    setTimeout(() => {
                        const osc2 = this.ctx.createOscillator();
                        const gain2 = this.ctx.createGain();
                        osc2.connect(gain2);
                        gain2.connect(this.ctx.destination);
                        osc2.frequency.setValueAtTime(880, this.ctx.currentTime);
                        osc2.frequency.exponentialRampToValueAtTime(440, this.ctx.currentTime + 0.3);
                        gain2.gain.setValueAtTime(0.2, this.ctx.currentTime);
                        gain2.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                        osc2.type = 'sine';
                        osc2.start();
                        osc2.stop(this.ctx.currentTime + 0.4);
                    }, 50);
                    break;
                    
                case 'death':
                    // Descending tone + crumble
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(60, now + 0.5);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.type = 'sawtooth';
                    osc.start(now);
                    osc.stop(now + 0.6);
                    this.playNoise(0.2, 0.3);
                    break;
                    
                case 'select':
                    // Click
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.setValueAtTime(800, now + 0.03);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                    osc.type = 'sine';
                    osc.start(now);
                    osc.stop(now + 0.08);
                    break;
                    
                case 'turnEnd':
                    // Ascending chime
                    [440, 550, 660].forEach((freq, i) => {
                        const o = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        o.connect(g);
                        g.connect(this.ctx.destination);
                        o.frequency.value = freq;
                        g.gain.setValueAtTime(0.15, now + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.2);
                        o.type = 'sine';
                        o.start(now + i * 0.1);
                        o.stop(now + i * 0.1 + 0.2);
                    });
                    break;
                    
                case 'victory':
                    // Triumphant fanfare
                    [523, 659, 784, 1047].forEach((freq, i) => {
                        setTimeout(() => {
                            const o = this.ctx.createOscillator();
                            const g = this.ctx.createGain();
                            o.connect(g);
                            g.connect(this.ctx.destination);
                            o.frequency.value = freq;
                            g.gain.setValueAtTime(0.2, this.ctx.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                            o.type = 'sine';
                            o.start();
                            o.stop(this.ctx.currentTime + 0.5);
                        }, i * 150);
                    });
                    break;
                    
                case 'defeat':
                    // Sad descending
                    [400, 350, 300, 200].forEach((freq, i) => {
                        setTimeout(() => {
                            const o = this.ctx.createOscillator();
                            const g = this.ctx.createGain();
                            o.connect(g);
                            g.connect(this.ctx.destination);
                            o.frequency.value = freq;
                            g.gain.setValueAtTime(0.15, this.ctx.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                            o.type = 'sine';
                            o.start();
                            o.stop(this.ctx.currentTime + 0.4);
                        }, i * 200);
                    });
                    break;
            }
        },
        
        playNoise(volume, duration) {
            const bufferSize = this.ctx.sampleRate * duration;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/bufferSize, 2);
            }
            const noise = this.ctx.createBufferSource();
            const gain = this.ctx.createGain();
            noise.buffer = buffer;
            noise.connect(gain);
            gain.connect(this.ctx.destination);
            gain.gain.value = volume;
            noise.start();
        }
    };
    
    // ═══════════════════════════════════════════════════════════════════
    // VISUAL EFFECTS
    // ═══════════════════════════════════════════════════════════════════
    const Effects = {
        screenShake(intensity = 'normal') {
            const container = document.getElementById('arenaContainer');
            container.classList.remove('shaking', 'shaking-heavy');
            void container.offsetWidth; // Force reflow
            container.classList.add(intensity === 'heavy' ? 'shaking-heavy' : 'shaking');
            setTimeout(() => container.classList.remove('shaking', 'shaking-heavy'), 500);
        },
        
        screenFlash(color = '#fff') {
            const flash = document.getElementById('screenFlash');
            flash.style.background = color;
            flash.classList.remove('active');
            void flash.offsetWidth;
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 300);
        },
        
        impactRing(x, y, color = '#ffd700') {
            const ring = document.createElement('div');
            ring.className = 'impact-ring';
            ring.style.cssText = `left:${x}px;top:${y}px;width:50px;height:50px;border-color:${color}`;
            document.body.appendChild(ring);
            setTimeout(() => ring.remove(), 500);
        },
        
        showDamage(element, value, isCrit = false, isHeal = false) {
            const rect = element.getBoundingClientRect();
            const dmg = document.createElement('div');
            dmg.className = `damage-number${isCrit ? ' crit' : ''}${isHeal ? ' heal' : ''}`;
            dmg.textContent = isHeal ? `+${value}` : `-${value}`;
            dmg.style.left = rect.left + rect.width/2 + (Math.random() - 0.5) * 30 + 'px';
            dmg.style.top = rect.top + rect.height/3 + 'px';
            document.body.appendChild(dmg);
            setTimeout(() => dmg.remove(), 1200);
        },
        
        showMiss(element) {
            const rect = element.getBoundingClientRect();
            const miss = document.createElement('div');
            miss.className = 'damage-number miss';
            miss.textContent = 'DODGE!';
            miss.style.left = rect.left + rect.width/2 + 'px';
            miss.style.top = rect.top + rect.height/3 + 'px';
            document.body.appendChild(miss);
            setTimeout(() => miss.remove(), 1200);
        },
        
        createParticles() {
            const container = document.getElementById('arenaParticles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = (15 + Math.random() * 10) + 's';
                const colors = ['#ffd700', '#ff6b00', '#a855f7', '#00ffff'];
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.width = (2 + Math.random() * 4) + 'px';
                p.style.height = p.style.width;
                container.appendChild(p);
            }
        }
    };

    function renderHP() {
        const playerPct = Math.max(0, gameState.playerHP / CONFIG.MAX_GUILD_HP * 100);
        const enemyPct = Math.max(0, gameState.enemyHP / CONFIG.MAX_GUILD_HP * 100);
        
        document.getElementById('playerHpFill').style.width = playerPct + '%';
        document.getElementById('enemyHpFill').style.width = enemyPct + '%';
        
        document.getElementById('playerHpValue').textContent = Math.max(0, gameState.playerHP);
        document.getElementById('enemyHpValue').textContent = Math.max(0, gameState.enemyHP);
        
        // Update colors
        const playerVal = document.getElementById('playerHpValue');
        const enemyVal = document.getElementById('enemyHpValue');
        const playerFill = document.getElementById('playerHpFill');
        const enemyFill = document.getElementById('enemyHpFill');
        
        playerVal.classList.toggle('low', playerPct <= 30);
        playerVal.classList.toggle('mid', playerPct > 30 && playerPct <= 60);
        enemyVal.classList.toggle('low', enemyPct <= 30);
        enemyVal.classList.toggle('mid', enemyPct > 30 && enemyPct <= 60);
        
        playerFill.classList.toggle('low', playerPct <= 30);
        playerFill.classList.toggle('mid', playerPct > 30 && playerPct <= 60);
        enemyFill.classList.toggle('low', enemyPct <= 30);
        enemyFill.classList.toggle('mid', enemyPct > 30 && enemyPct <= 60);
    }
    
    function renderEnergy() {
        const container = document.getElementById('energyCrystals');
        container.innerHTML = '';
        
        for (let i = 0; i < gameState.maxEnergy; i++) {
            const crystal = document.createElement('div');
            crystal.className = 'energy-crystal' + (i >= gameState.energy ? ' spent' : '');
            container.appendChild(crystal);
        }
    }
    
    function renderTurnIndicator() {
        const indicator = document.getElementById('turnIndicator');
        indicator.textContent = gameState.isPlayerTurn ? 'YOUR TURN' : 'ENEMY TURN';
        indicator.className = 'turn-indicator ' + (gameState.isPlayerTurn ? 'your-turn' : 'enemy-turn');
    }
    
    function renderHand() {
        const container = document.getElementById('playerHand');
        container.innerHTML = '';
        
        gameState.playerHand.forEach((card, idx) => {
            const canPlay = card.gameStats.cost <= gameState.energy && gameState.isPlayerTurn;
            
            const cardEl = document.createElement('div');
            cardEl.className = `hand-card ${card.rarity}${canPlay ? '' : ' unplayable'}${gameState.selectedCard === idx ? ' selected' : ''}`;
            cardEl.dataset.idx = idx;
            
            cardEl.innerHTML = `
                <div class="hand-card-inner">
                    <img class="hand-card-art" src="/static/images/cards/thumbs/${card.img?.replace(/\.(png|jpg)$/i, '.webp')}" 
                         onerror="this.src='/static/images/cards/${card.img}'" alt="${card.name}">
                    <div class="hand-card-stats">
                        <span class="hand-stat atk">⚔️${card.gameStats.atk}</span>
                        <span class="hand-stat hp">❤️${card.gameStats.hp}</span>
                    </div>
                </div>
                <div class="cost-badge">${card.gameStats.cost}</div>
            `;
            
            cardEl.onclick = () => selectHandCard(idx);
            cardEl.onmouseenter = (e) => showTooltip(card, e);
            cardEl.onmouseleave = hideTooltip;
            
            container.appendChild(cardEl);
        });
        
        document.getElementById('handCount').textContent = `${gameState.playerHand.length}/${CONFIG.MAX_HAND}`;
    }
    
    function renderBoards() {
        // Player board
        const playerBoardEl = document.getElementById('playerBoard');
        playerBoardEl.querySelectorAll('.board-slot').forEach((slot, idx) => {
            renderBoardSlot(slot, gameState.playerBoard[idx], idx, false);
        });
        
        // Enemy board
        const enemyBoardEl = document.getElementById('enemyBoard');
        enemyBoardEl.querySelectorAll('.board-slot').forEach((slot, idx) => {
            renderBoardSlot(slot, gameState.enemyBoard[idx], idx, true);
        });
    }
    
    function renderBoardSlot(slot, card, idx, isEnemy) {
        slot.classList.toggle('has-card', !!card);
        
        if (card) {
            slot.innerHTML = `
                <div class="board-card ${card.rarity}" data-instance="${card.instanceId}">
                    <div class="board-card-inner">
                        <img class="board-card-art" src="/static/images/cards/thumbs/${card.img?.replace(/\.(png|jpg)$/i, '.webp')}" 
                             onerror="this.src='/static/images/cards/${card.img}'" alt="${card.name}">
                        <div class="board-card-stats">
                            <div class="stat-box stat-atk">
                                <span class="stat-icon">⚔️</span>
                                <span>${card.currentAtk}</span>
                            </div>
                            <div class="stat-box stat-hp">
                                <span class="stat-icon">❤️</span>
                                <span>${card.currentHp}</span>
                            </div>
                        </div>
                    </div>
                    ${card.abilities?.length ? `<div class="ability-badge">${card.abilities[0]}</div>` : ''}
                </div>
            `;
            
            const cardEl = slot.querySelector('.board-card');
            cardEl.onmouseenter = (e) => showTooltip(card, e);
            cardEl.onmouseleave = hideTooltip;
            
            if (isEnemy) {
                slot.onclick = () => attackTarget(idx);
            }
        } else {
            slot.innerHTML = '';
            slot.onclick = isEnemy ? null : () => playCardToSlot(idx);
        }
    }
    
    // ═══════════════════════════════════════════════════════════════════
    // TOOLTIP
    // ═══════════════════════════════════════════════════════════════════
    
    function showTooltip(card, event) {
        const tooltip = document.getElementById('cardTooltip');
        
        document.getElementById('tooltipName').textContent = card.name;
        document.getElementById('tooltipRarity').textContent = card.rarity.toUpperCase();
        document.getElementById('tooltipRarity').className = `tooltip-rarity ${card.rarity}`;
        document.getElementById('tooltipAtk').textContent = card.currentAtk || card.gameStats.atk;
        document.getElementById('tooltipHp').textContent = card.currentHp || card.gameStats.hp;
        document.getElementById('tooltipCost').textContent = card.gameStats.cost;
        
        const abilitiesEl = document.getElementById('tooltipAbilities');
        if (card.abilities?.length) {
            abilitiesEl.innerHTML = card.abilities.map(a => 
                `<span class="tooltip-ability">${a}</span>`
            ).join('');
        } else {
            abilitiesEl.innerHTML = '<em style="opacity:0.5">No abilities</em>';
        }
        
        const rect = event.target.getBoundingClientRect();
        let left = rect.right + 10;
        let top = rect.top;
        
        if (left + 280 > window.innerWidth) {
            left = rect.left - 290;
        }
        if (top + 200 > window.innerHeight) {
            top = window.innerHeight - 210;
        }
        
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
        tooltip.classList.add('show');
    }
    
    function hideTooltip() {
        document.getElementById('cardTooltip').classList.remove('show');
    }
    
    // ═══════════════════════════════════════════════════════════════════
    // GAME LOGIC
    // ═══════════════════════════════════════════════════════════════════
    
    function selectHandCard(idx) {
        const card = gameState.playerHand[idx];
        if (!card || card.gameStats.cost > gameState.energy || !gameState.isPlayerTurn || gameState.isAnimating) return;
        
        gameState.selectedCard = gameState.selectedCard === idx ? null : idx;
        Audio.play('select');
        renderHand();
    }
    
    async function playCardToSlot(slotIdx) {
        if (gameState.selectedCard === null || gameState.playerBoard[slotIdx] || gameState.isAnimating) return;
        
        const card = gameState.playerHand[gameState.selectedCard];
        if (card.gameStats.cost > gameState.energy) return;
        
        gameState.isAnimating = true;
        
        // Pay cost
        gameState.energy -= card.gameStats.cost;
        
        // Prepare card for board
        const boardCard = {
            ...card,
            instanceId: Date.now() + Math.random(),
            currentAtk: card.gameStats.atk,
            currentHp: card.gameStats.hp,
            maxHp: card.gameStats.hp,
            canAttackThisTurn: card.abilities?.includes('RUSH'),
            hasAttacked: false
        };
        
        gameState.playerBoard[slotIdx] = boardCard;
        gameState.playerHand.splice(gameState.selectedCard, 1);
        gameState.selectedCard = null;
        gameState.stats.cardsPlayed++;
        
        // Render immediately
        renderHand();
        renderEnergy();
        renderBoards();
        
        // Animate slam
        const slot = document.querySelector(`#playerBoard .board-slot[data-slot="${slotIdx}"]`);
        const cardEl = slot.querySelector('.board-card');
        
        if (cardEl) {
            cardEl.classList.add('slamming');
            Audio.play('cardSlam');
            Effects.screenShake('normal');
            
            // Impact effect
            const rect = slot.getBoundingClientRect();
            Effects.impactRing(rect.left + rect.width/2, rect.top + rect.height/2);
            
            await sleep(CONFIG.CARD_SLAM_DURATION);
            cardEl.classList.remove('slamming');
        }
        
        // Battlecry
        handleBattlecry(boardCard, false, slotIdx);
        
        addLog(`You summon <span style="color:var(--gold)">${boardCard.name}</span>!`, 'summon');
        
        updateAttackButton();
        gameState.isAnimating = false;
    }
    
    async function attackTarget(targetIdx) {
        if (!gameState.isPlayerTurn || gameState.isAnimating) return;
        
        // Find attacker
        const attackerIdx = gameState.playerBoard.findIndex(c => 
            c && c.canAttackThisTurn && !c.hasAttacked
        );
        
        if (attackerIdx === -1) return;
        
        const attacker = gameState.playerBoard[attackerIdx];
        const target = gameState.enemyBoard[targetIdx];
        
        // Check taunt
        const hasTaunt = gameState.enemyBoard.some(c => c && c.abilities?.includes('TAUNT'));
        if (hasTaunt && (!target || !target.abilities?.includes('TAUNT'))) {
            addLog('Must attack TAUNT first!', 'ability');
            return;
        }
        
        gameState.isAnimating = true;
        
        // Calculate damage
        let damage = attacker.currentAtk;
        let isCrit = false;
        
        const critChance = attacker.gameStats?.crit || 0;
        if (Math.random() * 100 < critChance) {
            damage *= 2;
            isCrit = true;
        }
        
        // Get elements
        const attackerSlot = document.querySelector(`#playerBoard .board-slot[data-slot="${attackerIdx}"]`);
        const attackerCard = attackerSlot?.querySelector('.board-card');
        
        // Attack animation
        if (attackerCard) {
            attackerCard.classList.add('attacking');
            Audio.play('attack');
        }
        
        await sleep(CONFIG.ATTACK_DURATION * 0.4);
        
        if (target) {
            // Attack card
            const targetSlot = document.querySelector(`#enemyBoard .board-slot[data-slot="${targetIdx}"]`);
            const targetCard = targetSlot?.querySelector('.board-card');
            
            // Check dodge
            const dodgeChance = target.gameStats?.dodge || 0;
            if (Math.random() * 100 < dodgeChance) {
                Audio.play('select');
                if (targetCard) Effects.showMiss(targetCard);
                addLog(`${target.name} dodges!`, 'ability');
            } else {
                // Deal damage
                target.currentHp -= damage;
                gameState.stats.damageDealt += damage;
                
                Audio.play(isCrit ? 'crit' : 'hit');
                Effects.screenShake(isCrit ? 'heavy' : 'normal');
                if (isCrit) Effects.screenFlash('#ffd700');
                
                if (targetCard) {
                    targetCard.classList.add('hit');
                    Effects.showDamage(targetCard, damage, isCrit);
                    
                    const rect = targetSlot.getBoundingClientRect();
                    Effects.impactRing(rect.left + rect.width/2, rect.top + rect.height/2, isCrit ? '#ffd700' : '#ff4444');
                }
                
                addLog(`${attacker.name} deals ${damage}${isCrit ? ' CRIT' : ''} to ${target.name}!`, isCrit ? 'crit' : 'damage');
                
                await sleep(CONFIG.HIT_DURATION);
                if (targetCard) targetCard.classList.remove('hit');
                
                // Check death
                if (target.currentHp <= 0) {
                    await handleDeath(target, targetIdx, true);
                }
            }
        } else {
            // Attack face
            gameState.enemyHP -= damage;
            gameState.stats.damageDealt += damage;
            
            Audio.play(isCrit ? 'crit' : 'hit');
            Effects.screenShake('heavy');
            Effects.screenFlash(isCrit ? '#ffd700' : '#ff4444');
            
            const hpBar = document.getElementById('enemyHpBar');
            hpBar.classList.add('damaged');
            setTimeout(() => hpBar.classList.remove('damaged'), 300);
            
            addLog(`${attacker.name} deals ${damage}${isCrit ? ' CRIT' : ''} to ENEMY GUILD!`, isCrit ? 'crit' : 'damage');
            
            renderHP();
            checkGameOver();
        }
        
        await sleep(200);
        if (attackerCard) attackerCard.classList.remove('attacking');
        
        attacker.hasAttacked = true;
        renderBoards();
        updateAttackButton();
        
        gameState.isAnimating = false;
    }
    
    async function handleDeath(card, slot, isOnEnemyBoard) {
        Audio.play('death');
        Effects.screenShake('normal');
        
        const boardEl = isOnEnemyBoard ? document.getElementById('enemyBoard') : document.getElementById('playerBoard');
        const slotEl = boardEl.querySelector(`[data-slot="${slot}"]`);
        const cardEl = slotEl?.querySelector('.board-card');
        
        if (cardEl) {
            cardEl.classList.add('dying');
            await sleep(CONFIG.DEATH_DURATION);
        }
        
        const board = isOnEnemyBoard ? gameState.enemyBoard : gameState.playerBoard;
        board[slot] = null;
        
        gameState.stats.cardsKilled++;
        addLog(`${card.name} is destroyed!`, 'damage');
        
        renderBoards();
    }
    
    function handleBattlecry(card, isEnemy, slotIdx) {
        if (!card.abilities) return;
        
        if (card.abilities.includes('BUFF')) {
            const board = isEnemy ? gameState.enemyBoard : gameState.playerBoard;
            const allies = board.filter((c, i) => c && i !== slotIdx);
            if (allies.length > 0) {
                const target = allies[Math.floor(Math.random() * allies.length)];
                target.currentAtk += 2;
                target.currentHp += 2;
                target.maxHp += 2;
                addLog(`${card.name} buffs ${target.name} +2/+2!`, 'ability');
            }
        }
        
        // Add more battlecry effects as needed
    }
    
    function updateAttackButton() {
        const canAttack = gameState.playerBoard.some(c => 
            c && c.canAttackThisTurn && !c.hasAttacked
        );
        document.getElementById('attackBtn').disabled = !canAttack || !gameState.isPlayerTurn;
    }
    
    // ═══════════════════════════════════════════════════════════════════
    // TURN MANAGEMENT
    // ═══════════════════════════════════════════════════════════════════
    
    async function endTurn() {
        if (!gameState.isPlayerTurn || gameState.isAnimating) return;
        
        Audio.play('turnEnd');
        gameState.isPlayerTurn = false;
        renderTurnIndicator();
        
        // Enemy turn
        await sleep(500);
        await enemyTurn();
        
        // New turn
        startNewTurn();
    }
    
    async function enemyTurn() {
        addLog('--- ENEMY TURN ---', '');
        
        // Draw card (simplified)
        if (gameState.enemyDeck.length > 0 && gameState.enemyHand.length < CONFIG.MAX_HAND) {
            gameState.enemyHand.push(gameState.enemyDeck.pop());
        }
        
        // Play cards
        const enemyEnergy = Math.min(gameState.turn, CONFIG.MAX_ENERGY);
        let spent = 0;
        
        for (let i = gameState.enemyHand.length - 1; i >= 0; i--) {
            const card = gameState.enemyHand[i];
            if (card.gameStats.cost <= enemyEnergy - spent) {
                const emptySlot = gameState.enemyBoard.findIndex(s => s === null);
                if (emptySlot !== -1) {
                    spent += card.gameStats.cost;
                    
                    const boardCard = {
                        ...card,
                        instanceId: Date.now() + Math.random(),
                        currentAtk: card.gameStats.atk,
                        currentHp: card.gameStats.hp,
                        maxHp: card.gameStats.hp,
                        canAttackThisTurn: false,
                        hasAttacked: false
                    };
                    
                    gameState.enemyBoard[emptySlot] = boardCard;
                    gameState.enemyHand.splice(i, 1);
                    
                    renderBoards();
                    
                    const slot = document.querySelector(`#enemyBoard .board-slot[data-slot="${emptySlot}"]`);
                    const cardEl = slot?.querySelector('.board-card');
                    if (cardEl) {
                        cardEl.classList.add('slamming');
                        Audio.play('cardSlam');
                        Effects.screenShake('normal');
                    }
                    
                    addLog(`Enemy summons ${boardCard.name}!`, 'summon');
                    await sleep(600);
                    if (cardEl) cardEl.classList.remove('slamming');
                }
            }
        }
        
        await sleep(300);
        
        // Attack with cards that can attack
        for (let i = 0; i < gameState.enemyBoard.length; i++) {
            const attacker = gameState.enemyBoard[i];
            if (attacker && attacker.canAttackThisTurn && !attacker.hasAttacked) {
                // Find target
                const playerCards = gameState.playerBoard.filter(c => c);
                const tauntCards = playerCards.filter(c => c.abilities?.includes('TAUNT'));
                
                let targetIdx = -1;
                
                if (tauntCards.length > 0) {
                    // Must attack taunt
                    targetIdx = gameState.playerBoard.findIndex(c => c && c.abilities?.includes('TAUNT'));
                } else if (playerCards.length > 0) {
                    // Attack random card
                    const validTargets = gameState.playerBoard.map((c, idx) => c ? idx : -1).filter(idx => idx !== -1);
                    targetIdx = validTargets[Math.floor(Math.random() * validTargets.length)];
                }
                
                await enemyAttack(i, targetIdx);
                attacker.hasAttacked = true;
            }
        }
    }
    
    async function enemyAttack(attackerIdx, targetIdx) {
        const attacker = gameState.enemyBoard[attackerIdx];
        const target = targetIdx >= 0 ? gameState.playerBoard[targetIdx] : null;
        
        let damage = attacker.currentAtk;
        let isCrit = Math.random() < 0.1;
        if (isCrit) damage *= 2;
        
        const attackerSlot = document.querySelector(`#enemyBoard .board-slot[data-slot="${attackerIdx}"]`);
        const attackerCard = attackerSlot?.querySelector('.board-card');
        
        if (attackerCard) {
            attackerCard.classList.add('attacking');
            Audio.play('attack');
        }
        
        await sleep(CONFIG.ATTACK_DURATION * 0.4);
        
        if (target) {
            target.currentHp -= damage;
            
            const targetSlot = document.querySelector(`#playerBoard .board-slot[data-slot="${targetIdx}"]`);
            const targetCard = targetSlot?.querySelector('.board-card');
            
            Audio.play(isCrit ? 'crit' : 'hit');
            Effects.screenShake(isCrit ? 'heavy' : 'normal');
            
            if (targetCard) {
                targetCard.classList.add('hit');
                Effects.showDamage(targetCard, damage, isCrit);
            }
            
            addLog(`${attacker.name} deals ${damage}${isCrit ? ' CRIT' : ''} to ${target.name}!`, isCrit ? 'crit' : 'damage');
            
            await sleep(CONFIG.HIT_DURATION);
            if (targetCard) targetCard.classList.remove('hit');
            
            if (target.currentHp <= 0) {
                await handleDeath(target, targetIdx, false);
            }
        } else {
            // Attack face
            gameState.playerHP -= damage;
            
            Audio.play(isCrit ? 'crit' : 'hit');
            Effects.screenShake('heavy');
            Effects.screenFlash('#ff4444');
            
            const hpBar = document.getElementById('playerHpBar');
            hpBar.classList.add('damaged');
            setTimeout(() => hpBar.classList.remove('damaged'), 300);
            
            addLog(`${attacker.name} deals ${damage}${isCrit ? ' CRIT' : ''} to YOUR GUILD!`, isCrit ? 'crit' : 'damage');
            
            renderHP();
            checkGameOver();
        }
        
        await sleep(200);
        if (attackerCard) attackerCard.classList.remove('attacking');
        
        renderBoards();
    }
    
    function startNewTurn() {
        gameState.turn++;
        gameState.maxEnergy = Math.min(gameState.turn, CONFIG.MAX_ENERGY);
        gameState.energy = gameState.maxEnergy;
        gameState.isPlayerTurn = true;
        
        // Reset attack status for all cards
        gameState.playerBoard.forEach(c => {
            if (c) {
                c.canAttackThisTurn = true;
                c.hasAttacked = false;
            }
        });
        gameState.enemyBoard.forEach(c => {
            if (c) {
                c.canAttackThisTurn = true;
                c.hasAttacked = false;
            }
        });
        
        // Draw card
        if (gameState.playerDeck.length > 0 && gameState.playerHand.length < CONFIG.MAX_HAND) {
            gameState.playerHand.push(gameState.playerDeck.pop());
        }
        
        addLog(`--- TURN ${gameState.turn} ---`, '');
        
        renderAll();
    }
    
    function checkGameOver() {
        if (gameState.playerHP <= 0) {
            Audio.play('defeat');
            showGameOver(false);
        } else if (gameState.enemyHP <= 0) {
            Audio.play('victory');
            showGameOver(true);
        }
    }
    
    function showGameOver(victory) {
        const overlay = document.getElementById('gameOverOverlay');
        const text = document.getElementById('gameOverText');
        const stats = document.getElementById('gameOverStats');
        
        text.textContent = victory ? 'VICTORY!' : 'DEFEAT';
        text.className = 'game-over-text ' + (victory ? 'victory' : 'defeat');
        
        stats.innerHTML = `
            <p>Turns: ${gameState.turn}</p>
            <p>Cards Played: ${gameState.stats.cardsPlayed}</p>
            <p>Damage Dealt: ${gameState.stats.damageDealt}</p>
            <p>Cards Destroyed: ${gameState.stats.cardsKilled}</p>
        `;
        
        overlay.classList.add('show');
    }
    
    // ═══════════════════════════════════════════════════════════════════
    // BATTLE LOG
    // ═══════════════════════════════════════════════════════════════════
    
    function addLog(message, type = '') {
        const log = document.getElementById('battleLog');
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + type;
        entry.innerHTML = message;
        log.insertBefore(entry, log.firstChild);
        
        // Limit entries
        while (log.children.length > 30) {
            log.removeChild(log.lastChild);
        }
    }
    
    // ═══════════════════════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════════════════════
    
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    function renderAll() {
        renderHP();
        renderEnergy();
        renderTurnIndicator();
        renderHand();
        renderBoards();
        updateAttackButton();
    }
    
    function createDeck() {
        if (!CARDS.length) return [];
        
        const deck = [];
        const rarities = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
        
        // Create a balanced deck
        for (let i = 0; i < 15; i++) {
            const rarity = rarities[Math.min(i % 5, 3)];
            const pool = CARDS.filter(c => c.rarity === rarity && c.gameStats);
            if (pool.length > 0) {
                deck.push({...pool[Math.floor(Math.random() * pool.length)]});
            }
        }
        
        // Shuffle
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        
        return deck;
    }
    
    // ═══════════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════════
    
    async function init() {
        // Load cards
        if (typeof NW_CARDS !== 'undefined') {
            CARDS = NW_CARDS.getAllCards().filter(c => c.gameStats);
        } else {
            // Fallback - load from API
            try {
                const res = await fetch('/static/data/cards-v2.json');
                const data = await res.json();
                CARDS = data.filter(c => c.gameStats);
            } catch (e) {
                console.error('Failed to load cards:', e);
            }
        }
        
        console.log(`[Battle Arena] Loaded ${CARDS.length} cards`);
        
        // Create decks
        gameState.playerDeck = createDeck();
        gameState.enemyDeck = createDeck();
        
        // Draw starting hands
        for (let i = 0; i < CONFIG.STARTING_HAND; i++) {
            if (gameState.playerDeck.length > 0) {
                gameState.playerHand.push(gameState.playerDeck.pop());
            }
            if (gameState.enemyDeck.length > 0) {
                gameState.enemyHand.push(gameState.enemyDeck.pop());
            }
        }
        
        // Setup UI
        Effects.createParticles();
        renderAll();
        
        // Event listeners
        document.getElementById('endTurnBtn').onclick = endTurn;
        document.getElementById('attackBtn').onclick = () => {
            // Auto-attack first available target
            const targetIdx = gameState.enemyBoard.findIndex(c => c);
            if (targetIdx !== -1) {
                attackTarget(targetIdx);
            } else {
                attackTarget(0); // Attack face
            }
        };
        
        // Start audio on first interaction
        document.body.addEventListener('click', () => {
            Audio.init();
        }, { once: true });
        
        addLog('Battle Arena initialized!', 'ability');
        addLog(`Your deck: ${gameState.playerDeck.length + gameState.playerHand.length} cards`, '');
        
        console.log('[Battle Arena v2.0] Ready!');
    }
    
    // Start
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
})();
</script>
</body>
</html>
