<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NumbahWan TCG | BATTLE ARENA v7.1</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/static/battle-v7.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script defer src="/static/nw-icons.js"></script>
    <script defer src="/static/nw-cards.js"></script>
    <script defer src="/static/nw-sounds.js"></script>
    <script defer src="/static/nw-game-juice.js"></script>
    <script defer src="/static/nw-wallet.js"></script>
</head>
<body>
    <!-- BATTLE ARENA v7.1 — Bigger Cards + SVG Icons + Tap-to-Zoom -->
    <!-- Research: Marvel Snap card-first UI, 60px+ touch, 16pt+ fonts, thumb-zone -->
    <div id="arena">

        <!-- TOP BAR -->
        <header id="topBar">
            <a href="/" class="back-btn" aria-label="Back to home">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </a>
            <div class="top-info">
                <span class="turn-pill" id="turnBadge">TURN 1</span>
                <span class="energy-pill" id="energyPill">
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    <span id="energyText">1/1</span>
                </span>
            </div>
            <button class="menu-btn" id="menuBtn" aria-label="Game menu">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </header>

        <!-- ENEMY ZONE -->
        <div class="player-zone enemy-zone">
            <div class="zone-header">
                <div class="avatar-hp">
                    <span class="zone-avatar" id="enemyAvatar">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><rect x="5" y="8" width="14" height="12" rx="3"/><circle cx="9" cy="13" r="1.5"/><circle cx="15" cy="13" r="1.5"/><rect x="10" y="16" width="4" height="2" rx="1"/><line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="2" r="1.5"/><rect x="2" y="11" width="3" height="4" rx="1.5"/><rect x="19" y="11" width="3" height="4" rx="1.5"/></svg>
                    </span>
                    <div class="zone-info">
                        <span class="zone-name enemy-name" id="enemyName">Enemy</span>
                        <div class="hp-bar-track">
                            <div class="hp-bar-fill enemy-bar" id="enemyHpBar" style="width:100%"></div>
                            <span class="hp-label" id="enemyHpText">30/30</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Enemy Board: 5 slots -->
            <div class="board-row" id="enemyBoard">
                <div class="board-slot enemy-slot" data-slot="0" data-side="enemy"></div>
                <div class="board-slot enemy-slot" data-slot="1" data-side="enemy"></div>
                <div class="board-slot enemy-slot" data-slot="2" data-side="enemy"></div>
                <div class="board-slot enemy-slot" data-slot="3" data-side="enemy"></div>
                <div class="board-slot enemy-slot" data-slot="4" data-side="enemy"></div>
            </div>
        </div>

        <!-- BATTLE DIVIDER -->
        <div class="battle-divider">
            <div class="divider-line"></div>
            <span class="divider-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14.5 3.5L21 10l-2 2-2-2-5 5 2 2-2 2-6.5-6.5L2 15l2-2 2 2 5-5-2-2 2-2z"/><path d="M17 3l4 4M3 21l4-4"/></svg>
            </span>
            <div class="divider-line"></div>
        </div>

        <!-- PLAYER ZONE -->
        <div class="player-zone your-zone">
            <div class="board-row" id="playerBoard">
                <div class="board-slot player-slot" data-slot="0" data-side="player"></div>
                <div class="board-slot player-slot" data-slot="1" data-side="player"></div>
                <div class="board-slot player-slot" data-slot="2" data-side="player"></div>
                <div class="board-slot player-slot" data-slot="3" data-side="player"></div>
                <div class="board-slot player-slot" data-slot="4" data-side="player"></div>
            </div>
            <div class="zone-header player-header">
                <div class="avatar-hp">
                    <span class="zone-avatar">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M12 14c-6 0-8 3-8 5v1h16v-1c0-2-2-5-8-5z"/></svg>
                    </span>
                    <div class="zone-info">
                        <span class="zone-name your-name">You</span>
                        <div class="hp-bar-track">
                            <div class="hp-bar-fill player-bar" id="playerHpBar" style="width:100%"></div>
                            <span class="hp-label" id="playerHpText">30/30</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SYNERGY TICKER -->
        <div id="synergyTicker" class="synergy-ticker"></div>

        <!-- HAND AREA: Big Carousel Cards -->
        <div id="handArea" class="hand-area">
            <div class="hand-header">
                <span class="hand-label">YOUR HAND</span>
                <span class="hand-count" id="handCount">0 / 7</span>
            </div>
            <div class="hand-carousel" id="playerHand"></div>
            <div class="hand-dots" id="handDots"></div>
        </div>

        <!-- ACTION BAR: Thumb Zone -->
        <div id="actionBar" class="action-bar">
            <button class="action-btn end-btn" id="endTurnBtn" aria-label="End your turn">
                <span class="btn-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 4l10 8-10 8V4z"/><rect x="16" y="4" width="3" height="16" rx="1"/></svg></span>
                <span class="btn-text">END TURN</span>
            </button>
            <button class="action-btn attack-btn" id="attackBtn" disabled aria-label="Attack enemy">
                <span class="btn-icon"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14.5 3.5L21 10l-2 2-2-2-5 5 2 2-2 2-6.5-6.5L2 15l2-2 2 2 5-5-2-2 2-2z"/><path d="M17 3l4 4M3 21l4-4"/></svg></span>
                <span class="btn-text">ATTACK</span>
            </button>
        </div>

        <!-- ANNOUNCER -->
        <div id="announcer" class="announcer hidden" role="alert" aria-live="assertive"></div>

        <!-- COMBAT LOG -->
        <div id="combatLog" class="combat-log" aria-live="polite"></div>

        <!-- GAME OVER OVERLAY -->
        <div id="gameOver" class="overlay hidden">
            <div class="overlay-card">
                <h1 id="gameOverTitle" class="overlay-title"></h1>
                <div id="gameOverStats" class="overlay-stats"></div>
                <!-- BATTLE HISTORY: Lifetime stats in game-over -->
                <div id="battleLifetimeStats" class="bh-lifetime hidden"></div>
                <button class="big-btn gold-btn" onclick="location.reload()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:inline;vertical-align:middle;margin-right:6px"><path d="M14.5 3.5L21 10l-2 2-2-2-5 5 2 2-2 2-6.5-6.5L2 15l2-2 2 2 5-5-2-2 2-2z"/><path d="M17 3l4 4M3 21l4-4"/></svg>
                    PLAY AGAIN
                </button>
                <a href="/" class="overlay-link">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M15 18l-6-6 6-6"/></svg>
                    Back to Home
                </a>
            </div>
        </div>

        <!-- START SCREEN -->
        <div id="startScreen" class="overlay">
            <div class="overlay-card start-card">
                <h1 class="start-title">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:inline;vertical-align:middle;margin-right:6px"><path d="M14.5 3.5L21 10l-2 2-2-2-5 5 2 2-2 2-6.5-6.5L2 15l2-2 2 2 5-5-2-2 2-2z"/><path d="M17 3l4 4M3 21l4-4"/></svg>
                    BATTLE ARENA
                </h1>
                <p class="start-sub">NumbahWan TCG v7.1</p>

                <!-- BATTLE HISTORY: Stats bar (rendered by nw-battle-history.js) -->
                <div id="battleHistoryBar" class="bh-bar hidden"></div>

                <div class="diff-grid">
                    <button class="diff-card selected" data-diff="casual" onclick="selectDiff('casual')">
                        <span class="diff-icon diff-icon--casual">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><rect x="5" y="8" width="14" height="12" rx="3"/><circle cx="9" cy="13" r="1.5"/><circle cx="15" cy="13" r="1.5"/><rect x="10" y="16" width="4" height="2" rx="1"/><line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="2" r="1.5"/></svg>
                        </span>
                        <span class="diff-label">Casual</span>
                        <span class="diff-hint">Vibes only</span>
                    </button>
                    <button class="diff-card" data-diff="ranked" onclick="selectDiff('ranked')">
                        <span class="diff-icon diff-icon--ranked">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
                        </span>
                        <span class="diff-label">Ranked</span>
                        <span class="diff-hint">Smart AI</span>
                    </button>
                    <button class="diff-card" data-diff="boss" onclick="selectDiff('boss')">
                        <span class="diff-icon diff-icon--boss">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M12 2C7.58 2 4 5.58 4 10c0 2.76 1.34 5.2 3.4 6.72L7 21h3l.5-2h3l.5 2h3l-.4-4.28C18.66 15.2 20 12.76 20 10c0-4.42-3.58-8-8-8zm-2.5 10a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm5 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>
                        </span>
                        <span class="diff-label">Boss</span>
                        <span class="diff-hint">No mercy</span>
                    </button>
                </div>
                <button class="big-btn gold-btn" id="startBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:inline;vertical-align:middle;margin-right:6px"><path d="M14.5 3.5L21 10l-2 2-2-2-5 5 2 2-2 2-6.5-6.5L2 15l2-2 2 2 5-5-2-2 2-2z"/><path d="M17 3l4 4M3 21l4-4"/></svg>
                    START BATTLE
                </button>

                <!-- BATTLE HISTORY: Recent matches log -->
                <div id="battleRecentMatches" class="bh-recent hidden"></div>

            </div>
        </div>

        <!-- CARD DETAIL MODAL -->
        <div id="cardModal" class="overlay hidden" onclick="closeCardModal(event)">
            <div class="overlay-card modal-card" id="cardModalContent"></div>
        </div>

        <!-- TAP-TO-ZOOM: Board card preview overlay -->
        <div id="cardZoom" class="card-zoom hidden" onclick="closeCardZoom(event)">
            <div class="card-zoom-inner" id="cardZoomContent"></div>
        </div>

    </div>

    <script src="/static/nw-card-engine.js"></script>
    <script src="/static/nw-battle-v7.js"></script>
    <script src="/static/nw-battle-coach.js"></script>
    <script src="/static/nw-battle-assist.js"></script>
    <script src="/static/nw-battle-juice.js"></script>
    <script src="/static/nw-battle-history.js"></script>
</body>
</html>
<!-- test -->
