<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patch Notes | NumbahWan Guild</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/static/nw-config.js"></script>
    <script src="/static/nw-wallet.js"></script>
    <script src="/static/nw-sounds.js"></script>
    <script src="/static/nw-guide.js"></script>
    <script src="/static/nw-nav.js" defer></script>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --gold: #d4af37;
            --cyan: #00ffff;
            --green: #00ff88;
            --purple: #9333ea;
            --red: #ef4444;
            --text: #f5f5dc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        
        .patch-card {
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .patch-card:hover {
            border-color: rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        .patch-header {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(147, 51, 234, 0.1));
            padding: 24px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .version-badge {
            background: linear-gradient(135deg, var(--gold), #ffd700);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
        }
        .version-badge.major { background: linear-gradient(135deg, var(--gold), #ffd700); }
        .version-badge.minor { background: linear-gradient(135deg, var(--cyan), #00cccc); }
        .version-badge.patch { background: linear-gradient(135deg, var(--green), #00cc66); }
        
        .change-item {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }
        .change-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .change-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .change-icon.new { background: rgba(0, 255, 136, 0.15); }
        .change-icon.feature { background: rgba(0, 255, 255, 0.15); }
        .change-icon.balance { background: rgba(212, 175, 55, 0.15); }
        .change-icon.fix { background: rgba(239, 68, 68, 0.15); }
        
        .category-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .category-badge.new { background: rgba(0, 255, 136, 0.2); color: var(--green); }
        .category-badge.feature { background: rgba(0, 255, 255, 0.2); color: var(--cyan); }
        .category-badge.balance { background: rgba(212, 175, 55, 0.2); color: var(--gold); }
        .category-badge.fix { background: rgba(239, 68, 68, 0.2); color: var(--red); }
        
        /* Nav button spacing */
        body { padding-top: 50px; }
        
        .timeline-line {
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--gold), var(--purple), var(--cyan));
        }
        .timeline-dot {
            position: absolute;
            left: 12px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 3px solid var(--gold);
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Header -->
    <header class="max-w-4xl mx-auto mb-12 text-center">
        <h1 class="font-cinzel text-4xl md:text-5xl font-bold mb-4">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-600">
                📋 <span data-i18n="title">Patch Notes</span>
            </span>
        </h1>
        <p class="text-gray-400 text-lg" data-i18n="subtitle">Version history and updates</p>
        
        <!-- Current Version -->
        <div class="mt-8 inline-block px-6 py-3 bg-gradient-to-r from-purple-900/30 to-cyan-900/30 rounded-full border border-purple-500/30">
            <span class="text-gray-400" data-i18n="currentVersion">Current Version:</span>
            <span class="text-white font-bold ml-2" id="currentVersion">Loading...</span>
        </div>
    </header>

    <!-- Patches Timeline -->
    <main class="max-w-4xl mx-auto relative" id="patchesContainer">
        <div class="timeline-line hidden md:block"></div>
        <!-- Patches will be rendered here -->
    </main>

    <!-- Footer -->
    <footer class="max-w-4xl mx-auto mt-16 pt-8 border-t border-gray-800 text-center text-gray-500">
        <p data-i18n="footer">Updates are auto-generated from NW_CONFIG</p>
        <p class="mt-2 text-sm">NumbahWan Guild © 2026</p>
    </footer>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // TRANSLATIONS
        // ═══════════════════════════════════════════════════════════════
        const i18n = {
            en: {
                title: 'Patch Notes',
                subtitle: 'Version history and updates',
                currentVersion: 'Current Version:',
                footer: 'Updates are auto-generated from NW_CONFIG',
                categories: {
                    new: 'NEW',
                    feature: 'FEATURE',
                    balance: 'BALANCE',
                    fix: 'FIX'
                }
            },
            zh: {
                title: '更新日誌',
                subtitle: '版本歷史和更新',
                currentVersion: '當前版本：',
                footer: '更新自動從 NW_CONFIG 生成',
                categories: {
                    new: '新增',
                    feature: '功能',
                    balance: '平衡',
                    fix: '修復'
                }
            },
            th: {
                title: 'บันทึกแพทช์',
                subtitle: 'ประวัติเวอร์ชันและการอัปเดต',
                currentVersion: 'เวอร์ชันปัจจุบัน:',
                footer: 'อัปเดตสร้างอัตโนมัติจาก NW_CONFIG',
                categories: {
                    new: 'ใหม่',
                    feature: 'ฟีเจอร์',
                    balance: 'สมดุล',
                    fix: 'แก้ไข'
                }
            }
        };

        let currentLang = localStorage.getItem('nw_lang') || 'en';

        // ═══════════════════════════════════════════════════════════════
        // LANGUAGE SYSTEM
        // ═══════════════════════════════════════════════════════════════
        );
            
            // Update static text
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18n[lang]?.[key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            
            // Re-render patches
            renderPatches();
            
            // Notify other components
            window.dispatchEvent(new CustomEvent('nw-lang-changed', { detail: { lang } }));
        }

        // ═══════════════════════════════════════════════════════════════
        // RENDER PATCHES
        // ═══════════════════════════════════════════════════════════════
        function renderPatches() {
            if (!window.NW_CONFIG) {
                setTimeout(renderPatches, 100);
                return;
            }

            const container = document.getElementById('patchesContainer');
            const patches = NW_CONFIG.getAllPatches();
            
            // Update current version
            document.getElementById('currentVersion').textContent = `v${NW_CONFIG.version}`;
            
            container.innerHTML = patches.map((patch, index) => {
                const title = NW_CONFIG.t(patch.title, currentLang);
                const changes = patch.changes.map(change => {
                    const changeTitle = NW_CONFIG.t(change.title, currentLang);
                    const changeDesc = NW_CONFIG.t(change.desc, currentLang);
                    const categoryLabel = i18n[currentLang]?.categories?.[change.category] || change.category.toUpperCase();
                    
                    return `
                        <div class="change-item">
                            <div class="change-icon ${change.category}">
                                ${change.icon || '✨'}
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="category-badge ${change.category}">${categoryLabel}</span>
                                    <span class="font-semibold">${changeTitle}</span>
                                </div>
                                <p class="text-gray-400 text-sm">${changeDesc}</p>
                                ${change.path ? `<a href="${change.path}" class="text-cyan-400 text-sm hover:underline mt-1 inline-block">→ ${change.path}</a>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                
                return `
                    <article class="patch-card mb-8 md:ml-12 relative animate-in" style="animation-delay: ${index * 100}ms">
                        <div class="timeline-dot hidden md:block" style="top: 30px;"></div>
                        <div class="patch-header">
                            <div class="flex flex-wrap items-center gap-4 mb-2">
                                <span class="version-badge ${patch.type}">v${patch.version}</span>
                                <span class="text-gray-400">${patch.date}</span>
                                ${index === 0 ? '<span class="px-2 py-1 bg-green-500/20 text-green-400 text-xs rounded-full">LATEST</span>' : ''}
                            </div>
                            <h2 class="font-cinzel text-2xl font-bold text-white">${title}</h2>
                        </div>
                        <div class="p-6">
                            ${changes}
                        </div>
                    </article>
                `;
            }).join('');
        }

        // ═══════════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            // Init wallet for header display
            if (window.NW_WALLET) NW_WALLET.init();
            
            // Set initial language
            setLanguage(currentLang);
            
            // Listen for config updates
            window.addEventListener('nw-config-update', renderPatches);
            
            // Listen for nav language changes
            window.addEventListener('nw-lang-change', (e) => {
                if (e.detail.lang !== currentLang) {
                    setLanguage(e.detail.lang);
                }
            });
            
            // Initialize universal nav
            if (typeof NW_NAV !== 'undefined') NW_NAV.init('updates');
        });
    </script>
</body>
</html>
