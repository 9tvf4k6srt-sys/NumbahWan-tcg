<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NWG Battle Arena v3.0 | Luck-Based Card Battles</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --nwg-gold: #ffd700;
            --nwg-purple: #a855f7;
            --nwg-blue: #3b82f6;
            --nwg-green: #22c55e;
            --nwg-red: #ef4444;
            --nwg-orange: #f59e0b;
            --mythic: #ef4444;
            --legendary: #f59e0b;
            --epic: #a855f7;
            --rare: #3b82f6;
            --uncommon: #22c55e;
            --common: #9ca3af;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #080812 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════════════════════ */
        .header {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-title {
            font-family: 'NumbahWan', 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--nwg-gold);
        }
        
        .header-balance {
            font-size: 0.85rem;
            color: var(--nwg-gold);
            font-weight: 600;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           INSTRUCTION BANNER - Clear "how to play"
           ═══════════════════════════════════════════════════════════════════ */
        .instruction-banner {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(168, 85, 247, 0.2));
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .instruction-text {
            font-size: 0.9rem;
            color: #fff;
        }
        
        .instruction-text strong {
            color: var(--nwg-gold);
        }
        
        .selected-count {
            display: inline-block;
            background: var(--nwg-gold);
            color: #000;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
            margin-left: 8px;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           CARD GRID - Mobile Optimized (2 columns on mobile)
           ═══════════════════════════════════════════════════════════════════ */
        .card-section {
            padding: 16px;
        }
        
        .section-title {
            font-family: 'NumbahWan', 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--nwg-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 100%;
        }
        
        @media (min-width: 480px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (min-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(4, 1fr);
                max-width: 800px;
                margin: 0 auto;
            }
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           CARD COMPONENT - Larger, Tappable
           ═══════════════════════════════════════════════════════════════════ */
        .battle-card {
            background: rgba(30, 30, 50, 0.9);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 3px solid transparent;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .battle-card:active {
            transform: scale(0.95);
        }
        
        .battle-card.selected {
            border-color: var(--nwg-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transform: scale(1.02);
        }
        
        .battle-card.selected::before {
            content: '';
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--nwg-gold);
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            z-index: 10;
        }
        
        /* Rarity borders */
        .battle-card[data-rarity="mythic"] { border-color: var(--mythic); }
        .battle-card[data-rarity="legendary"] { border-color: var(--legendary); }
        .battle-card[data-rarity="epic"] { border-color: var(--epic); }
        .battle-card[data-rarity="rare"] { border-color: var(--rare); }
        .battle-card[data-rarity="uncommon"] { border-color: var(--uncommon); }
        .battle-card[data-rarity="common"] { border-color: var(--common); }
        
        .battle-card.selected[data-rarity="mythic"],
        .battle-card.selected[data-rarity="legendary"],
        .battle-card.selected[data-rarity="epic"],
        .battle-card.selected[data-rarity="rare"],
        .battle-card.selected[data-rarity="uncommon"],
        .battle-card.selected[data-rarity="common"] {
            border-color: var(--nwg-gold);
        }
        
        .card-image-container {
            width: 100%;
            aspect-ratio: 3/4;
            background: #1a1a2e;
            overflow: hidden;
            position: relative;
        }
        
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Show FULL character - no cropping */
            object-position: center center;
            background: linear-gradient(180deg, #0a0a14 0%, #1a1a2e 100%);
            transition: transform 0.3s ease;
        }
        
        .card-image {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .card-image.loaded {
            opacity: 1;
        }
        
        .card-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.3);
            background: linear-gradient(135deg, #1a1a2e, #2d1b4e);
        }
        
        .card-info {
            padding: 8px;
            text-align: center;
        }
        
        .card-name {
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        
        .card-rarity {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        
        .card-rarity.mythic { color: var(--mythic); }
        .card-rarity.legendary { color: var(--legendary); }
        .card-rarity.epic { color: var(--epic); }
        .card-rarity.rare { color: var(--rare); }
        .card-rarity.uncommon { color: var(--uncommon); }
        .card-rarity.common { color: var(--common); }
        
        .card-nwg {
            font-size: 0.65rem;
            color: var(--nwg-gold);
            font-weight: 600;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           BATTLE CONTROLS - Fixed at bottom
           ═══════════════════════════════════════════════════════════════════ */
        .battle-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            padding: 16px;
            border-top: 2px solid var(--nwg-gold);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        .luck-display {
            text-align: center;
            margin-bottom: 12px;
        }
        
        .luck-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .luck-value {
            font-family: 'NumbahWan', 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--nwg-gold);
        }
        
        .bet-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .bet-btn {
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .bet-btn.minus { background: var(--nwg-red); color: #fff; }
        .bet-btn.plus { background: var(--nwg-green); color: #fff; }
        
        .bet-input {
            width: 100px;
            height: 40px;
            background: #1a1a2e;
            border: 2px solid var(--nwg-gold);
            border-radius: 8px;
            color: var(--nwg-gold);
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
        }
        
        .difficulty-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .diff-btn {
            padding: 8px 12px;
            border: 2px solid;
            border-radius: 8px;
            background: transparent;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .diff-btn.easy { border-color: var(--nwg-green); color: var(--nwg-green); }
        .diff-btn.medium { border-color: var(--nwg-orange); color: var(--nwg-orange); }
        .diff-btn.hard { border-color: var(--nwg-red); color: var(--nwg-red); }
        .diff-btn.boss { border-color: var(--nwg-purple); color: var(--nwg-purple); }
        
        .diff-btn.active {
            color: #000;
        }
        .diff-btn.active.easy { background: var(--nwg-green); }
        .diff-btn.active.medium { background: var(--nwg-orange); }
        .diff-btn.active.hard { background: var(--nwg-red); }
        .diff-btn.active.boss { background: var(--nwg-purple); }
        
        .battle-btn {
            width: 100%;
            padding: 16px;
            font-family: 'NumbahWan', 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--nwg-gold), var(--nwg-orange));
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .battle-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        
        .battle-btn:not(:disabled):active {
            transform: scale(0.98);
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           RESULT MODAL
           ═══════════════════════════════════════════════════════════════════ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: rgba(30, 30, 50, 0.95);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            border: 3px solid var(--nwg-gold);
            animation: modalPop 0.3s ease;
        }
        
        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .result-title {
            font-family: 'NumbahWan', 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 16px;
        }
        
        .result-title.victory {
            color: var(--nwg-gold);
            text-shadow: 0 0 30px var(--nwg-gold);
        }
        
        .result-title.defeat {
            color: var(--nwg-red);
        }
        
        .result-stats {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 16px;
            line-height: 1.8;
        }
        
        .result-amount {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .result-amount.win { color: var(--nwg-green); }
        .result-amount.loss { color: var(--nwg-red); }
        
        .cliffhanger {
            background: rgba(168, 85, 247, 0.2);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
            border-left: 3px solid var(--nwg-purple);
        }
        
        .continue-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            background: var(--nwg-blue);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        /* Spacer for fixed bottom controls */
        .bottom-spacer {
            height: 220px;
        }
        
        /* Loading state */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--nwg-gold);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script defer src="/static/nw-nav.js"></script>
    <script defer src="/static/nw-currency.js"></script>
    <script defer src="/static/nw-wallet.js"></script>
    <script src="/static/nw-zone-bundle.js" defer></script>
</head>
<body data-page-id="battle">
    <!-- Header -->
    <header class="header">
        <div class="header-title" data-i18n="battleArena">BATTLE ARENA</div>
        <div class="header-balance"><span id="nwgIcon"></span> <span id="balanceDisplay">1,000</span> NWG</div>
    </header>
    
    <!-- Instructions -->
    <div class="instruction-banner">
        <div class="instruction-text">
            <span data-i18n="tapToSelect"><strong>TAP cards</strong> to select (pick 3-5)</span>
            <span class="selected-count" id="selectedCount">0/5</span>
        </div>
    </div>
    
    <!-- Card Selection -->
    <div class="card-section">
        <div class="section-title" data-i18n="yourDeck">Your Deck</div>
        <div class="card-grid" id="cardGrid">
            <!-- Cards loaded via JS -->
            <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                <div class="loading-spinner"></div>
                <div style="margin-top: 12px; color: rgba(255,255,255,0.5);">Loading cards...</div>
            </div>
        </div>
    </div>
    
    <!-- Spacer for fixed controls -->
    <div class="bottom-spacer"></div>
    
    <!-- Battle Controls -->
    <div class="battle-controls">
        <div class="luck-display">
            <div class="luck-label" data-i18n="yourLuck">YOUR LUCK</div>
            <div class="luck-value" id="luckDisplay">50%</div>
        </div>
        
        <div class="bet-row">
            <button class="bet-btn minus" onclick="adjustBet(-100)">−</button>
            <input type="number" class="bet-input" id="betInput" value="100" min="10" max="10000">
            <button class="bet-btn plus" onclick="adjustBet(100)">+</button>
            <span style="color: var(--nwg-green); font-size: 0.8rem;">→ <span id="potentialWin">200</span></span>
        </div>
        
        <div class="difficulty-row">
            <button class="diff-btn easy" onclick="setDifficulty('easy')" data-i18n="easyMode">Easy 1.3x</button>
            <button class="diff-btn medium active" onclick="setDifficulty('medium')" data-i18n="mediumMode">Med 2x</button>
            <button class="diff-btn hard" onclick="setDifficulty('hard')" data-i18n="hardMode">Hard 3.5x</button>
            <button class="diff-btn boss" onclick="setDifficulty('boss')" data-i18n="bossMode">Boss 8x</button>
        </div>
        
        <button class="battle-btn" id="battleBtn" onclick="startBattle()" disabled>
            SELECT 3+ CARDS TO BATTLE
        </button>
    </div>
    
    <!-- Result Modal -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-content">
            <div class="result-title" id="resultTitle">VICTORY!</div>
            <div class="result-stats" id="resultStats"></div>
            <div class="result-amount" id="resultAmount"></div>
            <div class="cliffhanger" id="cliffhanger"></div>
            <button class="continue-btn" onclick="closeModal()" data-i18n="continue">Continue</button>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // NWG BATTLE ARENA v3.0 - Mobile Optimized
    // ═══════════════════════════════════════════════════════════════════════════
    
    const NWG_VALUES = {
        common: 100, uncommon: 250, rare: 500, 
        epic: 2000, legendary: 10000, mythic: 50000
    };
    
    const DIFFICULTIES = {
        easy: { winChance: 0.70, payout: 1.3 },
        medium: { winChance: 0.50, payout: 2.0 },
        hard: { winChance: 0.30, payout: 3.5 },
        boss: { winChance: 0.15, payout: 8.0 }
    };
    
    const CLIFFHANGERS = [
        "What happens when you collect ALL mythics? Only 3 players have found out...",
        "Did you know RegginA has a secret final form? No one's pulled it yet...",
        "Rumor: A legendary card drops at exactly midnight. Coincidence?",
        "The next update contains something NOBODY expects...",
        "Your luck score is rising. Something good is about to happen..."
    ];
    
    const NEAR_MISS_MESSAGES = [
        "SO CLOSE! Just 2% away from victory!",
        "Almost had it! Your luck is building...",
        "Near miss! Next one's yours!",
        "The cards almost aligned! Try again?"
    ];
    
    // Game state
    let state = {
        cards: [],
        selectedCards: [],
        balance: 1000,
        bet: 100,
        difficulty: 'medium',
        streak: 0,
        lossStreak: 0
    };
    
    // ═══════════════════════════════════════════════════════════════════════════
    // IMAGE PATH RESOLVER - Try multiple extensions
    // ═══════════════════════════════════════════════════════════════════════════
    
    function getCardImagePath(card) {
        // IMPORTANT: Card data has .png/.jpg but ALL actual files are .webp!
        const basePath = '/static/images/cards/';
        const img = card.img || card.image || '';
        
        if (img) {
            // Convert any extension to .webp (that's what we actually have)
            const webpImg = img.replace(/\.(png|jpg|jpeg)$/i, '.webp');
            // Add cache buster
            return basePath + webpImg + '?v=3';
        }
        
        // Fallback placeholder
        return basePath + 'common-daily-login.webp?v=3';
    }
    
    // ═══════════════════════════════════════════════════════════════════════════
    // CARD RENDERING
    // ═══════════════════════════════════════════════════════════════════════════
    
    function renderCard(card) {
        const isSelected = state.selectedCards.some(c => c.id === card.id);
        const nwgValue = NWG_VALUES[card.rarity] || 100;
        const imgPath = getCardImagePath(card);
        
        return `
        <div class="battle-card ${isSelected ? 'selected' : ''}" 
             data-id="${card.id}" 
             data-rarity="${card.rarity}"
             onclick="toggleCard(${card.id})">
            <div class="card-image-container">
                <div class="card-placeholder"></div>
                <img class="card-image" 
                     src="${imgPath}" 
                     alt="${card.name}"
                     onload="this.classList.add('loaded'); this.previousElementSibling.style.display='none'; console.log('[IMG OK]', this.src);"
                     onerror="console.error('[IMG FAIL]', this.src); this.style.display='none';">
            </div>
            <div class="card-info">
                <div class="card-name">${card.name}</div>
                <div class="card-rarity ${card.rarity}">${card.rarity.toUpperCase()}</div>
                <div class="card-nwg">${nwgValue.toLocaleString()} NWG</div>
            </div>
        </div>
        `;
    }
    
    function renderCards() {
        const grid = document.getElementById('cardGrid');
        if (state.cards.length === 0) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">No cards found. Visit /cards to get some!</div>';
            return;
        }
        grid.innerHTML = state.cards.map(renderCard).join('');
    }
    
    // ═══════════════════════════════════════════════════════════════════════════
    // CARD SELECTION
    // ═══════════════════════════════════════════════════════════════════════════
    
    function toggleCard(cardId) {
        const card = state.cards.find(c => c.id === cardId);
        if (!card) return;
        
        const idx = state.selectedCards.findIndex(c => c.id === cardId);
        
        if (idx >= 0) {
            // Deselect
            state.selectedCards.splice(idx, 1);
        } else if (state.selectedCards.length < 5) {
            // Select (max 5)
            state.selectedCards.push(card);
        } else {
            // Already at max, show feedback
            alert('Maximum 5 cards! Deselect one first.');
            return;
        }
        
        // Update UI
        renderCards();
        updateLuck();
        updateBattleButton();
        updateSelectedCount();
    }
    
    function updateSelectedCount() {
        document.getElementById('selectedCount').textContent = `${state.selectedCards.length}/5`;
    }
    
    // ═══════════════════════════════════════════════════════════════════════════
    // LUCK CALCULATION (Collection-based, not stats!)
    // ═══════════════════════════════════════════════════════════════════════════
    
    function calculateLuck() {
        let luck = 50; // Base luck
        
        // Rarity luck bonus (collectibility value, not power)
        const rarityLuck = { common: 1, uncommon: 2, rare: 3, epic: 5, legendary: 8, mythic: 15 };
        let cardBonus = 0;
        state.selectedCards.forEach(card => {
            cardBonus += rarityLuck[card.rarity] || 1;
        });
        luck += Math.min(cardBonus, 25);
        
        // Streak bonus
        luck += Math.min(state.streak * 5, 25);
        
        // Pity boost (loss streak helps)
        if (state.lossStreak >= 3) {
            luck += Math.min(state.lossStreak * 3, 15);
        }
        
        return Math.min(luck, 85); // Cap at 85%
    }
    
    function updateLuck() {
        const luck = calculateLuck();
        document.getElementById('luckDisplay').textContent = luck + '%';
    }
    
    // ═══════════════════════════════════════════════════════════════════════════
    // BETTING
    // ═══════════════════════════════════════════════════════════════════════════
    
    function adjustBet(amount) {
        const input = document.getElementById('betInput');
        let newBet = Math.max(10, Math.min(state.balance, parseInt(input.value) + amount));
        input.value = newBet;
        state.bet = newBet;
        updatePotentialWin();
    }
    
    function updatePotentialWin() {
        const diff = DIFFICULTIES[state.difficulty];
        const potential = Math.floor(state.bet * diff.payout);
        document.getElementById('potentialWin').textContent = potential.toLocaleString();
    }
    
    function setDifficulty(diff) {
        state.difficulty = diff;
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.classList.toggle('active', btn.classList.contains(diff));
        });
        updatePotentialWin();
    }
    
    function updateBattleButton() {
        const btn = document.getElementById('battleBtn');
        const count = state.selectedCards.length;
        
        if (count < 3) {
            btn.disabled = true;
            btn.textContent = `SELECT ${3 - count} MORE CARD${3 - count > 1 ? 'S' : ''}`;
        } else {
            btn.disabled = false;
            btn.textContent = 'BATTLE!';
        }
    }
    
    // ═══════════════════════════════════════════════════════════════════════════
    // BATTLE
    // ═══════════════════════════════════════════════════════════════════════════
    
    async function startBattle() {
        if (state.selectedCards.length < 3) return;
        if (state.bet > state.balance) {
            alert('Not enough NWG!');
            return;
        }
        
        const btn = document.getElementById('battleBtn');
        btn.disabled = true;
        btn.textContent = 'BATTLING...';
        
        // Deduct bet
        state.balance -= state.bet;
        updateBalance();
        
        // Simulate battle (suspense!)
        await delay(2000);
        
        // Resolve
        const result = resolveBattle();
        showResult(result);
        
        btn.disabled = false;
        updateBattleButton();
    }
    
    function resolveBattle() {
        const diff = DIFFICULTIES[state.difficulty];
        const luck = calculateLuck();
        const adjustedWinChance = (luck / 100) * (diff.winChance * 2);
        
        const roll = Math.random();
        const won = roll < adjustedWinChance;
        const isNearMiss = !won && roll < (adjustedWinChance + 0.05);
        
        if (won) {
            const payout = Math.floor(state.bet * diff.payout);
            state.balance += payout;
            state.streak++;
            state.lossStreak = 0;
            return { won: true, payout, luck, roll: Math.floor(roll * 100) };
        } else {
            state.streak = 0;
            state.lossStreak++;
            return { won: false, loss: state.bet, luck, roll: Math.floor(roll * 100), isNearMiss };
        }
    }
    
    function showResult(result) {
        const modal = document.getElementById('resultModal');
        const title = document.getElementById('resultTitle');
        const stats = document.getElementById('resultStats');
        const amount = document.getElementById('resultAmount');
        const cliffhanger = document.getElementById('cliffhanger');
        
        if (result.won) {
            title.textContent = 'VICTORY!';
            title.className = 'result-title victory';
            stats.innerHTML = `Luck: ${result.luck}% | Roll: ${result.roll}<br>Streak: ${state.streak}`;
            amount.textContent = `+${result.payout.toLocaleString()} NWG`;
            amount.className = 'result-amount win';
        } else {
            if (result.isNearMiss) {
                const msg = NEAR_MISS_MESSAGES[Math.floor(Math.random() * NEAR_MISS_MESSAGES.length)];
                title.textContent = 'SO CLOSE!';
                stats.innerHTML = `${msg}<br>Luck: ${result.luck}% | Roll: ${result.roll}`;
            } else {
                title.textContent = 'DEFEAT';
                stats.innerHTML = `Luck: ${result.luck}% | Roll: ${result.roll}`;
            }
            title.className = 'result-title defeat';
            amount.textContent = `-${result.loss.toLocaleString()} NWG`;
            amount.className = 'result-amount loss';
        }
        
        // Random cliffhanger (creates curiosity)
        cliffhanger.textContent = CLIFFHANGERS[Math.floor(Math.random() * CLIFFHANGERS.length)];
        
        updateBalance();
        modal.classList.add('show');
    }
    
    function closeModal() {
        document.getElementById('resultModal').classList.remove('show');
        updateLuck();
    }
    
    function updateBalance() {
        document.getElementById('balanceDisplay').textContent = state.balance.toLocaleString();
    }
    
    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    // ═══════════════════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════════════════
    
    async function init() {
        // Render NWG icon using unified system
        if (typeof NW_CURRENCY !== 'undefined') {
            document.getElementById('nwgIcon').innerHTML = NW_CURRENCY.icon('nwg', { size: 18 });
        } else {
            document.getElementById('nwgIcon').textContent = '';
        }
        
        // Load wallet balance if available - use NW_WALLET if available
        try {
            if (typeof NW_WALLET !== 'undefined') {
                await NW_WALLET.init();
                state.balance = NW_WALLET.getBalance('nwg') || 1000;
            } else {
                const walletData = localStorage.getItem('nw_wallet');
                if (walletData) {
                    const wallet = JSON.parse(walletData);
                    state.balance = wallet.balance || 1000;
                }
            }
        } catch (e) {}
        
        updateBalance();
        
        // Load cards from API
        try {
            const response = await fetch('/api/cards');
            const data = await response.json();
            state.cards = data.cards || [];
            
            // Sort by rarity (mythic first)
            const rarityOrder = ['mythic', 'legendary', 'epic', 'rare', 'uncommon', 'common'];
            state.cards.sort((a, b) => rarityOrder.indexOf(a.rarity) - rarityOrder.indexOf(b.rarity));
            
            // Limit to first 20 for performance
            state.cards = state.cards.slice(0, 20);
        } catch (e) {
            console.error('Failed to load cards:', e);
            // Demo cards
            state.cards = [
                { id: 1, name: 'RegginA, The Eternal Flame', rarity: 'mythic', img: '01-reggina-mythic.jpg' },
                { id: 2, name: 'RegginO, The Shadow', rarity: 'legendary', img: '02-reggino-legendary.jpg' },
                { id: 3, name: 'The Sacred Log', rarity: 'epic', img: 'placeholder.jpg' },
                { id: 4, name: 'Guild Moment', rarity: 'rare', img: 'placeholder.jpg' },
                { id: 5, name: 'AFK Player', rarity: 'common', img: 'placeholder.jpg' },
            ];
        }
        
        renderCards();
        updateLuck();
        updateBattleButton();
        updateSelectedCount();
        updatePotentialWin();
        
        // Sync bet input changes
        document.getElementById('betInput').addEventListener('change', (e) => {
            state.bet = Math.max(10, Math.min(state.balance, parseInt(e.target.value) || 100));
            e.target.value = state.bet;
            updatePotentialWin();
        });
        
        console.log('[Battle Arena v3.0] Initialized');
    }
    
    // Start
    init();
    </script>
