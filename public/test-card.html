<!DOCTYPE html>
<html>
<head>
    <title>Test Card</title>
    <link rel="stylesheet" href="/static/nw-card-frames.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a12; padding: 50px; display: flex; gap: 30px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="nw-card nw-card-md" data-rarity="mythic">
        <div class="nw-card-inner">
            <img class="nw-card-art" src="/static/cards/01-reggina-mythic.jpg" alt="Test">
        </div>
        <div class="nw-card-cost">7</div>
        <div class="nw-card-banner">
            <div class="nw-card-name">RegginA, Eternal</div>
        </div>
        <div class="nw-card-stats-container">
            <div class="nw-card-stat atk">
                <span class="nw-card-stat-value">10</span>
                <span class="nw-card-stat-label">ATK</span>
            </div>
            <div class="nw-card-stat def">
                <span class="nw-card-stat-value">8</span>
                <span class="nw-card-stat-label">DEF</span>
            </div>
        </div>
        <div class="nw-card-rarity">MYTHIC</div>
    </div>
    
    <div class="nw-card nw-card-md" data-rarity="legendary">
        <div class="nw-card-inner">
            <img class="nw-card-art" src="/static/cards/02-reggino-legendary.jpg" alt="Test">
        </div>
        <div class="nw-card-cost">6</div>
        <div class="nw-card-banner">
            <div class="nw-card-name">Reggino, Shadow</div>
        </div>
        <div class="nw-card-stats-container">
            <div class="nw-card-stat atk">
                <span class="nw-card-stat-value">8</span>
                <span class="nw-card-stat-label">ATK</span>
            </div>
            <div class="nw-card-stat def">
                <span class="nw-card-stat-value">7</span>
                <span class="nw-card-stat-label">DEF</span>
            </div>
        </div>
        <div class="nw-card-rarity">LEGENDARY</div>
    </div>
    
    <div class="nw-card nw-card-md" data-rarity="epic">
        <div class="nw-card-inner">
            <img class="nw-card-art" src="/static/cards/03-onca-epic.jpg" alt="Test">
        </div>
        <div class="nw-card-cost">5</div>
        <div class="nw-card-banner">
            <div class="nw-card-name">Onca, Primal</div>
        </div>
        <div class="nw-card-stats-container">
            <div class="nw-card-stat atk">
                <span class="nw-card-stat-value">6</span>
                <span class="nw-card-stat-label">ATK</span>
            </div>
            <div class="nw-card-stat def">
                <span class="nw-card-stat-value">5</span>
                <span class="nw-card-stat-label">DEF</span>
            </div>
        </div>
        <div class="nw-card-rarity">EPIC</div>
    </div>
</body>
</html>
