<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | NumbahWan</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="/static/nw-sounds.js" defer></script>
    <script src="/static/nw-guide.js" defer></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --card-hover: #1a1a25;
            --border: #2a2a35;
            --text: #ffffff;
            --text-dim: #888;
            --primary: #ff6b00;
            --gold: #ffd700;
            --mythic: #ff00ff;
            --legendary: #ffd700;
            --epic: #a855f7;
            --rare: #3b82f6;
            --common: #6b7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* Header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            z-index: 100;
        }
        .header-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn {
            width: 36px;
            height: 36px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-btn:hover { background: var(--card-hover); }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #1a1a25 0%, #12121a 100%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .balance-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .balance-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .balance-row:last-child { border-bottom: none; }
        .balance-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .balance-icon.gold { background: linear-gradient(135deg, #b8860b, #ffd700); }
        .balance-icon.jade { background: linear-gradient(135deg, #0d5c2f, #10b981); }
        .balance-icon.crystal { background: linear-gradient(135deg, #0891b2, #06b6d4); }
        .balance-icon.log { background: linear-gradient(135deg, #78350f, #a16207); }
        .balance-info { flex: 1; }
        .balance-name { font-size: 14px; font-weight: 600; }
        .balance-desc { font-size: 11px; color: var(--text-dim); }
        .balance-amount {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 600;
        }
        .balance-amount.gold { color: #ffd700; }
        .balance-amount.jade { color: #10b981; }
        .balance-amount.crystal { color: #06b6d4; }
        .balance-amount.log { color: #d97706; }
        
        /* Tab Navigation */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding: 4px;
            background: var(--card);
            border-radius: 14px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .tab.active {
            background: var(--primary);
            color: white;
        }
        .tab:not(.active):hover {
            color: var(--text);
            background: var(--card-hover);
        }
        
        /* Panel */
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Cards Panel */
        .rarity-filters {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .rarity-filter {
            padding: 8px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .rarity-filter.active {
            background: var(--card-hover);
            color: var(--text);
            border-color: var(--primary);
        }
        .rarity-filter[data-rarity="mythic"].active { border-color: var(--mythic); color: var(--mythic); }
        .rarity-filter[data-rarity="legendary"].active { border-color: var(--legendary); color: var(--legendary); }
        .rarity-filter[data-rarity="epic"].active { border-color: var(--epic); color: var(--epic); }
        .rarity-filter[data-rarity="rare"].active { border-color: var(--rare); color: var(--rare); }
        
        .cards-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--card);
            border-radius: 12px;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 700;
        }
        .stat-value.mythic { color: var(--mythic); }
        .stat-value.legendary { color: var(--legendary); }
        .stat-value.epic { color: var(--epic); }
        .stat-value.rare { color: var(--rare); }
        .stat-value.common { color: var(--common); }
        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
        }
        .card-item {
            aspect-ratio: 3/4;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        .card-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .card-item.mythic { border-color: var(--mythic); box-shadow: 0 0 20px rgba(255,0,255,0.2); }
        .card-item.legendary { border-color: var(--legendary); box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        .card-item.epic { border-color: var(--epic); }
        .card-item.rare { border-color: var(--rare); }
        .card-item.empty {
            border-style: dashed;
            opacity: 0.4;
        }
        .card-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-count {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .card-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 6px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-size: 10px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Transactions Panel */
        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .tx-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s;
        }
        .tx-item:hover { background: var(--card-hover); }
        .tx-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .tx-icon.pull { background: rgba(168, 85, 247, 0.2); }
        .tx-icon.daily { background: rgba(34, 197, 94, 0.2); }
        .tx-icon.trade { background: rgba(59, 130, 246, 0.2); }
        .tx-icon.reward { background: rgba(255, 215, 0, 0.2); }
        .tx-info { flex: 1; min-width: 0; }
        .tx-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tx-time {
            font-size: 11px;
            color: var(--text-dim);
        }
        .tx-amount {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
        }
        .tx-amount.positive { color: #22c55e; }
        .tx-amount.negative { color: #ef4444; }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty-state-text {
            font-size: 14px;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .quick-btn {
            padding: 16px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: var(--card-hover);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .quick-btn-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .quick-btn-label {
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Footer nav */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .footer-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
        }
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 10px;
            transition: color 0.2s;
        }
        .footer-item.active { color: var(--primary); }
        .footer-item:hover { color: var(--text); }
        .footer-icon { font-size: 20px; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="/" class="back-btn">←</a>
            <h1>💰 Wallet</h1>
            <div style="width: 36px;"></div>
        </div>
    </header>
    
    <div class="container">
        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-label">Your Balance</div>
            <div class="balance-row">
                <div class="balance-icon gold">🪙</div>
                <div class="balance-info">
                    <div class="balance-name">Meso</div>
                    <div class="balance-desc">Standard currency</div>
                </div>
                <div class="balance-amount gold" id="mesoBalance">1,000,000</div>
            </div>
            <div class="balance-row">
                <div class="balance-icon jade">💎</div>
                <div class="balance-info">
                    <div class="balance-name">Black Jade</div>
                    <div class="balance-desc">Premium currency</div>
                </div>
                <div class="balance-amount jade" id="jadeBalance">500</div>
            </div>
            <div class="balance-row">
                <div class="balance-icon crystal">✨</div>
                <div class="balance-info">
                    <div class="balance-name">Crystal</div>
                    <div class="balance-desc">Special events</div>
                </div>
                <div class="balance-amount crystal" id="crystalBalance">1,250</div>
            </div>
            <div class="balance-row">
                <div class="balance-icon log">🪵</div>
                <div class="balance-info">
                    <div class="balance-name">Sacred Log</div>
                    <div class="balance-desc">Ultra rare</div>
                </div>
                <div class="balance-amount log" id="logBalance">3</div>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="cards">🃏 Cards</button>
            <button class="tab" data-tab="transactions">📜 History</button>
        </div>
        
        <!-- Cards Panel -->
        <div class="panel active" id="cardsPanel">
            <div class="rarity-filters">
                <button class="rarity-filter active" data-rarity="all">All</button>
                <button class="rarity-filter" data-rarity="mythic">Mythic</button>
                <button class="rarity-filter" data-rarity="legendary">Legendary</button>
                <button class="rarity-filter" data-rarity="epic">Epic</button>
                <button class="rarity-filter" data-rarity="rare">Rare</button>
                <button class="rarity-filter" data-rarity="common">Common</button>
            </div>
            
            <div class="cards-stats">
                <div class="stat-item">
                    <div class="stat-value mythic" id="mythicCount">6</div>
                    <div class="stat-label">Mythic</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value legendary" id="legendaryCount">11</div>
                    <div class="stat-label">Legend</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value epic" id="epicCount">18</div>
                    <div class="stat-label">Epic</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value rare" id="rareCount">22</div>
                    <div class="stat-label">Rare</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value common" id="commonCount">48</div>
                    <div class="stat-label">Common</div>
                </div>
            </div>
            
            <div class="cards-grid" id="cardsGrid"></div>
        </div>
        
        <!-- Transactions Panel -->
        <div class="panel" id="transactionsPanel">
            <div class="tx-list" id="txList"></div>
        </div>
        
        <!-- Quick Actions -->
        <div class="quick-actions">
            <a href="/tcg" class="quick-btn">
                <div class="quick-btn-icon">🎴</div>
                <div class="quick-btn-label">Pull Cards</div>
            </a>
            <a href="/market" class="quick-btn">
                <div class="quick-btn-icon">🛒</div>
                <div class="quick-btn-label">Market</div>
            </a>
            <a href="/forge" class="quick-btn">
                <div class="quick-btn-icon">⚒️</div>
                <div class="quick-btn-label">Forge</div>
            </a>
        </div>
    </div>
    
    <!-- Footer Navigation -->
    <nav class="footer-nav">
        <div class="footer-inner">
            <a href="/" class="footer-item">
                <span class="footer-icon">🏠</span>
                Home
            </a>
            <a href="/tcg" class="footer-item">
                <span class="footer-icon">🃏</span>
                Cards
            </a>
            <a href="/wallet" class="footer-item active">
                <span class="footer-icon">💰</span>
                Wallet
            </a>
            <a href="/market" class="footer-item">
                <span class="footer-icon">🛒</span>
                Market
            </a>
        </div>
    </nav>

    <script>
    // Sample card data
    const SAMPLE_CARDS = [
        // Mythic
        { id: 1, name: 'RegginA', rarity: 'mythic', image: '/static/images/cards/reggina.webp', count: 1 },
        { id: 2, name: 'FangBlade', rarity: 'mythic', image: '/static/images/cards/fangblade.webp', count: 1 },
        { id: 3, name: 'Tiger', rarity: 'mythic', image: '/static/images/cards/tiger.webp', count: 1 },
        { id: 4, name: 'Suuushi', rarity: 'mythic', image: '/static/images/cards/suuushi.webp', count: 1 },
        { id: 5, name: 'CurryIsHot', rarity: 'mythic', image: '/static/images/cards/curryishot.webp', count: 1 },
        { id: 6, name: 'NinjaTL', rarity: 'mythic', image: '/static/images/cards/ninjatl.webp', count: 1 },
        // Legendary
        { id: 7, name: 'EarlyBird', rarity: 'legendary', image: '/static/images/cards/earlybird.webp', count: 2 },
        { id: 8, name: 'NightOwl', rarity: 'legendary', image: '/static/images/cards/nightowl.webp', count: 1 },
        { id: 9, name: 'CC-07', rarity: 'legendary', image: '/static/images/cards/cc07.webp', count: 3 },
        { id: 10, name: 'LagSpike', rarity: 'legendary', image: '/static/images/cards/lagspike.webp', count: 1 },
        { id: 11, name: 'Tilt', rarity: 'legendary', image: '/static/images/cards/tilt.webp', count: 2 },
        { id: 12, name: 'GuildPride', rarity: 'legendary', image: '/static/images/cards/guildpride.webp', count: 1 },
        { id: 13, name: 'AFKSoul', rarity: 'legendary', image: '/static/images/cards/afksoul.webp', count: 1 },
        // Epic
        { id: 14, name: 'BossRunner', rarity: 'epic', image: '/static/images/cards/bossrunner.webp', count: 3 },
        { id: 15, name: 'MesoFarmer', rarity: 'epic', image: '/static/images/cards/mesofarmer.webp', count: 2 },
        { id: 16, name: 'ScrollMaster', rarity: 'epic', image: '/static/images/cards/scrollmaster.webp', count: 4 },
        { id: 17, name: 'PartyLeader', rarity: 'epic', image: '/static/images/cards/partyleader.webp', count: 2 },
        { id: 18, name: 'BuffBot', rarity: 'epic', image: '/static/images/cards/buffbot.webp', count: 3 },
        // Rare
        { id: 19, name: 'Newbie', rarity: 'rare', image: '/static/images/cards/newbie.webp', count: 5 },
        { id: 20, name: 'Grinder', rarity: 'rare', image: '/static/images/cards/grinder.webp', count: 4 },
        { id: 21, name: 'Potion Addict', rarity: 'rare', image: '/static/images/cards/potionaddict.webp', count: 6 },
        // Common
        { id: 22, name: 'Slime', rarity: 'common', image: '/static/images/cards/slime.webp', count: 10 },
        { id: 23, name: 'Mushroom', rarity: 'common', image: '/static/images/cards/mushroom.webp', count: 8 },
        { id: 24, name: 'Snail', rarity: 'common', image: '/static/images/cards/snail.webp', count: 12 },
    ];
    
    // Sample transactions
    const SAMPLE_TX = [
        { type: 'pull', title: 'Card Pull x10', time: '2 min ago', amount: '-1,000', icon: '🎴' },
        { type: 'reward', title: 'Daily Login Bonus', time: '1 hour ago', amount: '+500', icon: '🎁' },
        { type: 'pull', title: 'Got Mythic: RegginA!', time: '1 hour ago', amount: '', icon: '✨' },
        { type: 'trade', title: 'Sold: EarlyBird x1', time: '3 hours ago', amount: '+2,500', icon: '💰' },
        { type: 'daily', title: 'Quest Complete', time: '5 hours ago', amount: '+100', icon: '✅' },
        { type: 'pull', title: 'Card Pull x1', time: '1 day ago', amount: '-100', icon: '🎴' },
        { type: 'reward', title: 'Achievement: Collector', time: '1 day ago', amount: '+1,000', icon: '🏆' },
        { type: 'trade', title: 'Bought: NinjaTL', time: '2 days ago', amount: '-15,000', icon: '🛒' },
    ];
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
            if (typeof NW_SOUNDS !== 'undefined') NW_SOUNDS.play('click');
        });
    });
    
    // Rarity filtering
    let currentRarity = 'all';
    document.querySelectorAll('.rarity-filter').forEach(filter => {
        filter.addEventListener('click', () => {
            document.querySelectorAll('.rarity-filter').forEach(f => f.classList.remove('active'));
            filter.classList.add('active');
            currentRarity = filter.dataset.rarity;
            renderCards();
            if (typeof NW_SOUNDS !== 'undefined') NW_SOUNDS.play('click');
        });
    });
    
    // Render cards
    function renderCards() {
        const grid = document.getElementById('cardsGrid');
        const filtered = currentRarity === 'all' 
            ? SAMPLE_CARDS 
            : SAMPLE_CARDS.filter(c => c.rarity === currentRarity);
        
        if (filtered.length === 0) {
            grid.innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;">
                    <div class="empty-state-icon">🃏</div>
                    <div class="empty-state-text">No ${currentRarity} cards yet</div>
                </div>
            `;
            return;
        }
        
        grid.innerHTML = filtered.map(card => `
            <div class="card-item ${card.rarity}" onclick="viewCard(${card.id})">
                <img src="${card.image}" alt="${card.name}" onerror="this.src='/static/images/cards/placeholder.webp'">
                <div class="card-name">${card.name}</div>
                ${card.count > 1 ? `<div class="card-count">x${card.count}</div>` : ''}
            </div>
        `).join('');
    }
    
    // Render transactions
    function renderTransactions() {
        const list = document.getElementById('txList');
        
        if (SAMPLE_TX.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📜</div>
                    <div class="empty-state-text">No transactions yet</div>
                </div>
            `;
            return;
        }
        
        list.innerHTML = SAMPLE_TX.map(tx => `
            <div class="tx-item">
                <div class="tx-icon ${tx.type}">${tx.icon}</div>
                <div class="tx-info">
                    <div class="tx-title">${tx.title}</div>
                    <div class="tx-time">${tx.time}</div>
                </div>
                ${tx.amount ? `<div class="tx-amount ${tx.amount.startsWith('+') ? 'positive' : 'negative'}">${tx.amount}</div>` : ''}
            </div>
        `).join('');
    }
    
    // View card detail (placeholder)
    function viewCard(id) {
        const card = SAMPLE_CARDS.find(c => c.id === id);
        if (card && typeof NW_SOUNDS !== 'undefined') {
            NW_SOUNDS.play('flip');
        }
        // Could open a modal here
        console.log('View card:', card);
    }
    
    // Load from localStorage if available
    function loadWalletData() {
        try {
            const saved = localStorage.getItem('nw_wallet');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.meso) document.getElementById('mesoBalance').textContent = data.meso.toLocaleString();
                if (data.jade) document.getElementById('jadeBalance').textContent = data.jade.toLocaleString();
                if (data.crystal) document.getElementById('crystalBalance').textContent = data.crystal.toLocaleString();
                if (data.log) document.getElementById('logBalance').textContent = data.log.toLocaleString();
            }
        } catch (e) {}
    }
    
    // Init
    document.addEventListener('DOMContentLoaded', () => {
        loadWalletData();
        renderCards();
        renderTransactions();
    });
    </script>
</body>
</html>
