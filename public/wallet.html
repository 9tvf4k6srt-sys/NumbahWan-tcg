<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | NumbahWan</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="/static/nw-wallet.js"></script>
    <script src="/static/nw-economy.js"></script>
    <script src="/static/nw-sounds.js" defer></script>
    <script src="/static/nw-guide.js" defer></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --card-hover: #1a1a25;
            --border: #2a2a35;
            --text: #ffffff;
            --text-dim: #888;
            --primary: #ff6b00;
            --diamond: #00ffff;
            --gold: #ffd700;
            --iron: #94a3b8;
            --stone: #00ff88;
            --wood: #c97f3d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        
        .nw-bottom-bar { display: none !important; }
        body.nw-bottom-bar-active { padding-bottom: 100px !important; }
        
        .header {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            z-index: 100;
        }
        .header-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 18px; font-weight: 700; }
        .back-btn {
            width: 36px; height: 36px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .guest-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            background: var(--card);
            padding: 6px 10px;
            border-radius: 6px;
        }
        .guest-id.gm {
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            color: #000;
            font-weight: 600;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Currency Cards */
        .currency-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .currency-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .currency-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .currency-card.expanded {
            border-color: var(--primary);
        }
        .currency-card.diamond { border-left: 3px solid var(--diamond); }
        .currency-card.gold { border-left: 3px solid var(--gold); }
        .currency-card.iron { border-left: 3px solid var(--iron); }
        .currency-card.stone { border-left: 3px solid var(--stone); }
        .currency-card.wood { 
            border-left: 3px solid var(--wood);
            background: linear-gradient(135deg, rgba(201, 127, 61, 0.1), var(--card));
        }
        
        .currency-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .currency-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(255,255,255,0.05);
        }
        .currency-info { flex: 1; }
        .currency-name {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .currency-tier {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            text-transform: uppercase;
        }
        .currency-tier.premium { background: rgba(0,255,255,0.2); color: var(--diamond); }
        .currency-tier.legendary { background: rgba(201,127,61,0.3); color: var(--wood); }
        .currency-desc {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .currency-balance {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            text-align: right;
        }
        .currency-balance.diamond { color: var(--diamond); }
        .currency-balance.gold { color: var(--gold); }
        .currency-balance.iron { color: var(--iron); }
        .currency-balance.stone { color: var(--stone); }
        .currency-balance.wood { color: var(--wood); }
        
        /* Expanded Details */
        .currency-details {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .currency-card.expanded .currency-details {
            display: block;
            animation: slideDown 0.2s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .detail-section {
            margin-bottom: 14px;
        }
        .detail-title {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .detail-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        .detail-item .action { color: var(--text); }
        .detail-item .cost {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }
        .detail-item .note {
            font-size: 10px;
            color: var(--text-dim);
            margin-left: 4px;
        }
        
        .earn-tag {
            display: inline-block;
            font-size: 10px;
            padding: 4px 8px;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border-radius: 6px;
            margin: 2px;
        }
        
        /* Quick Actions */
        .section-title {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 24px 0 12px;
        }
        
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .quick-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
        }
        .quick-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .quick-icon { font-size: 28px; margin-bottom: 8px; }
        .quick-label { font-size: 13px; font-weight: 600; }
        .quick-sub { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
        
        /* Daily Rewards Preview */
        .daily-preview {
            background: linear-gradient(135deg, var(--card), rgba(255,107,0,0.1));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
        }
        .daily-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .daily-title {
            font-size: 14px;
            font-weight: 600;
        }
        .daily-streak {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
        }
        .daily-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .daily-day {
            text-align: center;
            padding: 8px 4px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 10px;
        }
        .daily-day.claimed {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
        }
        .daily-day.current {
            background: rgba(255, 107, 0, 0.2);
            border: 1px solid var(--primary);
        }
        .daily-day .day-num { font-weight: 600; margin-bottom: 4px; }
        .daily-day .day-reward { font-size: 14px; }
        .daily-day.day7 {
            background: linear-gradient(135deg, rgba(201,127,61,0.3), rgba(0,0,0,0.3));
        }
        
        /* Claim Button */
        .claim-btn {
            width: 100%;
            padding: 14px;
            margin-top: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            animation: claimPulse 2s infinite;
        }
        .claim-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
        }
        .claim-btn:disabled {
            background: var(--card-hover);
            color: var(--text-dim);
            cursor: not-allowed;
            animation: none;
        }
        @keyframes claimPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        }
        
        .next-reward-timer {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .next-reward-timer span {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            font-weight: 600;
        }
        
        /* Achievements */
        .achievements-preview {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
        }
        .achievement-progress {
            margin-bottom: 14px;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
            display: block;
        }
        .progress-bar-bg {
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #ffd700);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }
        .achievement-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .achievement-item.unlocked {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
        }
        .achievement-item.locked {
            opacity: 0.5;
        }
        .achievement-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }
        .achievement-name {
            font-size: 10px;
            font-weight: 600;
            text-align: center;
            color: var(--text);
        }
        .achievement-item.locked .achievement-icon {
            filter: grayscale(1);
        }
        
        /* Reward popup */
        .reward-popup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .reward-popup.show {
            opacity: 1;
            visibility: visible;
        }
        .reward-content {
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 320px;
            transform: scale(0.8);
            transition: transform 0.3s;
        }
        .reward-popup.show .reward-content {
            transform: scale(1);
        }
        .reward-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .reward-label {
            color: var(--primary);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .reward-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .reward-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }
        .reward-item.wood { color: var(--wood); background: rgba(201, 127, 61, 0.2); }
        .reward-item.diamond { color: var(--diamond); }
        .reward-item.gold { color: var(--gold); }
        .reward-item.iron { color: var(--iron); }
        .reward-item.stone { color: var(--stone); }
        .reward-close {
            padding: 12px 30px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        
        /* GM Section */
        .gm-section {
            margin-top: 20px;
            padding: 16px;
            background: var(--card);
            border: 1px dashed var(--border);
            border-radius: 14px;
        }
        .gm-section.active {
            border-color: var(--gold);
            border-style: solid;
            background: linear-gradient(135deg, rgba(255,215,0,0.1), var(--card));
        }
        .gm-title {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        .gm-input-row { display: flex; gap: 8px; }
        .gm-input {
            flex: 1;
            padding: 10px 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        .gm-btn {
            padding: 10px 16px;
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
        }
        .gm-btn.deactivate {
            background: var(--card-hover);
            color: var(--text-dim);
        }
        
        /* Footer */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .footer-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
        }
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 10px;
        }
        .footer-item.active { color: var(--primary); }
        .footer-icon { font-size: 20px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="back-btn">←</a>
            <h1>💰 Wallet</h1>
            <div class="guest-id" id="guestId">Loading...</div>
        </div>
    </header>
    
    <div class="container">
        <!-- Currency Cards -->
        <div class="currency-grid" id="currencyGrid"></div>
        
        <!-- Daily Rewards - THE HOOK! -->
        <div class="daily-preview" id="dailyRewardsSection">
            <div class="daily-header">
                <div class="daily-title">📅 Daily Rewards</div>
                <div class="daily-streak" id="dailyStreak">Day 1/7</div>
            </div>
            <div class="daily-grid" id="dailyGrid"></div>
            <button class="claim-btn" id="claimBtn" onclick="claimDailyReward()">
                🎁 Claim Today's Reward!
            </button>
            <div class="next-reward-timer" id="nextRewardTimer" style="display: none;">
                Next reward in: <span id="timerDisplay">--:--:--</span>
            </div>
        </div>
        
        <!-- Achievements Section -->
        <div class="section-title">🏆 Achievements</div>
        <div class="achievements-preview" id="achievementsPreview">
            <div class="achievement-progress">
                <span class="progress-text" id="achievementText">0/0 Unlocked</span>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="achievementBar" style="width: 0%"></div>
                </div>
            </div>
            <div class="achievement-grid" id="achievementGrid"></div>
        </div>
        
        <!-- Quick Actions -->
        <div class="section-title">Quick Actions</div>
        <div class="quick-grid">
            <a href="/forge" class="quick-card">
                <div class="quick-icon">🔮</div>
                <div class="quick-label">Forge</div>
                <div class="quick-sub">Pull cards</div>
            </a>
            <a href="/merch" class="quick-card">
                <div class="quick-icon">👕</div>
                <div class="quick-label">Merch</div>
                <div class="quick-sub">Spend currency</div>
            </a>
            <a href="/market" class="quick-card">
                <div class="quick-icon">🛒</div>
                <div class="quick-label">Market</div>
                <div class="quick-sub">Trade cards</div>
            </a>
            <a href="/tcg" class="quick-card">
                <div class="quick-icon">🃏</div>
                <div class="quick-label">Collection</div>
                <div class="quick-sub">View cards</div>
            </a>
        </div>
        
        <!-- GM Section -->
        <div class="gm-section" id="gmSection">
            <div class="gm-title">👑 Game Master Mode</div>
            <div class="gm-input-row" id="gmActivateRow">
                <input type="password" class="gm-input" id="gmCode" placeholder="Enter GM code...">
                <button class="gm-btn" onclick="activateGM()">Activate</button>
            </div>
            <div class="gm-input-row" id="gmDeactivateRow" style="display: none;">
                <button class="gm-btn deactivate" onclick="deactivateGM()" style="width: 100%;">Deactivate GM Mode</button>
            </div>
        </div>
    </div>
    
    <nav class="footer-nav">
        <div class="footer-inner">
            <a href="/" class="footer-item"><span class="footer-icon">🏠</span>Home</a>
            <a href="/forge" class="footer-item"><span class="footer-icon">🔮</span>Forge</a>
            <a href="/wallet" class="footer-item active"><span class="footer-icon">💰</span>Wallet</a>
            <a href="/merch" class="footer-item"><span class="footer-icon">👕</span>Merch</a>
        </div>
    </nav>

    <script>
    function formatNum(n) {
        if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n/1000).toFixed(1) + 'K';
        return n.toLocaleString();
    }
    
    function renderCurrencies() {
        const grid = document.getElementById('currencyGrid');
        const balances = NW_WALLET.getAllBalances();
        const isGM = NW_WALLET.isGMMode();
        
        const order = ['diamond', 'gold', 'iron', 'stone', 'wood'];
        
        grid.innerHTML = order.map(id => {
            const c = NW_ECONOMY.currencies[id];
            const bal = balances[id] || 0;
            
            const usesHtml = c.uses.map(u => `
                <div class="detail-item">
                    <span class="action">${u.action}</span>
                    <span class="cost">${u.cost}${u.note ? `<span class="note">${u.note}</span>` : ''}</span>
                </div>
            `).join('');
            
            const earnHtml = c.howToEarn.map(e => `<span class="earn-tag">${e}</span>`).join('');
            
            return `
                <div class="currency-card ${id}" onclick="toggleCurrency(this)">
                    <div class="currency-header">
                        <div class="currency-icon">${c.icon}</div>
                        <div class="currency-info">
                            <div class="currency-name">
                                ${c.name}
                                <span class="currency-tier ${c.tier}">${c.tier}</span>
                            </div>
                            <div class="currency-desc">${c.description}</div>
                        </div>
                        <div class="currency-balance ${id}">${isGM ? '∞' : formatNum(bal)}</div>
                    </div>
                    <div class="currency-details">
                        <div class="detail-section">
                            <div class="detail-title">💰 What You Can Buy</div>
                            <div class="detail-list">${usesHtml}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-title">⭐ How To Earn</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 4px;">${earnHtml}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function toggleCurrency(el) {
        el.classList.toggle('expanded');
        if (typeof NW_SOUNDS !== 'undefined') NW_SOUNDS.play('click');
    }
    
    function renderDailyRewards() {
        const grid = document.getElementById('dailyGrid');
        const dailyState = NW_WALLET.getDailyLoginState();
        const canClaim = NW_WALLET.canClaimDailyReward();
        const streak = dailyState.currentStreak;
        const nextDay = (streak % 7) + 1;
        
        document.getElementById('dailyStreak').textContent = `Day ${streak}/7 • ${dailyState.totalDaysLoggedIn} total`;
        
        // Main reward icons per day
        const icons = ['🪨', '🪨', '⚙️', '💎', '💎', '💎', '🪵'];
        
        grid.innerHTML = NW_WALLET.DAILY_REWARDS.map((dayData, idx) => {
            const day = idx + 1;
            const isClaimed = day <= streak;
            const isCurrent = day === nextDay && canClaim;
            const isDay7 = day === 7;
            
            return `
                <div class="daily-day ${isClaimed ? 'claimed' : ''} ${isCurrent ? 'current' : ''} ${isDay7 ? 'day7' : ''}">
                    <div class="day-num">${day}</div>
                    <div class="day-reward">${icons[day-1]}</div>
                </div>
            `;
        }).join('');
        
        // Update claim button state
        const claimBtn = document.getElementById('claimBtn');
        const timerDiv = document.getElementById('nextRewardTimer');
        
        if (canClaim) {
            claimBtn.style.display = 'block';
            claimBtn.disabled = false;
            claimBtn.textContent = `🎁 Claim Day ${nextDay} Reward!`;
            timerDiv.style.display = 'none';
        } else {
            claimBtn.style.display = 'none';
            timerDiv.style.display = 'block';
            startTimer();
        }
    }
    
    function startTimer() {
        function updateTimer() {
            const time = NW_WALLET.getTimeUntilNextDaily();
            const display = document.getElementById('timerDisplay');
            if (display) {
                display.textContent = `${String(time.hours).padStart(2,'0')}:${String(time.minutes).padStart(2,'0')}:${String(time.seconds).padStart(2,'0')}`;
            }
        }
        updateTimer();
        setInterval(updateTimer, 1000);
    }
    
    function claimDailyReward() {
        const result = NW_WALLET.claimDailyReward();
        
        if (result.success) {
            if (typeof NW_SOUNDS !== 'undefined') {
                NW_SOUNDS.play(result.isDay7 ? 'legendary' : 'profit');
            }
            showRewardPopup(result);
            renderDailyRewards();
            renderCurrencies();
            renderAchievements();
        }
    }
    
    function showRewardPopup(result) {
        // Create popup HTML
        const popup = document.createElement('div');
        popup.className = 'reward-popup';
        popup.id = 'rewardPopup';
        
        const rewardItems = Object.entries(result.rewards).map(([currency, amount]) => {
            const icons = { diamond: '💎', gold: '🪙', iron: '⚙️', stone: '🪨', wood: '🪵' };
            return `<div class="reward-item ${currency}">${icons[currency]} +${amount}</div>`;
        }).join('');
        
        popup.innerHTML = `
            <div class="reward-content">
                <div class="reward-title">${result.label}</div>
                <div class="reward-label">Day ${result.day} Complete!</div>
                <div class="reward-items">${rewardItems}</div>
                ${result.isDay7 ? '<div style="color: var(--wood); font-weight: bold; margin-bottom: 12px;">🪵 You earned a Sacred Log!</div>' : ''}
                <button class="reward-close" onclick="closeRewardPopup()">Awesome!</button>
            </div>
        `;
        
        document.body.appendChild(popup);
        setTimeout(() => popup.classList.add('show'), 10);
    }
    
    function closeRewardPopup() {
        const popup = document.getElementById('rewardPopup');
        if (popup) {
            popup.classList.remove('show');
            setTimeout(() => popup.remove(), 300);
        }
    }
    
    function renderAchievements() {
        const achievements = NW_WALLET.getAllAchievements();
        const progress = NW_WALLET.getAchievementProgress();
        
        document.getElementById('achievementText').textContent = `${progress.unlocked}/${progress.total} Unlocked (${progress.percentage}%)`;
        document.getElementById('achievementBar').style.width = `${progress.percentage}%`;
        
        // Show recent/important achievements (max 6)
        const displayAchievements = achievements
            .filter(a => !a.hidden)
            .sort((a, b) => {
                if (a.unlocked && !b.unlocked) return -1;
                if (!a.unlocked && b.unlocked) return 1;
                return 0;
            })
            .slice(0, 6);
        
        document.getElementById('achievementGrid').innerHTML = displayAchievements.map(ach => `
            <div class="achievement-item ${ach.unlocked ? 'unlocked' : 'locked'}" title="${ach.desc}">
                <div class="achievement-icon">${ach.icon}</div>
                <div class="achievement-name">${ach.name}</div>
            </div>
        `).join('');
    }
    
    function updateUI() {
        const isGM = NW_WALLET.isGMMode();
        const guestEl = document.getElementById('guestId');
        
        if (isGM) {
            guestEl.textContent = '👑 GM';
            guestEl.classList.add('gm');
        } else {
            guestEl.textContent = NW_WALLET.getGuestId() || 'Guest';
            guestEl.classList.remove('gm');
        }
        
        const gmSection = document.getElementById('gmSection');
        document.getElementById('gmActivateRow').style.display = isGM ? 'none' : 'flex';
        document.getElementById('gmDeactivateRow').style.display = isGM ? 'flex' : 'none';
        gmSection.classList.toggle('active', isGM);
        
        renderCurrencies();
    }
    
    function activateGM() {
        const code = document.getElementById('gmCode').value;
        if (NW_WALLET.activateGM(code)) {
            updateUI();
            if (typeof NW_SOUNDS !== 'undefined') NW_SOUNDS.play('legendary');
        }
        document.getElementById('gmCode').value = '';
    }
    
    function deactivateGM() {
        NW_WALLET.deactivateGM();
        updateUI();
    }
    
    window.addEventListener('nw-wallet-ready', () => {
        updateUI();
        renderDailyRewards();
        renderAchievements();
        setInterval(updateUI, 2000);
    });
    
    // Listen for achievement unlocks
    window.addEventListener('nw-achievement-unlocked', (e) => {
        const { achievement, rewards } = e.detail;
        console.log('🏆 Achievement unlocked:', achievement.name);
        renderAchievements();
        renderCurrencies();
        if (typeof NW_SOUNDS !== 'undefined') NW_SOUNDS.play('profit');
    });
    </script>
</body>
</html>
