        html, body { overflow: hidden; height: 100%; touch-action: none; }

        .logo { font-family: var(--nw-font-serif), serif; font-size: clamp(14px, 4vw, 20px); font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .lang { display: flex; gap: 6px; background: rgba(255,255,255,0.1); padding: 4px; border-radius: 16px; }
        .lang button { padding: 5px 10px; border: none; background: transparent;

        .lang button.on { background: linear-gradient(135deg, #ff6b00, #ffd700); color: #000; font-weight: bold; }
        
        .carousel { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            perspective: 1500px; cursor: grab; overflow: hidden; }
        .carousel:active { cursor: grabbing; }
        
        .glow { position: fixed; top: 50%; left: 50%; width: 400px; height: 500px;
            transform: translate(-50%, -50%); pointer-events: none; filter: blur(60px);
            opacity: 0; transition: opacity 0.6s; z-index: 0; border-radius: 50%; }
        .glow.on { opacity: 1; }
        .glow.mythic { background: radial-gradient(ellipse, rgba(255,215,0,0.7) 0%, rgba(255,107,0,0.4) 40%, transparent 70%); }
        .glow.legendary { background: radial-gradient(ellipse, rgba(255,215,0,0.6) 0%, rgba(245,199,26,0.3) 40%, transparent 70%); }
        .glow.epic { background: radial-gradient(ellipse, rgba(147,112,219,0.6) 0%, rgba(138,43,226,0.3) 40%, transparent 70%); }
        .glow.rare { background: radial-gradient(ellipse, rgba(30,144,255,0.5) 0%, rgba(65,105,225,0.25) 40%, transparent 70%); }
        .glow.common { background: radial-gradient(ellipse, rgba(150,150,150,0.4) 0%, rgba(100,100,100,0.2) 40%, transparent 70%); }
        
        .card { position: absolute; left: 50%; top: 50%; width: var(--card-w); height: var(--card-h);
            margin-left: calc(var(--card-w) / -2); margin-top: calc(var(--card-h) / -2);
            border-radius: 14px; overflow: hidden; cursor: pointer;
            will-change: transform, opacity; backface-visibility: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); transition: box-shadow 0.3s; }
        .card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; border-radius: 14px; }
        .card .holo { position: absolute; inset: 0; border-radius: 14px;
            background: linear-gradient(125deg, transparent, rgba(255,0,128,0.15) 25%, rgba(0,255,255,0.15) 50%, rgba(255,255,0,0.15) 75%, transparent);
            mix-blend-mode: overlay; opacity: 0.6; pointer-events: none; }
        .card .shine { position: absolute; inset: 0; border-radius: 14px;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
            background-size: 300% 300%; background-position: 100% 100%;
            opacity: 0; pointer-events: none; }
        .card.active .shine { opacity: 1; animation: shimmer 2s ease-in-out infinite; }
        @keyframes shimmer { 0%, 100% { background-position: 100% 100%; } 50% { background-position: 0% 0%; } }
        
        .card.mythic.active { box-shadow: 0 0 80px rgba(255,215,0,0.8), 0 0 40px rgba(255,107,0,0.6), 0 8px 32px rgba(0,0,0,0.6); }
        .card.legendary.active { box-shadow: 0 0 60px rgba(255,215,0,0.6), 0 0 30px rgba(245,199,26,0.4), 0 8px 32px rgba(0,0,0,0.6); }
        .card.epic.active { box-shadow: 0 0 50px rgba(147,112,219,0.6), 0 0 25px rgba(138,43,226,0.4), 0 8px 32px rgba(0,0,0,0.6); }
        .card.rare.active { box-shadow: 0 0 40px rgba(30,144,255,0.5), 0 0 20px rgba(65,105,225,0.3), 0 8px 32px rgba(0,0,0,0.6); }
        .card.common.active { box-shadow: 0 0 30px rgba(150,150,150,0.4), 0 8px 32px rgba(0,0,0,0.6); }
        
        .ctr { position: fixed; top: 70px; right: 16px; font-size: 13px; color: rgba(255,255,255,0.5); z-index: 50; }
        
        .debug { position: fixed; top: 70px; left: 16px; font-size: 16px; font-family: monospace;
            color: #0f0; z-index: 999; background: rgba(0,0,0,0.9); padding: 10px 14px; border-radius: 8px;
            min-width: 200px; display: none; }
        
        .nav-wrap { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 100; align-items: center; }
        .nav-btn { width: 48px; height: 48px; border: 2px solid #ff6b00; border-radius: 50%;
            background: rgba(0,0,0,0.9); color: #fff; font-size: 22px;
            cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: #ff6b00; color: #000; }
        .nav-btn:active { transform: scale(0.9); background: #ff6b00; }
        .nav-btn.view { width: auto; padding: 0 20px; border-radius: 24px; font-size: 16px; font-weight: bold;
            background: linear-gradient(135deg, #ff6b00, #ffd700); color: #000; border: none; }
        
        .filters { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; z-index: 50; padding: 0 10px; max-width: 320px; }
        .filters button { padding: 6px 12px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.6);
            font-size: 13px; border-radius: 16px; cursor: pointer; text-transform: uppercase; }
        .filters button.on { background: rgba(255,107,0,0.4); border-color: #ff6b00; color: #fff; }
        
        .hint { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
            font-size: 16px; color: rgba(255,255,255,0.3); text-align: center; z-index: 50; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal.on { opacity: 1; visibility: visible; }
        .modal-inner { display: flex; flex-direction: column; align-items: center; gap: 16px;

            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .modal.on .modal-inner { transform: scale(1) rotateY(0); }
        .modal-card-wrap { perspective: 1200px; width: min(340px, 80vw); height: calc(min(340px, 80vw) * 1.4); touch-action: none; }
        .modal-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            border-radius: 18px; cursor: grab; transition: transform 0.1s ease-out; touch-action: none; }
        .modal-card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 18px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .modal-card-face img { width: 100%; height: 100%; object-fit: cover; }
        .modal-card-back { transform: rotateY(180deg); background: linear-gradient(135deg, #1a1a2e, #0a0a0f);

        .modal-card-back div { width: 85%; height: 85%; border: 2px solid rgba(255,107,0,0.4); border-radius: 12px;

        .desc { margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.3);

        .close { position: fixed; top: 16px; right: 16px; width: 44px; height: 44px;

        @media (max-width: 500px) { :root { --card-w: min(180px, 60vw); } .filters { bottom: 100px; } }
    </style>
</head>

const carousel = $('#carousel');
const debug = $('#debug');

function mod(n, m) { return ((n % m) + m) % m; }

// ========== RENDER ==========
let didDrag = false;
let totalDragDist = 0;

function render() {
    carousel.innerHTML = '';
    cards.forEach((c, i) => {
        const el = document.createElement('div');
        el.className = `card ${c.rarity}`;
        el.innerHTML = `<img src="/static/cards/${c.img}" alt="${c.name}" loading="lazy"><div class="holo"></div><div class="shine"></div>`;
        carousel.appendChild(el);
    });
    $('#tot').textContent = cards.length;
}

function draw() {
    const n = cards.length;
    const cardEls = $$('.card');
    
    cardEls.forEach((el, i) => {
        let d = i - pos;
        while (d > n/2) d -= n;
        while (d < -n/2) d += n;
        
        const x = d * CARD_GAP;
        const ad = Math.abs(d);
        const z = -ad * 50;
        const ry = d * -5;
        const sc = Math.max(0.55, 1 - ad * 0.09);
        const op = Math.max(0.15, 1 - ad * 0.13);
        
        el.style.transform = `translate3d(${x}px,0,${z}px) rotateY(${ry}deg) scale(${sc})`;
        el.style.opacity = op;
        el.style.zIndex = Math.round(50 - ad * 10);
        el.classList.toggle('active', ad < 0.4);
    });
    
    const idx = mod(Math.round(pos), n);
    $('#cur').textContent = idx + 1;
    
    const card = cards[idx];
    const glow = $('#glow');
    if (card) {
        glow.className = 'glow ' + card.rarity + (Math.abs(vel) < 0.05 ? ' on' : '');
    }
    
    debug.innerHTML = `vel: <b>${vel.toFixed(3)}</b><br>pos: ${pos.toFixed(2)}`;
}

// ========== PHYSICS ==========
function tick() {
    try {
        if (!dragging) {
            // Apply velocity
            pos += vel;
            vel *= 0.9;  // Friction
            
            // Snap to nearest card
            const target = Math.round(pos);
            const diff = target - pos;
            pos += diff * 0.3;  // Magnetic pull
            
            // Stop when close enough
            if (Math.abs(diff) < 0.01 && Math.abs(vel) < 0.01) {
                pos = target;
                vel = 0;
            }
        }
    } catch(e) {
        console.error('Physics error:', e);
    }
    
    draw();
    requestAnimationFrame(tick);
}

// ========== INPUT ==========
function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

function onDown(e) {
    dragging = true;
    didDrag = false;
    totalDragDist = 0;
    const x = getX(e);
    dragStartX = x;
    dragStartPos = pos;
    lastX = x;
    lastTime = performance.now();
    dragVelocity = 0;
    vel = 0;  // INSTANT STOP - touch to stop momentum
}

function onMove(e) {
    if (!dragging) return;
    
    const x = getX(e);
    const now = performance.now();
    
    // Move position 1:1 with drag (swap direction if needed)
    pos = dragStartPos - (x - dragStartX) / CARD_GAP;
    
    // Track total drag distance
    totalDragDist += Math.abs(x - lastX);
    if (totalDragDist > 15) {
        didDrag = true;
    }
    
    // Track velocity continuously during drag
    const dt = now - lastTime;
    if (dt > 5) {  // at least 5ms between samples
        const dx = x - lastX;
        const instantVel = dx / dt;  // pixels per ms
        
        // Smooth the velocity (30% old, 70% new)
        dragVelocity = dragVelocity * 0.3 + instantVel * 0.7;
        
        lastX = x;
        lastTime = now;
    }
}

function onUp() {
    if (!dragging) return;
    dragging = false;
    
    // Simple: just continue at the same speed you were dragging
    // dragVelocity is pixels/ms, convert to cards/frame
    // At 60fps, 1 frame = 16.67ms
    // So velocity in cards/frame = (pixels/ms * 16.67) / CARD_GAP
    // Reduced by half for less sensitivity
    vel = -(dragVelocity * 16.67 / CARD_GAP) * 0.5;
    
    // Clamp to reasonable max (1.5 cards per frame - easier to control)
    const MAX_VEL = 1.5;
    if (vel > MAX_VEL) vel = MAX_VEL;
    if (vel < -MAX_VEL) vel = -MAX_VEL;
}

// ========== KEYBOARD - single card steps ==========
document.addEventListener('keydown', e => {
    if ($('#modal').classList.contains('on')) return;
    
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        // Animate to previous card (no momentum, just smooth move)
        animateToCard(Math.round(pos) - 1);
        e.preventDefault();
    }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        // Animate to next card
        animateToCard(Math.round(pos) + 1);
        e.preventDefault();
    }
    if (e.key === 'Escape') closeModal();
});

// Smooth animation to specific card (for arrow keys)
let animating = false;
function animateToCard(targetIdx) {
    if (animating) return;
    animating = true;
    vel = 0; // kill any momentum
    
    const startPos = pos;
    const startTime = performance.now();
    const duration = 250; // ms
    
    function step(now) {
        const t = Math.min(1, (now - startTime) / duration);
        // Ease out cubic
        const ease = 1 - Math.pow(1 - t, 3);
        pos = startPos + (targetIdx - startPos) * ease;
        
        if (t < 1) {
            requestAnimationFrame(step);
        } else {
            pos = targetIdx;
            animating = false;
        }
    }
    requestAnimationFrame(step);
}

// ========== WHEEL - adds momentum ==========
carousel.addEventListener('wheel', e => {
    e.preventDefault();
    vel += e.deltaY * 0.015;  // stronger wheel response
    const MAX_VEL = 8;
    if (vel > MAX_VEL) vel = MAX_VEL;
    if (vel < -MAX_VEL) vel = -MAX_VEL;
}, { passive: false });

// ========== SETUP ==========
function setup() {
    carousel.addEventListener('touchstart', onDown, { passive: true });
    carousel.addEventListener('touchmove', onMove, { passive: true });
    carousel.addEventListener('touchend', onUp);
    carousel.addEventListener('touchcancel', onUp);
    
    carousel.addEventListener('mousedown', e => { e.preventDefault(); onDown(e); });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    
    $$('.filters button').forEach(btn => {
        btn.onclick = () => {
            $$('.filters button').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            cards = btn.dataset.f === 'all' ? [...DATA] : DATA.filter(c => c.rarity === btn.dataset.f);
            pos = 0; vel = 0;
            render();
        };
    });
    
    $$('.lang button').forEach(btn => {
        btn.onclick = () => {
            $$('.lang button').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            lang = btn.dataset.l;
            updateUILanguage();
        };
    });
    
    $('#close').onclick = closeModal;
    $('#modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };
    
    // Navigation buttons
    $('#btnLeft').onclick = () => animateToCard(Math.round(pos) - 1);
    $('#btnRight').onclick = () => animateToCard(Math.round(pos) + 1);
    $('#btnView').onclick = openCenteredCard;
    
    setupModal3D();
}

function openModal(i) {
    const c = cards[i];
    $('#mimg').src = `/static/cards/${c.img}`;
    
    // Get translated name or fallback to English
    const name = (lang !== 'en' && cardNames[lang] && cardNames[lang][c.id]) ? cardNames[lang][c.id] : c.name;
    $('#mtitle').textContent = name;
    
    // Translated type
    $('#mtype').textContent = i18n[lang][c.type] || c.type;
    
    // Translated rarity badge
    const rarityText = i18n[lang][c.rarity] || c.rarity.toUpperCase();
    $('#mrarity').textContent = rarityText;
    $('#mrarity').className = `badge ${c.rarity}`;
    
    $('#mcost').textContent = c.cost;
    $('#mstats').textContent = c.stats || '-';
    $('#srow').style.display = c.stats ? 'flex' : 'none';
    
    // Get translated description or fallback to English
    const desc = (lang !== 'en' && cardDescs[lang] && cardDescs[lang][c.id]) ? cardDescs[lang][c.id] : c.desc;
    $('#mdesc').textContent = desc;
    
    $('#modal').classList.add('on');
}

function closeModal() { $('#modal').classList.remove('on'); }

// Simple tilt effect - no complex 3D that crashes
function setupModal3D() {
    const mc = $('#mc');
    const wrap = $('.modal-card-wrap');
    
    // Mouse hover tilt only (simple, doesn't crash)
    wrap.addEventListener('mousemove', e => {
        const rect = wrap.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        mc.style.transform = `rotateY(${x * 20}deg) rotateX(${-y * 20}deg)`;
    });
    wrap.addEventListener('mouseleave', () => {
        mc.style.transform = '';
    });
}

// Prevent context menu on long press
document.addEventListener('contextmenu', e => e.preventDefault());

// View button opens modal for centered card
function openCenteredCard() {
    const idx = mod(Math.round(pos), cards.length);
    openModal(idx);
}

// Update all UI text based on current language
function updateUILanguage() {
    $('#hint').textContent = i18n[lang].hint;
    $('#ltType').textContent = i18n[lang].type;
    $('#ltRarity').textContent = i18n[lang].rarity;
    $('#ltCost').textContent = i18n[lang].cost;
    $('#ltStats').textContent = i18n[lang].stats;
    $('#viewText').textContent = i18n[lang].view;
    $('#guideLink').textContent = i18n[lang].guide;
    
    // Update filter buttons
    $('#fAll').textContent = i18n[lang].all;
    $('#fMythic').textContent = i18n[lang].mythic;
    $('#fLegendary').textContent = i18n[lang].legendary;
    $('#fEpic').textContent = i18n[lang].epic;
    $('#fRare').textContent = i18n[lang].rare;
    $('#fCommon').textContent = i18n[lang].common;
}

render();
setup();
tick();
updateUILanguage();
</script>
</body>
</html>
