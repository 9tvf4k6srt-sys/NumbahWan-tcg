<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>NumbahWan TCG | Rise of RegginA</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/nw-tokens.css">
    <link rel="stylesheet" href="/static/nw-utilities.css">
    <link rel="stylesheet" href="/static/nw-card-frames.css">
    <script src="/static/nw-icons-inline.js"></script>
    <script src="/static/nw-cards.js"></script>
    
    <style>
        :root { --card-w: min(320px, 75vw); --card-h: calc(var(--card-w) * 1.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
        html, body { overflow: hidden; height: 100%; touch-action: none; }
        body { font-family: var(--nw-font-display), sans-serif; background: #0a0a0f; color: #fff; }
        img { pointer-events: none; -webkit-user-drag: none; }
        
        .hdr { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 12px 16px;
            background: linear-gradient(to bottom, rgba(10,10,15,0.95), transparent);
            display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: var(--nw-font-serif), serif; font-size: clamp(14px, 4vw, 20px); font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .lang { display: flex; gap: 6px; background: rgba(255,255,255,0.1); padding: 4px; border-radius: 16px; }
        .lang button { padding: 5px 10px; border: none; background: transparent;
            color: rgba(255,255,255,0.5); font-size: 16px; border-radius: 12px; cursor: pointer; }
        .lang button.on { background: linear-gradient(135deg, #ff6b00, #ffd700); color: #000; font-weight: bold; }
        
        .carousel { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            perspective: 1500px; cursor: grab; overflow: hidden; }
        .carousel:active { cursor: grabbing; }
        
        .glow { position: fixed; top: 50%; left: 50%; width: 400px; height: 500px;
            transform: translate(-50%, -50%); pointer-events: none; filter: blur(60px);
            opacity: 0; transition: opacity 0.6s; z-index: 0; border-radius: 50%; }
        .glow.on { opacity: 1; }
        .glow.mythic { background: radial-gradient(ellipse, rgba(255,215,0,0.7) 0%, rgba(255,107,0,0.4) 40%, transparent 70%); }
        .glow.legendary { background: radial-gradient(ellipse, rgba(255,215,0,0.6) 0%, rgba(245,199,26,0.3) 40%, transparent 70%); }
        .glow.epic { background: radial-gradient(ellipse, rgba(147,112,219,0.6) 0%, rgba(138,43,226,0.3) 40%, transparent 70%); }
        .glow.rare { background: radial-gradient(ellipse, rgba(30,144,255,0.5) 0%, rgba(65,105,225,0.25) 40%, transparent 70%); }
        .glow.uncommon { background: radial-gradient(ellipse, rgba(34,197,94,0.5) 0%, rgba(22,163,74,0.25) 40%, transparent 70%); }
        .glow.common { background: radial-gradient(ellipse, rgba(150,150,150,0.4) 0%, rgba(100,100,100,0.2) 40%, transparent 70%); }
        
        /* Card carousel positioning */
        .card { position: absolute; left: 50%; top: 50%; width: var(--card-w); height: var(--card-h);
            margin-left: calc(var(--card-w) / -2); margin-top: calc(var(--card-h) / -2);
            will-change: transform, opacity; backface-visibility: hidden;
            border-radius: 16px; overflow: hidden; }
        .card .card-art { width: 100%; height: 100%; object-fit: cover; pointer-events: none;
            border-radius: 12px; display: block; }
        
        /* Card frame - simple border approach with rounded corners */
        .card-frame {
            position: absolute; inset: 0; pointer-events: none; z-index: 5;
            border-radius: 16px;
        }
        
        /* Mythic frame - fiery orange/gold */
        .card.mythic .card-frame {
            border: 5px solid #ff6b00;
            box-shadow: inset 0 0 20px rgba(255,107,0,0.6), 0 0 25px rgba(255,107,0,0.5);
            animation: mythic-frame-pulse 2s ease-in-out infinite;
        }
        .card.mythic .card-frame::before {
            content: ''; position: absolute; inset: -5px; border-radius: 18px;
            background: linear-gradient(135deg, #ff6b00, #ffd700, #ff6b00, #dc2626);
            z-index: -1; animation: mythic-rotate 3s linear infinite;
        }
        @keyframes mythic-frame-pulse {
            0%, 100% { box-shadow: inset 0 0 20px rgba(255,107,0,0.6), 0 0 25px rgba(255,107,0,0.5); }
            50% { box-shadow: inset 0 0 30px rgba(255,107,0,0.8), 0 0 40px rgba(255,107,0,0.7); }
        }
        @keyframes mythic-rotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(30deg); }
        }
        
        /* Legendary frame - royal gold */
        .card.legendary .card-frame {
            border: 4px solid #fbbf24;
            box-shadow: inset 0 0 15px rgba(251,191,36,0.5), 0 0 20px rgba(251,191,36,0.4);
            animation: legendary-shimmer 3s ease-in-out infinite;
        }
        @keyframes legendary-shimmer {
            0%, 100% { border-color: #fbbf24; }
            50% { border-color: #fde68a; }
        }
        
        /* Epic frame - arcane purple */
        .card.epic .card-frame {
            border: 4px solid #a855f7;
            box-shadow: inset 0 0 12px rgba(168,85,247,0.5), 0 0 15px rgba(168,85,247,0.4);
        }
        
        /* Rare frame - crystal blue */
        .card.rare .card-frame {
            border: 3px solid #3b82f6;
            box-shadow: inset 0 0 10px rgba(59,130,246,0.4), 0 0 12px rgba(59,130,246,0.3);
        }
        
        /* Uncommon frame - forest green */
        .card.uncommon .card-frame {
            border: 3px solid #22c55e;
            box-shadow: inset 0 0 8px rgba(34,197,94,0.4);
        }
        
        /* Common frame - steel grey */
        .card.common .card-frame {
            border: 2px solid #71717a;
        }
        
        /* Card name is now shown in the BIG NAME BANNER above the carousel */
        
        /* Rarity indicator gem - only visible on active card */
        .card-rarity-gem {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900;
            box-shadow: 0 3px 10px rgba(0,0,0,0.6);
            opacity: 0; transform: scale(0.5);
            transition: opacity 0.3s, transform 0.3s;
        }
        .card.active .card-rarity-gem { opacity: 1; transform: scale(1); }
        
        .card.mythic .card-rarity-gem { 
            background: linear-gradient(135deg, #ff6b00, #dc2626); 
            border: 2px solid #fbbf24; color: #fff;
        }
        @keyframes gem-pulse {
            0%, 100% { box-shadow: 0 3px 10px rgba(0,0,0,0.6), 0 0 15px rgba(255,107,0,0.6); }
            50% { box-shadow: 0 3px 15px rgba(0,0,0,0.6), 0 0 25px rgba(255,107,0,0.8); }
        }
        .card.active.mythic .card-rarity-gem { animation: gem-pulse 1.5s ease-in-out infinite; }
        .card.legendary .card-rarity-gem { 
            background: linear-gradient(135deg, #fbbf24, #d97706); 
            border: 2px solid #fde68a; color: #1c1917;
        }
        .card.epic .card-rarity-gem { 
            background: linear-gradient(135deg, #a855f7, #7c3aed); 
            border: 2px solid #c084fc; color: #fff;
        }
        .card.rare .card-rarity-gem { 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            border: 2px solid #60a5fa; color: #fff;
        }
        .card.uncommon .card-rarity-gem { 
            background: linear-gradient(135deg, #22c55e, #059669); 
            border: 2px solid #4ade80; color: #fff;
        }
        .card.common .card-rarity-gem { 
            background: linear-gradient(135deg, #71717a, #52525b); 
            border: 2px solid #a1a1aa; color: #fff;
        }
        
        /* Rarity gem icons */
        .gem-icon { font-style: normal; }
        .card.mythic .gem-icon::before { content: '✦'; }
        .card.legendary .gem-icon::before { content: '♔'; }
        .card.epic .gem-icon::before { content: '◆'; }
        .card.rare .gem-icon::before { content: '★'; }
        .card.uncommon .gem-icon::before { content: '●'; }
        .card.common .gem-icon::before { content: '○'; }
        
        /* Holo effect for active cards */
        .card .holo { position: absolute; inset: 0; border-radius: 14px;
            background: linear-gradient(125deg, transparent, rgba(255,0,128,0.15) 25%, rgba(0,255,255,0.15) 50%, rgba(255,255,0,0.15) 75%, transparent);
            mix-blend-mode: overlay; opacity: 0; pointer-events: none; z-index: 6; }
        .card.active .holo { opacity: 0.6; }
        
        /* Shine effect */
        .card .shine { position: absolute; inset: 0; border-radius: 14px;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
            background-size: 300% 300%; background-position: 100% 100%;
            opacity: 0; pointer-events: none; z-index: 7; }
        .card.active .shine { opacity: 1; animation: shimmer 2s ease-in-out infinite; }
        @keyframes shimmer { 0%, 100% { background-position: 100% 100%; } 50% { background-position: 0% 0%; } }
        
        /* Active card glow intensification */
        .card.mythic.active { box-shadow: 0 0 80px rgba(255,215,0,0.8), 0 0 40px rgba(255,107,0,0.6), 0 8px 32px rgba(0,0,0,0.6); }
        .card.legendary.active { box-shadow: 0 0 60px rgba(255,215,0,0.6), 0 0 30px rgba(245,199,26,0.4), 0 8px 32px rgba(0,0,0,0.6); }
        .card.epic.active { box-shadow: 0 0 50px rgba(147,112,219,0.6), 0 0 25px rgba(138,43,226,0.4), 0 8px 32px rgba(0,0,0,0.6); }
        .card.rare.active { box-shadow: 0 0 40px rgba(30,144,255,0.5), 0 0 20px rgba(65,105,225,0.3), 0 8px 32px rgba(0,0,0,0.6); }
        .card.uncommon.active { box-shadow: 0 0 35px rgba(34,197,94,0.5), 0 0 18px rgba(22,163,74,0.3), 0 8px 32px rgba(0,0,0,0.6); }
        .card.common.active { box-shadow: 0 0 30px rgba(150,150,150,0.4), 0 8px 32px rgba(0,0,0,0.6); }
        
        /* Note: name badge and rarity gem visibility already handled above */
        
        .ctr { position: fixed; top: 70px; right: 16px; font-size: 13px; color: rgba(255,255,255,0.5); z-index: 50; }
        
        /* BIG NAME BANNER - Shows current card name prominently */
        .name-banner {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 80;
            padding: 12px 24px;
            background: rgba(0,0,0,0.8);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.1);
            min-width: 280px; max-width: 90vw;
        }
        .name-banner-rarity {
            font-family: var(--nw-font-display), sans-serif;
            font-size: 11px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 4px;
            padding: 2px 12px; border-radius: 8px;
            display: inline-block;
        }
        .name-banner-rarity.mythic { background: linear-gradient(135deg, #ff6b00, #dc2626); color: #fff; }
        .name-banner-rarity.legendary { background: linear-gradient(135deg, #fbbf24, #d97706); color: #1c1917; }
        .name-banner-rarity.epic { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; }
        .name-banner-rarity.rare { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; }
        .name-banner-rarity.uncommon { background: linear-gradient(135deg, #22c55e, #059669); color: #fff; }
        .name-banner-rarity.common { background: linear-gradient(135deg, #71717a, #52525b); color: #fff; }
        
        .name-banner-name {
            font-family: var(--nw-font-display), sans-serif;
            font-size: clamp(16px, 4vw, 22px); font-weight: 800;
            color: #fff; text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .name-banner.mythic { border-color: #ff6b00; box-shadow: 0 0 30px rgba(255,107,0,0.4); }
        .name-banner.legendary { border-color: #fbbf24; box-shadow: 0 0 25px rgba(251,191,36,0.3); }
        .name-banner.epic { border-color: #a855f7; box-shadow: 0 0 20px rgba(168,85,247,0.3); }
        .name-banner.rare { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .name-banner.uncommon { border-color: #22c55e; }
        .name-banner.common { border-color: #71717a; }
        
        .debug { position: fixed; top: 70px; left: 16px; font-size: 16px; font-family: monospace;
            color: #0f0; z-index: 999; background: rgba(0,0,0,0.9); padding: 10px 14px; border-radius: 8px;
            min-width: 200px; display: none; }
        
        .nav-wrap { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 100; align-items: center; }
        .nav-btn { width: 48px; height: 48px; border: 2px solid #ff6b00; border-radius: 50%;
            background: rgba(0,0,0,0.9); color: #fff; font-size: 22px;
            cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: #ff6b00; color: #000; }
        .nav-btn:active { transform: scale(0.9); background: #ff6b00; }
        .nav-btn.view { width: auto; padding: 0 20px; border-radius: 24px; font-size: 16px; font-weight: bold;
            background: linear-gradient(135deg, #ff6b00, #ffd700); color: #000; border: none; }
        
        .filters { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; z-index: 50; padding: 0 10px; max-width: 320px; }
        .filters button { padding: 6px 12px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.6);
            font-size: 13px; border-radius: 16px; cursor: pointer; text-transform: uppercase; }
        .filters button.on { background: rgba(255,107,0,0.4); border-color: #ff6b00; color: #fff; }
        
        .hint { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
            font-size: 16px; color: rgba(255,255,255,0.3); text-align: center; z-index: 50; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal.on { opacity: 1; visibility: visible; }
        .modal-inner { display: flex; flex-direction: column; align-items: center; gap: 16px;
            max-width: 90vw; padding: 16px; transform: scale(0.9) rotateY(-15deg);
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .modal.on .modal-inner { transform: scale(1) rotateY(0); }
        .modal-card-wrap { perspective: 1200px; width: min(340px, 80vw); height: calc(min(340px, 80vw) * 1.4); touch-action: none; }
        .modal-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            border-radius: 18px; cursor: grab; transition: transform 0.1s ease-out; touch-action: none; }
        .modal-card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 18px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .modal-card-face img { width: 100%; height: 100%; object-fit: cover; }
        .modal-card-back { transform: rotateY(180deg); background: linear-gradient(135deg, #1a1a2e, #0a0a0f);
            display: flex; align-items: center; justify-content: center; }
        .modal-card-back div { width: 85%; height: 85%; border: 2px solid rgba(255,107,0,0.4); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--nw-font-serif), serif; font-size: 18px; font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .modal-holo { position: absolute; inset: 0; border-radius: 18px; pointer-events: none;
            opacity: 0.5; mix-blend-mode: overlay;
            background: linear-gradient(var(--ha, 125deg), transparent, rgba(255,0,128,0.3) 25%, rgba(0,255,255,0.3) 50%, rgba(255,255,0,0.3) 75%, transparent); }
        .info { background: rgba(15,15,25,0.95); border: 1px solid rgba(255,107,0,0.3);
            border-radius: 12px; padding: 16px; width: min(340px, 80vw); }
        .info h2 { font-family: var(--nw-font-serif), serif; font-size: clamp(16px, 4vw, 20px);
            background: linear-gradient(135deg, #ffd700, #ff6b00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 15px; }
        .info-row:last-child { border: none; }
        .info-row span:first-child { color: rgba(255,255,255,0.5); }
        .info-row span:last-child { color: #fff; font-weight: bold; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .badge.mythic { background: linear-gradient(135deg, #ffd700, #ff6b00); color: #000; }
        .badge.legendary { background: linear-gradient(135deg, #ffd700, #f5c71a); color: #000; }
        .badge.epic { background: linear-gradient(135deg, #9370db, #8a2be2); color: #fff; }
        .badge.rare { background: linear-gradient(135deg, #1e90ff, #4169e1); color: #fff; }
        .badge.uncommon { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
        .badge.common { background: rgba(128,128,128,0.5); color: #fff; }
        .desc { margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.3);
            border-radius: 8px; font-size: 15px; line-height: 1.5; color: rgba(255,255,255,0.8); }
        .close { position: fixed; top: 16px; right: 16px; width: 44px; height: 44px;
            border: none; background: rgba(255,255,255,0.1); color: #fff;
            font-size: 22px; border-radius: 50%; cursor: pointer; z-index: 201; }
        
        @media (max-width: 500px) { :root { --card-w: min(180px, 60vw); } .filters { bottom: 100px; } }
    </style>
</head>
<body>
    <!-- Captivating Background -->
    <div class="nw-bg-captivating">
        <div class="bg-image"></div>
        <div class="bg-gradient"></div>
        <div class="bg-particles"></div>
        <div class="bg-grid"></div>
    </div>
    <header class="hdr">
        <a href="/" class="logo" style="text-decoration:none;"><i class="fas fa-images" style="margin-right:8px;"></i>NumbahWan TCG</a>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/tcg" style="padding:6px 12px;background:rgba(255,107,0,0.3);border:1px solid #ff6b00;border-radius:12px;color:#fff;font-size:11px;text-decoration:none;"><i class="fas fa-trophy"></i> Hub</a>
            <a href="/guide" id="guideLink" style="padding:6px 12px;background:rgba(59,130,246,0.3);border:1px solid #3b82f6;border-radius:12px;color:#fff;font-size:11px;text-decoration:none;"><i class="fas fa-book"></i> Guide</a>
            <div class="lang">
                <button class="on" data-l="en">EN</button>
                <button data-l="zh">中文</button>
                <button data-l="th">ไทย</button>
            </div>
        </div>
    </header>
    
    <div class="ctr"><span id="cur">1</span> / <span id="tot">50</span></div>
    <div class="debug" id="debug">vel: 0</div>
    
    <!-- BIG NAME BANNER - Shows current card name while scrolling -->
    <div class="name-banner" id="nameBanner">
        <div class="name-banner-rarity" id="nameBannerRarity">MYTHIC</div>
        <div class="name-banner-name" id="nameBannerName">RegginA, The Eternal Flame</div>
    </div>
    
    <div class="glow" id="glow"></div>
    <div class="carousel" id="carousel"></div>
    
    <div class="nav-wrap">
        <button class="nav-btn" id="btnLeft">←</button>
        <button class="nav-btn view" id="btnView"><span id="viewText">VIEW</span></button>
        <button class="nav-btn" id="btnRight">→</button>
    </div>
    
    <div class="filters">
        <button class="on" data-f="all" id="fAll">ALL</button>
        <button data-f="mythic" id="fMythic">MYTHIC</button>
        <button data-f="legendary" id="fLegendary">LEGENDARY</button>
        <button data-f="epic" id="fEpic">EPIC</button>
        <button data-f="rare" id="fRare">RARE</button>
        <button data-f="uncommon" id="fUncommon">UNCOMMON</button>
        <button data-f="common" id="fCommon">COMMON</button>
    </div>
    
    <div class="hint" id="hint">Swipe to browse • Tap VIEW for details</div>
    
    <div class="modal" id="modal">
        <button class="close" id="close">×</button>
        <div class="modal-inner">
            <div class="modal-card-wrap">
                <div class="modal-card" id="mc">
                    <div class="modal-card-face"><img id="mimg" src=""><div class="modal-holo" id="mholo"></div></div>
                    <div class="modal-card-face modal-card-back"><div>NumbahWan<br>TCG</div></div>
                </div>
            </div>
            <div class="info">
                <h2 id="mtitle">Card</h2>
                <div class="info-row"><span id="ltType">Type</span><span id="mtype">Hero</span></div>
                <div class="info-row"><span id="ltRarity">Rarity</span><span><span class="badge" id="mrarity">MYTHIC</span></span></div>
                <div class="info-row"><span id="ltCost">Mana</span><span id="mcost">8</span></div>
                <div class="info-row" id="srow"><span id="ltStats">Stats</span><span id="mstats">ATK 9</span></div>
                <div class="desc" id="mdesc">Description</div>
            </div>
        </div>
    </div>

const IMAGE_FULL_PATH = '/static/images/cards/'; // Full resolution for modal

// Convert image filename to WebP thumbnail
function getThumbUrl(img) {
    return IMAGE_BASE_PATH + img.replace(/\.(png|jpg|jpeg)$/i, '.webp');
}
// Get full resolution image URL
function getFullUrl(img) {
    return IMAGE_FULL_PATH + img;
}

// Load cards from JSON
async function loadCardsData() {
    try {
        const response = await fetch('/static/data/cards-v2.json?v=' + Date.now());
        const data = await response.json();
        DATA = data.cards.map(c => ({
            id: c.id,
            name: c.name,
            type: c.category || 'member',
            rarity: c.rarity,
            cost: getRarityCost(c.rarity),
            stats: getRarityStats(c.rarity, c.role),
            desc: c.description,
            img: c.img,
            role: c.role,
            category: c.category
        }));
        console.log(`Loaded ${DATA.length} cards from cards-v2.json`);
        return DATA;
    } catch (error) {
        console.error('Failed to load cards:', error);
        return [];
    }
}

// Generate stats based on rarity
function getRarityCost(rarity) {
    const costs = { mythic: 10, legendary: 8, epic: 6, rare: 4, uncommon: 3, common: 2 };
    return costs[rarity] || 3;
}
function getRarityStats(rarity, role) {
    const baseStats = {
        mythic: 'ATK 12 | DEF 10 | SPECIAL',
        legendary: 'ATK 9 | DEF 8',
        epic: 'ATK 7 | DEF 6',
        rare: 'ATK 5 | DEF 5',
        uncommon: 'ATK 4 | DEF 4',
        common: 'ATK 3 | DEF 3'
    };
    return baseStats[rarity] || 'ATK 3 | DEF 3';
}

// ========== STATE ==========
let lang = 'en';
let cards = [...DATA];
let pos = 0;        // position in card-units  
let vel = 0;        // velocity in cards-per-frame
let dragging = false;
let dragStartX = 0;
let dragStartPos = 0;

// Velocity tracking (simple and reliable)
let lastX = 0;
let lastTime = 0;
let dragVelocity = 0;  // instantaneous velocity during drag

const CARD_GAP = 85;
const FRICTION = 0.85;    // Quick deceleration
const SNAP_ZONE = 99;     // ALWAYS snapping (magnetic feel)
const SNAP_PULL = 0.2;    // Gentle magnetic pull to nearest card

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const carousel = $('#carousel');
const debug = $('#debug');

function mod(n, m) { return ((n % m) + m) % m; }

// ========== RENDER ==========
let didDrag = false;
let totalDragDist = 0;

function render() {
    carousel.innerHTML = '';
    cards.forEach((c, i) => {
        const el = document.createElement('div');
        el.className = `card ${c.rarity}`;
        // Build card with frame, image, and rarity gem (name shown in big banner above)
        el.innerHTML = `
            <img class="card-art" src="${getThumbUrl(c.img)}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
            <div class="card-frame"></div>
            <div class="card-rarity-gem"><i class="gem-icon"></i></div>
            <div class="holo"></div>
            <div class="shine"></div>
        `;
        carousel.appendChild(el);
    });
    $('#tot').textContent = cards.length;
}

function draw() {
    const n = cards.length;
    const cardEls = $$('.card');
    
    cardEls.forEach((el, i) => {
        let d = i - pos;
        while (d > n/2) d -= n;
        while (d < -n/2) d += n;
        
        const x = d * CARD_GAP;
        const ad = Math.abs(d);
        const z = -ad * 50;
        const ry = d * -5;
        const sc = Math.max(0.55, 1 - ad * 0.09);
        const op = Math.max(0.15, 1 - ad * 0.13);
        
        el.style.transform = `translate3d(${x}px,0,${z}px) rotateY(${ry}deg) scale(${sc})`;
        el.style.opacity = op;
        el.style.zIndex = Math.round(50 - ad * 10);
        el.classList.toggle('active', ad < 0.4);
    });
    
    const idx = mod(Math.round(pos), n);
    $('#cur').textContent = idx + 1;
    
    const card = cards[idx];
    const glow = $('#glow');
    if (card) {
        glow.className = 'glow ' + card.rarity + (Math.abs(vel) < 0.05 ? ' on' : '');
        
        // Update the BIG NAME BANNER
        const banner = $('#nameBanner');
        const bannerRarity = $('#nameBannerRarity');
        const bannerName = $('#nameBannerName');
        
        // Get translated name or fallback to English
        const displayName = (lang !== 'en' && cardNames[lang] && cardNames[lang][card.id]) 
            ? cardNames[lang][card.id] 
            : card.name;
        
        bannerName.textContent = displayName;
        bannerRarity.textContent = i18n[lang][card.rarity] || card.rarity.toUpperCase();
        bannerRarity.className = 'name-banner-rarity ' + card.rarity;
        banner.className = 'name-banner ' + card.rarity;
    }
    
    debug.innerHTML = `vel: <b>${vel.toFixed(3)}</b><br>pos: ${pos.toFixed(2)}`;
}

// ========== PHYSICS ==========
function tick() {
    try {
        if (!dragging) {
            // Apply velocity
            pos += vel;
            vel *= 0.9;  // Friction
            
            // Snap to nearest card
            const target = Math.round(pos);
            const diff = target - pos;
            pos += diff * 0.3;  // Magnetic pull
            
            // Stop when close enough
            if (Math.abs(diff) < 0.01 && Math.abs(vel) < 0.01) {
                pos = target;
                vel = 0;
            }
        }
    } catch(e) {
        console.error('Physics error:', e);
    }
    
    draw();
    requestAnimationFrame(tick);
}

// ========== INPUT ==========
function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

function onDown(e) {
    dragging = true;
    didDrag = false;
    totalDragDist = 0;
    const x = getX(e);
    dragStartX = x;
    dragStartPos = pos;
    lastX = x;
    lastTime = performance.now();
    dragVelocity = 0;
    vel = 0;  // INSTANT STOP - touch to stop momentum
}

function onMove(e) {
    if (!dragging) return;
    
    const x = getX(e);
    const now = performance.now();
    
    // Move position 1:1 with drag (swap direction if needed)
    pos = dragStartPos - (x - dragStartX) / CARD_GAP;
    
    // Track total drag distance
    totalDragDist += Math.abs(x - lastX);
    if (totalDragDist > 15) {
        didDrag = true;
    }
    
    // Track velocity continuously during drag
    const dt = now - lastTime;
    if (dt > 5) {  // at least 5ms between samples
        const dx = x - lastX;
        const instantVel = dx / dt;  // pixels per ms
        
        // Smooth the velocity (30% old, 70% new)
        dragVelocity = dragVelocity * 0.3 + instantVel * 0.7;
        
        lastX = x;
        lastTime = now;
    }
}

function onUp() {
    if (!dragging) return;
    dragging = false;
    
    // Simple: just continue at the same speed you were dragging
    // dragVelocity is pixels/ms, convert to cards/frame
    // At 60fps, 1 frame = 16.67ms
    // So velocity in cards/frame = (pixels/ms * 16.67) / CARD_GAP
    // Reduced by half for less sensitivity
    vel = -(dragVelocity * 16.67 / CARD_GAP) * 0.5;
    
    // Clamp to reasonable max (1.5 cards per frame - easier to control)
    const MAX_VEL = 1.5;
    if (vel > MAX_VEL) vel = MAX_VEL;
    if (vel < -MAX_VEL) vel = -MAX_VEL;
}

// ========== KEYBOARD - single card steps ==========
document.addEventListener('keydown', e => {
    if ($('#modal').classList.contains('on')) return;
    
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        // Animate to previous card (no momentum, just smooth move)
        animateToCard(Math.round(pos) - 1);
        e.preventDefault();
    }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        // Animate to next card
        animateToCard(Math.round(pos) + 1);
        e.preventDefault();
    }
    if (e.key === 'Escape') closeModal();
});

// Smooth animation to specific card (for arrow keys)
let animating = false;
function animateToCard(targetIdx) {
    if (animating) return;
    animating = true;
    vel = 0; // kill any momentum
    
    const startPos = pos;
    const startTime = performance.now();
    const duration = 250; // ms
    
    function step(now) {
        const t = Math.min(1, (now - startTime) / duration);
        // Ease out cubic
        const ease = 1 - Math.pow(1 - t, 3);
        pos = startPos + (targetIdx - startPos) * ease;
        
        if (t < 1) {
            requestAnimationFrame(step);
        } else {
            pos = targetIdx;
            animating = false;
        }
    }
    requestAnimationFrame(step);
}

// ========== WHEEL - adds momentum ==========
carousel.addEventListener('wheel', e => {
    e.preventDefault();
    vel += e.deltaY * 0.015;  // stronger wheel response
    const MAX_VEL = 8;
    if (vel > MAX_VEL) vel = MAX_VEL;
    if (vel < -MAX_VEL) vel = -MAX_VEL;
}, { passive: false });

// ========== SETUP ==========
function setup() {
    carousel.addEventListener('touchstart', onDown, { passive: true });
    carousel.addEventListener('touchmove', onMove, { passive: true });
    carousel.addEventListener('touchend', onUp);
    carousel.addEventListener('touchcancel', onUp);
    
    carousel.addEventListener('mousedown', e => { e.preventDefault(); onDown(e); });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    
    $$('.filters button').forEach(btn => {
        btn.onclick = () => {
            $$('.filters button').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            cards = btn.dataset.f === 'all' ? [...DATA] : DATA.filter(c => c.rarity === btn.dataset.f);
            pos = 0; vel = 0;
            render();
        };
    });
    
    $$('.lang button').forEach(btn => {
        btn.onclick = () => {
            $$('.lang button').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            lang = btn.dataset.l;
            updateUILanguage();
        };
    });
    
    $('#close').onclick = closeModal;
    $('#modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };
    
    // Navigation buttons
    $('#btnLeft').onclick = () => animateToCard(Math.round(pos) - 1);
    $('#btnRight').onclick = () => animateToCard(Math.round(pos) + 1);
    $('#btnView').onclick = openCenteredCard;
    
    setupModal3D();
}

function openModal(i) {
    const c = cards[i];
    $('#mimg').src = getFullUrl(c.img); // Full resolution for modal view
    
    // Get translated name or fallback to English
    const name = (lang !== 'en' && cardNames[lang] && cardNames[lang][c.id]) ? cardNames[lang][c.id] : c.name;
    $('#mtitle').textContent = name;
    
    // Translated type
    $('#mtype').textContent = i18n[lang][c.type] || c.type;
    
    // Translated rarity badge
    const rarityText = i18n[lang][c.rarity] || c.rarity.toUpperCase();
    $('#mrarity').textContent = rarityText;
    $('#mrarity').className = `badge ${c.rarity}`;
    
    $('#mcost').textContent = c.cost;
    $('#mstats').textContent = c.stats || '-';
    $('#srow').style.display = c.stats ? 'flex' : 'none';
    
    // Get translated description or fallback to English
    const desc = (lang !== 'en' && cardDescs[lang] && cardDescs[lang][c.id]) ? cardDescs[lang][c.id] : c.desc;
    $('#mdesc').textContent = desc;
    
    $('#modal').classList.add('on');
}

function closeModal() { $('#modal').classList.remove('on'); }

// Simple tilt effect - no complex 3D that crashes
function setupModal3D() {
    const mc = $('#mc');
    const wrap = $('.modal-card-wrap');
    
    // Mouse hover tilt only (simple, doesn't crash)
    wrap.addEventListener('mousemove', e => {
        const rect = wrap.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        mc.style.transform = `rotateY(${x * 20}deg) rotateX(${-y * 20}deg)`;
    });
    wrap.addEventListener('mouseleave', () => {
        mc.style.transform = '';
    });
}

// Prevent context menu on long press
document.addEventListener('contextmenu', e => e.preventDefault());

// View button opens modal for centered card
function openCenteredCard() {
    const idx = mod(Math.round(pos), cards.length);
    openModal(idx);
}

// Update all UI text based on current language
function updateUILanguage() {
    $('#hint').textContent = i18n[lang].hint;
    $('#ltType').textContent = i18n[lang].type;
    $('#ltRarity').textContent = i18n[lang].rarity;
    $('#ltCost').textContent = i18n[lang].cost;
    $('#ltStats').textContent = i18n[lang].stats;
    $('#viewText').textContent = i18n[lang].view;
    $('#guideLink').textContent = i18n[lang].guide;
    
    // Update filter buttons
    $('#fAll').textContent = i18n[lang].all;
    $('#fMythic').textContent = i18n[lang].mythic;
    $('#fLegendary').textContent = i18n[lang].legendary;
    $('#fEpic').textContent = i18n[lang].epic;
    $('#fRare').textContent = i18n[lang].rare;
    $('#fUncommon').textContent = i18n[lang].uncommon;
    $('#fCommon').textContent = i18n[lang].common;
}

// Initialize after loading card data
loadCardsData().then(() => {
    cards = [...DATA];
    render();
    setup();
    tick();
    updateUILanguage();
});
</script>
