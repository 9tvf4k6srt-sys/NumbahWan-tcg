<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PINFORGE Wealth · 品峰財富管理</title>
<meta name="description" content="PINFORGE Wealth loading.">
<meta name="theme-color" content="#EFE7D6">

<link rel="icon" type="image/webp" href="/static/images/invest/pinforge-emblem-brass.webp">
<link rel="preload" as="image" href="/static/images/invest/pinforge-emblem-brass.webp" fetchpriority="high">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
    --paper:#EFE7D6;
    --paper-2:#E7DEC8;
    --ink:#2A2118;
    --ink-3:#7C6A4E;
    --brass:#A8854A;
    --brass-2:#C9A867;
    --brass-3:#866637;
    --gold:#D8B36A;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:var(--paper)}
body{
    font-family:'Cormorant Garamond', Georgia, serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    position:fixed;
    inset:0;
    transition:opacity .55s ease;
}

/* paper grain — very faint, just to keep the ground from feeling flat */
.grain{
    position:absolute;inset:0;pointer-events:none;z-index:1;
    background-image:
        radial-gradient(rgba(74,56,32,.04) 1px, transparent 1.5px),
        radial-gradient(rgba(168,133,74,.03) 1px, transparent 2px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1.5px 1.5px;
    opacity:.5;
    mix-blend-mode:multiply;
}

/* warm vignette — subtle gold halo at the center */
.wash{
    position:absolute;inset:0;pointer-events:none;z-index:2;
    background:
        radial-gradient(circle at 50% 50%, rgba(216,179,106,.18) 0%, transparent 50%),
        radial-gradient(ellipse at center, transparent 60%, rgba(42,33,24,.16) 100%);
}

/* center stage */
.stage{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:3;
    padding:0 22px;
}

/* the seal — single emblem with a tracing ring */
.seal{
    position:relative;
    width:clamp(140px, 28vmin, 200px);
    height:clamp(140px, 28vmin, 200px);
    display:flex;align-items:center;justify-content:center;
}

/* the emblem itself */
.seal img{
    position:relative;
    width:62%;
    height:62%;
    object-fit:contain;
    z-index:2;
    filter:
        drop-shadow(0 2px 8px rgba(74,56,32,.18))
        drop-shadow(0 0 18px rgba(216,179,106,.0));
    animation: emblem-bloom 2.8s ease-out forwards;
    will-change: filter, transform, opacity;
    opacity:0;
    transform:scale(.92);
}
@keyframes emblem-bloom{
    0%   { opacity:0; transform:scale(.92);
           filter: drop-shadow(0 2px 8px rgba(74,56,32,.18)) drop-shadow(0 0 0 rgba(216,179,106,0)); }
    20%  { opacity:1; transform:scale(1.0);
           filter: drop-shadow(0 2px 8px rgba(74,56,32,.18)) drop-shadow(0 0 0 rgba(216,179,106,0)); }
    85%  { opacity:1; transform:scale(1.0);
           filter: drop-shadow(0 4px 14px rgba(74,56,32,.22)) drop-shadow(0 0 32px rgba(216,179,106,.65)); }
    100% { opacity:1; transform:scale(1.02);
           filter: drop-shadow(0 4px 14px rgba(74,56,32,.22)) drop-shadow(0 0 18px rgba(216,179,106,.4)); }
}

/* the tracing ring */
.ring{
    position:absolute;
    inset:0;
    z-index:1;
}
.ring svg{
    width:100%;height:100%;
    transform:rotate(-90deg);
    overflow:visible;
}
.ring circle{
    fill:none;
    stroke:var(--brass);
    stroke-width:1.6;
    stroke-linecap:round;
    /* circumference of r=49 in a 100×100 viewBox = 2π·49 ≈ 307.876 */
    stroke-dasharray: 307.876;
    stroke-dashoffset: 307.876;
    opacity:.85;
    animation: trace 2.8s cubic-bezier(.55,.05,.25,1) forwards;
}
@keyframes trace{
    0%   { stroke-dashoffset: 307.876; opacity:.85; stroke:var(--brass); }
    85%  { stroke-dashoffset: 0;       opacity:.95; stroke:var(--brass-2); }
    100% { stroke-dashoffset: 0;       opacity:0;   stroke:var(--brass-2); }
}

/* the gold pulse that radiates out at completion */
.pulse{
    position:absolute;
    inset:0;
    z-index:1;
    border-radius:50%;
    border:1.5px solid var(--brass-2);
    opacity:0;
    transform:scale(.85);
    animation: pulse-out 1.4s ease-out 2.4s forwards;
}
@keyframes pulse-out{
    0%   { opacity:.7; transform:scale(.85); border-color:var(--brass-2); }
    60%  { opacity:.25; }
    100% { opacity:0; transform:scale(1.55); border-color:var(--gold); }
}

/* wordmark below */
.mark{
    text-align:center;
    margin-top:clamp(20px, 4vmin, 32px);
    opacity:0;
    animation: mark-in 1.4s ease-out .6s forwards;
}
@keyframes mark-in{
    0%   { opacity:0; transform:translateY(6px); }
    100% { opacity:1; transform:translateY(0); }
}
.mark .en{
    display:block;
    font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:clamp(.66rem, .58rem + .4vw, .8rem);
    letter-spacing:.42em;
    color:var(--brass-3);
    text-transform:uppercase;
    font-weight:700;
    padding-left:.42em; /* optical balance for tracking */
}

/* respect motion preferences */
@media (prefers-reduced-motion: reduce){
    .seal img{ animation:none; opacity:1; transform:scale(1) }
    .ring circle{ animation:none; stroke-dashoffset:0; opacity:0 }
    .pulse{ animation:none; opacity:0 }
    .mark{ animation:none; opacity:1 }
}
</style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<div class="wash" aria-hidden="true"></div>

<main class="stage" role="status" aria-live="polite" aria-label="Loading PINFORGE Wealth">
    <div class="seal" aria-hidden="true">
        <div class="ring">
            <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
                <circle cx="50" cy="50" r="49"/>
            </svg>
        </div>
        <div class="pulse"></div>
        <img src="/static/images/invest/pinforge-emblem-brass.webp"
             alt="" loading="eager" decoding="async">
    </div>
    <div class="mark">
        <span class="en">PINFORGE WEALTH</span>
    </div>
</main>

<script>
(function(){
    'use strict';

    var qs    = new URLSearchParams(window.location.search);
    var next  = qs.get('next');
    // total animation runtime is ~3.2s (trace 2.8s + pulse extends to 3.8s).
    // hand-off at 3.2s feels right — emblem locked in, ring vanished, pulse halfway out.
    var hold  = parseInt(qs.get('hold') || '3200', 10);
    if(isNaN(hold)) hold = 3200;
    hold = Math.max(0, Math.min(15000, hold));

    // safe-route check: only allow same-origin paths
    var safe = next && /^\/[A-Za-z0-9._\-\/?=&#]*$/.test(next) ? next : null;

    if(safe){
        setTimeout(function(){
            document.body.style.opacity = '0';
            setTimeout(function(){
                window.location.replace(safe);
            }, 520);
        }, hold);
    }
    // when no ?next= provided, the loader loops the bloom forever — stareable.
    else {
        // restart the animation every 4.5s so you can sit and watch
        var seal  = document.querySelector('.seal img');
        var ring  = document.querySelector('.ring circle');
        var pulse = document.querySelector('.pulse');
        var mark  = document.querySelector('.mark');
        function restart(){
            [seal, ring, pulse, mark].forEach(function(el){
                if(!el) return;
                el.style.animation = 'none';
                /* trigger reflow */
                void el.offsetWidth;
                el.style.animation = '';
            });
        }
        setInterval(restart, 4500);
    }
})();
</script>

</body>
</html>
