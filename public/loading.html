<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PINFORGE Wealth · 品峰財富管理 — loading</title>
<meta name="description" content="A breathing seal. PINFORGE Wealth loading screen.">
<meta name="theme-color" content="#EFE7D6">

<link rel="icon" type="image/webp" href="/static/images/invest/pinforge-emblem-brass.webp">
<link rel="preload" as="image" href="/static/images/invest/pinforge-emblem-brass.webp" fetchpriority="high">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Serif+TC:wght@500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
    --paper:#EFE7D6;
    --paper-2:#E7DEC8;
    --paper-3:#DCD0B5;
    --ink:#2A2118;
    --ink-2:#4A3820;
    --ink-3:#7C6A4E;
    --brass:#A8854A;
    --brass-2:#C9A867;
    --brass-3:#866637;
    --seal:#7A2F26;
    --gold:#D8B36A;

    --display:'Cormorant Garamond', Georgia, serif;
    --zh:'Noto Serif TC', 'Songti TC', serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:var(--paper)}
body{
    font-family:var(--display);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    position:fixed;
    inset:0;
}

/* paper grain — drifts on a 20s sine, never quite syncs with the breath */
.grain{
    position:absolute;inset:-10%;pointer-events:none;z-index:1;
    background-image:
        radial-gradient(rgba(74,56,32,.045) 1px, transparent 1.5px),
        radial-gradient(rgba(168,133,74,.035) 1px, transparent 2px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1.5px 1.5px;
    opacity:.55;
    mix-blend-mode:multiply;
    animation: drift 20s ease-in-out infinite alternate;
    will-change:transform;
}
@keyframes drift{
    0%   {transform:translate3d(-2%,-1%,0) rotate(-.4deg)}
    50%  {transform:translate3d( 1%, 1%,0) rotate( .2deg)}
    100% {transform:translate3d( 2%, .5%,0) rotate( .5deg)}
}

/* radial vignette + warm wash, breathes with same period as emblems */
.wash{
    position:absolute;inset:0;pointer-events:none;z-index:2;
    background:
        radial-gradient(ellipse at center, transparent 0%, transparent 40%, rgba(122,47,38,.05) 75%, rgba(42,33,24,.18) 100%),
        radial-gradient(circle at 50% 42%, rgba(216,179,106,.18) 0%, transparent 55%);
    animation: wash-breathe 6s ease-in-out infinite;
    will-change:opacity;
}
@keyframes wash-breathe{
    0%,100% {opacity:.85}
    50%     {opacity:1.0}
}

/* center stage */
.stage{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:3;
    padding:0 22px;
}

/* the 品 — three emblems stacked in the traditional form */
.pin{
    position:relative;
    width:clamp(180px, 36vmin, 260px);
    height:clamp(200px, 40vmin, 290px);
    margin-bottom:clamp(28px, 5vmin, 44px);
    transform-origin:50% 50%;
    /* the master breath: 6s sine, scales the whole stack 0.97 → 1.03 */
    animation: master-breath 6s ease-in-out infinite;
    will-change:transform;
}
@keyframes master-breath{
    0%,100% {transform:scale(.97)}
    50%     {transform:scale(1.03)}
}

/* each emblem tile */
.tile{
    position:absolute;
    width:38%;
    aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;
}
.tile img{
    width:100%;height:100%;
    object-fit:contain;
    filter:
        drop-shadow(0 2px 6px rgba(74,56,32,.18))
        drop-shadow(0 0 0 rgba(216,179,106,0));
    animation: glow 6s ease-in-out infinite;
    will-change:filter, transform;
}
@keyframes glow{
    0%,100% {
        filter:
            drop-shadow(0 2px 6px rgba(74,56,32,.18))
            drop-shadow(0 0 0px rgba(216,179,106,0));
        transform:scale(1);
    }
    50% {
        filter:
            drop-shadow(0 4px 14px rgba(74,56,32,.22))
            drop-shadow(0 0 22px rgba(216,179,106,.55));
        transform:scale(1.015);
    }
}

/* top square of 品 — center-top */
.tile-top{
    top:0; left:50%; transform:translateX(-50%);
}
/* bottom-left square of 品 */
.tile-bl{
    bottom:0; left:6%;
}
/* bottom-right square of 品 */
.tile-br{
    bottom:0; right:6%;
}

/* each tile's emblem breathes slightly out of phase — the bloom-toward-each-other feel */
.tile-top img{ animation-delay: 0s; }
.tile-bl  img{ animation-delay: -2s; }
.tile-br  img{ animation-delay: -4s; }

/* the gold ink-line that traces the 品 silhouette */
.seal-line{
    position:absolute;inset:0;
    pointer-events:none;
    z-index:1;
}
.seal-line svg{
    width:100%;height:100%;
    overflow:visible;
}
.seal-line path{
    fill:none;
    stroke:var(--brass-2);
    stroke-width:1.4;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    opacity:.55;
    animation: ink 12s ease-in-out infinite;
}
@keyframes ink{
    0%   { stroke-dashoffset: 1200; opacity:0; }
    25%  { opacity:.6; }
    50%  { stroke-dashoffset: 0;    opacity:.7; }
    75%  { opacity:.4; }
    100% { stroke-dashoffset:-1200; opacity:0; }
}

/* the wordmark */
.mark{
    text-align:center;
    margin-top:clamp(8px, 2vmin, 16px);
    animation: mark-fade 12s ease-in-out infinite;
    will-change:opacity;
}
@keyframes mark-fade{
    0%,100% {opacity:.78}
    50%     {opacity:1.0}
}
.mark .en{
    display:block;
    font-family:var(--mono);
    font-size:clamp(.66rem, .58rem + .4vw, .82rem);
    letter-spacing:.36em;
    color:var(--brass-3);
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:6px;
}
.mark .zh{
    display:block;
    font-family:var(--zh);
    font-size:clamp(1.05rem, .9rem + .65vw, 1.4rem);
    letter-spacing:.16em;
    color:var(--ink);
    font-weight:600;
}
.mark .rule{
    display:block;
    width:42px;height:1px;
    background:linear-gradient(to right, transparent, var(--brass), transparent);
    margin:14px auto 0;
}

/* the rotating motto — three languages, 30s full cycle, sine-eased */
.motto{
    position:absolute;
    bottom:clamp(32px, 7vmin, 64px);
    left:0;right:0;
    text-align:center;
    padding:0 28px;
    z-index:4;
    height:3em;
}
.motto p{
    position:absolute;
    left:0;right:0;
    padding:0 28px;
    font-family:var(--display);
    font-style:italic;
    font-weight:500;
    font-size:clamp(.92rem, .84rem + .35vw, 1.08rem);
    line-height:1.6;
    color:var(--ink-2);
    opacity:0;
    animation: motto-cycle 30s ease-in-out infinite;
}
.motto p.zh,.motto p.ja{ font-family:var(--zh); font-style:normal; }
.motto p.en{ animation-delay: 0s; }
.motto p.zh{ animation-delay: -20s; }
.motto p.ja{ animation-delay: -10s; }
@keyframes motto-cycle{
    0%   {opacity:0; transform:translateY(4px)}
    8%   {opacity:.85; transform:translateY(0)}
    25%  {opacity:.85; transform:translateY(0)}
    33%  {opacity:0; transform:translateY(-4px)}
    100% {opacity:0; transform:translateY(-4px)}
}

/* sound toggle — bottom-right, very quiet */
.sound{
    position:absolute;
    bottom:18px; right:18px;
    z-index:5;
    width:34px; height:34px;
    border:1px solid rgba(168,133,74,.4);
    background:transparent;
    border-radius:50%;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:var(--brass-3);
    font-family:var(--mono);
    font-size:.62rem;
    letter-spacing:.1em;
    font-weight:700;
    transition:opacity .4s ease, background .3s ease;
    opacity:.45;
}
.sound:hover{ opacity:.9; background:rgba(216,179,106,.08) }
.sound[data-on="true"]{ opacity:.9; background:rgba(216,179,106,.12); border-color:var(--brass-2); color:var(--brass) }

/* corner mark — the seal in the corner */
.corner{
    position:absolute;
    top:18px; left:18px;
    z-index:5;
    font-family:var(--mono);
    font-size:.62rem;
    letter-spacing:.22em;
    color:var(--brass-3);
    text-transform:uppercase;
    font-weight:700;
    opacity:.5;
}

/* progress hint — only visible if a real load is happening; just a thin ink line */
.thin{
    position:absolute;
    bottom:0; left:0;
    height:1px;
    background:linear-gradient(to right, transparent, var(--brass), transparent);
    width:0;
    z-index:6;
    transition:width .35s ease;
    opacity:.7;
}

/* respect motion preferences — switch to a single still pose */
@media (prefers-reduced-motion: reduce){
    .pin, .tile img, .grain, .wash, .mark, .motto p, .seal-line path{
        animation:none !important;
    }
    .motto p.en{ opacity:.85 }
    .motto p.zh,.motto p.ja{ display:none }
    .seal-line path{ stroke-dashoffset:0; opacity:.45 }
}

/* tiny screens */
@media (max-width:380px){
    .corner{ font-size:.56rem }
    .mark .en{ letter-spacing:.28em }
}
</style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>
<div class="wash" aria-hidden="true"></div>

<div class="corner">PINFORGE · LOADING</div>

<main class="stage" role="status" aria-live="polite" aria-label="Loading PINFORGE Wealth">

    <div class="pin" aria-hidden="true">
        <!-- gold ink-line tracing the 品 silhouette -->
        <div class="seal-line">
            <svg viewBox="0 0 260 290" preserveAspectRatio="none">
                <!-- top square -->
                <path d="M 81 4 L 179 4 L 179 102 L 81 102 Z"/>
                <!-- bottom-left square -->
                <path d="M 16 188 L 114 188 L 114 286 L 16 286 Z"/>
                <!-- bottom-right square -->
                <path d="M 146 188 L 244 188 L 244 286 L 146 286 Z"/>
            </svg>
        </div>

        <div class="tile tile-top">
            <img src="/static/images/invest/pinforge-emblem-brass.webp"
                 alt="" loading="eager" decoding="async">
        </div>
        <div class="tile tile-bl">
            <img src="/static/images/invest/pinforge-emblem-brass.webp"
                 alt="" loading="eager" decoding="async">
        </div>
        <div class="tile tile-br">
            <img src="/static/images/invest/pinforge-emblem-brass.webp"
                 alt="" loading="eager" decoding="async">
        </div>
    </div>

    <div class="mark">
        <span class="en">PINFORGE WEALTH</span>
        <span class="zh">品峰財富管理</span>
        <span class="rule" aria-hidden="true"></span>
    </div>

</main>

<div class="motto" aria-hidden="true">
    <p class="en">"We treat your wealth and your business like our own."</p>
    <p class="zh">「你的財富、你的店,我們當自己的在顧。」</p>
    <p class="ja">「あなたの資産も商売も、自分のものとして扱う。」</p>
</div>

<button class="sound" type="button" aria-label="Toggle ambient tone" title="Toggle ambient tone" data-on="false">
    <span class="lbl">♪</span>
</button>

<div class="thin" id="thin" aria-hidden="true"></div>

<script>
(function(){
    'use strict';

    // ============= ambient 432Hz tone, 3s pulse, very quiet =============
    var ctx = null, osc = null, gain = null, pulser = null;
    var btn = document.querySelector('.sound');
    var KEY = 'pinforge_loading_sound';

    function startTone(){
        if(ctx) return;
        try{
            var AC = window.AudioContext || window.webkitAudioContext;
            if(!AC) return;
            ctx = new AC();
            osc = ctx.createOscillator();
            gain = ctx.createGain();
            osc.frequency.value = 432;     // 432Hz, calm
            osc.type = 'sine';
            gain.gain.value = 0;
            osc.connect(gain).connect(ctx.destination);
            osc.start();

            // 3s pulse: gentle inhale (0 → 0.018) over 1.4s, exhale back over 1.6s
            function pulse(){
                var t = ctx.currentTime;
                gain.gain.cancelScheduledValues(t);
                gain.gain.setValueAtTime(gain.gain.value, t);
                gain.gain.linearRampToValueAtTime(0.018, t + 1.4);
                gain.gain.linearRampToValueAtTime(0.0,   t + 3.0);
            }
            pulse();
            pulser = setInterval(pulse, 3000);
        }catch(e){ /* silent fail */ }
    }
    function stopTone(){
        if(pulser){ clearInterval(pulser); pulser = null; }
        if(gain && ctx){
            try{
                var t = ctx.currentTime;
                gain.gain.cancelScheduledValues(t);
                gain.gain.linearRampToValueAtTime(0, t + 0.3);
            }catch(e){}
        }
        setTimeout(function(){
            try{ if(osc){ osc.stop(); osc.disconnect(); } }catch(e){}
            try{ if(ctx){ ctx.close(); } }catch(e){}
            ctx = null; osc = null; gain = null;
        }, 400);
    }

    function setOn(on){
        btn.setAttribute('data-on', on ? 'true' : 'false');
        try{ localStorage.setItem(KEY, on ? '1' : '0'); }catch(e){}
        if(on) startTone(); else stopTone();
    }

    btn.addEventListener('click', function(){
        var on = btn.getAttribute('data-on') === 'true';
        setOn(!on);
    });

    // restore preference; do NOT auto-start without a tap (browser autoplay rules)
    // we honour the saved preference only on the first user interaction
    var saved = '0';
    try{ saved = localStorage.getItem(KEY) || '0'; }catch(e){}
    if(saved === '1'){
        // arm the toggle visually but wait for any tap to actually start audio
        btn.setAttribute('data-on','false');
        var arm = function(){
            setOn(true);
            window.removeEventListener('pointerdown', arm);
            window.removeEventListener('keydown', arm);
        };
        window.addEventListener('pointerdown', arm, {once:true});
        window.addEventListener('keydown', arm, {once:true});
    }

    // ============= optional progress wire =============
    // call window.PINFORGE_LOADER.progress(0..1) externally if you want a thin line.
    // call window.PINFORGE_LOADER.done() to fade out the screen.
    var thin = document.getElementById('thin');
    window.PINFORGE_LOADER = {
        progress:function(p){
            p = Math.max(0, Math.min(1, +p || 0));
            thin.style.width = (p * 100).toFixed(2) + '%';
        },
        done:function(){
            thin.style.width = '100%';
            document.body.style.transition = 'opacity .6s ease';
            document.body.style.opacity = '0';
            setTimeout(function(){ stopTone(); }, 650);
        }
    };

    // also support ?next=/some/path to act as a real splash
    var qs = new URLSearchParams(window.location.search);
    var next = qs.get('next');
    var hold = parseInt(qs.get('hold') || '0', 10); // ms
    if(next && /^\/[A-Za-z0-9._\-\/?=&#]*$/.test(next)){
        var ms = isNaN(hold) ? 0 : Math.max(0, Math.min(60000, hold));
        // animate thin line over the hold window
        var start = performance.now();
        function tick(now){
            var p = ms > 0 ? Math.min(1, (now - start) / ms) : 1;
            thin.style.width = (p * 100).toFixed(2) + '%';
            if(p < 1) requestAnimationFrame(tick);
            else {
                document.body.style.transition = 'opacity .5s ease';
                document.body.style.opacity = '0';
                setTimeout(function(){ window.location.replace(next); }, 520);
            }
        }
        if(ms > 0) requestAnimationFrame(tick);
        else window.location.replace(next);
    }
})();
</script>

</body>
</html>
