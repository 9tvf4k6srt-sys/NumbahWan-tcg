<!DOCTYPE html><html><head><title>Art Test</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:20px">
<h2>DEADRIFT Art Loading Test</h2>
<div id="log" style="white-space:pre;font-size:12px"></div>
<div id="imgs" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:20px"></div>
<script>
const log=document.getElementById('log');
const imgs=document.getElementById('imgs');
function L(msg){log.textContent+=msg+'\n';console.log(msg)}

const ART_SRC={
  char0:'art/chars/char_tier0_gamer.png',char1:'art/chars/char_tier1_enforcer.png',char2:'art/chars/char_tier2_seal.png',
  enemy_walker:'art/enemies/enemy_walker.png',enemy_runner:'art/enemies/enemy_runner.png',
  enemy_bloater:'art/enemies/enemy_bloater.png',enemy_spitter:'art/enemies/enemy_spitter.png',
  enemy_crawler:'art/enemies/enemy_crawler.png',
  enemy_gorelord:'art/enemies/enemy_gorelord.png',enemy_hivemind:'art/enemies/enemy_hivemind.png',
  wpn_bat:'art/weapons/wpn_bat.png',wpn_pipe:'art/weapons/wpn_pipe.png',
  wpn_machete:'art/weapons/wpn_machete.png',wpn_katana:'art/weapons/wpn_katana.png',
  wpn_chainsaw:'art/weapons/wpn_chainsaw.png',wpn_m4a1:'art/weapons/wpn_m4a1.png',
  wpn_shotgun:'art/weapons/wpn_shotgun.png',wpn_minigun:'art/weapons/wpn_minigun.png',
  wpn_railgun:'art/weapons/wpn_railgun.png',wpn_plasma:'art/weapons/wpn_plasma.png',
};

let loaded=0,total=Object.keys(ART_SRC).length;
L('Loading '+total+' assets...');

for(const[k,src] of Object.entries(ART_SRC)){
  const img=new Image();
  img.onload=()=>{
    loaded++;
    L('OK: '+k+' ('+img.naturalWidth+'x'+img.naturalHeight+')');
    const d=document.createElement('div');
    d.style.cssText='text-align:center;background:#222;padding:5px;border-radius:8px;border:1px solid #444';
    d.innerHTML='<img src="'+src+'" style="max-width:80px;max-height:80px;display:block;margin:0 auto"><div style="font-size:10px;margin-top:4px;color:#0f0">'+k+'</div>';
    imgs.appendChild(d);
    if(loaded===total)L('\nALL '+total+' LOADED!');
  };
  img.onerror=(e)=>{loaded++;L('FAIL: '+k+' src='+src);};
  img.src=src;
}
</script>
</body></html>
