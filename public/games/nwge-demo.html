<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NWGE — Engine Proof of Concept</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0c0c14; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
  canvas { display: block; }
  #debug {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.8); padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.6; border: 1px solid rgba(255,68,68,0.3);
    min-width: 280px;
  }
  #debug h3 { color: #ff4444; margin-bottom: 6px; font-size: 14px; }
  #debug .stat { color: #ffbe0b; }
  #debug .label { color: #888; }
  #controls {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 10;
    background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 8px;
    font-size: 12px; border: 1px solid rgba(255,190,11,0.3);
  }
  #controls span { color: #ffbe0b; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="debug">
  <h3>NWGE Proof of Concept</h3>
  <div><span class="label">Entities:</span> <span class="stat" id="d-entities">0</span></div>
  <div><span class="label">Systems:</span> <span class="stat" id="d-systems">0</span></div>
  <div><span class="label">FPS:</span> <span class="stat" id="d-fps">0</span></div>
  <div><span class="label">Frame:</span> <span class="stat" id="d-frame">0</span></div>
  <div><span class="label">Time:</span> <span class="stat" id="d-time">0.0s</span></div>
</div>
<div id="controls">
  <span>[Click]</span> Spawn 50 entities &nbsp; <span>[Space]</span> Pause &nbsp; <span>[R]</span> Reset
</div>

<script type="module">
// ─── Import NWGE ECS Core ────────────────────────────────────────────
import {
  World, Engine,
  defineComponent, definePrefab, spawnPrefab,
  Transform, Velocity, Sprite, PhysicsBody, Health, Tag, TAGS
} from '/nwge/core/ecs/index.js';

// ─── Canvas Setup ────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Custom Components ───────────────────────────────────────────────
const ColorComp = defineComponent('Color', { r: 255, g: 68, b: 68 });
const SizeComp = defineComponent('Size', { w: 8, h: 8 });
const LifetimeComp = defineComponent('Lifetime', { remaining: 5, max: 5 });
const TrailComp = defineComponent('Trail', { length: 0 }); // flag component

// ─── Prefabs ─────────────────────────────────────────────────────────
definePrefab('Particle', [
  [Transform, {}],
  [Velocity, {}],
  [ColorComp, {}],
  [SizeComp, { w: 6, h: 6 }],
  [LifetimeComp, { remaining: 4, max: 4 }],
]);

definePrefab('Zombie', [
  [Transform, {}],
  [Velocity, {}],
  [PhysicsBody, { mass: 1, friction: 0.95, gravityScale: 1 }],
  [Health, { current: 30, max: 30 }],
  [ColorComp, { r: 80, g: 200, b: 80 }],
  [SizeComp, { w: 16, h: 24 }],
  [Tag, { tags: TAGS.ENEMY }],
]);

definePrefab('Bullet', [
  [Transform, {}],
  [Velocity, {}],
  [ColorComp, { r: 255, g: 190, b: 11 }],
  [SizeComp, { w: 4, h: 4 }],
  [LifetimeComp, { remaining: 2, max: 2 }],
  [TrailComp, {}],
  [Tag, { tags: TAGS.PROJECTILE }],
]);

// ─── World & Systems ─────────────────────────────────────────────────
const world = new World(4096);
const GRAVITY = 800;
const GROUND_Y = 0.85; // fraction of screen height

// Movement system
world.addSystem({
  name: 'Movement',
  priority: 10,
  components: [Transform, Velocity],
  update(w, dt, entities) {
    const tStore = w.getStore(Transform);
    const vStore = w.getStore(Velocity);
    for (const eid of entities) {
      tStore.x[eid] += vStore.vx[eid] * dt;
      tStore.y[eid] += vStore.vy[eid] * dt;
    }
  }
});

// Gravity system
world.addSystem({
  name: 'Gravity',
  priority: 5,
  components: [Velocity, PhysicsBody],
  update(w, dt, entities) {
    const vStore = w.getStore(Velocity);
    const pStore = w.getStore(PhysicsBody);
    const tStore = w.getStore(Transform);
    const groundY = H * GROUND_Y;

    for (const eid of entities) {
      vStore.vy[eid] += GRAVITY * pStore.gravityScale[eid] * dt;

      // Ground collision
      if (tStore.y[eid] >= groundY) {
        tStore.y[eid] = groundY;
        vStore.vy[eid] *= -0.4; // bounce
        vStore.vx[eid] *= pStore.friction[eid];
        if (Math.abs(vStore.vy[eid]) < 20) vStore.vy[eid] = 0;
      }
    }
  }
});

// Lifetime system
world.addSystem({
  name: 'Lifetime',
  priority: 90,
  components: [LifetimeComp],
  update(w, dt, entities) {
    const lStore = w.getStore(LifetimeComp);
    for (const eid of entities) {
      lStore.remaining[eid] -= dt;
      if (lStore.remaining[eid] <= 0) {
        w.destroy(eid);
      }
    }
  }
});

// Boundary cleanup
world.addSystem({
  name: 'Boundary',
  priority: 95,
  components: [Transform],
  update(w, dt, entities) {
    const tStore = w.getStore(Transform);
    for (const eid of entities) {
      if (tStore.x[eid] < -100 || tStore.x[eid] > W + 100 ||
          tStore.y[eid] > H + 100) {
        w.destroy(eid);
      }
    }
  }
});

// ─── Render (outside ECS, called by Engine.onRender) ─────────────────
const trails = new Map(); // eid → [{x,y}]

function render(alpha) {
  ctx.fillStyle = 'rgba(12, 12, 20, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, H * GROUND_Y + 12, W, H);
  ctx.strokeStyle = 'rgba(255, 68, 68, 0.3)';
  ctx.beginPath();
  ctx.moveTo(0, H * GROUND_Y + 12);
  ctx.lineTo(W, H * GROUND_Y + 12);
  ctx.stroke();

  const tStore = world.getStore(Transform);
  const cStore = world.getStore(ColorComp);
  const sStore = world.getStore(SizeComp);
  const lStore = world.getStore(LifetimeComp);
  const trStore = world.getStore(TrailComp);

  if (!tStore || !cStore || !sStore) return;

  for (let eid = 0; eid < world.nextEntityId; eid++) {
    if (!world.alive[eid]) {
      trails.delete(eid);
      continue;
    }
    if (!(world.masks[eid] & (1 << Transform.id))) continue;
    if (!(world.masks[eid] & (1 << ColorComp.id))) continue;
    if (!(world.masks[eid] & (1 << SizeComp.id))) continue;

    const x = tStore.x[eid];
    const y = tStore.y[eid];
    const r = cStore.r[eid];
    const g = cStore.g[eid];
    const b = cStore.b[eid];
    const w = sStore.w[eid];
    const h = sStore.h[eid];

    // Fade based on lifetime
    let opacity = 1;
    if (lStore && (world.masks[eid] & (1 << LifetimeComp.id))) {
      opacity = Math.max(0, lStore.remaining[eid] / lStore.max[eid]);
    }

    // Trail
    if (trStore && (world.masks[eid] & (1 << TrailComp.id))) {
      if (!trails.has(eid)) trails.set(eid, []);
      const trail = trails.get(eid);
      trail.push({ x, y });
      if (trail.length > 12) trail.shift();
      for (let i = 0; i < trail.length; i++) {
        const t = i / trail.length;
        ctx.fillStyle = `rgba(${r},${g},${b},${t * opacity * 0.4})`;
        const tw = w * t;
        ctx.fillRect(trail[i].x - tw / 2, trail[i].y - tw / 2, tw, tw);
      }
    }

    // Glow
    ctx.shadowBlur = 10 + w;
    ctx.shadowColor = `rgba(${r},${g},${b},${opacity * 0.6})`;

    ctx.fillStyle = `rgba(${r},${g},${b},${opacity})`;
    ctx.fillRect(x - w / 2, y - h / 2, w, h);

    ctx.shadowBlur = 0;
  }

  // Debug overlay update
  fpsFrames++;
  const now = performance.now();
  if (now - fpsLast > 500) {
    document.getElementById('d-fps').textContent = Math.round(fpsFrames / ((now - fpsLast) / 1000));
    fpsLast = now;
    fpsFrames = 0;
  }
  document.getElementById('d-entities').textContent = world.entityCount;
  document.getElementById('d-systems').textContent = world._systems.length;
  document.getElementById('d-frame').textContent = engine.frame;
  document.getElementById('d-time').textContent = engine.time.toFixed(1) + 's';
}

let fpsFrames = 0, fpsLast = performance.now();

// ─── Engine Setup ────────────────────────────────────────────────────
const engine = new Engine(world, { fixedDt: 1 / 60, maxSubSteps: 5 });
engine.onRender = render;

// ─── Spawn Helpers ───────────────────────────────────────────────────
function spawnBurst(cx, cy, count = 50) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const speed = 100 + Math.random() * 400;
    const type = Math.random();

    if (type < 0.3) {
      // Zombie
      spawnPrefab(world, 'Zombie', {
        Transform: { x: cx, y: cy },
        Velocity: { vx: Math.cos(angle) * speed * 0.5, vy: Math.sin(angle) * speed - 200 },
        Color: { r: 40 + Math.random() * 80, g: 150 + Math.random() * 100, b: 40 + Math.random() * 60 },
        Size: { w: 10 + Math.random() * 14, h: 16 + Math.random() * 16 },
      });
    } else if (type < 0.6) {
      // Bullet
      spawnPrefab(world, 'Bullet', {
        Transform: { x: cx, y: cy },
        Velocity: { vx: Math.cos(angle) * speed * 1.5, vy: Math.sin(angle) * speed * 1.5 },
        Color: { r: 255, g: 150 + Math.random() * 100, b: Math.random() * 50 },
        Size: { w: 3 + Math.random() * 4, h: 3 + Math.random() * 4 },
        Lifetime: { remaining: 1.5 + Math.random() * 2, max: 3 },
      });
    } else {
      // Particle
      spawnPrefab(world, 'Particle', {
        Transform: { x: cx, y: cy },
        Velocity: { vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed },
        Color: {
          r: [255, 255, 168, 255][Math.floor(Math.random() * 4)],
          g: [68, 190, 85, 140][Math.floor(Math.random() * 4)],
          b: [68, 11, 247, 30][Math.floor(Math.random() * 4)]
        },
        Size: { w: 3 + Math.random() * 6, h: 3 + Math.random() * 6 },
        Lifetime: { remaining: 1 + Math.random() * 3, max: 4 },
      });
    }
  }
}

// Initial spawn
spawnBurst(W / 2, H * 0.4, 100);

// ─── Input ───────────────────────────────────────────────────────────
canvas.addEventListener('click', (e) => {
  spawnBurst(e.clientX, e.clientY, 50);
});

canvas.addEventListener('mousemove', (e) => {
  if (e.buttons === 1) {
    spawnBurst(e.clientX, e.clientY, 5);
  }
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    engine.paused = !engine.paused;
    e.preventDefault();
  }
  if (e.code === 'KeyR') {
    // Reset world
    for (let i = 0; i < world.nextEntityId; i++) {
      if (world.alive[i]) world.destroy(i);
    }
    trails.clear();
    spawnBurst(W / 2, H * 0.4, 100);
  }
});

// ─── Start! ──────────────────────────────────────────────────────────
engine.start();
console.log('NWGE Engine started', world.stats());
</script>
</body>
</html>
