<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Cafeteria | NumbahWan</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/static/nw-nav.js" defer></script>
    <script src="/static/nw-sounds.js" defer></script>
    <script src="/static/nw-guide.js" defer></script>
    <style>
        :root { --neon-orange: #ff6b00; --neon-purple: #a855f7; --dark: #0a0a0f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; }
        .font-fun { font-family: 'Fredoka', sans-serif; }
        .hero { min-height: 60vh; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(10,10,15,0.95)), url('/static/images/absurdist/cafeteria.webp') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .neon-text { text-shadow: 0 0 10px var(--neon-orange), 0 0 40px var(--neon-orange); }
        .menu-card { background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border: 1px solid rgba(255,107,0,0.3); border-radius: 16px; padding: 1.5rem; transition: all 0.3s; }
        .menu-card:hover { transform: translateY(-4px); border-color: var(--neon-orange); box-shadow: 0 10px 40px rgba(255,107,0,0.2); }
        .price { color: #ffd700; font-weight: 700; }
        .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; }
        .tag-new { background: #22c55e; color: #000; }
        .tag-hot { background: #ef4444; color: #fff; }
        .tag-whale { background: linear-gradient(90deg, #ffd700, #ff6b00); color: #000; }
        .review { background: rgba(255,255,255,0.03); border-left: 3px solid var(--neon-purple); padding: 1rem; margin: 1rem 0; border-radius: 0 8px 8px 0; }
        .stars { color: #ffd700; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body>
    <section class="hero">
        <div>
            <div class="text-6xl mb-4 float">🍜</div>
            <h1 class="font-fun text-5xl md:text-7xl neon-text mb-4" data-i18n="title">GUILD CAFETERIA</h1>
            <p class="text-xl text-gray-300 max-w-xl mx-auto" data-i18n="subtitle">Where the food is questionable but the vibes are immaculate</p>
        </div>
    </section>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <!-- Chef Section -->
        <div class="text-center mb-12">
            <div class="inline-block bg-gradient-to-r from-orange-500/20 to-purple-500/20 border border-orange-500/30 rounded-2xl p-6">
                <div class="text-4xl mb-2">🐹</div>
                <h2 class="font-fun text-2xl text-orange-400" data-i18n="chef">Head Chef: Sir Nibbles III</h2>
                <p class="text-gray-400 text-sm" data-i18n="chefTitle">"I may be small, but my flavor profiles are MASSIVE"</p>
            </div>
        </div>

        <!-- Menu Grid -->
        <h2 class="font-fun text-3xl text-center mb-8 text-orange-400">📋 <span data-i18n="menuTitle">TODAY'S MENU</span></h2>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16" id="menuGrid"></div>

        <!-- Reviews Section -->
        <h2 class="font-fun text-3xl text-center mb-8 text-purple-400">⭐ <span data-i18n="reviewsTitle">CUSTOMER REVIEWS</span></h2>
        <div class="max-w-3xl mx-auto" id="reviewsSection"></div>

        <!-- Kitchen Rules -->
        <div class="mt-16 bg-red-500/10 border border-red-500/30 rounded-2xl p-6 max-w-2xl mx-auto">
            <h3 class="font-fun text-xl text-red-400 mb-4 text-center">⚠️ <span data-i18n="rulesTitle">KITCHEN RULES</span></h3>
            <ul class="space-y-2 text-gray-300 text-sm" id="rulesList"></ul>
        </div>
    </main>

                { user: "免費玩家_驕傲", stars: 1, text: "我要了水。他們收我50鑽。水耶。", avatar: "😤" },
                { user: "摸草去", stars: 5, text: "72小時沒離開椅子吃過最好的食物。", avatar: "🌱" },
                { user: "伺服器倉鼠", stars: 5, text: "我在這工作。轉輪薪水不錯。起司普普。", avatar: "🐹" }
            ],
            rules: [
                "🚫 禁止閃光燈 - 會嚇到倉鼠",
                "💳 接受：鑽石、金幣、靈魂、長子",
                "⏰ 倉鼠累了廚房就關門",
                "🎰 抱怨抽卡機率帳單加10◆",

        th: {
            title: "โรงอาหารกิลด์",
            subtitle: "อาหารน่าสงสัย แต่บรรยากาศเลิศ",

            chefTitle: '"ข้าอาจตัวเล็ก แต่รสชาติข้ายิ่งใหญ่"',
            menuTitle: "เมนูวันนี้",
            reviewsTitle: "รีวิวลูกค้า",
            rulesTitle: "กฎห้องครัว",
            menu: [
                { name: "ราเมน AFK", desc: "เสิร์ฟเองตอนคุณไม่อยู่ อาจยังอยู่ตอนกลับมา หรือไม่ก็ไม่", price: "15◆", tags: ["hot"], emoji: "🍜" },
                { name: "ซุปน้ำตาเวล", desc: "เก็บจากบัตรเครดิตถูกปฏิเสธ เค็มอย่างน่าประหลาดใจ", price: "999◆", tags: ["whale"], emoji: "🥣" },
                { name: "สมูทตี้แลค", desc: "คำเตือน: อาจค้างกลางจิบ 3-5 วันทำการ", price: "8◆", tags: ["new"], emoji: "🥤" },
                { name: "ชามเซอร์ไพรส์กาชา", desc: "โอกาส 0.01% ได้อาหารจริง 99.99% ได้ความผิดหวัง", price: "50◆", tags: ["hot"], emoji: "🎲" },
                { name: "ขนมปังซ่อมบำรุง", desc: "มีทุกวันอังคาร หรือพุธ เดี๋ยวแจ้งให้ทราบ", price: "ฟรี*", tags: [], emoji: "🍞" },
                { name: "ปีกไก่โกรธออก", desc: "เผ็ดจนต้องถอนการติดตั้ง สองครั้ง", price: "25◆", tags: ["hot"], emoji: "🍗" },
                { name: "จาน P2W", desc: "เหมือนอาหารปกติแต่แพงกว่า 10 เท่า รสชาติแห่งชัยชนะ", price: "500◆", tags: ["whale"], emoji: "🍱" },
                { name: "คุกกี้หลุดการเชื่อมต่อ", desc: "เห็นแล้ว ไม่เห็นแล้ว", price: "5◆", tags: ["new"], emoji: "🍪" },
                { name: "พาสต้าแพทช์โน้ต", desc: "สูตรเปลี่ยนโดยไม่แจ้ง ไม่รับประกันรสชาติเดิม", price: "12◆", tags: [], emoji: "🍝" }
            ],
            reviews: [
                { user: "xX_โปรเกมเมอร์_Xx", stars: 5, text: "สั่งราเมน AFK 3 วันก่อน ยังรออยู่ ให้ 5 ดาวสำหรับความระทึก", avatar: "😎" },
                { user: "แม่เวล2024", stars: 4, text: "ซุปน้ำตาเวลทำให้นึกถึงบัญชีธนาคาร ดาเมจทางอารมณ์", avatar: "🐋" },
                { user: "F2P_และภูมิใจ", stars: 1, text: "ขอน้ำเปล่า โดนชาร์จ 50 เพชร น้ำเปล่านะ", avatar: "😤" },
                { user: "ไปสัมผัสหญ้า", stars: 5, text: "อาหารที่ดีที่สุดที่กินโดยไม่ลุกจากเก้าอี้ 72 ชั่วโมง", avatar: "🌱" },
                { user: "หนูแฮมเซิร์ฟเวอร์", stars: 5, text: "ทำงานที่นี่ วงล้อจ่ายดี ชีสพอใช้ได้", avatar: "🐹" }
            ],
            rules: [
                "🚫 ห้ามแฟลช - หนูแฮมตกใจ",
                "💳 รับ: เพชร, ทอง, วิญญาณ, ลูกคนโต",
                "⏰ ครัวปิดเมื่อหนูแฮมเหนื่อย",
                "🎰 บ่นเรื่องเรทกาชา บิลเพิ่ม 10◆",
                "📱 รหัส WiFi ฟรี: 'git_gud_lol'",
                "🚪 ทางออกฉุกเฉินนำไปสู่เครื่องกาชา"
            ]
        }
    };

    let currentLang = localStorage.getItem('nw_lang') || 'en';
    
    function t(key) { return i18n[currentLang]?.[key] || i18n.en[key]; }
    
    function render() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (t(key)) el.textContent = t(key);
        });
        
        const tagLabels = { new: currentLang === 'zh' ? '新' : currentLang === 'th' ? 'ใหม่' : 'NEW', hot: currentLang === 'zh' ? '熱' : currentLang === 'th' ? 'ฮอต' : 'HOT', whale: currentLang === 'zh' ? '課長' : currentLang === 'th' ? 'เวล' : 'WHALE' };
        
        document.getElementById('menuGrid').innerHTML = t('menu').map(item => `
            <div class="menu-card">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-3xl">${item.emoji}</span>
                    <div class="flex gap-1">${item.tags.map(tag => `<span class="tag tag-${tag}">${tagLabels[tag]}</span>`).join('')}</div>
                </div>
                <h3 class="font-fun text-xl text-orange-400 mb-2">${item.name}</h3>
                <p class="text-gray-400 text-sm mb-3">${item.desc}</p>
                <div class="price text-lg">${item.price}</div>
            </div>
        `).join('');
        
        document.getElementById('reviewsSection').innerHTML = t('reviews').map(r => `
            <div class="review">
                <div class="flex items-center gap-3 mb-2">
                    <span class="text-2xl">${r.avatar}</span>
                    <div>
                        <div class="font-semibold">${r.user}</div>
                        <div class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
                    </div>
                </div>
                <p class="text-gray-300 italic">"${r.text}"</p>
            </div>
        `).join('');
        
        document.getElementById('rulesList').innerHTML = t('rules').map(r => `<li>${r}</li>`).join('');
    }
    
    render();
    window.addEventListener('nw-lang-change', (e) => { currentLang = e.detail?.lang || 'en'; render(); });
    </script>
</body>
</html>
