<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>NumbahWan TCG | AI Battle Demo</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700; --orange: #ff6b00; --purple: #a855f7; --blue: #3b82f6;
            --green: #22c55e; --red: #ef4444; --dark: #0a0a0f; --mythic: #ff00ff;
            --cyan: #00ffff; --log: #c97f3d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--dark); 
            color: #fff;
        }
        
        /* Battle Arena Background */
        .arena-bg {
            position: fixed; inset: 0; z-index: -2;
            background: url('/static/guild-base.jpg') center center / cover no-repeat;
            filter: brightness(0.6) saturate(1.2);
        }
        .arena-overlay {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(ellipse at 50% 100%, rgba(255,107,0,0.15) 0%, transparent 50%),
                linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.6) 100%);
        }
        
        /* Header */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 10px 16px;
            background: linear-gradient(180deg, rgba(10,10,15,0.98), rgba(10,10,15,0.85));
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255,107,0,0.3);
        }
        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 800;
            color: var(--gold); text-decoration: none;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        .nav-links { display: flex; gap: 8px; align-items: center; }
        .nav-link {
            padding: 8px 14px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            color: #fff; font-size: 13px; text-decoration: none; font-weight: 600;
        }
        .nav-link:hover { background: rgba(255,107,0,0.2); border-color: var(--orange); }
        
        /* Language Toggle */
        .lang-toggle { display: flex; gap: 4px; background: rgba(0,0,0,0.4); padding: 3px; border-radius: 8px; }
        .lang-btn { padding: 6px 10px; border: none; background: transparent;
            color: rgba(255,255,255,0.5); font-size: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .lang-btn.active { background: linear-gradient(135deg, var(--orange), var(--gold)); color: #fff; }
        
        /* Main Battle Area */
        main {
            padding: 70px 16px 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Guild HP Bars */
        .hp-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hp-bar-container {
            flex: 1;
            max-width: 45%;
        }
        .hp-bar-container.enemy { text-align: right; }
        .hp-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hp-bar-container.enemy .hp-label { flex-direction: row-reverse; }
        .hp-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--green);
        }
        .hp-value.low { color: var(--red); }
        .hp-value.mid { color: var(--gold); }
        .hp-bar {
            height: 16px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), #84cc16);
            border-radius: 6px;
            transition: width 0.5s ease-out;
            position: relative;
        }
        .hp-fill.low { background: linear-gradient(90deg, var(--red), #f97316); }
        .hp-fill.mid { background: linear-gradient(90deg, var(--gold), #f59e0b); }
        .hp-fill::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%);
        }
        
        .vs-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        /* Energy Display */
        .energy-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
        }
        .energy-crystals {
            display: flex;
            gap: 4px;
        }
        .energy-crystal {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--blue), #1d4ed8);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
            transition: all 0.3s;
        }
        .energy-crystal.spent {
            background: rgba(59,130,246,0.2);
            box-shadow: none;
        }
        .energy-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--blue);
        }
        
        /* Battle Boards */
        .battle-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            min-height: 140px;
        }
        .board.enemy { border-color: rgba(239,68,68,0.3); }
        .board.player { border-color: rgba(59,130,246,0.3); }
        
        .board-slot {
            aspect-ratio: 5/7;
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: rgba(255,255,255,0.1);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .board-slot:hover { border-color: var(--gold); background: rgba(255,215,0,0.1); }
        .board-slot.has-card {
            border-style: solid;
            border-color: var(--gold);
            background: transparent;
        }
        .board-slot.targetable {
            animation: targetPulse 1s infinite;
        }
        @keyframes targetPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(239,68,68,0.5); }
            50% { box-shadow: 0 0 20px rgba(239,68,68,0.8); }
        }
        
        /* Board Card */
        .board-card {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .board-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .board-card .card-stats-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 4px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
        }
        .board-card .stat-atk { color: var(--red); }
        .board-card .stat-hp { color: var(--green); }
        .board-card.attacking {
            animation: attackAnimation 0.5s ease-out;
        }
        @keyframes attackAnimation {
            0% { transform: translateY(0); }
            30% { transform: translateY(-20px) scale(1.1); }
            60% { transform: translateY(20px); }
            100% { transform: translateY(0); }
        }
        .board-card.damaged {
            animation: damageFlash 0.3s ease-out;
        }
        @keyframes damageFlash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(2) saturate(0) sepia(1) hue-rotate(-30deg); }
        }
        
        /* Damage Numbers */
        .damage-number {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--red);
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000;
            animation: damageFloat 1s ease-out forwards;
            z-index: 100;
            pointer-events: none;
        }
        .damage-number.crit {
            font-size: 32px;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold);
        }
        .damage-number.heal {
            color: var(--green);
        }
        .damage-number.dodge {
            color: var(--purple);
            font-size: 18px;
        }
        @keyframes damageFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
        }
        
        /* Hand Section */
        .hand-section {
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 16px 16px 0 0;
            border: 2px solid rgba(59,130,246,0.3);
            border-bottom: none;
        }
        .hand-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .hand {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .hand::-webkit-scrollbar { height: 4px; }
        .hand::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 2px; }
        
        .hand-card {
            flex-shrink: 0;
            width: 80px;
            aspect-ratio: 5/7;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .hand-card:hover {
            transform: translateY(-10px) scale(1.1);
            border-color: var(--gold);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hand-card.selected {
            transform: translateY(-20px);
            border-color: var(--orange);
            box-shadow: 0 0 20px var(--orange);
        }
        .hand-card.unplayable {
            opacity: 0.4;
            filter: grayscale(0.5);
        }
        .hand-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hand-card .cost-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, var(--blue), #1d4ed8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            border: 2px solid #fff;
        }
        .hand-card .rarity-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .hand-card .rarity-glow.mythic { box-shadow: inset 0 0 15px var(--mythic); }
        .hand-card .rarity-glow.legendary { box-shadow: inset 0 0 12px var(--gold); }
        .hand-card .rarity-glow.epic { box-shadow: inset 0 0 10px var(--purple); }
        
        /* Action Buttons */
        .action-bar {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            border-radius: 0 0 16px 16px;
            justify-content: center;
        }
        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn.attack {
            background: linear-gradient(135deg, var(--red), #dc2626);
            color: #fff;
        }
        .action-btn.end-turn {
            background: linear-gradient(135deg, var(--green), #16a34a);
            color: #fff;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Turn Indicator */
        .turn-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: rgba(0,0,0,0.9);
            border: 3px solid var(--gold);
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold);
            z-index: 200;
            animation: turnPop 0.5s ease-out;
            display: none;
        }
        .turn-indicator.show { display: block; }
        @keyframes turnPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        /* Battle Log */
        .battle-log {
            position: fixed;
            bottom: 220px;
            right: 16px;
            width: 280px;
            max-height: 200px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 12px;
            overflow-y: auto;
            font-size: 11px;
            z-index: 50;
        }
        .battle-log::-webkit-scrollbar { width: 4px; }
        .battle-log::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 2px; }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            line-height: 1.4;
        }
        .log-entry:last-child { border-bottom: none; }
        .log-entry.damage { color: var(--red); }
        .log-entry.heal { color: var(--green); }
        .log-entry.crit { color: var(--gold); font-weight: 700; }
        .log-entry.dodge { color: var(--purple); }
        .log-entry.summon { color: var(--blue); }
        .log-entry.ability { color: var(--orange); }
        
        /* Start Screen */
        .start-screen {
            position: fixed;
            inset: 0;
            background: rgba(10,10,15,0.98);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .start-screen.hidden { display: none; }
        .start-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .start-subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
        }
        .difficulty-select {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }
        .difficulty-btn {
            padding: 16px 32px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .difficulty-btn:hover {
            border-color: var(--gold);
            background: rgba(255,215,0,0.1);
        }
        .difficulty-btn.easy { border-color: var(--green); }
        .difficulty-btn.easy:hover { background: rgba(34,197,94,0.2); }
        .difficulty-btn.medium { border-color: var(--gold); }
        .difficulty-btn.medium:hover { background: rgba(255,215,0,0.2); }
        .difficulty-btn.hard { border-color: var(--red); }
        .difficulty-btn.hard:hover { background: rgba(239,68,68,0.2); }
        .start-btn {
            padding: 20px 60px;
            background: linear-gradient(135deg, var(--orange), var(--gold));
            border: none;
            border-radius: 16px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(255,107,0,0.5);
        }
        
        /* Game Over Screen */
        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(10,10,15,0.95);
            z-index: 400;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .game-over.show { display: flex; }
        .game-over.victory .result-title { color: var(--gold); }
        .game-over.defeat .result-title { color: var(--red); }
        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(40px, 10vw, 72px);
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 40px currentColor;
        }
        .result-stats {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 40px;
            line-height: 2;
        }
        .play-again-btn {
            padding: 16px 48px;
            background: linear-gradient(135deg, var(--orange), var(--gold));
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
        }
        
        /* Tooltip */
        .card-tooltip {
            position: fixed;
            z-index: 500;
            background: rgba(10,10,15,0.98);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 16px;
            max-width: 280px;
            display: none;
            pointer-events: none;
        }
        .card-tooltip.show { display: block; }
        .tooltip-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }
        .tooltip-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .tooltip-stat { display: flex; align-items: center; gap: 4px; }
        .tooltip-abilities {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        .tooltip-ability {
            padding: 4px 8px;
            background: rgba(255,107,0,0.2);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--orange);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .battle-log { display: none; }
            .board { min-height: 120px; }
            .hand-card { width: 70px; }
        }
    </style>
    <link rel="stylesheet" href="/static/nw-card-frames.css">
    <script src="/static/nw-cards.js"></script>
    <script src="/static/nw-card-renderer.js"></script>
    <script src="/static/nw-game-juice.js"></script>
    <script src="/static/nw-3d-engine.js"></script>
</head>
<body>
    <div class="arena-bg"></div>
    <div class="arena-overlay"></div>
    
    <header>
        <a href="/" class="logo">🔥 NumbahWan TCG</a>
        <nav class="nav-links">
            <a href="/cards" class="nav-link" data-i18n="navCards">Cards</a>
            <a href="/deckbuilder" class="nav-link" data-i18n="navDeck">Deck</a>
            <a href="/guide" class="nav-link" data-i18n="navGuide">Guide</a>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
                <button class="lang-btn" data-lang="th">ไทย</button>
            </div>
        </nav>
    </header>
    
    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <div class="start-title" data-i18n="battleTitle">⚔️ BATTLE DEMO</div>
        <div class="start-subtitle" data-i18n="battleSubtitle">Test your deck against the AI</div>
        <div class="difficulty-select">
            <button class="difficulty-btn easy" data-difficulty="easy" data-i18n="easy">🟢 Easy</button>
            <button class="difficulty-btn medium" data-difficulty="medium" data-i18n="medium">🟡 Medium</button>
            <button class="difficulty-btn hard" data-difficulty="hard" data-i18n="hard">🔴 Hard</button>
        </div>
        <button class="start-btn" id="startBtn" data-i18n="startBattle">🎮 START BATTLE</button>
    </div>
    
    <!-- Main Game Area -->
    <main>
        <!-- HP Bars -->
        <div class="hp-section">
            <div class="hp-bar-container enemy">
                <div class="hp-label">
                    <span class="hp-value" id="enemyHpValue">30</span>
                    <span data-i18n="enemyGuild">ENEMY GUILD</span>
                </div>
                <div class="hp-bar">
                    <div class="hp-fill" id="enemyHpFill" style="width: 100%"></div>
                </div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="hp-bar-container player">
                <div class="hp-label">
                    <span data-i18n="yourGuild">YOUR GUILD</span>
                    <span class="hp-value" id="playerHpValue">30</span>
                </div>
                <div class="hp-bar">
                    <div class="hp-fill" id="playerHpFill" style="width: 100%"></div>
                </div>
            </div>
        </div>
        
        <!-- Energy Display -->
        <div class="energy-display">
            <div class="energy-label" data-i18n="turn">TURN <span id="turnNumber">1</span></div>
            <div class="energy-crystals" id="energyCrystals"></div>

            <span class="tooltip-stat">💎 <span id="tooltipCost">0</span></span>

    <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // 🎮 NumbahWan TCG - AI Battle Demo
    // Full game mechanics implementation with CRIT, DODGE, abilities, and AI
    // ═══════════════════════════════════════════════════════════════════════════
    
    // Translations
    const i18n = {
        en: {
            battleTitle: '⚔️ BATTLE DEMO',
            battleSubtitle: 'Test your deck against the AI',
            easy: '🟢 Easy', medium: '🟡 Medium', hard: '🔴 Hard',

            enemyGuild: 'ENEMY GUILD', yourGuild: 'YOUR GUILD',

        },

            turn: '回合', yourHand: '你的手牌',
            attack: '⚔️ 攻击', endTurn: '✓ 结束回合',
            battleStart: '⚔️ 战斗开始！',
            yourTurn: '你的回合', enemyTurn: '敌方回合',
            victory: '胜利！', defeat: '失败！',
            playAgain: '🔄 再来一局',
            navCards: '卡牌', navDeck: '卡组', navGuide: '攻略',
            summons: '召唤', attacks: '攻击', for: '造成',
            damage: '伤害', crit: '暴击！', dodge: '闪避！',
            dies: '死亡', heals: '治疗'
        },
        th: {
            battleTitle: '⚔️ สาธิตการต่อสู้',
            battleSubtitle: 'ทดสอบเด็คของคุณกับ AI',
            easy: '🟢 ง่าย', medium: '🟡 ปานกลาง', hard: '🔴 ยาก',
            startBattle: '🎮 เริ่มการต่อสู้',
            enemyGuild: 'กิลด์ศัตรู', yourGuild: 'กิลด์ของคุณ',
            turn: 'เทิร์น', yourHand: 'มือของคุณ',
            attack: '⚔️ โจมตี', endTurn: '✓ จบเทิร์น',
            battleStart: '⚔️ การต่อสู้เริ่มขึ้น!',
            yourTurn: 'เทิร์นของคุณ', enemyTurn: 'เทิร์นศัตรู',
            victory: 'ชัยชนะ!', defeat: 'พ่ายแพ้!',
            playAgain: '🔄 เล่นอีกครั้ง',
            navCards: 'การ์ด', navDeck: 'เด็ค', navGuide: 'คู่มือ',
            summons: 'เรียก', attacks: 'โจมตี', for: 'ทำ',
            damage: 'ดาเมจ', crit: 'คริติคอล!', dodge: 'หลบ!',
            dies: 'ตาย', heals: 'รักษา'
        }
    };
    
    let currentLang = localStorage.getItem('nw_lang') || 'en';
    function t(key) { return i18n[currentLang]?.[key] || i18n.en[key] || key; }
    
    // Game Constants
    const MAX_GUILD_HP = 30;
    const MAX_ENERGY = 10;
    const MAX_HAND = 10;
    const MAX_BOARD = 5;
    const STARTING_HAND = 5;
    
    // Keyword Effects
    const KEYWORDS = {
        CARRY: { effect: 'onKill', desc: '+1 ATK permanent per kill' },
        CLUTCH: { effect: 'onLowHP', desc: '+5 ATK when Guild HP < 10' },
        RUSH: { effect: 'haste', desc: 'Can attack immediately' },
        TAUNT: { effect: 'taunt', desc: 'Must be attacked first' },
        STEALTH: { effect: 'stealth', desc: "Can't be targeted until attacks" },
        GRINDER: { effect: 'startTurn', desc: '+1/+1 at start of each turn' },
        TOXIC: { effect: 'onDamaged', desc: 'Deal 2 damage back to attacker' },
        LEECH: { effect: 'onDamage', desc: 'Heal Guild HP equal to damage' },
        RAGEQUIT: { effect: 'onDeath', desc: 'Deal ATK damage to all enemies' },
        COMEBACK: { effect: 'onDeath', desc: 'Return to hand (once)' },
        AFK: { effect: 'endTurn', desc: "Can't attack, regen 3 HP" },
        SIMP: { effect: 'sacrifice', desc: 'Destroy to buff ally +3/+3' },
        HYPE: { effect: 'aura', desc: 'Adjacent allies +2 ATK' },
        BUFF: { effect: 'battlecry', desc: 'Give ally +2/+2' }
    };
    
    // Audio Context for sound effects
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioCtx();
        }
    }
    
    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        const sounds = {
            attack: () => { osc.frequency.value = 200; gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.stop(now + 0.2); },
            crit: () => { osc.frequency.value = 600; gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.stop(now + 0.3); },
            dodge: () => { osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(400, now + 0.15); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.stop(now + 0.15); },
            summon: () => { osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.2); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25); osc.stop(now + 0.25); },
            death: () => { osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.3); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35); osc.stop(now + 0.35); },
            victory: () => { const notes = [523, 659, 784, 1047]; notes.forEach((f, i) => { setTimeout(() => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.frequency.value = f; g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.3); }, i * 150); }); return; },
            defeat: () => { osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.8); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8); osc.stop(now + 0.8); }
        };
        
        osc.type = 'square';
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now);
        sounds[type]?.();
    }
    
    // Game State
    let gameState = {
        playerHP: MAX_GUILD_HP,
        enemyHP: MAX_GUILD_HP,
        turn: 1,
        energy: 1,
        maxEnergy: 1,
        isPlayerTurn: true,
        playerHand: [],
        enemyHand: [],
        playerBoard: [null, null, null, null, null],
        enemyBoard: [null, null, null, null, null],
        playerDeck: [],
        enemyDeck: [],
        selectedCard: null,
        difficulty: 'medium',
        stats: { damageDealt: 0, cardsPlayed: 0, turns: 0 }
    };
    
    let allCards = [];
    
    // Load cards from JSON
    async function loadCards() {
        try {
            const res = await fetch('/static/data/cards-v2.json?v=' + Date.now());
            const data = await res.json();
            allCards = data.cards.filter(c => c.category === 'member' && c.gameStats);
            console.log(`Loaded ${allCards.length} playable cards`);
        } catch (e) {
            console.error('Failed to load cards:', e);
        }
    }
    
    // Create a deck
    function createDeck(isEnemy = false) {
        const deck = [];
        const difficultyMod = { easy: 0.7, medium: 1, hard: 1.3 }[gameState.difficulty];
        
        // Build a balanced deck
        const rarityWeights = isEnemy && gameState.difficulty === 'hard'
            ? { mythic: 5, legendary: 15, epic: 30, rare: 30, uncommon: 15, common: 5 }
            : { mythic: 2, legendary: 8, epic: 20, rare: 30, uncommon: 25, common: 15 };
        
        const cardsByRarity = {};
        allCards.forEach(c => {
            if (!cardsByRarity[c.rarity]) cardsByRarity[c.rarity] = [];
            cardsByRarity[c.rarity].push(c);
        });
        
        // Add 25 cards to deck
        for (let i = 0; i < 25; i++) {
            const roll = Math.random() * 100;
            let cumulative = 0;
            let selectedRarity = 'common';
            
            for (const [rarity, weight] of Object.entries(rarityWeights)) {
                cumulative += weight;
                if (roll < cumulative && cardsByRarity[rarity]?.length > 0) {
                    selectedRarity = rarity;
                    break;
                }
            }
            
            const pool = cardsByRarity[selectedRarity] || cardsByRarity.common || allCards;
            const card = pool[Math.floor(Math.random() * pool.length)];
            if (card) {
                // Clone card with current stats
                const cardInstance = {
                    ...card,
                    instanceId: Math.random().toString(36).substr(2, 9),
                    currentAtk: card.gameStats.atk,
                    currentHp: card.gameStats.hp,
                    maxHp: card.gameStats.hp,
                    hasAttacked: false,
                    canAttackThisTurn: false,
                    stealthActive: card.abilities?.includes('STEALTH'),
                    comebackUsed: false
                };
                deck.push(cardInstance);
            }
        }
        
        // Shuffle deck
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        
        return deck;
    }
    
    // Draw cards
    function drawCards(isEnemy, count = 1) {
        const deck = isEnemy ? gameState.enemyDeck : gameState.playerDeck;
        const hand = isEnemy ? gameState.enemyHand : gameState.playerHand;
        
        for (let i = 0; i < count && deck.length > 0 && hand.length < MAX_HAND; i++) {
            hand.push(deck.pop());
        }
        
        if (!isEnemy) renderHand();
    }
    
    // Render hand
    function renderHand() {
        const handEl = document.getElementById('playerHand');
        handEl.innerHTML = gameState.playerHand.map((card, idx) => {
            const canPlay = card.gameStats.cost <= gameState.energy && gameState.isPlayerTurn;
            return `
                <div class="hand-card ${canPlay ? '' : 'unplayable'} ${gameState.selectedCard === idx ? 'selected' : ''}"
                     data-idx="${idx}"
                     onmouseenter="showTooltip(event, ${idx})"
                     onmouseleave="hideTooltip()"
                     onclick="selectHandCard(${idx})">
                    <img src="/static/images/cards/thumbs/${card.img?.replace(/\.(png|jpg)$/i, '.webp')}" 
                         onerror="this.src='/static/images/cards/${card.img}'" alt="${card.name}">
                    <div class="cost-badge">${card.gameStats.cost}</div>
                    <div class="rarity-glow ${card.rarity}"></div>
                </div>
            `;
        }).join('');
        
        document.getElementById('handCount').textContent = `${gameState.playerHand.length}/${MAX_HAND}`;
        
        // Enable tilt effects on hand cards
        const handCards = handEl.querySelectorAll('.hand-card');
        handCards.forEach(cardEl => {
            if (typeof NW_3D !== 'undefined') {
                NW_3D.card.enableTilt(cardEl, 12);
            }
        });
    }
    
    // Render boards
    function renderBoards() {
        const boards = [
            { board: gameState.playerBoard, el: document.getElementById('playerBoard'), isEnemy: false },
            { board: gameState.enemyBoard, el: document.getElementById('enemyBoard'), isEnemy: true }
        ];
        
        boards.forEach(({ board, el, isEnemy }) => {
            const slots = el.querySelectorAll('.board-slot');
            slots.forEach((slot, idx) => {
                const card = board[idx];
                if (card) {
                    slot.innerHTML = `
                        <div class="board-card" data-id="${card.instanceId}">
                            <img src="/static/images/cards/thumbs/${card.img?.replace(/\.(png|jpg)$/i, '.webp')}" 
                                 onerror="this.src='/static/images/cards/${card.img}'" alt="${card.name}">
                            <div class="card-stats-overlay">
                                <span class="stat-atk">⚔️${card.currentAtk}</span>
                                <span class="stat-hp">❤️${card.currentHp}</span>
                            </div>
                        </div>
                    `;
                    slot.classList.add('has-card');
                    slot.onclick = isEnemy ? () => attackTarget(idx) : null;
                    
                    // Enable 3D tilt effect on board cards
                    const boardCard = slot.querySelector('.board-card');
                    if (boardCard && typeof NW_3D !== 'undefined') {
                        NW_3D.card.enableTilt(boardCard, 10);
                    }
                } else {
                    slot.innerHTML = isEnemy ? '?' : '+';
                    slot.classList.remove('has-card');
                    slot.onclick = !isEnemy ? () => playCardToSlot(idx) : null;
                }
            });
        });
    }
    
    // Select hand card
    function selectHandCard(idx) {
        const card = gameState.playerHand[idx];
        if (!card || card.gameStats.cost > gameState.energy || !gameState.isPlayerTurn) return;
        
        gameState.selectedCard = gameState.selectedCard === idx ? null : idx;
        renderHand();
    }
    
    // Play card to slot
    function playCardToSlot(slotIdx) {
        if (gameState.selectedCard === null || gameState.playerBoard[slotIdx]) return;
        
        const card = gameState.playerHand[gameState.selectedCard];
        if (card.gameStats.cost > gameState.energy) return;
        
        // Pay cost
        gameState.energy -= card.gameStats.cost;
        
        // Place on board
        card.canAttackThisTurn = card.abilities?.includes('RUSH');
        card.hasAttacked = false;
        gameState.playerBoard[slotIdx] = card;
        gameState.playerHand.splice(gameState.selectedCard, 1);
        gameState.selectedCard = null;
        gameState.stats.cardsPlayed++;
        
        playSound('summon');
        addLog(`You ${t('summons')} <span style="color:var(--gold)">${card.name}</span>`, 'summon');
        
        // Battlecry effects
        handleBattlecry(card, false, slotIdx);
        
        renderHand();
        renderBoards();
        
        // Enhanced summon animation with NW_3D
        setTimeout(() => {
            const boardEl = document.getElementById('playerBoard');
            const cardEl = boardEl.querySelector(`[data-slot="${slotIdx}"] .board-card`);
            if (cardEl && typeof NW_3D !== 'undefined') {
                NW_3D.card.summon(cardEl);
            }
            if (typeof NW_JUICE !== 'undefined') {
                NW_JUICE.haptic.medium();
            }
        }, 50);
        updateEnergy();
        updateAttackButton();
    }
    
    // Handle battlecry abilities
    function handleBattlecry(card, isEnemy, slotIdx) {
        if (!card.abilities) return;
        
        if (card.abilities.includes('BUFF')) {
            // Buff a random ally
            const board = isEnemy ? gameState.enemyBoard : gameState.playerBoard;
            const allies = board.filter((c, i) => c && i !== slotIdx);
            if (allies.length > 0) {
                const target = allies[Math.floor(Math.random() * allies.length)];
                target.currentAtk += 2;
                target.currentHp += 2;
                target.maxHp += 2;
                addLog(`${card.name} buffs ${target.name} +2/+2`, 'ability');
            }
        }
        
        if (card.abilities.includes('HYPE')) {
            // Buff adjacent cards
            const board = isEnemy ? gameState.enemyBoard : gameState.playerBoard;
            [slotIdx - 1, slotIdx + 1].forEach(i => {
                if (i >= 0 && i < MAX_BOARD && board[i]) {
                    board[i].currentAtk += 2;
                    addLog(`${card.name} HYPE buffs ${board[i].name} +2 ATK`, 'ability');
                }
            });
        }
    }
    
    // Attack logic
    function attackTarget(targetIdx) {
        if (!gameState.isPlayerTurn) return;
        
        // Find an attacker that can attack
        const attackerIdx = gameState.playerBoard.findIndex(c => 
            c && c.canAttackThisTurn && !c.hasAttacked && !c.abilities?.includes('AFK')
        );
        
        if (attackerIdx === -1) return;
        
        const attacker = gameState.playerBoard[attackerIdx];
        const target = gameState.enemyBoard[targetIdx];
        
        // Check for taunt
        const hasTaunt = gameState.enemyBoard.some(c => c && c.abilities?.includes('TAUNT') && !c.stealthActive);
        if (hasTaunt && (!target || !target.abilities?.includes('TAUNT'))) {
            addLog('Must attack TAUNT first!', 'ability');
            return;
        }
        
        // Check stealth
        if (target?.stealthActive) {
            addLog(`${target.name} has STEALTH!`, 'ability');
            return;
        }
        
        // Remove attacker stealth
        if (attacker.stealthActive) {
            attacker.stealthActive = false;
        }
        
        // Perform attack
        performAttack(attacker, target, attackerIdx, targetIdx, false);
        attacker.hasAttacked = true;
        
        renderBoards();
        updateAttackButton();
    }
    
    // Perform attack
    function performAttack(attacker, defender, attackerSlot, defenderSlot, isEnemyAttacker) {
        let damage = attacker.currentAtk;
        let isCrit = false;
        let isDodge = false;
        
        // Calculate CLUTCH bonus
        const attackerHP = isEnemyAttacker ? gameState.enemyHP : gameState.playerHP;
        if (attacker.abilities?.includes('CLUTCH') && attackerHP <= 10) {
            damage += 5;
            addLog(`${attacker.name} CLUTCH! +5 ATK`, 'ability');
        }
        
        // Check CRIT
        const critChance = attacker.gameStats?.crit || 0;
        if (Math.random() * 100 < critChance) {
            damage *= 2;
            isCrit = true;
        }
        
        // Animation - Enhanced with NW_3D and NW_JUICE
        const attackerBoard = isEnemyAttacker ? document.getElementById('enemyBoard') : document.getElementById('playerBoard');
        const defenderBoard = isEnemyAttacker ? document.getElementById('playerBoard') : document.getElementById('enemyBoard');
        const attackerCard = attackerBoard.querySelector(`[data-slot="${attackerSlot}"] .board-card`);
        const defenderCard = defenderBoard.querySelector(`[data-slot="${defenderSlot}"] .board-card`);
        
        // Use NW_3D for attack animation if available
        if (typeof NW_3D !== 'undefined' && attackerCard && defenderCard) {
            NW_3D.battle.attack(attackerCard, defenderCard, damage, isCrit);
        } else {
            if (attackerCard) attackerCard.classList.add('attacking');
            setTimeout(() => attackerCard?.classList.remove('attacking'), 500);
        }
        
        if (defender) {
            // Check DODGE
            const dodgeChance = defender.gameStats?.dodge || 0;
            if (Math.random() * 100 < dodgeChance) {
                isDodge = true;
                playSound('dodge');
                addLog(`${defender.name} ${t('dodge')}`, 'dodge');
                showDamageNumber(defenderSlot, 'DODGE!', 'dodge', isEnemyAttacker);
                return;
            }
            
            // Deal damage to defender
            defender.currentHp -= damage;
            gameState.stats.damageDealt += damage;
            
            playSound(isCrit ? 'crit' : 'attack');
            const dmgClass = isCrit ? 'crit' : 'damage';
            addLog(`${attacker.name} ${t('attacks')} ${defender.name} ${t('for')} ${damage} ${isCrit ? t('crit') : t('damage')}`, dmgClass);
            showDamageNumber(defenderSlot, damage, isCrit ? 'crit' : '', isEnemyAttacker);
            
            // TOXIC retaliation
            if (defender.abilities?.includes('TOXIC')) {
                attacker.currentHp -= 2;
                addLog(`${defender.name} TOXIC! ${attacker.name} takes 2 damage`, 'ability');
            }
            
            // LEECH healing
            if (attacker.abilities?.includes('LEECH')) {
                const healAmount = Math.min(damage, MAX_GUILD_HP - (isEnemyAttacker ? gameState.enemyHP : gameState.playerHP));
                if (isEnemyAttacker) gameState.enemyHP += healAmount;
                else gameState.playerHP += healAmount;
                addLog(`${attacker.name} LEECH ${t('heals')} ${healAmount}`, 'heal');
                updateHP();
            }
            
            // Check if defender dies
            if (defender.currentHp <= 0) {
                handleDeath(defender, defenderSlot, isEnemyAttacker);
                
                // CARRY bonus
                if (attacker.abilities?.includes('CARRY')) {
                    attacker.currentAtk += 1;
                    addLog(`${attacker.name} CARRY! +1 ATK permanent`, 'ability');
                }
            }
            
            // Check if attacker dies from toxic
            if (attacker.currentHp <= 0) {
                handleDeath(attacker, attackerSlot, !isEnemyAttacker);
            }
        } else {
            // Attack face (Guild HP)
            if (isEnemyAttacker) {
                gameState.playerHP -= damage;
            } else {
                gameState.enemyHP -= damage;
            }
            
            playSound(isCrit ? 'crit' : 'attack');
            const targetName = isEnemyAttacker ? t('yourGuild') : t('enemyGuild');
            addLog(`${attacker.name} ${t('attacks')} ${targetName} ${t('for')} ${damage} ${isCrit ? t('crit') : t('damage')}`, isCrit ? 'crit' : 'damage');
            gameState.stats.damageDealt += damage;
            
            updateHP();
            checkGameOver();
        }
    }
    
    // Handle card death
    function handleDeath(card, slot, isOnEnemyBoard) {
        playSound('death');
        addLog(`${card.name} ${t('dies')}!`, 'damage');
        
        // Enhanced death animation with NW_3D
        const boardEl = isOnEnemyBoard ? document.getElementById('enemyBoard') : document.getElementById('playerBoard');
        const cardEl = boardEl.querySelector(`[data-slot="${slot}"] .board-card`);
        if (cardEl && typeof NW_3D !== 'undefined') {
            // Use NW_3D death animation without waiting (continues in background)
            NW_3D.battle.death(cardEl).catch(() => {});
        }
        
        const board = isOnEnemyBoard ? gameState.enemyBoard : gameState.playerBoard;
        
        // RAGEQUIT - damage all enemies
        if (card.abilities?.includes('RAGEQUIT')) {
            const enemyBoard = isOnEnemyBoard ? gameState.playerBoard : gameState.enemyBoard;
            enemyBoard.forEach((c, i) => {
                if (c) {
                    c.currentHp -= card.currentAtk;
                    addLog(`${card.name} RAGEQUIT deals ${card.currentAtk} to ${c.name}`, 'ability');
                    if (c.currentHp <= 0) {
                        handleDeath(c, i, !isOnEnemyBoard);
                    }
                }
            });
        }
        
        // COMEBACK - return to hand
        if (card.abilities?.includes('COMEBACK') && !card.comebackUsed) {
            card.comebackUsed = true;
            card.currentHp = card.maxHp;
            card.currentAtk = card.gameStats.atk;
            const hand = isOnEnemyBoard ? gameState.enemyHand : gameState.playerHand;
            if (hand.length < MAX_HAND) {
                hand.push(card);
                addLog(`${card.name} COMEBACK returns to hand!`, 'ability');
            }
        }
        
        board[slot] = null;
        renderBoards();
    }
    
    // Show damage number animation
    function showDamageNumber(slot, value, type, isOnEnemyBoard) {
        const board = isOnEnemyBoard ? document.getElementById('enemyBoard') : document.getElementById('playerBoard');
        const slotEl = board.querySelector(`[data-slot="${slot}"]`);
        if (!slotEl) return;
        
        const dmgEl = document.createElement('div');
        dmgEl.className = `damage-number ${type}`;
        dmgEl.textContent = type === 'dodge' ? value : `-${value}`;
        
        const rect = slotEl.getBoundingClientRect();
        dmgEl.style.left = rect.left + rect.width / 2 + 'px';
        dmgEl.style.top = rect.top + 'px';
        
        document.body.appendChild(dmgEl);
        setTimeout(() => dmgEl.remove(), 1000);
    }
    
    // Update HP display
    function updateHP() {
        const playerFill = document.getElementById('playerHpFill');
        const enemyFill = document.getElementById('enemyHpFill');
        const playerValue = document.getElementById('playerHpValue');
        const enemyValue = document.getElementById('enemyHpValue');
        
        const playerPct = Math.max(0, gameState.playerHP / MAX_GUILD_HP * 100);
        const enemyPct = Math.max(0, gameState.enemyHP / MAX_GUILD_HP * 100);
        
        playerFill.style.width = playerPct + '%';
        enemyFill.style.width = enemyPct + '%';
        
        playerFill.className = 'hp-fill' + (playerPct <= 30 ? ' low' : playerPct <= 60 ? ' mid' : '');
        enemyFill.className = 'hp-fill' + (enemyPct <= 30 ? ' low' : enemyPct <= 60 ? ' mid' : '');
        
        playerValue.textContent = Math.max(0, gameState.playerHP);
        enemyValue.textContent = Math.max(0, gameState.enemyHP);
        
        playerValue.className = 'hp-value' + (playerPct <= 30 ? ' low' : playerPct <= 60 ? ' mid' : '');
        enemyValue.className = 'hp-value' + (enemyPct <= 30 ? ' low' : enemyPct <= 60 ? ' mid' : '');
    }
    
    // Update energy display
    function updateEnergy() {
        document.getElementById('energyCurrent').textContent = gameState.energy;
        document.getElementById('energyMax').textContent = gameState.maxEnergy;
        
        const crystals = document.getElementById('energyCrystals');
        crystals.innerHTML = '';
        for (let i = 0; i < gameState.maxEnergy; i++) {
            const crystal = document.createElement('div');
            crystal.className = 'energy-crystal' + (i >= gameState.energy ? ' spent' : '');
            crystals.appendChild(crystal);
        }
    }
    
    // Update attack button
    function updateAttackButton() {
        const canAttack = gameState.playerBoard.some(c => 
            c && c.canAttackThisTurn && !c.hasAttacked && !c.abilities?.includes('AFK')
        );
        document.getElementById('btnAttack').disabled = !canAttack || !gameState.isPlayerTurn;
    }
    
    // Add to battle log
    function addLog(message, type = '') {
        const log = document.getElementById('battleLog');
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + type;
        entry.innerHTML = message;
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
    }
    
    // Check game over
    function checkGameOver() {
        if (gameState.playerHP <= 0) {
            endGame(false);
        } else if (gameState.enemyHP <= 0) {
            endGame(true);
        }
    }
    
    // End game
    function endGame(victory) {
        playSound(victory ? 'victory' : 'defeat');
        
        const gameOver = document.getElementById('gameOver');
        gameOver.className = 'game-over show ' + (victory ? 'victory' : 'defeat');
        document.getElementById('resultTitle').textContent = victory ? t('victory') : t('defeat');
        document.getElementById('resultStats').innerHTML = `
            Turns: ${gameState.stats.turns}<br>
            Damage Dealt: ${gameState.stats.damageDealt}<br>
            Cards Played: ${gameState.stats.cardsPlayed}
        `;
    }
    
    // End turn
    function endTurn() {
        if (!gameState.isPlayerTurn) return;
        
        // End of turn effects
        handleEndOfTurn(false);
        
        gameState.isPlayerTurn = false;
        showTurnIndicator(t('enemyTurn'));
        
        // AI turn
        setTimeout(aiTurn, 1500);
    }
    
    // Handle end of turn effects
    function handleEndOfTurn(isEnemy) {
        const board = isEnemy ? gameState.enemyBoard : gameState.playerBoard;
        
        board.forEach(card => {
            if (!card) return;
            
            // AFK regeneration
            if (card.abilities?.includes('AFK')) {
                const heal = Math.min(3, card.maxHp - card.currentHp);
                card.currentHp += heal;
                if (heal > 0) addLog(`${card.name} AFK regenerates ${heal} HP`, 'heal');
            }
        });
        
        renderBoards();
    }
    
    // Handle start of turn effects
    function handleStartOfTurn(isEnemy) {
        const board = isEnemy ? gameState.enemyBoard : gameState.playerBoard;
        
        board.forEach(card => {
            if (!card) return;
            
            // GRINDER growth
            if (card.abilities?.includes('GRINDER')) {
                card.currentAtk += 1;
                card.currentHp += 1;
                card.maxHp += 1;
                addLog(`${card.name} GRINDER grows +1/+1`, 'ability');
            }
            
            // Reset attack state
            card.hasAttacked = false;
            card.canAttackThisTurn = true;
        });
        
        renderBoards();
    }
    
    // AI Turn
    function aiTurn() {
        gameState.stats.turns++;
        
        // Increase energy
        gameState.maxEnergy = Math.min(MAX_ENERGY, gameState.maxEnergy + 1);
        let aiEnergy = gameState.maxEnergy;
        
        // Draw card
        drawCards(true, 1);
        
        // Start of turn effects
        handleStartOfTurn(true);
        
        // Play cards (AI logic)
        const playableCards = gameState.enemyHand
            .map((c, i) => ({ card: c, idx: i }))
            .filter(({ card }) => card.gameStats.cost <= aiEnergy)
            .sort((a, b) => b.card.gameStats.cost - a.card.gameStats.cost);
        
        const playDelay = 800;
        let currentDelay = 0;
        
        playableCards.forEach(({ card, idx }) => {
            const emptySlot = gameState.enemyBoard.findIndex(s => s === null);
            if (emptySlot !== -1 && card.gameStats.cost <= aiEnergy) {
                currentDelay += playDelay;
                setTimeout(() => {
                    aiEnergy -= card.gameStats.cost;
                    card.canAttackThisTurn = card.abilities?.includes('RUSH');
                    card.hasAttacked = false;
                    gameState.enemyBoard[emptySlot] = card;
                    
                    const cardIdx = gameState.enemyHand.indexOf(card);
                    if (cardIdx > -1) gameState.enemyHand.splice(cardIdx, 1);
                    
                    playSound('summon');
                    addLog(`Enemy ${t('summons')} <span style="color:var(--red)">${card.name}</span>`, 'summon');
                    
                    handleBattlecry(card, true, emptySlot);
                    renderBoards();
                }, currentDelay);
            }
        });
        
        // AI attacks
        currentDelay += playDelay;
        setTimeout(() => {
            aiAttackPhase();
        }, currentDelay);
    }
    
    // AI Attack Phase
    function aiAttackPhase() {
        const attackers = gameState.enemyBoard.filter(c => 
            c && !c.hasAttacked && c.canAttackThisTurn && !c.abilities?.includes('AFK')
        );
        
        let delay = 0;
        const attackDelay = 600;
        
        attackers.forEach(attacker => {
            delay += attackDelay;
            setTimeout(() => {
                const attackerIdx = gameState.enemyBoard.indexOf(attacker);
                
                // Check for taunt targets
                const tauntTargets = gameState.playerBoard
                    .map((c, i) => ({ card: c, idx: i }))
                    .filter(({ card }) => card && card.abilities?.includes('TAUNT') && !card.stealthActive);
                
                let targetIdx = -1;
                
                if (tauntTargets.length > 0) {
                    // Must attack taunt
                    targetIdx = tauntTargets[0].idx;
                } else {
                    // Find valid targets (non-stealth)
                    const validTargets = gameState.playerBoard
                        .map((c, i) => ({ card: c, idx: i }))
                        .filter(({ card }) => card && !card.stealthActive);
                    
                    // AI decision: attack minions or face?
                    const goFace = Math.random() < (gameState.difficulty === 'hard' ? 0.3 : 0.5);
                    
                    if (validTargets.length > 0 && !goFace) {
                        // Attack lowest HP minion
                        validTargets.sort((a, b) => a.card.currentHp - b.card.currentHp);
                        targetIdx = validTargets[0].idx;
                    }
                }
                
                const target = targetIdx >= 0 ? gameState.playerBoard[targetIdx] : null;
                performAttack(attacker, target, attackerIdx, targetIdx, true);
                attacker.hasAttacked = true;
                
                renderBoards();
                checkGameOver();
            }, delay);
        });
        
        // End AI turn
        delay += attackDelay + 500;
        setTimeout(() => {
            handleEndOfTurn(true);
            startPlayerTurn();
        }, delay);
    }
    
    // Start player turn
    function startPlayerTurn() {
        gameState.turn++;
        gameState.maxEnergy = Math.min(MAX_ENERGY, gameState.maxEnergy + 1);
        gameState.energy = gameState.maxEnergy;
        gameState.isPlayerTurn = true;
        
        document.getElementById('turnNumber').textContent = gameState.turn;
        
        // Draw card
        drawCards(false, 1);
        
        // Start of turn effects
        handleStartOfTurn(false);
        
        showTurnIndicator(t('yourTurn'));
        updateEnergy();
        updateAttackButton();
    }
    
    // Show turn indicator
    function showTurnIndicator(text) {
        const indicator = document.getElementById('turnIndicator');
        indicator.textContent = text;
        indicator.classList.add('show');
        setTimeout(() => indicator.classList.remove('show'), 1500);
    }
    
    // Tooltip functions
    function showTooltip(e, idx) {
        const card = gameState.playerHand[idx];
        if (!card) return;
        
        const tooltip = document.getElementById('cardTooltip');
        document.getElementById('tooltipName').textContent = card.name;
        document.getElementById('tooltipAtk').textContent = card.gameStats?.atk || 0;
        document.getElementById('tooltipHp').textContent = card.gameStats?.hp || 0;
        document.getElementById('tooltipCost').textContent = card.gameStats?.cost || 0;
        
        const abilitiesEl = document.getElementById('tooltipAbilities');
        abilitiesEl.innerHTML = (card.abilities || []).map(a => 
            `<span class="tooltip-ability" title="${KEYWORDS[a]?.desc || ''}">${a}</span>`
        ).join('');
        
        tooltip.style.left = Math.min(e.pageX + 15, window.innerWidth - 300) + 'px';
        tooltip.style.top = Math.max(e.pageY - 150, 10) + 'px';
        tooltip.classList.add('show');
    }
    
    function hideTooltip() {
        document.getElementById('cardTooltip').classList.remove('show');
    }
    
    // Language update
    function updateLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('nw_lang', lang);
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.lang === lang);
        });
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (i18n[lang]?.[key]) el.textContent = i18n[lang][key];
        });
    }
    
    // Start game
    function startGame() {
        initAudio();
        
        // Reset state
        gameState = {
            playerHP: MAX_GUILD_HP,
            enemyHP: MAX_GUILD_HP,
            turn: 1,
            energy: 1,
            maxEnergy: 1,
            isPlayerTurn: true,
            playerHand: [],
            enemyHand: [],
            playerBoard: [null, null, null, null, null],
            enemyBoard: [null, null, null, null, null],
            playerDeck: createDeck(false),
            enemyDeck: createDeck(true),
            selectedCard: null,
            difficulty: gameState.difficulty,
            stats: { damageDealt: 0, cardsPlayed: 0, turns: 1 }
        };
        
        // Draw starting hands
        drawCards(false, STARTING_HAND);
        drawCards(true, STARTING_HAND);
        
        // Update UI
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('gameOver').className = 'game-over';
        document.getElementById('battleLog').innerHTML = `<div class="log-entry">${t('battleStart')}</div>`;
        
        updateHP();
        updateEnergy();
        renderBoards();
        
        showTurnIndicator(t('yourTurn'));
        updateAttackButton();
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        await loadCards();
        
        // Difficulty buttons
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.style.transform = 'scale(1)');
                btn.style.transform = 'scale(1.1)';
                gameState.difficulty = btn.dataset.difficulty;
            });
        });
        
        // Start button
        document.getElementById('startBtn').addEventListener('click', startGame);
        
        // End turn button
        document.getElementById('btnEndTurn').addEventListener('click', endTurn);
        
        // Attack button - attack face by default
        document.getElementById('btnAttack').addEventListener('click', () => {
            // Find attacker and attack face
            const attackerIdx = gameState.playerBoard.findIndex(c => 
                c && c.canAttackThisTurn && !c.hasAttacked && !c.abilities?.includes('AFK')
            );
            if (attackerIdx === -1) return;
            
            // Check for taunt
            const hasTaunt = gameState.enemyBoard.some(c => c && c.abilities?.includes('TAUNT') && !c.stealthActive);
            if (hasTaunt) {
                addLog('Must attack TAUNT first!', 'ability');
                return;
            }
            
            const attacker = gameState.playerBoard[attackerIdx];
            performAttack(attacker, null, attackerIdx, -1, false);
            attacker.hasAttacked = true;
            
            renderBoards();
            updateAttackButton();
        });
        
        // Play again button
        document.getElementById('playAgainBtn').addEventListener('click', () => {
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('gameOver').className = 'game-over';
        });
        
        // Language toggle
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
        });
        
        updateLanguage(currentLang);
    });
    </script>
</body>
</html>
