<?xml version="1.0" encoding="UTF-8"?>
<!--
  NumbahWan TCG - Physical Card Back Template
  Size: 65mm x 90mm (with 1mm bleed)
  Safe Zone: 63mm x 88mm
  
  QR Code placeholder: 20mm x 20mm centered
  All cards share this same back design
-->
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 65 90" 
     width="65mm" 
     height="90mm">
  
  <defs>
    <!-- Background Pattern -->
    <pattern id="bg-pattern" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#0f0f23"/>
      <circle cx="4" cy="4" r="0.5" fill="#1a1a3e" opacity="0.5"/>
    </pattern>
    
    <!-- Gold Gradient for Logo -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ff9500"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    
    <!-- Cyan Gradient for Accents -->
    <linearGradient id="cyan-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00f5d4"/>
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Clip path for rounded corners -->
    <clipPath id="card-clip">
      <rect x="1" y="1" width="63" height="88" rx="3" ry="3"/>
    </clipPath>
  </defs>
  
  <!-- Bleed Area Background -->
  <rect width="65" height="90" fill="#0a0a1a"/>
  
  <!-- Card Content -->
  <g clip-path="url(#card-clip)">
    
    <!-- Main Background -->
    <rect x="1" y="1" width="63" height="88" fill="url(#bg-pattern)"/>
    
    <!-- Decorative Border Lines -->
    <rect x="3" y="3" width="59" height="84" fill="none" 
          stroke="url(#gold-gradient)" stroke-width="0.5" rx="2" opacity="0.4"/>
    <rect x="5" y="5" width="55" height="80" fill="none" 
          stroke="url(#cyan-gradient)" stroke-width="0.3" rx="1.5" opacity="0.3"/>
    
    <!-- Top Section: NUMBAHWAN TCG Title -->
    <g transform="translate(32.5, 12)">
      <!-- Decorative line above -->
      <line x1="-20" y1="-4" x2="20" y2="-4" stroke="url(#gold-gradient)" stroke-width="0.3" opacity="0.6"/>
      
      <!-- Title -->
      <text x="0" y="0" font-family="Arial Black, Arial" font-size="4" fill="url(#gold-gradient)" 
            text-anchor="middle" font-weight="bold" filter="url(#glow)">NUMBAHWAN</text>
      <text x="0" y="4" font-family="Arial" font-size="2.5" fill="#94a3b8" 
            text-anchor="middle" letter-spacing="3">T C G</text>
      
      <!-- Decorative line below -->
      <line x1="-20" y1="7" x2="20" y2="7" stroke="url(#gold-gradient)" stroke-width="0.3" opacity="0.6"/>
    </g>
    
    <!-- Center Section: Guild Emblem -->
    <g transform="translate(32.5, 32)">
      <!-- Outer ring -->
      <circle cx="0" cy="0" r="10" fill="none" stroke="url(#gold-gradient)" stroke-width="0.5" opacity="0.6"/>
      
      <!-- Inner emblem background -->
      <circle cx="0" cy="0" r="8" fill="#0f0f23" stroke="url(#cyan-gradient)" stroke-width="0.3"/>
      
      <!-- Guild Emblem (NW Logo) -->
      <text x="0" y="3" font-family="Arial Black, Arial" font-size="8" fill="url(#gold-gradient)" 
            text-anchor="middle" font-weight="bold" filter="url(#glow)">NW</text>
      
      <!-- Small decorative elements -->
      <circle cx="-7" cy="-7" r="1" fill="url(#gold-gradient)" opacity="0.4"/>
      <circle cx="7" cy="-7" r="1" fill="url(#gold-gradient)" opacity="0.4"/>
      <circle cx="-7" cy="7" r="1" fill="url(#gold-gradient)" opacity="0.4"/>
      <circle cx="7" cy="7" r="1" fill="url(#gold-gradient)" opacity="0.4"/>
    </g>
    
    <!-- Set Name -->
    <text x="32.5" y="48" font-family="Arial Black, Arial" font-size="2.5" fill="url(#cyan-gradient)" 
          text-anchor="middle" letter-spacing="1">ORIGINS SET</text>
    
    <!-- QR Code Section -->
    <g transform="translate(32.5, 62)">
      <!-- QR Background Box -->
      <rect x="-11" y="-11" width="22" height="22" rx="1" fill="#ffffff"/>
      
      <!-- QR Code Placeholder - Replace with actual QR -->
      <rect x="-10" y="-10" width="20" height="20" fill="#ffffff" id="qr-placeholder"/>
      <!-- Replace with: <image x="-10" y="-10" width="20" height="20" href="{{QR_CODE_IMAGE}}"/> -->
      
      <!-- Placeholder pattern (remove when adding real QR) -->
      <g fill="#000000" opacity="0.2">
        <rect x="-9" y="-9" width="3" height="3"/>
        <rect x="6" y="-9" width="3" height="3"/>
        <rect x="-9" y="6" width="3" height="3"/>
        <rect x="-4" y="-4" width="8" height="8" fill="none" stroke="#000" stroke-width="0.5"/>
        <text x="0" y="0" font-size="2" text-anchor="middle" fill="#666">QR</text>
      </g>
    </g>
    
    <!-- Scan instruction -->
    <text x="32.5" y="78" font-family="Arial" font-size="1.8" fill="#6b7280" 
          text-anchor="middle">Scan to claim your digital card!</text>
    
    <!-- Claim URL -->
    <text x="32.5" y="82" font-family="monospace" font-size="2" fill="url(#cyan-gradient)" 
          text-anchor="middle" font-weight="bold">nwg.gg/claim</text>
    
    <!-- Copyright -->
    <text x="32.5" y="87" font-family="Arial" font-size="1.5" fill="#4b5563" 
          text-anchor="middle">© 2026 NumbahWan Guild</text>
    
  </g>
  
  <!-- Cut Line Guide (remove for final print) -->
  <rect x="1" y="1" width="63" height="88" fill="none" stroke="#ff0000" stroke-width="0.1" 
        stroke-dasharray="1,1" opacity="0.3"/>

</svg>
