<?xml version="1.0" encoding="UTF-8"?>
<!--
  NumbahWan TCG - Physical Card Front Template
  Size: 65mm x 90mm (with 1mm bleed)
  Safe Zone: 63mm x 88mm
  Resolution: Design at 300 DPI
  
  Usage: Replace placeholders with card data
  - {{CARD_ART}}: Card artwork (full bleed background)
  - {{CARD_NAME}}: Card name text
  - {{RARITY}}: Rarity level (mythic, legendary, epic, rare, uncommon, common)
  - {{CATEGORY}}: Category (Member, Moment, Gear, Vibe, Spot)
  - {{ROLE}}: Role name
  - {{SET_NUMBER}}: Set number (e.g., OG-001)
  - {{PRINT_NUMBER}}: Print number (e.g., #47/250)
  - {{NWG_VALUE}}: NWG value (e.g., 1,500)
  - {{DAILY_YIELD}}: Daily yield (e.g., 5.0)
-->
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 65 90" 
     width="65mm" 
     height="90mm">
  
  <!-- Definitions -->
  <defs>
    <!-- Rarity Gradients -->
    <linearGradient id="mythic-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    
    <linearGradient id="legendary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    
    <linearGradient id="epic-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    
    <linearGradient id="rare-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="uncommon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280"/>
      <stop offset="100%" style="stop-color:#9ca3af"/>
    </linearGradient>
    
    <linearGradient id="common-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4b5563"/>
      <stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
    
    <!-- Holographic Foil Pattern (for premium cards) -->
    <pattern id="holo-pattern" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="url(#mythic-gradient)" opacity="0.3"/>
      <circle cx="2" cy="2" r="1" fill="white" opacity="0.5"/>
    </pattern>
    
    <!-- Card Frame -->
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Clip path for rounded corners -->
    <clipPath id="card-clip">
      <rect x="1" y="1" width="63" height="88" rx="3" ry="3"/>
    </clipPath>
  </defs>
  
  <!-- Bleed Area Background (full 65x90) -->
  <rect width="65" height="90" fill="#1a1a2e"/>
  
  <!-- Card Content (within safe zone) -->
  <g clip-path="url(#card-clip)">
    
    <!-- Card Art Placeholder (full bleed within frame) -->
    <rect x="1" y="1" width="63" height="88" fill="#2a2a4e" id="art-area"/>
    <!-- Replace with: <image x="1" y="1" width="63" height="88" href="{{CARD_ART}}"/> -->
    
    <!-- First Edition Badge (top left) -->
    <g transform="translate(3, 3)">
      <rect width="14" height="4" rx="1" fill="rgba(0,0,0,0.7)"/>
      <text x="7" y="2.8" font-family="Arial Black, Arial" font-size="2" fill="#ffd700" 
            text-anchor="middle" font-weight="bold">1ST ED</text>
    </g>
    
    <!-- Rarity Badge (top right) -->
    <g transform="translate(48, 3)">
      <rect width="14" height="4" rx="1" fill="url(#{{RARITY}}-gradient)" filter="url(#card-shadow)"/>
      <text x="7" y="2.8" font-family="Arial Black, Arial" font-size="1.8" fill="white" 
            text-anchor="middle" font-weight="bold">{{RARITY_LABEL}}</text>
    </g>
    
    <!-- Set Number (bottom left of art) -->
    <g transform="translate(3, 62)">
      <rect width="10" height="3.5" rx="0.5" fill="rgba(0,0,0,0.8)"/>
      <text x="5" y="2.5" font-family="monospace" font-size="1.8" fill="#00d4ff" 
            text-anchor="middle">{{SET_NUMBER}}</text>
    </g>
    
    <!-- Print Number (bottom right of art) -->
    <g transform="translate(52, 62)">
      <rect width="10" height="3.5" rx="0.5" fill="rgba(0,0,0,0.8)"/>
      <text x="5" y="2.5" font-family="monospace" font-size="1.6" fill="#94a3b8" 
            text-anchor="middle">{{PRINT_NUMBER}}</text>
    </g>
    
    <!-- Card Info Panel (bottom section) -->
    <rect x="1" y="66" width="63" height="23" fill="rgba(15, 15, 35, 0.95)"/>
    
    <!-- Card Name -->
    <text x="32.5" y="73" font-family="Arial Black, Arial" font-size="3.2" fill="white" 
          text-anchor="middle" font-weight="bold">{{CARD_NAME}}</text>
    
    <!-- Category • Role -->
    <text x="32.5" y="77" font-family="Arial" font-size="2" fill="#94a3b8" text-anchor="middle">
      {{CATEGORY}} • {{ROLE}}
    </text>
    
    <!-- Divider Line -->
    <line x1="5" y1="79" x2="60" y2="79" stroke="url(#{{RARITY}}-gradient)" stroke-width="0.3"/>
    
    <!-- NWG Value -->
    <g transform="translate(8, 81)">
      <text x="0" y="3" font-family="Arial" font-size="1.8" fill="#94a3b8">NWG:</text>
      <text x="7" y="3" font-family="Arial Black" font-size="2.2" fill="#00d4ff">◆{{NWG_VALUE}}</text>
    </g>
    
    <!-- Daily Yield -->
    <g transform="translate(38, 81)">
      <text x="0" y="3" font-family="Arial" font-size="1.8" fill="#94a3b8">YIELD:</text>
      <text x="10" y="3" font-family="Arial Black" font-size="2.2" fill="#22c55e">{{DAILY_YIELD}}/day</text>
    </g>
    
    <!-- NW Logo (bottom right) -->
    <g transform="translate(55, 84)">
      <circle cx="3" cy="3" r="3" fill="url(#mythic-gradient)" opacity="0.8"/>
      <text x="3" y="4" font-family="Arial Black" font-size="2.5" fill="white" 
            text-anchor="middle" font-weight="bold">NW</text>
    </g>
    
  </g>
  
  <!-- Cut Line Guides (for printer - remove for final) -->
  <rect x="1" y="1" width="63" height="88" fill="none" stroke="#ff0000" stroke-width="0.1" 
        stroke-dasharray="1,1" opacity="0.3"/>
  
</svg>
