<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>PAGE_TITLE | NumbahWan TCG</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Core Styles -->
    <style>
        /* ========== CSS VARIABLES (Design System) ========== */
        :root {
            /* Brand Colors */
            --nw-gold: #ffd700;
            --nw-orange: #ff6b00;
            --nw-purple: #a855f7;
            --nw-blue: #3b82f6;
            --nw-green: #22c55e;
            --nw-red: #ef4444;
            --nw-dark: #0a0a0f;
            --nw-mythic: #ff00ff;
            --nw-cyan: #00ffff;
            --nw-log: #c97f3d;
            
            /* Z-Index Scale */
            --nw-z-base: 1;
            --nw-z-dropdown: 100;
            --nw-z-sticky: 200;
            --nw-z-fixed: 300;
            --nw-z-nav: 500;
            --nw-z-drawer: 600;
            --nw-z-modal: 700;
            --nw-z-overlay: 800;
            --nw-z-toast: 900;
            --nw-z-loader: 1000;
            
            /* Spacing */
            --nw-header-height: 60px;
            --nw-safe-top: 70px;
            --nw-safe-bottom: 80px;
        }
        
        /* ========== RESET & BASE ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--nw-dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* ========== BACKGROUND ========== */
        .nw-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse at top, rgba(255,107,0,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(168,85,247,0.08) 0%, transparent 40%),
                var(--nw-dark);
        }
        
        /* ========== HEADER ========== */
        .nw-header {
            position: sticky;
            top: 0;
            z-index: var(--nw-z-sticky);
            padding: 12px 16px;
            padding-left: 60px; /* Space for nav toggle */
            background: rgba(10,10,15,0.98);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255,107,0,0.3);
            min-height: var(--nw-header-height);
        }
        
        .nw-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--nw-gold);
            text-decoration: none;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        /* ========== MAIN CONTENT ========== */
        .nw-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: var(--nw-safe-bottom);
            min-height: calc(100vh - var(--nw-header-height));
        }
        
        /* ========== TYPOGRAPHY ========== */
        .nw-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--nw-gold);
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
            margin-bottom: 1rem;
        }
        
        .nw-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        
        /* ========== CARDS & CONTAINERS ========== */
        .nw-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .nw-card-highlight {
            border-color: var(--nw-orange);
            box-shadow: 0 0 20px rgba(255,107,0,0.2);
        }
        
        /* ========== BUTTONS ========== */
        .nw-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-decoration: none;
        }
        
        .nw-btn-primary {
            background: linear-gradient(135deg, var(--nw-orange), var(--nw-gold));
            color: #000;
        }
        
        .nw-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,107,0,0.4);
        }
        
        .nw-btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .nw-btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--nw-gold);
        }
        
        /* ========== TOAST NOTIFICATIONS ========== */
        #nw-toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: var(--nw-z-toast);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .nw-toast {
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
            max-width: 320px;
        }
        
        .nw-toast-success { background: var(--nw-green); color: #fff; }
        .nw-toast-error { background: var(--nw-red); color: #fff; }
        .nw-toast-info { background: var(--nw-blue); color: #fff; }
        .nw-toast-warning { background: #f59e0b; color: #000; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* ========== LOADING STATES ========== */
        .nw-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .nw-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,107,0,0.2);
            border-top-color: var(--nw-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .nw-header { padding: 10px 12px; padding-left: 50px; }
            .nw-main { padding: 16px; }
            .nw-title { font-size: 1.5rem; }
        }
    </style>
    
    <!-- PAGE-SPECIFIC STYLES HERE -->
    <style>
        /* Add your page-specific CSS here */
    </style>
</head>

<body data-page-id="PAGE_ID">
    <!-- Background -->
    <div class="nw-bg"></div>
    
    <!-- Toast Container -->
    <div id="nw-toast-container"></div>
    
    <!-- Header -->
    <header class="nw-header">
        <a href="/" class="nw-logo">🔥 NumbahWan</a>
        <!-- Add header actions here -->
    </header>
    
    <!-- Main Content -->
    <main class="nw-main">
        <h1 class="nw-title" data-i18n="pageTitle">PAGE_TITLE</h1>
        <p class="nw-subtitle" data-i18n="pageSubtitle">PAGE_SUBTITLE</p>
        
        <!-- Your content here -->
        <div class="nw-card">
            <p>Content goes here...</p>
        </div>
    </main>
    
    <!-- ========== SCRIPTS ========== -->
    <!-- Core modules (order matters!) -->
    <script src="/static/nw-storage.js"></script>
    <script src="/static/nw-errors.js"></script>
    <script src="/static/nw-sounds.js"></script>
    <script src="/static/nw-wallet.js"></script>
    <script src="/static/nw-nav.js"></script>
    <script src="/static/nw-i18n-core.js"></script>
    
    <!-- Deferred modules -->
    <script src="/static/nw-guide.js" defer></script>
    
    <!-- Page-specific modules (uncomment as needed) -->
    <!-- <script src="/static/nw-forge-engine.js"></script> -->
    <!-- <script src="/static/nw-battle-engine.js"></script> -->
    <!-- <script src="/static/nw-card-upgrade.js"></script> -->
    
    <!-- Toast helper -->
    <script>
        function showToast(message, type = 'info') {
            const container = document.getElementById('nw-toast-container');
            const toast = document.createElement('div');
            toast.className = `nw-toast nw-toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        window.showToast = showToast;
    </script>
    
    <!-- i18n (translations) -->
    <script>
        const PAGE_I18N = {
            pageTitle: {
                en: 'PAGE_TITLE',
                zh: '頁面標題',
                th: 'ชื่อหน้า'
            },
            pageSubtitle: {
                en: 'PAGE_SUBTITLE',
                zh: '頁面副標題',
                th: 'คำบรรยายหน้า'
            }
        };
        
        function applyI18n(lang = 'en') {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                const text = PAGE_I18N[key]?.[lang] || PAGE_I18N[key]?.en || key;
                el.textContent = text;
            });
        }
        
        // Listen for language changes
        window.addEventListener('nw-lang-change', (e) => applyI18n(e.detail?.lang || 'en'));
    </script>
    
    <!-- Page initialization -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize navigation
            if (typeof NW_NAV !== 'undefined') {
                NW_NAV.init('PAGE_ID');
            }
            
            // Apply initial language
            const lang = localStorage.getItem('nw_lang') || 'en';
            applyI18n(lang);
            
            // Your page initialization code here
            console.log('[PAGE_ID] Page loaded');
        });
    </script>
</body>
</html>
