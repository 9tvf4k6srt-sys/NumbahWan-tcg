<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Black Jade Gradient - Deep obsidian with jade undertones -->
    <linearGradient id="jadeBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="20%" stop-color="#0d1f0d"/>
      <stop offset="40%" stop-color="#1a3a2a"/>
      <stop offset="60%" stop-color="#0a1510"/>
      <stop offset="80%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#050a05"/>
    </linearGradient>
    
    <!-- Jade Shine - Mystical green glow -->
    <linearGradient id="jadeShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#00cc66"/>
      <stop offset="100%" stop-color="#009944"/>
    </linearGradient>
    
    <!-- Jade Edge Highlight -->
    <linearGradient id="jadeEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Inner Core Glow -->
    <radialGradient id="coreGlow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#00cc66" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#009944" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Premium Outer Glow -->
    <filter id="jadeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00ff88" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Facet Shadow -->
    <filter id="facetShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Mystical Aura -->
  <ellipse cx="32" cy="32" rx="28" ry="28" fill="url(#coreGlow)" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Main Gem Body - Hexagonal Cut -->
  <g filter="url(#jadeGlow)">
    <!-- Base hexagon shape -->
    <polygon points="32,6 54,18 54,46 32,58 10,46 10,18" 
             fill="url(#jadeBody)" 
             stroke="#00ff88" 
             stroke-width="1.5"
             stroke-opacity="0.6"/>
    
    <!-- Top facet (brightest) -->
    <polygon points="32,6 54,18 32,26 10,18" 
             fill="#1a3a2a" 
             opacity="0.9"/>
    <polygon points="32,10 48,20 32,26 16,20" 
             fill="url(#coreGlow)" 
             opacity="0.8"/>
    
    <!-- Left facet -->
    <polygon points="10,18 32,26 32,50 10,46" 
             fill="#0d1f0d" 
             opacity="0.95"/>
    
    <!-- Right facet (highlight) -->
    <polygon points="54,18 54,46 32,50 32,26" 
             fill="#152515" 
             opacity="0.9"/>
    
    <!-- Bottom point -->
    <polygon points="32,50 54,46 32,58 10,46" 
             fill="#050a05" 
             opacity="0.95"/>
    
    <!-- Inner mystical symbol -->
    <circle cx="32" cy="32" r="8" fill="none" stroke="url(#jadeShine)" stroke-width="1.5" opacity="0.7">
      <animate attributeName="r" values="8;9;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Center jade eye -->
    <ellipse cx="32" cy="32" rx="4" ry="4" fill="#00ff88" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="32" cy="30" rx="2" ry="1.5" fill="#88ffbb" opacity="0.9"/>
    
    <!-- Shine lines on facets -->
    <line x1="20" y1="14" x2="30" y2="18" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
    <line x1="34" y1="12" x2="44" y2="16" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
    <line x1="48" y1="24" x2="42" y2="36" stroke="#00ff88" stroke-width="0.5" opacity="0.3"/>
  </g>
  
  <!-- Edge highlights -->
  <line x1="32" y1="6" x2="54" y2="18" stroke="url(#jadeEdge)" stroke-width="2"/>
  <line x1="32" y1="6" x2="10" y2="18" stroke="url(#jadeEdge)" stroke-width="2"/>
  
  <!-- Sparkles -->
  <circle cx="44" cy="12" r="2" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;1.2;2" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="14" r="1.5" fill="#88ffbb">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="36" r="1.5" fill="#00ff88">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="14" cy="38" r="1.2" fill="#88ffbb">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Floating runes effect -->
  <text x="24" y="28" font-size="6" fill="#00ff88" opacity="0.4" font-family="serif">✦</text>
  <text x="38" y="40" font-size="5" fill="#00ff88" opacity="0.3" font-family="serif">✦</text>
</svg>