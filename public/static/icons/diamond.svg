<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Diamond Body Gradient -->
    <linearGradient id="diamondBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0FFFF"/>
      <stop offset="25%" stop-color="#00BFFF"/>
      <stop offset="50%" stop-color="#87CEEB"/>
      <stop offset="75%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#4169E1"/>
    </linearGradient>
    
    <!-- Diamond Shine -->
    <linearGradient id="diamondShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Inner Glow -->
    <radialGradient id="diamondGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00BFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4169E1" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Outer Glow Filter -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#00BFFF" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Aura -->
  <ellipse cx="32" cy="32" rx="26" ry="26" fill="url(#diamondGlow)" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Main Diamond -->
  <g filter="url(#blueGlow)">
    <!-- Crown (top) -->
    <polygon points="32,4 48,20 16,20" fill="#87CEEB"/>
    <polygon points="32,4 40,20 32,16 24,20" fill="#E0FFFF"/>
    
    <!-- Girdle (middle band) -->
    <polygon points="16,20 48,20 52,28 12,28" fill="url(#diamondBody)"/>
    
    <!-- Pavilion (bottom) -->
    <polygon points="12,28 52,28 32,58" fill="url(#diamondBody)"/>
    
    <!-- Left facet -->
    <polygon points="12,28 32,58 32,32" fill="#4169E1" opacity="0.6"/>
    
    <!-- Right facet highlight -->
    <polygon points="52,28 32,58 32,32" fill="#00BFFF" opacity="0.5"/>
    
    <!-- Top shine -->
    <polygon points="32,4 40,20 32,16" fill="#FFFFFF" opacity="0.7"/>
    
    <!-- Central brilliance -->
    <polygon points="24,20 40,20 36,28 28,28" fill="#FFFFFF" opacity="0.5"/>
  </g>
  
  <!-- Edge highlight -->
  <line x1="32" y1="4" x2="48" y2="20" stroke="url(#diamondShine)" stroke-width="2"/>
  <line x1="32" y1="4" x2="16" y2="20" stroke="url(#diamondShine)" stroke-width="2"/>
  
  <!-- Sparkles -->
  <circle cx="40" cy="10" r="2" fill="#FFFFFF">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="24" r="1.5" fill="#E0FFFF">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="32" r="1.5" fill="#FFFFFF">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>