<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Outer Golden Glow -->
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Rune Glow -->
    <filter id="runeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="1"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Deep Brown Wood Gradient -->
    <linearGradient id="darkWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5D3A1A"/>
      <stop offset="25%" stop-color="#4D2E0B"/>
      <stop offset="50%" stop-color="#3D2610"/>
      <stop offset="75%" stop-color="#4D2E0B"/>
      <stop offset="100%" stop-color="#2D1A08"/>
    </linearGradient>
    
    <!-- Wood End Grain -->
    <radialGradient id="endGrain" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="20%" stop-color="#6B4E12"/>
      <stop offset="40%" stop-color="#8B6914"/>
      <stop offset="60%" stop-color="#5D3A1A"/>
      <stop offset="80%" stop-color="#6B4E12"/>
      <stop offset="100%" stop-color="#4D2E0B"/>
    </radialGradient>
    
    <!-- Golden Rune Color -->
    <linearGradient id="runeGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEC8B"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    
    <!-- Animated Shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0">
        <animate attributeName="offset" values="-0.5;1.5" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FFFACD" stop-opacity="0.6">
        <animate attributeName="offset" values="0;2" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0">
        <animate attributeName="offset" values="0.5;2.5" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Cosmic Aura -->
    <radialGradient id="cosmicAura" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#FF8C00" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#8B4513" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Cosmic Aura Background -->
  <ellipse cx="32" cy="32" rx="30" ry="24" fill="url(#cosmicAura)">
    <animate attributeName="rx" values="28;32;28" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="22;26;22" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Main Log Body with Glow -->
  <g filter="url(#outerGlow)">
    <!-- Log Cylinder -->
    <rect x="6" y="22" width="52" height="20" rx="10" ry="10" fill="url(#darkWood)"/>
    
    <!-- Wood Grain Texture (Dark Lines) -->
    <path d="M10 25 Q20 27, 32 24 Q44 22, 54 26" stroke="#2D1A08" stroke-width="1.2" fill="none" opacity="0.7"/>
    <path d="M8 30 Q22 33, 38 29 Q50 27, 56 31" stroke="#2D1A08" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M8 36 Q18 34, 32 37 Q46 39, 56 35" stroke="#2D1A08" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M10 40 Q24 42, 40 39 Q52 37, 54 41" stroke="#2D1A08" stroke-width="1.2" fill="none" opacity="0.7"/>
    
    <!-- Vertical Wood Cracks -->
    <path d="M18 24 L17 40" stroke="#3D2610" stroke-width="0.8" opacity="0.5"/>
    <path d="M30 23 L31 41" stroke="#3D2610" stroke-width="0.8" opacity="0.4"/>
    <path d="M44 24 L45 40" stroke="#3D2610" stroke-width="0.8" opacity="0.5"/>
    
    <!-- Left End Cap -->
    <ellipse cx="8" cy="32" rx="5" ry="10" fill="url(#endGrain)" stroke="#3D2610" stroke-width="1"/>
    <ellipse cx="8" cy="32" rx="3" ry="6" fill="none" stroke="#8B6914" stroke-width="0.5" opacity="0.6"/>
    <ellipse cx="8" cy="32" rx="1.5" ry="3" fill="#8B6914" opacity="0.7"/>
    
    <!-- Right End Cap -->
    <ellipse cx="56" cy="32" rx="5" ry="10" fill="url(#endGrain)" stroke="#3D2610" stroke-width="1"/>
    <ellipse cx="56" cy="32" rx="3" ry="6" fill="none" stroke="#8B6914" stroke-width="0.5" opacity="0.6"/>
    <ellipse cx="56" cy="32" rx="1.5" ry="3" fill="#8B6914" opacity="0.7"/>
  </g>
  
  <!-- GLOWING RUNES - The Sacred Part -->
  <g filter="url(#runeGlow)">
    <!-- Central Sacred Rune (Diamond/Star shape) -->
    <path d="M32 26 L36 32 L32 38 L28 32 Z" fill="url(#runeGold)" opacity="0.95">
      <animate attributeName="opacity" values="0.95;0.7;0.95" dur="1.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Left Rune (Ancient Symbol) -->
    <g transform="translate(20, 32)">
      <path d="M0 -4 L2 0 L0 4 L-2 0 Z" fill="url(#runeGold)" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.6;0.9" dur="1.8s" repeatCount="indefinite"/>
      </path>
      <line x1="-3" y1="0" x2="3" y2="0" stroke="#FFD700" stroke-width="1.5" opacity="0.8"/>
    </g>
    
    <!-- Right Rune (Ancient Symbol) -->
    <g transform="translate(44, 32)">
      <path d="M0 -4 L2 0 L0 4 L-2 0 Z" fill="url(#runeGold)" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2s" repeatCount="indefinite"/>
      </path>
      <line x1="-3" y1="0" x2="3" y2="0" stroke="#FFD700" stroke-width="1.5" opacity="0.8"/>
    </g>
    
    <!-- Connecting Rune Lines -->
    <path d="M24 32 L28 32" stroke="#FFD700" stroke-width="1.5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M36 32 L40 32" stroke="#FFD700" stroke-width="1.5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Top Highlight -->
  <ellipse cx="32" cy="24" rx="18" ry="2.5" fill="#FFFACD" opacity="0.25"/>
  
  <!-- Shimmer Overlay -->
  <rect x="6" y="22" width="52" height="20" rx="10" ry="10" fill="url(#shimmer)" opacity="0.5"/>
  
  <!-- Golden Sparkles -->
  <g>
    <circle cx="16" cy="16" r="1.8" fill="#FFD700">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.8;1;1.8" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="14" r="2" fill="#FFFACD">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;1.2;2" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="48" r="1.5" fill="#FFD700">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="46" r="1.6" fill="#FFFACD">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="12" r="1.4" fill="#FFD700">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="24" cy="50" r="1.2" fill="#FFFACD">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="52" r="1.3" fill="#FFD700">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>