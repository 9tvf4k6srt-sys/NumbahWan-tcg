<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Golden Outer Glow -->
    <filter id="goldenGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.9"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Wood Bark Gradient (Dark Brown) -->
    <linearGradient id="barkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5D3A1A"/>
      <stop offset="20%" stop-color="#8B4513"/>
      <stop offset="40%" stop-color="#6B3E12"/>
      <stop offset="60%" stop-color="#8B4513"/>
      <stop offset="80%" stop-color="#5D3A1A"/>
      <stop offset="100%" stop-color="#3D2610"/>
    </linearGradient>
    
    <!-- Inner Wood Gradient (Tree Rings) -->
    <radialGradient id="woodRings" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DEB887"/>
      <stop offset="15%" stop-color="#D2691E"/>
      <stop offset="30%" stop-color="#DEB887"/>
      <stop offset="45%" stop-color="#CD853F"/>
      <stop offset="60%" stop-color="#DEB887"/>
      <stop offset="75%" stop-color="#8B4513"/>
      <stop offset="90%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </radialGradient>
    
    <!-- Sacred Golden Shimmer -->
    <linearGradient id="sacredShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FFFACD" stop-opacity="0.4">
        <animate attributeName="stop-opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Golden Aura -->
    <radialGradient id="goldenAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FFD700" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Golden Aura Background -->
  <ellipse cx="32" cy="32" rx="30" ry="22" fill="url(#goldenAura)">
    <animate attributeName="rx" values="28;32;28" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="20;24;20" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Main Log Group with Golden Glow -->
  <g filter="url(#goldenGlow)">
    <!-- Log Body (Horizontal Cylinder) -->
    <rect x="8" y="20" width="48" height="24" rx="12" ry="12" fill="url(#barkGrad)"/>
    
    <!-- Bark Texture Lines -->
    <path d="M12 22 Q20 24, 28 22 Q40 20, 52 23" stroke="#3D2610" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M10 28 Q25 30, 40 27 Q50 26, 54 29" stroke="#3D2610" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M10 35 Q22 33, 38 36 Q48 37, 54 34" stroke="#3D2610" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M12 41 Q28 43, 42 40 Q50 39, 52 42" stroke="#3D2610" stroke-width="1" fill="none" opacity="0.6"/>
    
    <!-- Left End Cap (Cut Wood - Tree Rings) -->
    <ellipse cx="10" cy="32" rx="6" ry="12" fill="url(#woodRings)" stroke="#5D3A1A" stroke-width="1"/>
    <!-- Inner rings detail -->
    <ellipse cx="10" cy="32" rx="4" ry="8" fill="none" stroke="#CD853F" stroke-width="0.5" opacity="0.7"/>
    <ellipse cx="10" cy="32" rx="2.5" ry="5" fill="none" stroke="#DEB887" stroke-width="0.5" opacity="0.6"/>
    <ellipse cx="10" cy="32" rx="1" ry="2" fill="#DEB887" opacity="0.8"/>
    
    <!-- Right End Cap (Cut Wood - Tree Rings) -->
    <ellipse cx="54" cy="32" rx="6" ry="12" fill="url(#woodRings)" stroke="#5D3A1A" stroke-width="1"/>
    <!-- Inner rings detail -->
    <ellipse cx="54" cy="32" rx="4" ry="8" fill="none" stroke="#CD853F" stroke-width="0.5" opacity="0.7"/>
    <ellipse cx="54" cy="32" rx="2.5" ry="5" fill="none" stroke="#DEB887" stroke-width="0.5" opacity="0.6"/>
    <ellipse cx="54" cy="32" rx="1" ry="2" fill="#DEB887" opacity="0.8"/>
    
    <!-- Wood Grain Highlights on Bark -->
    <path d="M16 24 L16 40" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
    <path d="M24 22 L24 42" stroke="#A0522D" stroke-width="0.8" opacity="0.3"/>
    <path d="M32 23 L32 41" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
    <path d="M40 22 L40 42" stroke="#A0522D" stroke-width="0.8" opacity="0.3"/>
    <path d="M48 24 L48 40" stroke="#A0522D" stroke-width="0.8" opacity="0.4"/>
  </g>
  
  <!-- Sacred Golden Shimmer Overlay -->
  <rect x="8" y="20" width="48" height="24" rx="12" ry="12" fill="url(#sacredShimmer)"/>
  
  <!-- Top Highlight (3D effect) -->
  <ellipse cx="32" cy="22" rx="20" ry="3" fill="#FFFACD" opacity="0.3"/>
  
  <!-- Golden Sparkles -->
  <g>
    <circle cx="18" cy="14" r="2" fill="#FFD700">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;1.2;2" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="46" cy="12" r="2.5" fill="#FFFACD">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2.5;1.5;2.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="1.8" fill="#FFD700">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="48" r="2" fill="#FFFACD">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="10" r="1.5" fill="#FFD700">
      <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Sacred Symbol on Log Center -->
  <g opacity="0.8">
    <text x="32" y="36" font-family="serif" font-size="12" fill="#FFD700" text-anchor="middle" font-weight="bold" filter="url(#goldenGlow)">✦</text>
  </g>
</svg>