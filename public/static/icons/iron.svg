<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Iron/Steel Gradient -->
    <linearGradient id="ironBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="25%" stop-color="#B0C4DE"/>
      <stop offset="50%" stop-color="#708090"/>
      <stop offset="75%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#4A5568"/>
    </linearGradient>
    
    <!-- Gear Tooth Gradient -->
    <linearGradient id="gearTooth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="50%" stop-color="#708090"/>
      <stop offset="100%" stop-color="#4A5568"/>
    </linearGradient>
    
    <!-- Metallic Shine -->
    <linearGradient id="metalShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Steel Glow -->
    <filter id="steelGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#B0C4DE" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Subtle aura -->
  <circle cx="32" cy="32" r="28" fill="#B0C4DE" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Main Gear -->
  <g filter="url(#steelGlow)">
    <!-- Gear teeth (8 teeth) -->
    <g fill="url(#gearTooth)" stroke="#4A5568" stroke-width="0.5">
      <rect x="28" y="4" width="8" height="10" rx="1"/>
      <rect x="28" y="50" width="8" height="10" rx="1"/>
      <rect x="4" y="28" width="10" height="8" ry="1"/>
      <rect x="50" y="28" width="10" height="8" ry="1"/>
      <!-- Diagonal teeth -->
      <rect x="44" y="8" width="8" height="10" rx="1" transform="rotate(45, 48, 13)"/>
      <rect x="8" y="44" width="8" height="10" rx="1" transform="rotate(45, 12, 49)"/>
      <rect x="8" y="8" width="8" height="10" rx="1" transform="rotate(-45, 12, 13)"/>
      <rect x="44" y="44" width="8" height="10" rx="1" transform="rotate(-45, 48, 49)"/>
    </g>
    
    <!-- Main gear body -->
    <circle cx="32" cy="32" r="20" fill="url(#ironBody)" stroke="#4A5568" stroke-width="1.5"/>
    
    <!-- Inner details -->
    <circle cx="32" cy="32" r="15" fill="none" stroke="#708090" stroke-width="2"/>
    <circle cx="32" cy="32" r="8" fill="#4A5568" stroke="#708090" stroke-width="1"/>
    
    <!-- Center hole -->
    <circle cx="32" cy="32" r="4" fill="#2D3748"/>
    
    <!-- Spokes -->
    <line x1="32" y1="17" x2="32" y2="24" stroke="#708090" stroke-width="3"/>
    <line x1="32" y1="40" x2="32" y2="47" stroke="#708090" stroke-width="3"/>
    <line x1="17" y1="32" x2="24" y2="32" stroke="#708090" stroke-width="3"/>
    <line x1="40" y1="32" x2="47" y2="32" stroke="#708090" stroke-width="3"/>
    
    <!-- Metallic shine -->
    <ellipse cx="26" cy="24" rx="8" ry="4" fill="#FFFFFF" opacity="0.3" transform="rotate(-30, 26, 24)"/>
  </g>
  
  <!-- Sparkles -->
  <circle cx="42" cy="14" r="1.5" fill="#E8E8E8">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="44" r="1.5" fill="#B0C4DE">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>