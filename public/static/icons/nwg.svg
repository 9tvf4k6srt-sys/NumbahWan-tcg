  <!-- Crystal lines -->
  <path d="M16 5V27M8 10L24 22M24 10L8 22" stroke="#22d3ee" stroke-width="0.5" opacity="0.5"/>
  <!-- Top shine -->
  <polygon points="16,5 24,10 16,13 8,10" fill="url(#nwg-shine)"/>
  <!-- N emblem -->
  <path d="M11 11V21H13V15L19 21H21V11H19V17L13 11H11Z" fill="#ffffff"/>
  <!-- Sparkles -->
