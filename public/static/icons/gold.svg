<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Gold Coin Gradient -->
    <linearGradient id="goldCoin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE4B5"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="40%" stop-color="#FFA500"/>
      <stop offset="60%" stop-color="#FFD700"/>
      <stop offset="80%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <!-- Coin Edge Gradient -->
    <linearGradient id="coinEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    
    <!-- Shine Gradient -->
    <linearGradient id="coinShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Gold Glow -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Emboss -->
    <filter id="emboss">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur"/>
      <feOffset in="blur" dx="1" dy="1"/>
    </filter>
  </defs>
  
  <!-- Glow aura -->
  <circle cx="32" cy="32" r="28" fill="#FFD700" opacity="0.2">
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Main Coin -->
  <g filter="url(#goldGlow)">
    <!-- Coin edge (3D effect) -->
    <ellipse cx="32" cy="34" rx="24" ry="6" fill="url(#coinEdge)"/>
    
    <!-- Main coin face -->
    <circle cx="32" cy="30" r="24" fill="url(#goldCoin)" stroke="#8B6914" stroke-width="1"/>
    
    <!-- Inner ring -->
    <circle cx="32" cy="30" r="20" fill="none" stroke="#DAA520" stroke-width="2"/>
    <circle cx="32" cy="30" r="18" fill="none" stroke="#B8860B" stroke-width="1"/>
    
    <!-- N Symbol (NumbahWan) -->
    <text x="32" y="38" font-family="Orbitron, sans-serif" font-size="24" font-weight="bold" 
          fill="#B8860B" text-anchor="middle">N</text>
    <text x="31" y="37" font-family="Orbitron, sans-serif" font-size="24" font-weight="bold" 
          fill="#FFFACD" text-anchor="middle">N</text>
    
    <!-- Shine arc -->
    <ellipse cx="24" cy="22" rx="12" ry="6" fill="#FFFFFF" opacity="0.4" transform="rotate(-20, 24, 22)"/>
    <ellipse cx="22" cy="20" rx="6" ry="3" fill="#FFFFFF" opacity="0.6" transform="rotate(-20, 22, 20)"/>
  </g>
  
  <!-- Sparkles -->
  <circle cx="48" cy="18" r="2" fill="#FFFACD">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="40" r="1.5" fill="#FFD700">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="44" r="1.5" fill="#FFFACD">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.3s" repeatCount="indefinite"/>
  </circle>
</svg>