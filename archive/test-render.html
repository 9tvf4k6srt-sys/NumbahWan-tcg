<!DOCTYPE html>
<html>
<head>
<title>Card Test</title>
<link rel="stylesheet" href="/static/nw-card-frames.css">
<style>
body { background: #111; padding: 40px; display: flex; gap: 20px; flex-wrap: wrap; }
</style>
</head>
<body>
<script src="/static/nw-card-renderer.js"></script>
<script>
// Test cards
const testCards = [
    { id: 1, name: 'RegginA, The Eternal Flame', rarity: 'mythic', img: '01-reggina-mythic.jpg' },
    { id: 2, name: 'Reggino, Shadow Commander', rarity: 'legendary', img: '02-reggino-legendary.jpg' },
    { id: 3, name: 'Onca, Primal Hunter', rarity: 'epic', img: '03-onca-epic.jpg' },
    { id: 4, name: 'Vorn, Iron Knight', rarity: 'rare', img: 'rare/rare-01-vorn.jpg' },
    { id: 5, name: 'Novice Warrior', rarity: 'uncommon', img: 'uncommon/uncommon-01-novice-warrior.jpg' },
    { id: 16, name: 'Guild Slime', rarity: 'common', img: '16-guild-slime.jpg' }
];

window.onload = function() {
    testCards.forEach(card => {
        const el = NW_CARDS.render(card, { size: 'md' });
        document.body.appendChild(el);
        //console.log('Rendered:', card.name, el.outerHTML.substring(0, 200));
    });
};
</script>
</body>
</html>
