<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NWG Trailer Keyframes — Review Dashboard v2.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 2rem;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 30px;
    font-size: 0.9rem;
  }
  .timeline {
    display: flex;
    gap: 2px;
    margin-bottom: 30px;
    border-radius: 8px;
    overflow: hidden;
  }
  .timeline-segment {
    flex: 1;
    height: 6px;
    cursor: pointer;
    transition: height 0.2s;
  }
  .timeline-segment:hover { height: 12px; }
  .timeline-segment.act1 { background: #4a9eff; }
  .timeline-segment.act2 { background: #ff6b35; }
  .timeline-segment.act3 { background: #9b59b6; }
  .timeline-segment.act4 { background: #ffd700; }
  .acts-legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
    font-size: 0.85rem;
  }
  .acts-legend span { display: flex; align-items: center; gap: 6px; }
  .acts-legend .dot { width: 10px; height: 10px; border-radius: 50%; }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .scene-card {
    background: #14141f;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .scene-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(255, 215, 0, 0.1);
  }
  .scene-card img {
    width: 100%;
    display: block;
    cursor: zoom-in;
  }
  .scene-card img.zoomed {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    background: #000;
    z-index: 1000;
    cursor: zoom-out;
    border-radius: 0;
  }
  .scene-info {
    padding: 16px 20px;
  }
  .scene-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .scene-id {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .act1 .scene-id { background: #4a9eff22; color: #4a9eff; border: 1px solid #4a9eff44; }
  .act2 .scene-id { background: #ff6b3522; color: #ff6b35; border: 1px solid #ff6b3544; }
  .act3 .scene-id { background: #9b59b622; color: #9b59b6; border: 1px solid #9b59b644; }
  .act4 .scene-id { background: #ffd70022; color: #ffd700; border: 1px solid #ffd70044; }
  .scene-time {
    font-size: 0.8rem;
    color: #888;
    font-family: monospace;
  }
  .scene-name {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: #fff;
  }
  .scene-emotion {
    font-size: 0.85rem;
    color: #aaa;
    font-style: italic;
    margin-bottom: 8px;
  }
  .scene-desc {
    font-size: 0.85rem;
    color: #999;
    line-height: 1.5;
  }
  .feedback-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #2a2a3a;
  }
  .btn {
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-approve { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
  .btn-approve:hover { background: #22c55e44; }
  .btn-approve.active { background: #22c55e; color: #000; }
  .btn-flag { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
  .btn-flag:hover { background: #ef444444; }
  .btn-flag.active { background: #ef4444; color: #fff; }
  .btn-regen { background: #3b82f622; color: #3b82f6; border: 1px solid #3b82f644; }
  .btn-regen:hover { background: #3b82f644; }
  .summary-bar {
    position: sticky;
    bottom: 0;
    background: #14141f;
    border-top: 1px solid #ffd70044;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
    z-index: 100;
  }
  .summary-bar .count { color: #ffd700; font-weight: 700; }
  @media (min-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<h1>NWG Cinematic Trailer — Keyframe Review</h1>
<p class="subtitle">Phase 2: Asset Generation v3.0 — 11 Verified Keyframes | RegginA v5 locked (BLACK headband prongs, fur coat) | All 7 characters now visible | Click to zoom</p>

<div class="timeline" id="timeline"></div>
<div class="acts-legend">
  <span><span class="dot" style="background:#4a9eff"></span> ACT 1: Birth</span>
  <span><span class="dot" style="background:#ff6b35"></span> ACT 2: Wonder</span>
  <span><span class="dot" style="background:#9b59b6"></span> ACT 3: Depth</span>
  <span><span class="dot" style="background:#ffd700"></span> ACT 4: Soul</span>
</div>

<div class="grid" id="grid"></div>

<div class="summary-bar">
  <span>Approved: <span class="count" id="approvedCount">0</span>/11 | Flagged: <span class="count" id="flaggedCount" style="color:#ef4444">0</span>/11</span>
  <button class="btn btn-regen" onclick="exportFeedback()">Export Feedback JSON</button>
</div>

<script>
const scenes = [
  {
    id: "scene-01", act: "act1", name: "BIRTH — Black. Then Light.",
    time: "0:00-0:08", duration: "8s", version: "v2",
    emotion: "Mystery → wonder",
    desc: "POV first-person — new player opens eyes. Castle NumbahWan revealed in golden hour. Cherry blossoms, beacon tower flame, volumetric god rays. Castle architecture locked for consistency.",
    img: "scene-01-v2-castle-reveal.png",
    status: "verified",
    checks: "Castle architecture, golden hour, cherry blossoms, beacon tower"
  },
  {
    id: "scene-02", act: "act1", name: "THE LIVING WORLD — 8 Biomes",
    time: "0:08-0:30", duration: "22s", version: "v2",
    emotion: "Awe, scale, beauty",
    desc: "Aerial sweep: same castle as scene-01 surrounded by 8 biomes — bioluminescent mushroom forest, cherry blossom grove, wheat fields, mountains, market stalls with monkeys.",
    img: "scene-02-v2-living-world.png",
    status: "verified",
    checks: "Castle consistency with scene-01, biome variety, mushroom forest"
  },
  {
    id: "scene-03", act: "act2", name: "COMPANIONS — Player Meets CIA",
    time: "0:30-0:52", duration: "22s", version: "v2",
    emotion: "Tenderness → trust → love → CIA heart-melt",
    desc: "Enchanted forest clearing. Gender-neutral adventurer kneels to feed CIA the French Bulldog (black/tan, bat ears, CIA tactical vest). Holographic TRUST: 12% meter. Wolf REMOVED, replaced with approved Frenchie asset.",
    img: "scene-03-v2-cia-frenchie.png",
    status: "verified",
    checks: "CIA breed, CIA coloring, CIA vest text, no wolf, trust meter, forest setting"
  },
  {
    id: "scene-04", act: "act2", name: "CARDS & COMBAT — Cute Dragon Summon",
    time: "0:52-1:12", duration: "20s", version: "v3",
    emotion: "Excitement → spectacle → delight",
    desc: "Natehouoho (grey beanie, butterfly wings) summons an ADORABLE CHUBBY FAT GOLDEN DRAGON from a TCG card in a volcanic colosseum. Dragon has round belly, tiny wings, goofy grin — cute proportions with UE5 photorealistic textures.",
    img: "scene-04-v3-combat-fat-dragon.png",
    status: "verified",
    checks: "Natehouoho beanie + wings, dragon cute/fat design, UE5 realism, TCG card, arena"
  },
  {
    id: "scene-05", act: "act2", name: "CASTLE LIFE — Tavern Strategy",
    time: "1:12-1:30", duration: "18s", version: "v3",
    emotion: "Warmth, humor, belonging — HOME",
    desc: "RegginA v5 (tan skin, golden hair, BLACK headband with pointed prongs, white fur wrap coat, brown boots, golden hammer) at holographic war table. CIA the Frenchie at her feet with CIA vest. Cozy tavern, fireplace, patrons.",
    img: "scene-05-v3-tavern-reggina-cia.png",
    status: "verified",
    checks: "RegginA v5 headband+coat, CIA Frenchie vest, holo map, tavern ambiance"
  },
  {
    id: "scene-06", act: "act3", name: "DLC 1: THE ABYSS — Frost Wyrm Boss",
    time: "1:30-1:42", duration: "12s", version: "v4",
    emotion: "Danger, adrenaline, scale",
    desc: "RegginA v5 (tan skin, golden hair, BLACK headband prongs, white fur wrap coat, brown boots, golden hammer mid-swing) vs CHUBBY cute Frost Wyrm boss (round belly, tiny wings, icy scales, goofy smirk) in ice crystal cavern.",
    img: "scene-06-v4-frost-wyrm-reggina.png",
    status: "verified",
    checks: "RegginA v5 headband+coat, Frost Wyrm cute/fat, ice cavern, boss scale"
  },
  {
    id: "scene-07", act: "act3", name: "DLC 2&3: Sky Islands + Championship",
    time: "1:42-1:55", duration: "13s", version: "v2",
    emotion: "Spectacle → vertigo → freedom → majesty",
    desc: "Panthera (crimson red hair, pale skin, red/gold armor, massive angel wings with golden guards, holy orb) and Santaboy (Santa hat, glasses, red rose, full red outfit, golden wings, candy cane) on crystal bridge platform. Griffins, airship, clouds.",
    img: "scene-07-v2-sky-islands-panthera-santaboy.png",
    status: "verified",
    checks: "Panthera: red hair/armor/wings/orb. Santaboy: hat/glasses/rose/red outfit/golden wings/candy cane"
  },
  {
    id: "scene-08", act: "act3", name: "DLC 4: THE FORGOTTEN FLOOR",
    time: "1:55-2:03", duration: "8s", version: "v2",
    emotion: "Mystery, ancient wonder, unsettling beauty",
    desc: "RegginO (long pink-magenta hair, lavender highlights, floral crown, dark navy tunic, teal magic orb) and Sweetiez (golden blonde twin-tails past waist, purple combat dress, mystical staff) walk through 20m bioluminescent mushroom cavern with clockwork ruins.",
    img: "scene-08-v2-forgotten-floor-reggino-sweetiez.png",
    status: "verified",
    checks: "RegginO: pink hair/floral crown/magic orb. Sweetiez: twin-tails/purple dress/staff. Mushrooms/gears/library"
  },
  {
    id: "scene-09", act: "act3", name: "DLC 5: SS REGINA — The Storm",
    time: "2:03-2:15", duration: "12s", version: "v1",
    emotion: "Reverence, historical awe, haunting silence",
    desc: "SS Regina — period-accurate early 1900s Great Lakes steamship in the Great Storm of 1913. Massive waves, lightning, pilothouse, smokestack, cargo crates. Historically grounded.",
    img: "scene-09-ss-regina-storm.png",
    status: "verified",
    checks: "Historical accuracy, ship details, storm drama, period correctness"
  },
  {
    id: "scene-10", act: "act4", name: "SAMSARA — Every Creature Has a Soul",
    time: "2:15-2:35", duration: "20s", version: "v1",
    emotion: "Dread → punishment → redemption → hope → tears",
    desc: "Massive golden dharma Wheel of Samsara with yin-yang center. Split scene: hellfire left / cherry blossoms right. Spirit animals (wolf, deer, owl, lamb). Adventurer kneeling before the Wheel.",
    img: "scene-10-samsara-wheel.png",
    status: "verified",
    checks: "Dharma wheel, duality composition, spirit animals, emotional arc"
  },
  {
    id: "scene-11", act: "act4", name: "GUILD ASSEMBLES — NumbahWan United",
    time: "2:35-2:45", duration: "10s", version: "v3",
    emotion: "Belonging, invitation, epic finality",
    desc: "All 7 characters: RegginA center (BLACK headband prongs, fur coat, hammer), Natehouoho (beanie, butterfly wings), RegginO (pink hair, floral crown, orb), Sweetiez (twin-tails, staff), Panthera (red hair), plus more. Grand hall with holographic war table.",
    img: "scene-11-v3-guild-assembles-all.png",
    status: "verified",
    checks: "All 7 chars present: RegginA, Natehouoho, RegginO, Sweetiez, Panthera visible. Santaboy/CIA less clear."
  }
];

const feedback = {};

// Build timeline
const timeline = document.getElementById('timeline');
scenes.forEach(s => {
  const seg = document.createElement('div');
  seg.className = `timeline-segment ${s.act}`;
  seg.title = `${s.id}: ${s.name} (${s.time})`;
  seg.onclick = () => document.getElementById(s.id).scrollIntoView({ behavior: 'smooth' });
  timeline.appendChild(seg);
});

// Build grid
const grid = document.getElementById('grid');
scenes.forEach(s => {
  const card = document.createElement('div');
  card.className = `scene-card ${s.act}`;
  card.id = s.id;
  const vBadge = s.version !== 'v1' ? `<span style="background:#ffd70033;color:#ffd700;padding:1px 6px;border-radius:3px;font-size:0.7rem;margin-left:6px">${s.version}</span>` : '';
  const statusBadge = s.status === 'verified' ? '<span style="background:#22c55e22;color:#22c55e;padding:1px 6px;border-radius:3px;font-size:0.7rem;margin-left:6px">VERIFIED</span>' : '';
  card.innerHTML = `
    <img src="${s.img}" alt="${s.name}" loading="lazy" onclick="toggleZoom(this)">
    <div class="scene-info">
      <div class="scene-header">
        <span class="scene-id">${s.id} · ${s.duration}${vBadge}${statusBadge}</span>
        <span class="scene-time">${s.time}</span>
      </div>
      <div class="scene-name">${s.name}</div>
      <div class="scene-emotion">${s.emotion}</div>
      <div class="scene-desc">${s.desc}</div>
      <div style="font-size:0.75rem;color:#666;margin-top:6px;font-style:italic">Checks: ${s.checks}</div>
      <div class="feedback-row">
        <button class="btn btn-approve" onclick="setFeedback('${s.id}','approve',this)">Approve</button>
        <button class="btn btn-flag" onclick="setFeedback('${s.id}','flag',this)">Flag for Redo</button>
      </div>
    </div>
  `;
  grid.appendChild(card);
});

function toggleZoom(img) {
  img.classList.toggle('zoomed');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('img.zoomed').forEach(i => i.classList.remove('zoomed'));
  }
});

function setFeedback(id, type, btn) {
  const card = document.getElementById(id);
  card.querySelectorAll('.btn-approve,.btn-flag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  feedback[id] = type;
  updateCounts();
}

function updateCounts() {
  const vals = Object.values(feedback);
  document.getElementById('approvedCount').textContent = vals.filter(v => v === 'approve').length;
  document.getElementById('flaggedCount').textContent = vals.filter(v => v === 'flag').length;
}

function exportFeedback() {
  const data = JSON.stringify(feedback, null, 2);
  navigator.clipboard.writeText(data).then(() => alert('Feedback copied to clipboard!\n\n' + data));
}
</script>
</body>
</html>
